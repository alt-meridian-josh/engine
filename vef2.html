<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alt Meridian · VEF Assist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: {
        bg:'#0e0e0e', surface:'#141414', surface2:'#1a1a1a',
        border:'#222222', border2:'#2d2d2d',
        ink:'#e8e8e8', ink2:'#888888', ink3:'#444444',
        red:'#d63b2f', 'red-dim':'rgba(214,59,47,0.10)',
        green:'#2d7d4f', amber:'#b45309', blue:'#1d4ed8', teal:'#0f766e'
      },
      fontFamily: {
        display:['Syne','sans-serif'],
        mono:['"DM Mono"','monospace'],
        sans:['Syne','system-ui','sans-serif']
      }
    } } };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html, body, #root { height: 100%; }
    body { background:#0e0e0e; color:#e8e8e8; font-family:'Syne', system-ui, sans-serif; }
    input, textarea, button, select { font-family: inherit; }
    input[type=range] { accent-color:#d63b2f; }
  </style>
</head>
<body class="bg-bg text-ink">
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    /* ---------- SUPABASE ---------- */
    const SUPABASE_URL = 'https://kpecdezcolcycgpuqbgs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZWNkZXpjb2xjeWNncHVxYmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODIyMDYsImV4cCI6MjA5MTI1ODIwNn0.rKHzdjjkYToEZWdS0ngg3Kgigh_gDWt5cRbLBCE44rg';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    async function sbSelect(table, q) {
      let b = sb.from(table).select('*');
      if (q?.eq) Object.entries(q.eq).forEach(([k, v]) => b = b.eq(k, v));
      if (q?.limit) b = b.limit(q.limit);
      const { data, error } = await b;
      if (error) throw error;
      return data || [];
    }
    async function sbInsert(table, row) {
      const { data, error } = await sb.from(table).insert(row).select();
      if (error) throw error;
      return data?.[0] || null;
    }
    async function sbUpsert(table, row, onConflict) {
      const { data, error } = await sb.from(table).upsert(row, onConflict ? { onConflict } : {}).select();
      if (error) throw error;
      return data?.[0] || null;
    }

    /* ---------- LOADERS ---------- */
    const cleanDomainName = (n) => (n || '').replace(/^[A-Z][A-Z0-9]+\s+—\s+/, '');
    async function loadDomains() {
      const arr = await sbSelect('vef_domains');
      const m = {}; arr.forEach(d => m[d.domain_id] = d); return m;
    }
    const loadAllScenarios = () => sbSelect('vef_value_scenarios').catch(() => []);
    const loadValueSignals = (domainId) => sbSelect('vef_value_signals', { eq: { domain_id: domainId } }).catch(() => []);
    async function loadInputDefinitions(domainId, domain) {
      let rows = await sbSelect('vef_input_definitions', { eq: { domain_id: domainId } }).catch(() => []);
      if (!rows.length && domain?.technology === 'RFID' && domainId !== 'RFD') {
        rows = await sbSelect('vef_input_definitions', { eq: { domain_id: 'RFD' } }).catch(() => []);
      }
      const seen = new Set();
      return rows.filter(r => seen.has(r.input_key) ? false : (seen.add(r.input_key), true));
    }

    /* ---------- VOCAB + FORMAT ---------- */
    const OUTCOMES = [
      { key: 'Visibility',   color: '#93c5fd', desc: "Know where things are and what condition they're in" },
      { key: 'Throughput',   color: '#fbbf24', desc: 'Move things faster through your operation' },
      { key: 'Compliance',   color: '#c4b5fd', desc: 'Prove what happened and when' },
      { key: 'Risk',         color: '#f87171', desc: 'Predict and prevent financial exposure' },
      { key: 'Intelligence', color: '#5eead4', desc: 'Turn data into faster decisions' },
      { key: 'Performance',  color: '#86efac', desc: 'Get more from equipment and assets' },
      { key: 'Revenue',      color: '#6ee7b7', desc: "Capture value that's being lost" }
    ];
    const OUTCOME_BY = OUTCOMES.reduce((m, o) => (m[o.key] = o, m), {});
    // Op areas — "Where in their operation?" chips (multi-select).
    const OP_AREAS = [
      { key: 'store',     label: 'Store / Branch',             sub: 'Frontline locations' },
      { key: 'warehouse', label: 'Warehouse / DC',             sub: 'Inventory & flows' },
      { key: 'plant',     label: 'Plant / Line',               sub: 'Production & quality' },
      { key: 'fleet',     label: 'Fleet / Field',              sub: 'Mobile assets & routes' },
      { key: 'office',    label: 'Back Office / Finance',      sub: 'Planning, risk, finance' },
      { key: 'platform',  label: 'Digital Product / Platform', sub: 'Software, data, APIs' }
    ];
    // Solution patterns shown after at least one op area is picked.
    // `match` regex resolves a pattern to its representative domain by scanning
    // domain_name + technology + primary_outcome of each domain in the catalog.
    const SOLUTION_PATTERNS = [
      { key: 'asset_location', label: 'Asset & Location Intelligence', desc: "Track what's where in real time.",            opAreas: ['store','warehouse','plant','fleet'], match: /rfid|rtls|gps|ble|location|asset[\s-]*track|track[\s-]*asset|telemetry|tag/i },
      { key: 'risk_cat',       label: 'Risk & Cat Analytics',          desc: 'Predict and prevent financial exposure.',     opAreas: ['office','plant','fleet'],            match: /risk|insur|compliance|catastrophe|fraud|exposure|safety/i },
      { key: 'cv_quality',     label: 'Computer Vision Quality',       desc: 'Visual inspection and defect detection.',     opAreas: ['plant','warehouse'],                 match: /vision|inspect|defect|visual|imaging|camera/i },
      { key: 'enterprise_ai',  label: 'Enterprise AI Platform',        desc: 'Foundation for cross-cutting AI workflows.',  opAreas: ['office','platform'],                 match: /\bai\b|\bml\b|machine[\s-]*learn|llm|gen[\s-]*ai|intelligence/i },
      { key: 'inventory_flow', label: 'Inventory & Flow Optimization', desc: 'Move things faster through your operation.',  opAreas: ['warehouse','store'],                 match: /inventory|throughput|picking|pick[\s-]*pack|flow|wms|stock/i },
      { key: 'workforce',      label: 'Workforce & Productivity',      desc: 'Get more from your people.',                  opAreas: ['store','warehouse','plant','office'], match: /labor|workforce|productiv|employee|crew|wfm/i },
      { key: 'connected_ops',  label: 'Connected Operations',          desc: 'Real-time visibility across your operation.', opAreas: ['plant','warehouse','fleet'],         match: /iot|connect|telemetry|real[\s-]?time|sensor|mes|scada/i },
      { key: 'data_platform',  label: 'Data & Integration',            desc: 'Software, data flows, APIs.',                 opAreas: ['platform','office'],                 match: /data|api|integrat|platform|etl|lake|stream/i }
    ];
    function resolvePatternDomain(pattern, domains) {
      for (const d of Object.values(domains || {})) {
        const hay = [d.domain_name, d.technology, d.primary_outcome].filter(Boolean).join(' ');
        if (pattern.match.test(hay)) return d.domain_id;
      }
      return null;
    }
    const THEME_COLORS = {
      'Operational Efficiency':'#fbbf24', 'Compliance & Risk':'#c4b5fd', 'Asset Performance':'#86efac',
      'Inventory Accuracy':'#93c5fd', 'Throughput':'#f59e0b', 'Visibility':'#60a5fa',
      'Revenue':'#6ee7b7', 'Labor Productivity':'#5eead4'
    };
    const themeColor = (t) => THEME_COLORS[t] || '#888';
    function fmtMoney(n) {
      if (n == null || !isFinite(n)) return '—';
      const a = Math.abs(n);
      if (a >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
      if (a >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
      if (a >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
      return '$' + Math.round(n).toLocaleString();
    }

    /* ---------- FUZZY TOKENIZER (lesson 2026-04-24) ---------- */
    // length>=3 + stopwords filter; secondary 'strong' bucket gated at length>=6
    // for categorical fields (mechanism_label + value_theme).
    const STOPWORDS = new Set('the and for with from this that have been into were when what your you are our about over more some most all any can will would could should there their these those'.split(' '));
    function tokensFor(text) {
      return new Set(String(text || '').toLowerCase().match(/[a-z][a-z0-9_-]{2,}/g)?.filter(w => !STOPWORDS.has(w)) || []);
    }
    function strongTokens(text) {
      return new Set([...tokensFor(text)].filter(w => w.length >= 6));
    }

    /* ---------- CLAIM EXTRACTION + MATCHING ---------- */
    const QUANTITY_RE = /(\$\s?[\d,]+(?:\.\d+)?\s?(?:k|m|b|million|billion)?|\d{1,3}(?:\.\d+)?\s?%|\d+\s?(?:hours?|days?|weeks?|months?|min|x|times))/i;
    function extractClaims(text) {
      const lines = (text || '').split(/[\n\.]+/).map(l => l.trim()).filter(Boolean);
      const out = [];
      for (const line of lines) {
        const m = line.match(QUANTITY_RE);
        if (!m) continue;
        const value = m[0].trim();
        const metric = line.replace(m[0], '').replace(/\b(by|of|to|at|in|on|the|a|an|with|from|up|down)\b/gi, '').replace(/\s+/g, ' ').trim();
        if (metric.length < 3) continue;
        out.push({ raw: line, metric: metric.slice(0, 80), value });
      }
      return out;
    }
    function matchClaim(claim, pool) {
      const claimTok = tokensFor(claim.metric);
      const claimStrong = strongTokens(claim.metric);
      if (!claimTok.size) return null;
      let best = { score: 0, scenario: null };
      for (const sc of pool || []) {
        const text = [sc.mechanism_label, sc.value_theme, sc.one_liner, sc.scenario_description].filter(Boolean).join(' ');
        const stTok = tokensFor(text);
        const stStrong = strongTokens([sc.mechanism_label, sc.value_theme].filter(Boolean).join(' '));
        let hits = 0, strongHits = 0;
        claimTok.forEach(t => { if (stTok.has(t)) hits++; });
        claimStrong.forEach(t => { if (stStrong.has(t)) strongHits++; });
        if (hits >= 2 || strongHits >= 1) {
          const score = hits * 10 + strongHits * 5 - (Number(sc.print_priority) || 0);
          if (score > best.score) best = { score, scenario: sc };
        }
      }
      return best.scenario;
    }
    const VERDICTS = [
      { key: 'Accept',    color: '#86efac' },
      { key: 'Adjust',    color: '#fbbf24' },
      { key: 'Challenge', color: '#f87171' },
      { key: 'Missing',   color: '#93c5fd' }
    ];
    const VERDICT_BY = VERDICTS.reduce((m, v) => (m[v.key] = v, m), {});
    const cycleVerdict = (cur) => { const i = VERDICTS.findIndex(v => v.key === cur); return VERDICTS[(i + 1) % VERDICTS.length].key; };
    function VerdictChip({ verdict, onCycle }) {
      const v = VERDICT_BY[verdict] || VERDICTS[1];
      return (
        <button onClick={onCycle} title="Click to cycle"
          className="text-[10px] font-mono uppercase tracking-widest px-2 py-0.5"
          style={{ background: v.color + '22', color: v.color, border: '1px solid ' + v.color + '55' }}>{v.key}</button>
      );
    }
    function ClaimCard({ claim, onCycle }) {
      const v = VERDICT_BY[claim.verdict] || VERDICTS[1];
      return (
        <div className="bg-surface border-l-2 border border-border p-4 transition-colors" style={{ borderLeftColor: v.color }}>
          <div className="flex items-start justify-between gap-3 mb-2">
            <div className="font-display text-base text-ink min-w-0 flex-1">{claim.metric}</div>
            <div className="font-mono text-base text-ink flex-shrink-0">{claim.value}</div>
          </div>
          <div className="flex items-center justify-between gap-3 pt-3 border-t border-border">
            <div className="text-[11px] font-mono text-ink2 truncate min-w-0">{claim.scenario ? '→ ' + (claim.scenario.mechanism_label || claim.scenario.scenario_id) : <span className="text-ink3 italic">no match</span>}</div>
            <VerdictChip verdict={claim.verdict} onCycle={onCycle} />
          </div>
        </div>
      );
    }

    /* ---------- STEP 0 IMPORT ---------- */
    function Step0Import({ s, update, matchPool, onSkip }) {
      const [busy, setBusy] = useState(false);
      const extract = async () => {
        if (!s.pasted.trim()) return;
        setBusy(true);
        try {
          const claims = extractClaims(s.pasted).map(c => ({ ...c, scenario: matchClaim(c, matchPool), verdict: 'Adjust' }));
          update({ claims, extracted: true });
        } finally { setBusy(false); }
      };
      const cycleClaim = (i) => update({ claims: s.claims.map((c, idx) => idx === i ? { ...c, verdict: cycleVerdict(c.verdict) } : c) });
      return (
        <div>
          <div className="text-[12px] text-ink2 mb-3 leading-relaxed">Paste a vendor's ROI claim, case study excerpt, or marketing one-pager. We'll extract the quantitative claims and try to map each to a value mechanism.</div>
          <textarea value={s.pasted} onChange={e => update({ pasted: e.target.value })}
            rows={7} placeholder={'e.g. "Customers see 30% reduction in inventory shrinkage and save $400K annually in labor costs by using our RFID solution. Picking accuracy improves to 99.9%."'}
            className="w-full bg-surface border border-border px-3 py-2.5 text-sm focus:border-red outline-none mb-3" />
          <div className="flex items-center gap-3 mb-6">
            <button onClick={extract} disabled={busy || !s.pasted.trim()}
              className="bg-red hover:bg-red/90 disabled:opacity-40 text-white px-4 py-2 text-[11px] font-mono uppercase tracking-widest">{busy ? 'Extracting…' : 'Extract & map →'}</button>
            <button onClick={onSkip} className="text-[11px] font-mono text-ink2 hover:text-red uppercase tracking-widest">Skip →</button>
          </div>
          {s.extracted && s.claims.length === 0 && (
            <div className="text-[11px] font-mono text-ink3 italic">No quantitative claims found. Paste vendor copy with concrete numbers ($, %, time, multiples) or skip ahead.</div>
          )}
          {s.claims.length > 0 && (
            <div>
              <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-3">{s.claims.length} extracted claims</div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {s.claims.map((c, i) => <ClaimCard key={i} claim={c} onCycle={() => cycleClaim(i)} />)}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ---------- STEP 1 CONTEXT ---------- */
    function OutcomeTile({ outcome, selected, onToggle }) {
      return (
        <button onClick={() => onToggle(outcome.key)}
          className={`text-left p-4 border transition-colors ${selected ? 'border-red bg-red/10' : 'border-border bg-surface hover:border-border2'}`}>
          <div className="flex items-center gap-2">
            <span className="w-2 h-2 rounded-full" style={{ background: outcome.color }} />
            <span className="font-display text-base text-ink">{outcome.key}</span>
          </div>
          <div className="text-[11px] text-ink2 mt-1.5 leading-relaxed">{outcome.desc}</div>
        </button>
      );
    }
// MetaPills (Rule 1: kill forms — 3 inline placeholder inputs, no labels)
    function MetaPills({ s, update }) {
      const cls = "bg-surface border border-border px-3 py-2 text-sm font-mono text-ink placeholder:text-ink3 focus:border-red outline-none";
      return (
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
          <input value={s.analysis_name} onChange={e => update({ analysis_name: e.target.value })} placeholder="analysis name" className={cls} />
          <input value={s.customer} onChange={e => update({ customer: e.target.value })} placeholder="customer" className={cls} />
          <input value={s.vendor} onChange={e => update({ vendor: e.target.value })} placeholder="vendor" className={cls} />
        </div>
      );
    }
    function OpAreaChip({ area, selected, onToggle }) {
      return (
        <button onClick={() => onToggle(area.key)}
          className={`text-left px-3 py-2 border transition-colors ${selected ? 'border-red bg-red/10' : 'border-border bg-surface hover:border-border2'}`}>
          <div className="font-display text-sm text-ink">{area.label}</div>
          <div className="text-[10px] font-mono text-ink2 mt-0.5">{area.sub}</div>
        </button>
      );
    }
    function SolutionPatternTile({ pattern, resolvable, selected, onSelect }) {
      const disabled = !resolvable;
      return (
        <button onClick={() => !disabled && onSelect(pattern.key)} disabled={disabled}
          className={`text-left p-3 border transition-colors ${disabled ? 'border-border bg-bg opacity-40 cursor-not-allowed' : selected ? 'border-red bg-red/10' : 'border-border bg-surface hover:border-border2'}`}>
          <div className="font-display text-sm text-ink">{pattern.label}</div>
          <div className="text-[11px] text-ink2 mt-1 leading-relaxed">{pattern.desc}</div>
          {disabled && <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mt-1.5">No matching engine in library</div>}
        </button>
      );
    }
    function Step1Context({ s, update, matchPool, domains, attempted }) {
      const toggleOutcome = (key) => {
        const next = s.outcomes.includes(key) ? s.outcomes.filter(o => o !== key) : [...s.outcomes, key];
        update({ outcomes: next });
      };
      const toggleArea = (key) => {
        const next = new Set(s.opAreas);
        next.has(key) ? next.delete(key) : next.add(key);
        // Re-validate selected pattern against the new op-area set; clear if no overlap.
        const pat = s.pattern ? SOLUTION_PATTERNS.find(p => p.key === s.pattern) : null;
        const stillValid = pat && pat.opAreas.some(a => next.has(a));
        update({ opAreas: next, ...(stillValid ? {} : { pattern: null, domain: null }) });
      };
      const visiblePatterns = useMemo(() => {
        if (s.opAreas.size === 0) return [];
        return SOLUTION_PATTERNS.filter(p => p.opAreas.some(a => s.opAreas.has(a)));
      }, [s.opAreas]);
      const pickPattern = (key) => {
        const p = SOLUTION_PATTERNS.find(x => x.key === key);
        const did = p ? resolvePatternDomain(p, domains) : null;
        update({ pattern: key, domain: did });
      };
      const showAreaError = attempted && s.opAreas.size === 0;
      return (
        <div>
          <div className="text-[12px] text-ink2 mb-4 leading-relaxed">Pick the business outcomes this analysis is targeting. Multi-select.</div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-8">
            {OUTCOMES.map(o => <OutcomeTile key={o.key} outcome={o} selected={s.outcomes.includes(o.key)} onToggle={toggleOutcome} />)}
          </div>
          {s.outcomes.length > 0 && (
            <>
              <div className="flex items-center justify-between mb-1">
                <div className="font-display text-base text-ink">Where in their operation?</div>
                <span className="text-[9px] font-mono uppercase tracking-widest px-2 py-0.5 border border-border2 text-ink3">Multi-select</span>
              </div>
              <div className="text-[12px] text-ink2 mb-3 leading-relaxed">Choose the parts of the operation most affected by this problem.</div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                {OP_AREAS.map(a => <OpAreaChip key={a.key} area={a} selected={s.opAreas.has(a.key)} onToggle={toggleArea} />)}
              </div>
              {s.opAreas.size > 0 && (
                <div className="text-[10px] font-mono text-ink3 italic mt-2">Tip: add another area if the problem spans multiple parts of the operation.</div>
              )}
              {showAreaError && (
                <div className="text-[11px] font-mono text-red mt-3 border-l-2 border-red bg-red/5 px-3 py-2">Pick at least one part of the operation so we can narrow the right engines.</div>
              )}
              {s.opAreas.size > 0 && (
                <div className="mt-6 mb-8">
                  <div className="text-[10px] font-mono uppercase tracking-widest text-red mb-3">Solution pattern</div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    {visiblePatterns.map(p => (
                      <SolutionPatternTile key={p.key} pattern={p}
                        resolvable={!!resolvePatternDomain(p, domains)}
                        selected={s.pattern === p.key}
                        onSelect={pickPattern} />
                    ))}
                  </div>
                </div>
              )}
            </>
          )}
          <div className="mb-3">
            <div className="text-[10px] font-mono uppercase tracking-widest text-ink3 mb-2">Tag this analysis</div>
            <MetaPills s={s} update={update} />
          </div>
          <button onClick={() => update({ whatToProveOpen: !s.whatToProveOpen })}
            className="text-[10px] font-mono uppercase tracking-widest text-ink2 hover:text-red flex items-center gap-1.5 mt-3">
            <span className="text-ink3">{s.whatToProveOpen ? '▾' : '▸'}</span>
            {s.whatToProveOpen ? "What we're trying to prove" : 'Add context +'}
          </button>
          {s.whatToProveOpen && (
            <textarea value={s.whatToProve} onChange={e => update({ whatToProve: e.target.value })}
              rows={3} placeholder="What's the question this analysis needs to answer?"
              className="w-full mt-2 bg-surface border border-border px-3 py-2 text-sm focus:border-red outline-none" />
          )}
        </div>
      );
    }

    /* ---------- STEP 2 SCENARIOS ---------- */
    function ScenarioPickRow({ scenario, checked, recommended, matched, onToggle }) {
      const ev = scenario.evidence_strength || 'Moderate';
      const evColor = ev === 'Strong' ? '#86efac' : ev === 'Weak' ? '#f87171' : '#fbbf24';
      const evPct = ev === 'Strong' ? 100 : ev === 'Weak' ? 30 : 60;
      const themeC = themeColor(scenario.value_theme);
      return (
        <button onClick={() => onToggle(scenario.scenario_id)}
          className={`w-full text-left grid grid-cols-12 gap-3 items-center p-3 border transition-colors ${checked ? 'bg-red/10 border-red' : 'border-border bg-surface hover:border-border2'}`}>
          <span className={`col-span-1 w-4 h-4 border flex items-center justify-center flex-shrink-0 ${checked ? 'bg-red border-red' : 'border-border2'}`}>
            {checked && <span className="text-white text-[10px]">✓</span>}
          </span>
          <div className="col-span-7 sm:col-span-6 min-w-0">
            <div className="flex items-center gap-2 flex-wrap">
              {scenario.value_theme && <span className="text-[9px] font-mono uppercase tracking-wider px-1.5 py-0.5" style={{ background: themeC + '22', color: themeC }}>{scenario.value_theme}</span>}
              {recommended && <span className="text-[9px] font-mono uppercase tracking-widest text-green">★ Recommended</span>}
              {matched && <span className="text-[9px] font-mono uppercase tracking-widest text-red">↳ Matched</span>}
            </div>
            <div className="text-sm text-ink truncate mt-0.5">{scenario.mechanism_label || scenario.scenario_label || 'Untitled'}</div>
          </div>
          <div className="col-span-4 sm:col-span-5 flex items-center gap-2">
            <div className="flex-1 h-1 bg-surface2 relative">
              <div className="absolute inset-y-0 left-0" style={{ width: evPct + '%', background: evColor }} />
            </div>
            <span className="text-[9px] font-mono uppercase tracking-widest flex-shrink-0" style={{ color: evColor }}>{ev}</span>
          </div>
        </button>
      );
    }
    function Step2Scenarios({ s, update, matchPool }) {
      const pool = useMemo(() => {
        if (!s.domain || !matchPool) return [];
        let list = matchPool.filter(sc => sc.domain_id === s.domain);
        if (!list.length) list = matchPool.filter(sc => sc.domain_id === 'RFD');
        return list;
      }, [matchPool, s.domain]);
      const matchedIds = useMemo(() => new Set((s.claims || []).filter(c => c.scenario && c.verdict !== 'Missing').map(c => c.scenario.scenario_id)), [s.claims]);
      const allThemes = useMemo(() => Array.from(new Set(pool.map(p => p.value_theme).filter(Boolean))).sort(), [pool]);
      const filtered = useMemo(() => {
        const q = (s.scenarioSearch || '').toLowerCase();
        return pool.filter(sc => {
          if (s.themeFilter.size && !s.themeFilter.has(sc.value_theme)) return false;
          if (q && !((sc.mechanism_label || '') + ' ' + (sc.one_liner || '') + ' ' + (sc.scenario_description || '')).toLowerCase().includes(q)) return false;
          return true;
        });
      }, [pool, s.scenarioSearch, s.themeFilter]);
      const toggle = (id) => {
        const next = new Set(s.selectedScenarios);
        next.has(id) ? next.delete(id) : next.add(id);
        update({ selectedScenarios: next });
      };
      const toggleTheme = (t) => {
        const next = new Set(s.themeFilter); next.has(t) ? next.delete(t) : next.add(t);
        update({ themeFilter: next });
      };
      const selectAll = () => update({ selectedScenarios: new Set(filtered.map(sc => sc.scenario_id)) });
      const clearAll = () => update({ selectedScenarios: new Set() });
      if (!s.domain) return <div className="text-[12px] font-mono text-ink3 italic">Pick a domain in step 1 first.</div>;
      return (
        <div>
          <div className="text-[12px] text-ink2 mb-4 leading-relaxed">{pool.length} mechanisms available. Pick the ones that fit this customer's situation — the interpretation panel updates live.</div>
          <div className="flex items-center gap-2 mb-3">
            <input value={s.scenarioSearch} onChange={e => update({ scenarioSearch: e.target.value })}
              placeholder="search mechanisms…" className="flex-1 bg-surface border border-border px-3 py-2 text-sm font-mono text-ink placeholder:text-ink3 focus:border-red outline-none" />
            <button onClick={selectAll} className="text-[10px] font-mono uppercase tracking-widest text-ink2 hover:text-red">Select all</button>
            <button onClick={clearAll} className="text-[10px] font-mono uppercase tracking-widest text-ink2 hover:text-red">Clear</button>
          </div>
          {allThemes.length > 0 && (
            <div className="flex flex-wrap gap-1.5 mb-4">
              {allThemes.map(t => {
                const on = s.themeFilter.has(t);
                const c = themeColor(t);
                return (
                  <button key={t} onClick={() => toggleTheme(t)}
                    className="text-[10px] font-mono uppercase tracking-wider px-2 py-0.5 transition-colors"
                    style={{ background: on ? c + '33' : 'transparent', color: on ? c : '#888', border: '1px solid ' + (on ? c : '#222') }}>{t}</button>
                );
              })}
            </div>
          )}
          <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-2">{s.selectedScenarios.size} of {filtered.length} selected</div>
          <div className="space-y-2 max-h-[640px] overflow-auto pr-1">
            {filtered.length === 0 && <div className="text-[11px] font-mono text-ink3 italic">No mechanisms match the current filters.</div>}
            {filtered.map(sc => (
              <ScenarioPickRow key={sc.scenario_id} scenario={sc} checked={s.selectedScenarios.has(sc.scenario_id)}
                recommended={!!sc.active_by_default} matched={matchedIds.has(sc.scenario_id)} onToggle={toggle} />
            ))}
          </div>
        </div>
      );
    }

    /* ---------- STEP 3 EVIDENCE ---------- */
    function evidenceStatus(scenario) {
      const ev = scenario.evidence_strength || 'Moderate';
      const ids = String(scenario.evidence_ids || '').split(',').map(x => x.trim()).filter(Boolean);
      if (ev === 'Strong') return { label: 'Good to go', color: '#86efac' };
      if (ev === 'Moderate' && ids.length > 0) return { label: 'Good to go', color: '#86efac' };
      if (ev === 'Moderate') return { label: 'Needs data', color: '#fbbf24' };
      return { label: 'Assumption', color: '#f87171' };
    }
    function EvidenceCoverageTable({ scenarios }) {
      if (!scenarios.length) return <div className="text-[11px] font-mono text-ink3 italic">Pick at least one scenario in step 2.</div>;
      return (
        <table className="w-full">
          <thead>
            <tr className="border-b border-border">
              {['Scenario', 'Evidence', 'Sources', 'Status'].map(h => (
                <th key={h} className="text-left text-[9px] font-mono uppercase tracking-widest text-ink3 py-2 px-3">{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {scenarios.map(sc => {
              const ids = String(sc.evidence_ids || '').split(',').map(x => x.trim()).filter(Boolean);
              const ev = sc.evidence_strength || 'Moderate';
              const evC = ev === 'Strong' ? '#86efac' : ev === 'Weak' ? '#f87171' : '#fbbf24';
              const st = evidenceStatus(sc);
              return (
                <tr key={sc.scenario_id} className="border-b border-border">
                  <td className="py-2.5 px-3 text-xs text-ink truncate max-w-[280px]">{sc.mechanism_label || sc.scenario_id}</td>
                  <td className="py-2.5 px-3"><span className="text-[9px] font-mono uppercase tracking-widest" style={{ color: evC }}>{ev}</span></td>
                  <td className="py-2.5 px-3 text-xs font-mono text-ink2">{ids.length}</td>
                  <td className="py-2.5 px-3"><span className="text-[10px] font-mono" style={{ color: st.color }}>{st.label}</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      );
    }
    function ClaimAuditTable({ claims }) {
      const used = (claims || []).filter(c => c.scenario && c.verdict !== 'Missing');
      if (!used.length) return null;
      return (
        <div className="mt-8">
          <div className="text-[10px] font-mono uppercase tracking-widest text-red mb-3">Claim audit · {used.length} matched</div>
          <table className="w-full">
            <thead>
              <tr className="border-b border-border">
                {['Vendor claim', 'Matched scenario', 'Verdict', 'Evidence'].map(h => (
                  <th key={h} className="text-left text-[9px] font-mono uppercase tracking-widest text-ink3 py-2 px-3">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {used.map((c, i) => {
                const v = VERDICT_BY[c.verdict] || VERDICTS[1];
                const ev = c.scenario?.evidence_strength || 'Moderate';
                const evC = ev === 'Strong' ? '#86efac' : ev === 'Weak' ? '#f87171' : '#fbbf24';
                return (
                  <tr key={i} className="border-b border-border">
                    <td className="py-2.5 px-3 text-xs text-ink"><span className="font-mono mr-2">{c.value}</span>{c.metric}</td>
                    <td className="py-2.5 px-3 text-xs text-ink2 truncate max-w-[200px]">{c.scenario?.mechanism_label || c.scenario?.scenario_id || '—'}</td>
                    <td className="py-2.5 px-3"><span className="text-[10px] font-mono" style={{ color: v.color }}>{v.key}</span></td>
                    <td className="py-2.5 px-3"><span className="text-[10px] font-mono" style={{ color: evC }}>{ev}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }
    function Step3Evidence({ s, update, matchPool, onCreate, busy }) {
      const selectedScenarios = useMemo(() => (matchPool || []).filter(sc => s.selectedScenarios.has(sc.scenario_id)), [matchPool, s.selectedScenarios]);
      return (
        <div>
          <div className="text-[12px] text-ink2 mb-4 leading-relaxed">Coverage of evidence across the chosen mechanisms. "Needs data" or "Assumption" rows are fair game for the customer or finance to challenge.</div>
          <EvidenceCoverageTable scenarios={selectedScenarios} />
          <ClaimAuditTable claims={s.claims} />
          <div className="mt-8">
            <div className="text-[10px] font-mono uppercase tracking-widest text-ink3 mb-2">Notes — what evidence still needs to be gathered?</div>
            <textarea value={s.notes} onChange={e => update({ notes: e.target.value })}
              rows={4} placeholder="case studies to pull, customer references to talk to, finance proof points to source…"
              className="w-full bg-surface border border-border px-3 py-2 text-sm focus:border-red outline-none" />
          </div>
          <div className="mt-8 flex items-center justify-end gap-4">
            <span className="text-[10px] font-mono text-ink3">Ready to create?</span>
            <button onClick={onCreate} disabled={busy || s.selectedScenarios.size === 0 || !s.domain}
              className="bg-red hover:bg-red/90 disabled:opacity-40 text-white px-5 py-2.5 text-xs font-display tracking-wide">
              {busy ? 'Creating…' : 'Create Analysis →'}
            </button>
          </div>
        </div>
      );
    }

    /* ---------- STEPS ---------- */
    const STEPS = [
      { key: 0, label: 'Import',    title: 'Paste a vendor claim' },
      { key: 1, label: 'Context',   title: 'What are we trying to improve?' },
      { key: 2, label: 'Scenarios', title: 'Pick the mechanisms that fit' },
      { key: 3, label: 'Evidence',  title: 'Evidence and audit' }
    ];

    function StepIndicator({ step, complete }) {
      return (
        <div className="flex items-center gap-1.5 sm:gap-2">
          {STEPS.map((s, i) => {
            const isDone = complete[s.key];
            const isCurrent = step === s.key;
            const cls = isDone ? 'bg-red border-red text-white' : isCurrent ? 'bg-bg border-red text-red' : 'bg-bg border-border2 text-ink3';
            return (
              <React.Fragment key={s.key}>
                <div className="flex items-center gap-1.5 sm:gap-2">
                  <div className={`w-5 h-5 sm:w-6 sm:h-6 border flex items-center justify-center text-[10px] font-mono ${cls}`}>{i + 1}</div>
                  <span className={`text-[10px] font-mono uppercase tracking-widest hidden sm:inline ${isCurrent ? 'text-red' : isDone ? 'text-ink' : 'text-ink3'}`}>{s.label}</span>
                </div>
                {i < STEPS.length - 1 && <div className={`w-4 sm:w-8 h-px ${isDone ? 'bg-red' : 'bg-border'}`} />}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    function Topbar({ step, complete, onCancel }) {
      return (
        <header className="h-12 sm:h-14 px-4 sm:px-6 border-b border-border bg-surface flex items-center justify-between flex-shrink-0 gap-3">
          <div className="flex items-center gap-3 sm:gap-6">
            <div className="font-display text-base sm:text-lg tracking-wide"><span className="text-red">ALT</span> <span className="text-ink">MERIDIAN</span></div>
            <span className="font-mono text-[10px] uppercase tracking-widest text-ink2 hidden sm:inline">VEF Assist</span>
          </div>
          <StepIndicator step={step} complete={complete} />
          <button onClick={onCancel} className="text-[11px] font-mono text-ink2 hover:text-red">Cancel</button>
        </header>
      );
    }

    /* ---------- INTERPRETATION PRIMITIVES (Rules 3, 5, 7) ---------- */
    function InterpSection({ title, children }) {
      return (
        <div className="mb-4">
          <div className="text-[9px] font-mono uppercase tracking-widest text-red/80 mb-1.5">{title}</div>
          {children}
        </div>
      );
    }
    function ChipRow({ items, color = '#888', empty = '—' }) {
      if (!items?.length) return <div className="text-[11px] font-mono text-ink3 italic">{empty}</div>;
      return (
        <div className="flex flex-wrap gap-1.5">
          {items.slice(0, 8).map(t => <span key={t} className="text-[10px] font-mono px-2 py-0.5" style={{ background: color + '22', color }}>{t}</span>)}
        </div>
      );
    }
    // OutcomeMatrix — 7 dots, muted if not selected. Always rendered (Rule 3).
    function OutcomeMatrix({ selected }) {
      return (
        <div className="grid grid-cols-7 gap-2">
          {OUTCOMES.map(o => {
            const on = selected.includes(o.key);
            return (
              <div key={o.key} className="flex flex-col items-center gap-1 min-w-0">
                <span className="w-3 h-3 rounded-full transition-opacity" style={{ background: o.color, opacity: on ? 1 : 0.2 }} />
                <span className="text-[8px] font-mono text-center truncate w-full" style={{ color: on ? o.color : '#444' }}>{o.key.slice(0, 4)}</span>
              </div>
            );
          })}
        </div>
      );
    }
    // ThemeDonut — inline SVG showing distribution of themes across a scenario pool (Rule 5).
    function ThemeDonut({ data, size = 80 }) {
      const total = data.reduce((s, d) => s + d.value, 0);
      if (total === 0) return null;
      const r = size / 2 - 6, cx = size / 2, cy = size / 2, C = 2 * Math.PI * r;
      let offset = 0;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1a1a1a" strokeWidth="8" />
          {data.map((d, i) => {
            const len = (d.value / total) * C;
            const seg = <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth="8"
              strokeDasharray={`${len} ${C - len}`} strokeDashoffset={-offset}
              transform={`rotate(-90 ${cx} ${cy})`} vectorEffect="non-scaling-stroke" />;
            offset += len;
            return seg;
          })}
        </svg>
      );
    }
    function EvidenceMixBar({ tally }) {
      const total = tally.Strong + tally.Moderate + tally.Weak;
      if (total === 0) return null;
      return (
        <div className="space-y-1">
          <div className="text-[10px] font-mono text-ink2">{tally.Strong} <span style={{ color: '#86efac' }}>Strong</span> · {tally.Moderate} <span style={{ color: '#fbbf24' }}>Moderate</span> · {tally.Weak} <span style={{ color: '#f87171' }}>Weak</span></div>
          <div className="flex h-1.5 w-full">
            <div style={{ width: ((tally.Strong / total) * 100) + '%', background: '#86efac' }} />
            <div style={{ width: ((tally.Moderate / total) * 100) + '%', background: '#fbbf24' }} />
            <div style={{ width: ((tally.Weak / total) * 100) + '%', background: '#f87171' }} />
          </div>
        </div>
      );
    }

    /* ---------- INTERPRETATION HOOK + PANEL ---------- */
    function useInterpretation(s, matchPool, domains) {
      const [signals, setSignals] = useState([]);
      const [inputDefs, setInputDefs] = useState([]);
      // Load per-domain auxiliary data lazily; falls back to empty if unavailable.
      useEffect(() => {
        if (!s.domain) { setSignals([]); setInputDefs([]); return; }
        const dom = domains[s.domain];
        Promise.all([loadValueSignals(s.domain), loadInputDefinitions(s.domain, dom)])
          .then(([sigs, defs]) => { setSignals(sigs); setInputDefs(defs); }).catch(() => {});
      }, [s.domain, domains]);
      return useMemo(() => {
        const dom = s.domain ? domains[s.domain] : null;
        // Pre-domain pool: filter by selected outcomes (if any), else full library.
        const outcomeFiltered = s.outcomes.length === 0
          ? (matchPool || [])
          : (matchPool || []).filter(sc => {
              const sd = domains[sc.domain_id];
              return sd && s.outcomes.includes(sd.primary_outcome);
            });
        const pool = s.domain ? (matchPool || []).filter(sc => sc.domain_id === s.domain) : outcomeFiltered;
        const themes = Array.from(new Set(pool.map(p => p.value_theme).filter(Boolean)));
        const themeData = themes.map(t => ({ key: t, label: t, value: pool.filter(p => p.value_theme === t).length, color: themeColor(t) }));
        const tally = { Strong: 0, Moderate: 0, Weak: 0 };
        pool.forEach(sc => { const e = sc.evidence_strength || 'Moderate'; if (tally[e] != null) tally[e]++; });
        const score = pool.length === 0 ? 0 : (tally.Strong + tally.Moderate * 0.6 + tally.Weak * 0.3) / pool.length;
        const conf = score >= 0.75 ? { tier: 'STRONG', pct: 90, color: '#86efac' }
                    : score >= 0.45 ? { tier: 'MODERATE', pct: 60, color: '#fbbf24' }
                    : { tier: 'EXPLORATORY', pct: 30, color: '#888' };
        const why = !s.domain
          ? (s.outcomes.length === 0 ? 'Showing the full library. Pick outcomes to narrow.' : `${pool.length} mechanisms across ${s.outcomes.length} outcome${s.outcomes.length > 1 ? 's' : ''}.`)
          : `${pool.length} mechanisms in ${cleanDomainName(dom?.domain_name) || s.domain}.`;
        const signalLabels = (signals || []).map(sg => sg.signal_label || sg.signal_name || sg.signal_key).filter(Boolean);
        const missing = (inputDefs || [])
          .filter(d => d.discovery_prompt && d.input_key !== 'implementation_cost')
          .slice(0, 3)
          .map(d => ({ key: d.input_key, label: d.input_label || d.input_key.replace(/_/g, ' '), discovery: d.discovery_prompt }));
        const topMini = pool.slice().sort((a, b) => (Number(a.print_priority) || 99) - (Number(b.print_priority) || 99)).slice(0, 3);
        return { engine: dom ? cleanDomainName(dom.domain_name) || dom.domain_id : null, pool, themes, themeData, tally, conf, why, signals: signalLabels, missing, topMini };
      }, [s.domain, s.outcomes, matchPool, domains, signals, inputDefs]);
    }
    function InterpretationPanel({ s, ctx }) {
      return (
        <div className="bg-red-dim border border-red/30 p-5 sticky top-4">
          <div className="flex items-center justify-between mb-4">
            <div className="font-display text-base text-red">VEF Interpretation</div>
            <span className="text-[9px] font-mono uppercase tracking-widest text-red/60">live</span>
          </div>
          <InterpSection title="Outcomes selected">
            <OutcomeMatrix selected={s.outcomes} />
            <div className="text-[10px] font-mono text-ink3 mt-2">{s.outcomes.length === 0 ? 'None yet' : s.outcomes.join(' · ')}</div>
          </InterpSection>
          <InterpSection title="Recommended engine">
            <div className="font-display text-sm text-ink">{ctx.engine || <span className="text-ink3 italic font-mono text-[11px]">Pending domain selection.</span>}</div>
          </InterpSection>
          {ctx.themeData.length > 0 && (
            <InterpSection title="Value themes">
              <div className="flex items-center gap-3">
                <ThemeDonut data={ctx.themeData} size={72} />
                <div className="flex-1 min-w-0 space-y-0.5">
                  {ctx.themeData.slice(0, 4).map(d => (
                    <div key={d.key} className="flex items-center gap-1.5 text-[10px]">
                      <span className="w-2 h-2 flex-shrink-0" style={{ background: d.color }} />
                      <span className="text-ink truncate">{d.label}</span>
                    </div>
                  ))}
                </div>
              </div>
            </InterpSection>
          )}
          <InterpSection title="Mechanisms available">
            <div className="font-display text-base text-ink mb-2">{ctx.pool.length}</div>
            <EvidenceMixBar tally={ctx.tally} />
          </InterpSection>
          <InterpSection title="Confidence preview">
            <div className="text-[11px] font-mono text-ink mb-1.5">This analysis will be <span style={{ color: ctx.conf.color }}>{ctx.conf.tier}</span>.</div>
            <div className="h-1.5 bg-surface2 relative">
              <div className="absolute inset-y-0 left-0" style={{ width: ctx.conf.pct + '%', background: ctx.conf.color }} />
            </div>
          </InterpSection>
          {s.domain && (
            <>
              <InterpSection title="Detected signals">
                <ChipRow items={ctx.signals} color="#fbbf24" empty="No signals registered for this domain." />
              </InterpSection>
              {ctx.missing.length > 0 && (
                <InterpSection title="Missing inputs">
                  {ctx.missing.map(m => (
                    <div key={m.key} className="mb-2">
                      <div className="text-[11px] text-ink">{m.label}</div>
                      <div className="text-[10px] font-mono text-ink3 italic">Ask: {m.discovery}</div>
                    </div>
                  ))}
                </InterpSection>
              )}
              {ctx.topMini.length > 0 && (
                <InterpSection title="Top mechanisms">
                  <div className="space-y-1.5">
                    {ctx.topMini.map(sc => {
                      const ev = sc.evidence_strength || 'Moderate';
                      const evC = ev === 'Strong' ? '#86efac' : ev === 'Weak' ? '#f87171' : '#fbbf24';
                      const evPct = ev === 'Strong' ? 100 : ev === 'Weak' ? 30 : 60;
                      return (
                        <div key={sc.scenario_id} className="bg-surface border border-border px-2.5 py-2">
                          <div className="text-[11px] text-ink truncate">{sc.mechanism_label || sc.scenario_id}</div>
                          <div className="flex items-center gap-2 mt-1">
                            <div className="flex-1 h-0.5 bg-surface2 relative"><div className="absolute inset-y-0 left-0" style={{ width: evPct + '%', background: evC }} /></div>
                            <span className="text-[8px] font-mono uppercase tracking-widest" style={{ color: evC }}>{ev}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </InterpSection>
              )}
            </>
          )}
          <div className="text-[10px] font-mono text-ink3 italic pt-3 border-t border-red/20">{ctx.why}</div>
        </div>
      );
    }

    /* ---------- CREATE ANALYSIS ---------- */
    function buildEngagementRow({ s }) {
      const today = new Date().toISOString().slice(0, 10);
      const id = (crypto && crypto.randomUUID) ? crypto.randomUUID() : 'eng_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      // Lesson 2026-04-24 — speculative fields stash into `notes` with labeled prefix.
      // Never INSERT unknown columns; PostgREST fails loud.
      const claimSummary = (s.claims || []).filter(c => c.scenario && c.verdict !== 'Missing')
        .map(c => `  - "${c.metric}" ${c.value} → ${c.scenario.mechanism_label || c.scenario.scenario_id} [${c.verdict}]`).join('\n');
      const parts = [];
      if (s.whatToProve) parts.push("WHAT WE'RE TRYING TO PROVE:\n" + s.whatToProve);
      if (s.outcomes.length) parts.push('TARGET OUTCOMES: ' + s.outcomes.join(', '));
      if (claimSummary) parts.push('VENDOR CLAIMS:\n' + claimSummary);
      if (s.notes) parts.push('EVIDENCE NOTES:\n' + s.notes);
      return {
        engagement_id: id,
        analysis_name: s.analysis_name || 'Untitled analysis',
        prospect_name: s.customer || null,
        vendor_name:   s.vendor || null,
        domain_id:     s.domain,
        intake_date:   today,
        deal_stage:    'discovery',
        engagement_status: 'Draft',
        phase:         'Discovery',
        notes:         parts.join('\n\n') || null
      };
    }
    async function createAnalysis(s) {
      if (!s.domain || !s.selectedScenarios.size) throw new Error('Pick a domain and at least one scenario.');
      const row = buildEngagementRow({ s });
      await sbInsert('vef_engagements', row);
      await Promise.all(Array.from(s.selectedScenarios).map(scenario_id =>
        sbUpsert('vef_scenario_selections', { engagement_id: row.engagement_id, scenario_id, is_active: true }, 'engagement_id,scenario_id')
      ));
      return row.engagement_id;
    }

    /* ---------- APP STATE ---------- */
    function makeInitialState() {
      return {
        pasted: '', claims: [], extracted: false,
        outcomes: [], opAreas: new Set(), domain: null, pattern: null,
        analysis_name: '', customer: '', vendor: '',
        whatToProve: '', whatToProveOpen: false,
        selectedScenarios: new Set(),
        scenarioSearch: '', themeFilter: new Set(),
        notes: ''
      };
    }

    function App() {
      const [step, setStep] = useState(0);
      const [s, setS] = useState(makeInitialState);
      const [matchPool, setMatchPool] = useState([]);
      const [domains, setDomains] = useState({});
      const [busy, setBusy] = useState(false);
      const update = (patch) => setS(prev => ({ ...prev, ...patch }));
      const onCreate = async () => {
        setBusy(true);
        try {
          const id = await createAnalysis(s);
          location.href = 'workspace2.html?engagement=' + encodeURIComponent(id);
        } catch (e) {
          alert('Create failed: ' + (e.message || e));
          setBusy(false);
        }
      };
      // Preload library + domains so the interpretation panel is alive from frame 1 (Rule 3).
      useEffect(() => {
        loadAllScenarios().then(setMatchPool).catch(() => {});
        loadDomains().then(setDomains).catch(() => {});
      }, []);
      const ctx = useInterpretation(s, matchPool, domains);
      const [attempted, setAttempted] = useState({});
      const complete = useMemo(() => ({
        0: s.extracted || s.claims.length > 0,
        1: s.outcomes.length > 0 && s.opAreas.size > 0 && !!s.domain,
        2: s.selectedScenarios.size > 0,
        3: false
      }), [s]);
      const tryNext = () => {
        if (!complete[step]) { setAttempted(a => ({ ...a, [step]: true })); return; }
        setStep(p => Math.min(STEPS.length - 1, p + 1));
      };
      const cancel = () => { if (confirm('Cancel and discard?')) location.href = 'workspace2.html'; };
      return (
        <div className="h-full flex flex-col bg-bg">
          <Topbar step={step} complete={complete} onCancel={cancel} />
          <main className="flex-1 overflow-auto">
            <div className="max-w-[1280px] mx-auto px-4 sm:px-8 py-6 sm:py-10 grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-8">
              <section className="md:col-span-7">
                <div className="font-display text-xl sm:text-2xl text-ink mb-1">{STEPS[step].title}</div>
                <div className="text-[11px] font-mono text-ink2 mb-6 sm:mb-8">Step {step + 1} of {STEPS.length} · {STEPS[step].label}</div>
                {step === 0 && <Step0Import s={s} update={update} matchPool={matchPool} onSkip={() => setStep(1)} />}
                {step === 1 && <Step1Context s={s} update={update} matchPool={matchPool} domains={domains} attempted={!!attempted[1]} />}
                {step === 2 && <Step2Scenarios s={s} update={update} matchPool={matchPool} />}
                {step === 3 && <Step3Evidence s={s} update={update} matchPool={matchPool} onCreate={onCreate} busy={busy} />}
                <div className="mt-12 flex items-center justify-between">
                  <button onClick={() => setStep(p => Math.max(0, p - 1))} disabled={step === 0}
                    className="text-[11px] font-mono uppercase tracking-widest text-ink2 hover:text-red disabled:opacity-30">← Back</button>
                  <button onClick={tryNext} disabled={step === STEPS.length - 1}
                    className="bg-red hover:bg-red/90 disabled:opacity-30 text-white px-4 py-2 text-[11px] font-mono uppercase tracking-widest">Next →</button>
                </div>
              </section>
              <aside className="md:col-span-5">
                <InterpretationPanel s={s} ctx={ctx} />
              </aside>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
