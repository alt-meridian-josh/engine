<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alt Meridian | Value Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap');
        body { font-family: 'DM Mono', monospace; }
        h1, h2, h3 { font-family: 'Syne', sans-serif; }
        .lever-card { transition: all 0.3s ease; }
        .lever-card:hover { transform: translateY(-2px); border-color: #C84B2F; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-[#F5F2EB] text-[#0F0F0F] min-h-screen">

    <header class="bg-[#0F0F0F] py-5">
        <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
            <div>
                <span class="text-white font-bold text-lg tracking-tight" style="font-family:Syne,sans-serif">ALT MERIDIAN</span>
                <span class="text-[#C84B2F] font-bold text-lg tracking-tight" style="font-family:Syne,sans-serif"> · VALUE ENGINE</span>
            </div>
            <div id="connection-status" class="text-xs font-medium px-3 py-1 rounded-full bg-white/10 text-white/50">
                Connecting...
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12">

        <div class="mb-10">
            <p class="text-xs font-medium text-[#C84B2F] uppercase tracking-widest mb-2">Value Epistemology Framework · Lever Library</p>
            <h2 class="text-4xl font-extrabold text-[#0F0F0F] mb-3">Signal Audit</h2>
            <p class="text-[#0F0F0F]/60 text-base max-w-xl">
                44 governed financial mechanisms. Every claim traces to a mechanism, an evidence source, and a buyer input.
            </p>
        </div>

        <!-- Filter bar -->
        <div class="mb-8 flex gap-2 flex-wrap" id="theme-filters"></div>

        <!-- Lever grid -->
        <div id="lever-container" class="grid gap-5 md:grid-cols-2 lg:grid-cols-3">
            <div class="animate-pulse bg-white border border-[#0F0F0F]/10 p-6 rounded-xl h-48"></div>
            <div class="animate-pulse bg-white border border-[#0F0F0F]/10 p-6 rounded-xl h-48"></div>
            <div class="animate-pulse bg-white border border-[#0F0F0F]/10 p-6 rounded-xl h-48"></div>
        </div>

        <div id="lever-count" class="mt-6 text-xs text-[#0F0F0F]/40"></div>

    </main>

    <script>
        const SB_URL = "https://kpecdezcolcycgpuqbgs.supabase.co";
        const SB_KEY = "sb_publishable_LqM8qLV9Bnd4wh2Ol2ljIA_ZIQpoBAM";

        const statusEl  = document.getElementById('connection-status');
        const container = document.getElementById('lever-container');
        const countEl   = document.getElementById('lever-count');
        const filtersEl = document.getElementById('theme-filters');

        let allLevers = [];
        let activeTheme = null;

        async function loadLevers() {
            try {
                const res = await fetch(
                    `${SB_URL}/rest/v1/vef_levers?select=vl_num,value_theme,value_lever,simple_formula,strategic_note&order=vl_num.asc`,
                    {
                        headers: {
                            'apikey': SB_KEY,
                            'Authorization': `Bearer ${SB_KEY}`
                        }
                    }
                );

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                allLevers = await res.json();

                if (allLevers.length > 0) {
                    statusEl.innerText = `● LIVE · ${allLevers.length} LEVERS`;
                    statusEl.className = 'text-xs font-medium px-3 py-1 rounded-full bg-[#1E5C3A]/30 text-[#1E5C3A]';
                    buildFilters();
                    renderLevers(allLevers);
                } else {
                    throw new Error('No data returned');
                }

            } catch (err) {
                statusEl.innerText = "● OFFLINE";
                statusEl.className = 'text-xs font-medium px-3 py-1 rounded-full bg-red-100 text-red-700';
                container.innerHTML = `<p class="text-red-500 col-span-3 text-sm">Connection failed: ${err.message}</p>`;
                console.error(err);
            }
        }

        function buildFilters() {
            const themes = [...new Set(allLevers.map(l => l.value_theme))];
            filtersEl.innerHTML = `
                <button onclick="filterTheme(null)" class="filter-btn px-3 py-1 rounded-full text-xs font-medium border border-[#0F0F0F]/20 bg-[#0F0F0F] text-white">All</button>
                ${themes.map(t => `
                    <button onclick="filterTheme('${t}')" class="filter-btn px-3 py-1 rounded-full text-xs font-medium border border-[#0F0F0F]/20 hover:border-[#C84B2F] hover:text-[#C84B2F] transition-all">${t}</button>
                `).join('')}
            `;
        }

        function filterTheme(theme) {
            activeTheme = theme;
            const filtered = theme ? allLevers.filter(l => l.value_theme === theme) : allLevers;
            renderLevers(filtered);
        }

        function renderLevers(levers) {
            countEl.innerText = `${levers.length} of ${allLevers.length} mechanisms`;
            container.innerHTML = levers.map(lever => `
                <div class="lever-card bg-white border border-[#0F0F0F]/10 p-6 rounded-xl shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black text-[#C84B2F] uppercase tracking-widest bg-[#C84B2F]/8 px-2 py-1 rounded">${lever.vl_num}</span>
                        <span class="text-[10px] text-[#0F0F0F]/30 font-medium uppercase tracking-wider">${lever.value_theme}</span>
                    </div>
                    <h3 class="font-bold text-base mb-2 text-[#0F0F0F] leading-snug">${lever.value_lever}</h3>
                    <p class="text-xs text-[#0F0F0F]/50 leading-relaxed mb-4 font-mono">${lever.simple_formula}</p>
                    <p class="text-xs text-[#0F0F0F]/40 leading-relaxed border-t border-[#0F0F0F]/8 pt-3 mt-auto">
                        ${lever.strategic_note || ''}
                    </p>
                </div>
            `).join('');
        }

        loadLevers();
    </script>
</body>
</html>
