// Returns ordered gap list per spec — TYPE 4 first, then 1 (by parent ARV
// desc), 2, 3 (by ARV desc), 5 last. Cap is applied at render time.
function vcGaps(e, scenarios, defs, ivs, analysis){
  const gaps = [];
  const peById = {};
  (analysis.perScenario || []).forEach(p => { peById[p.scenario_id] = p; });
  const activeScens = (scenarios || []).filter(s => {
    const pe = peById[s.scenario_id];
    return pe && pe.active && !pe.pool_shadow;
  });
  const reqOf = s => {
    const r = s.inputs_required;
    return Array.isArray(r) ? r : typeof r === 'string' ? r.split(',').map(k => k.trim()).filter(Boolean) : [];
  };
  const filled = key => {
    const v = ivs && ivs[key] && ivs[key].provided_value;
    return v != null && String(v).trim() !== '';
  };

  // TYPE 4 — overdue follow-up (red).
  if (e.next_followup_date){
    const todayStr = new Date().toISOString().slice(0, 10);
    const fuStr = String(e.next_followup_date).slice(0, 10);
    if (fuStr < todayStr){
      const days = Math.floor((new Date(todayStr + 'T00:00:00') - new Date(fuStr + 'T00:00:00')) / 86400000);
      gaps.push({ kind:'overdue', label:`Follow-up overdue by ${days} day${days === 1 ? '' : 's'}`, dot:'red', impact: Infinity });
    }
  }

  // TYPE 1 — high-sensitivity inputs unconfirmed (amber).
  (defs || []).filter(d => (d.sensitivity || '').toLowerCase() === 'high').forEach(d => {
    if (filled(d.input_key)) return;
    let parentArv = 0;
    activeScens.forEach(s => {
      if (reqOf(s).includes(d.input_key)){
        const arv = peById[s.scenario_id]?.arv || 0;
        if (arv > parentArv) parentArv = arv;
      }
    });
    gaps.push({ kind:'high-input', label:`${d.label || d.input_key} — not confirmed`, dot:'amber', impact: parentArv });
  });

  // TYPE 2 — implementation cost missing (amber).
  if (!filled('implementation_cost')){
    gaps.push({ kind:'impl-cost', label:'Implementation cost — needed for payback + BCR', dot:'amber' });
  }

  // TYPE 3 — weak-evidence active scenarios (amber).
  activeScens.forEach(s => {
    const ev = (s.evidence_strength || '').toLowerCase().trim();
    if (!ev || ev === 'weak'){
      const arv = peById[s.scenario_id]?.arv || 0;
      const oneLiner = s.one_liner || s.mechanism_label || s.scenario_id || '';
      gaps.push({ kind:'weak-ev', label:`${oneLiner} — weak evidence`, dot:'amber', impact: arv });
    }
  });

  // TYPE 5 — no snapshot saved (grey).
  const snaps = state.snapshots[e.engagement_id] || [];
  if (!snaps.length){
    gaps.push({ kind:'no-snap', label:'No milestone snapshot saved yet', dot:'grey' });
  }

  const typeOrder = { 'overdue':0, 'high-input':1, 'impl-cost':2, 'weak-ev':3, 'no-snap':4 };
  gaps.sort((a, b) => {
    const t = typeOrder[a.kind] - typeOrder[b.kind];
    if (t !== 0) return t;
    return (b.impact || 0) - (a.impact || 0);
  });
  return gaps;
}

function renderVCGapsList(gaps){
  if (!gaps.length) return `<div class="vc-empty-gaps">Nothing flagged.</div>`;
  const cap = 5;
  const visible = gaps.slice(0, cap);
  const hidden = gaps.length - visible.length;
  const rows = visible.map(g =>
    `<div class="vc-gap-row"><span class="vc-gap-dot is-${g.dot}"></span><span class="vc-gap-label">${escapeHtml(g.label)}</span></div>`
  ).join('');
  return rows + (hidden > 0 ? `<div class="vc-gap-more">+${hidden} more not shown</div>` : '');
}

// Returns the highest-priority next-action descriptor, or null if nothing
// applies. Priorities are evaluated 1→6 in order; first match wins.
function vcNextAction(e, scenarios, defs, ivs, analysis, conf){
  const ivsObj = ivs || {};
  const peById = {};
  (analysis.perScenario || []).forEach(p => { peById[p.scenario_id] = p; });
  const activeScens = (scenarios || []).filter(s => {
    const pe = peById[s.scenario_id];
    return pe && pe.active && !pe.pool_shadow;
  });
  const reqOf = s => {
    const r = s.inputs_required;
    return Array.isArray(r) ? r : typeof r === 'string' ? r.split(',').map(k => k.trim()).filter(Boolean) : [];
  };
  const filled = key => {
    const v = ivsObj[key] && ivsObj[key].provided_value;
    return v != null && String(v).trim() !== '';
  };
  const todayStr = new Date().toISOString().slice(0, 10);
  const fuStr = e.next_followup_date ? String(e.next_followup_date).slice(0, 10) : '';
  const overdue = fuStr && fuStr < todayStr;
  const highSensDefs = (defs || []).filter(d => (d.sensitivity || '').toLowerCase() === 'high');
  const unconfirmedHigh = highSensDefs.filter(d => !filled(d.input_key));
  const totalHigh = highSensDefs.length;
  const snaps = state.snapshots[e.engagement_id] || [];

  // PRIORITY 1 — overdue follow-up.
  if (overdue){
    const days = Math.floor((new Date(todayStr + 'T00:00:00') - new Date(fuStr + 'T00:00:00')) / 86400000);
    const champ = e.champion_email || 'your champion';
    return {
      body: `Follow-up with <b>${escapeHtml(champ)}</b> is overdue by ${days} day${days === 1 ? '' : 's'}.`,
      btnLabel:'Go to Deal →', btnAction:'ws-tab', btnData:{ tab:'deal' }
    };
  }
  // PRIORITY 2 — top high-sensitivity input has a discovery question.
  if (unconfirmedHigh.length){
    let topArv = -1, topScen = null, topDef = null;
    unconfirmedHigh.forEach(d => {
      activeScens.forEach(s => {
        if (!reqOf(s).includes(d.input_key)) return;
        const arv = peById[s.scenario_id]?.arv || 0;
        if (arv > topArv){ topArv = arv; topScen = s; topDef = d; }
      });
    });
    const dq = topScen?.discovery_questions || '';
    const firstQ = String(dq).split('|')[0].trim();
    if (firstQ){
      return {
        body: `Ask your champion: <b>${escapeHtml(firstQ)}</b>`,
        btnLabel:'Ask Meridian →', btnAction:'vc-ask-meridian', btnData:{ question:firstQ }
      };
    }
  }
  // PRIORITY 3 — governed but no snapshot.
  if (conf === 'governed' && !snaps.length){
    return {
      body:'Analysis is governed. Save a milestone before your next meeting.',
      btnLabel:'Save Snapshot →', btnAction:'open-save-snapshot', btnData:{}
    };
  }
  // PRIORITY 4 — exploratory (some inputs, not yet governed).
  if (conf === 'exploratory'){
    return {
      body: `<b>${unconfirmedHigh.length}</b> of <b>${totalHigh}</b> high-sensitivity inputs are unconfirmed. Ground the model to unlock governed output.`,
      btnLabel:'Start Discovery →', btnAction:'toggle-meridian', btnData:{}
    };
  }
  // PRIORITY 5 — default (no buyer inputs at all).
  if (conf === 'default'){
    return {
      body:'No buyer inputs captured yet. Start with VEF Assist to activate the right scenarios.',
      btnLabel:'Open VEF Assist →', btnAction:'vefa-open-update', btnData:{}
    };
  }
  // PRIORITY 6 — everything complete.
  return {
    body:'Value case is governed and snapshot saved.',
    btnLabel:'Generate Report →', btnAction:'generate-report', btnData:{}
  };
}

function renderVCHealthStrip(e, scenarios, analysis, defs, ivs){
  const peById = {};
  (analysis.perScenario || []).forEach(p => { peById[p.scenario_id] = p; });
  const activeScens = (scenarios || []).filter(s => peById[s.scenario_id]?.active && !peById[s.scenario_id]?.pool_shadow);
  const shadowedCount = (scenarios || []).filter(s => peById[s.scenario_id]?.active && peById[s.scenario_id]?.pool_shadow).length;
  const high = (defs || []).filter(d => (d.sensitivity || '').toLowerCase() === 'high');
  const filledHigh = high.filter(d => {
    const v = ivs && ivs[d.input_key] && ivs[d.input_key].provided_value;
    return v != null && String(v).trim() !== '';
  });
  const completeStr = high.length ? Math.round(filledHigh.length / high.length * 100) + '%' : '—';
  let strong = 0, moderate = 0, weak = 0;
  activeScens.forEach(s => {
    const v = (s.evidence_strength || '').toLowerCase();
    if      (v.includes('strong')   || v.includes('1') || v.includes('customer'))  strong++;
    else if (v.includes('moderate') || v.includes('2') || v.includes('benchmark')) moderate++;
    else                                                                            weak++;
  });
  const snaps = state.snapshots[e.engagement_id] || [];
  const last = snaps[0];
  const lastStr = last
    ? `${escapeHtml(last.snapshot_label || 'unlabeled')} · ${escapeHtml(relTime(last.created_at) || '')}`
    : 'None saved';
  return `
    <div class="vc-health">

const debouncers = {};
function debounce(key, fn, ms=800){ clearTimeout(debouncers[key]); debouncers[key] = setTimeout(fn, ms); }

function inputGroup(key){
  const first = (key || '').split('_')[0] || 'other';
  return first.charAt(0).toUpperCase() + first.slice(1);
}
function discoveryFor(key, scenarios){
  for (const s of scenarios){
    const req = s.inputs_required, arr = Array.isArray(req) ? req : typeof req === 'string' ? req.split(',').map(k=>k.trim()) : [];
    if (arr.includes(key) && s.discovery_questions) return s.discovery_questions;
  }
  return '';
}

function renderInputRow(d, iv, scenarios){
  const provided = iv?.provided_value;
  const current = provided != null ? Number(provided) : Number(d.typical_value ?? d.default_value ?? 0);
  const hasVal = provided != null || d.typical_value != null || d.default_value != null;
  const src = iv?.value_source === 'prospect' ? {c:'chip-green',l:'Buyer'} : (provided != null ? {c:'chip-blue',l:'Analyst'} : hasVal ? {c:'chip-grey',l:'Default'} : {c:'chip-amber',l:'Needs Input'});
  const sens = (d.sensitivity || '').toLowerCase();
  const sensKey = sens.includes('high') ? 'High' : sens.includes('med') ? 'Medium' : 'Low';
  const min = Number(d.min_value ?? 0), max = Number(d.max_value ?? Math.max(current * 2, 1000));
  const step = max > 1000 ? Math.max(1, Math.round((max-min)/100)) : (max-min)/100;
  const prompt = discoveryFor(d.input_key, scenarios) || d.label || d.input_key;
  return `<div class="ig-row">
    <div class="ig-top">
      <div class="ig-chip-col"><span class="chip ${src.c}">${src.l}</span><span class="sensitivity-tag sensitivity-${sensKey}">${sensKey}</span></div>
      <div class="ig-label">${escapeHtml(d.label || d.input_key)}</div>
      <span class="ig-value editable" data-action="edit-input-val" data-key="${escapeHtml(d.input_key)}">${escapeHtml(current.toLocaleString('en-US'))}</span>
      <span class="ig-unit">${escapeHtml(d.unit || '')}</span>
      <span class="ig-prompt" data-p="${escapeHtml(prompt)}">?</span>
    </div>
    <input type="range" class="ig-slider" min="${min}" max="${max}" step="${step}" value="${current}" data-action="slider-input" data-key="${escapeHtml(d.input_key)}"/>
    <div class="ig-range"><span>${escapeHtml(String(min))}</span><span>${escapeHtml(String(max))}</span></div>
  </div>`;
}

async function applyInputPreset(preset){
  state.preset = preset;
  const eng = currentEng(); if (!eng){ return render(); }
  const defs = state.inputDefs[eng.domain_id] || [];
  const ivs = state.inputValues[eng.engagement_id] = state.inputValues[eng.engagement_id] || {};
  const rows = [];
  defs.forEach(d => {
    const k = preset === 'conservative' ? 'conservative_value' : preset === 'aggressive' ? 'aggressive_value' : 'typical_value';
    const v = d[k] ?? d.typical_value ?? d.default_value;
    if (v == null) return;
    const row = { engagement_id: eng.engagement_id, input_key: d.input_key, provided_value: Number(v), value_source: 'analyst' };
    ivs[d.input_key] = row; rows.push(row);
  });
  render();
  try {
    for (const r of rows) await sbUpsert('vef_input_values', r, 'engagement_id,input_key');
    state.lastSavedAt = Date.now(); paintCtxSaved();
    toast('Applied ' + preset + ' preset');

}

async function onSaveSnapshotSubmit(e){

  const f = e.target;
  const eng = currentEng(); if (!eng) return;
  const scenarios = state.scenarios[eng.engagement_id] || [];
  const defs = state.inputDefs[eng.domain_id] || [];
  const ivs = state.inputValues[eng.engagement_id] || {};
  const a = computeAnalysis(eng, scenarios, ivs, defs);
  const existing = state.snapshots[eng.engagement_id] || [];
  const version = (existing.reduce((m,s) => Math.max(m, s.snapshot_version || 0), 0) || 0) + 1;
  const inputSnap = { _meta: { stage: eng.deal_stage, phase: eng.phase, preset: state.preset || 'typical' } };
  defs.forEach(d => { inputSnap[d.input_key] = ivs[d.input_key]?.provided_value ?? d.typical_value ?? d.default_value ?? null; });
  const row = {
    engagement_id: eng.engagement_id, domain_id: eng.domain_id,
    snapshot_label: f.label.value, intent: f.intent.value, snapshot_version: version,
    annual_value: a.arvFull, payback_mo: a.payback, bcr: a.bcr, monthly_delay_cost: a.monthlyDelay,
    active_scenario_ids: scenarios.filter(s => s.active).map(s => s.scenario_id).join(','),
    input_snapshot: inputSnap, notes: f.notes.value.trim() || null
  };
  try {
    const created = await sbInsert('vef_output_snapshots', row);
    const snap = created || { ...row, id: uid('snap'), created_at: new Date().toISOString() };
    (state.snapshots[eng.engagement_id] = state.snapshots[eng.engagement_id] || []).unshift(snap);
    setState({ modal: null });
    toast('Snapshot saved · ' + snap.snapshot_label);
  } catch (err) { console.error(err); toast('Save failed: ' + (err.message || err), true); }
}

${last ? `${last.snapshot_label} v${last.snapshot_version} · ARV ${fmtMoney(last.annual_value)}` : '(none)'}`;
}

async function callMeridian(userMsg){
  const eng = currentEng(); if (!eng || !userMsg.trim()) return;
  const key = getAnthropicKey();
  if (!key) return toast('Meridian needs an API key', true);
  const history = state.meridianHistory[eng.engagement_id] = state.meridianHistory[eng.engagement_id] || [];
  history.push({ role: 'user', content: userMsg.trim() });
  history.push({ role: 'assistant', content: '__thinking__' });
  render();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'content-type':'application/json', 'x-api-key':key, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({
        model: MERIDIAN_MODEL,
        max_tokens: 1000,
        system: buildMeridianSystem(eng),
        messages: history.slice(0,-1).filter(m => m.content !== '__thinking__').map(m => ({ role: m.role === 'error' ? 'assistant' : m.role, content: m.content }))
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || ('HTTP ' + res.status));
    history[history.length - 1] = { role: 'assistant', content: data.content?.[0]?.text || '—' };
  } catch (err) {
    history[history.length - 1] = { role: 'error', content: 'Meridian failed: ' + (err.message || err) };
  }
  render();
}

function renderMeridianDrawer(){
  const e = currentEng(); if (!e) return '';
  const prompts = QUICK_PROMPTS[state.activeTab] || QUICK_PROMPTS['value-case'];
  const history = state.meridianHistory[e.engagement_id] || [];
  return `
    <aside class="mx-drawer ${state.meridianOpen?'is-open':''}">
      <div class="mx-head">
        <div class="mx-title"><span class="dot">◆</span>Meridian</div>
        <div class="mx-model">${MERIDIAN_MODEL_LABEL}</div>
        <div class="mx-head-actions">
          <button class="mx-icon-btn" data-action="mx-reset-key" title="Change API key">Key</button>
          <button class="mx-icon-btn" data-action="mx-clear" title="Clear chat">Clear</button>
          <button class="mx-close" data-action="toggle-meridian" title="Close">×</button>
        </div>
      </div>
      <div class="mx-body">${history.length === 0
        ? `<div class="mx-empty">No chat yet — pick a prompt below or type a question.</div>`
        : history.map(m => {
            if (m.content === '__thinking__') return `<div class="mx-msg thinking">Meridian is thinking…</div>`;
            return `<div class="mx-msg ${m.role}">${escapeHtml(m.content)}</div>`;
          }).join('')}</div>
      <div class="mx-chips">${prompts.map(p => `<button class="mx-chip" data-action="mx-quick" data-prompt="${escapeHtml(p)}">${escapeHtml(p)}</button>`).join('')}</div>
      <form class="mx-input-row" data-action="mx-submit" autocomplete="off">
        <input class="mx-input" name="msg" placeholder="Ask Meridian…" ${history.some(m => m.content === '__thinking__') ? 'disabled' : ''}/>
        <button class="mx-send" type="submit" ${history.some(m => m.content === '__thinking__') ? 'disabled' : ''}>Send</button>
      </form>
    </aside>`;
}

async function patchEngField(field, value){
  const eng = currentEng(); if (!eng) return;
  if (eng[field] === value) return;
  eng[field] = value;
  try { await sbPatch('vef_engagements', { engagement_id: eng.engagement_id }, { [field]: value }); toast('Saved'); }
  catch (err) { toast('Save failed: ' + (err.message || err), true); }
}

async function onLoginSubmit(e){
  e.preventDefault();
  setState({ screen: 'home', loading: true });
  try {
    const [domains, engagements, allSnaps] = await Promise.all([
      loadDomains(), loadEngagements(), loadAllSnapshots().catch(() => [])
    ]);
    const snapshots = {};
    (allSnaps || []).forEach(s => (snapshots[s.engagement_id] = snapshots[s.engagement_id] || []).push(s));
    setState({ domains, engagements, snapshots, loading: false });
  } catch (err) {
    console.error(err);
    toast('Load failed: ' + (err.message || err), true);
    setState({ loading: false });
  }
}

/* ---------- EVENT DELEGATION ---------- */
document.addEventListener('submit', e => {
  const form = e.target.closest('form[data-action]');
  if (!form) return;
  const action = form.getAttribute('data-action');
  if (action === 'login-submit')         return onLoginSubmit(e);
  if (action === 'save-snap-submit')     return onSaveSnapshotSubmit(e);
  if (action === 'mx-submit'){
    e.preventDefault();
    const input = form.querySelector('input[name="msg"]');
    const msg = input?.value || '';
    if (input) input.value = '';
    return callMeridian(msg);
  }
});
document.addEventListener('click', e => {
  const node = e.target.closest('[data-action]');
  if (!node || node.tagName === 'FORM') return;
  const a = node.getAttribute('data-action');
  if (a === 'home-tab')          return setState({ homeFilter: node.getAttribute('data-tab') });
  if (a === 'open-engagement')   return onOpenEngagement(node.getAttribute('data-id'));
  if (a === 'open-new-analysis') return openVEFAssist({ mode:'new' });
  if (a === 'close-modal')       return setState({ modal: null });
  if (a === 'modal-backdrop' && e.target === node) return setState({ modal: null });
  if (a === 'vefa-backdrop' && e.target === node) return closeVEFAssist(true);
  if (a === 'vefa-close')        return closeVEFAssist(true);
  if (a === 'vefa-next')         return vefaStep(+1);
  if (a === 'vefa-back')         return vefaStep(-1);
  if (a === 'vefa-extract')      return vefaExtract();
  if (a === 'vefa-skip')         return vefaSkipImport();
  if (a === 'vefa-outcome-toggle'){
    return vefaToggleOutcome(node.getAttribute('data-outcome'));
  }
  if (a === 'vefa-domain-tile'){
    return vefaPickDomain(node.getAttribute('data-domain'));
  }
  if (a === 'vefa-focus-toggle'){
    // Toggle chip imperatively — no setState — so the form keeps its typed state.
    const f = node.getAttribute('data-focus');
    const arr = state.vefAssist.valueFocus || (state.vefAssist.valueFocus = []);
    const i = arr.indexOf(f); if (i >= 0) arr.splice(i, 1); else arr.push(f);
    node.classList.toggle('is-on'); return;
  }
  if (a === 'vefa-select-recommended') return vefaSelectRecommended();
  if (a === 'vefa-clear-all')          return vefaClearAll();
  if (a === 'vefa-theme-filter'){
    const t = node.getAttribute('data-theme');
    state.vefAssist.step2ThemeFilter = t;
    document.querySelectorAll('[data-action="vefa-theme-filter"]').forEach(btn => {
      btn.classList.toggle('is-on', btn.getAttribute('data-theme') === t);
    });
    paintVEFAScenList(); return;
  }
  if (a === 'vefa-finish'){
    if (state.vefAssist.mode === 'update') return vefaUpdateInitiate();
    return createAnalysisFromVEF();
  }
  if (a === 'vefa-update-snap') return updateAnalysisFromVEF(true);
  if (a === 'vefa-update-skip') return updateAnalysisFromVEF(false);
  if (a === 'vefa-open-update'){
    if (!state.activeEngagementId) return toast('No active engagement', true);
    return openVEFAssist({ mode:'update', engagementId: state.activeEngagementId });
  }
  if (a === 'back-to-home')      return setState({ screen:'home', activeEngagementId:null, activeTab:'value-case' });
  if (a === 'ws-tab')            return setState({ activeTab: node.getAttribute('data-tab') });
  if (a === 'ctx-jump-vc')       return setState({ activeTab: 'value-case' });
  if (a === 'ctx-tier-cycle'){
    const order = ['conservative','typical','aggressive'];
    const i = order.indexOf(state.preset || 'typical');
    return applyInputPreset(order[(i + 1) % order.length]);
  }
  if (a === 'toggle-meridian'){
    const opening = !state.meridianOpen;
    setState({ meridianOpen: opening });
    if (opening && state.meridianPreload){
      const q = state.meridianPreload; state.meridianPreload = null;
      callMeridian(q);
    }
    return;
  }
  if (a === 'vc-ask-meridian'){
    const q = (node.getAttribute('data-question') || '').trim();
    state.meridianPreload = q || null;
    if (!state.meridianOpen) setState({ meridianOpen: true });
    if (state.meridianPreload){
      const msg = state.meridianPreload; state.meridianPreload = null;
      callMeridian(msg);
    }
    return;
  }
  if (a === 'vc-toggle-detail') return setState({ vcDetailOpen: !state.vcDetailOpen });
  if (a === 'vc-toggle-card'){
    const sid = node.getAttribute('data-sid'); if (!sid) return;
    const cur = state.vcCardOpen || {};
    return setState({ vcCardOpen: { ...cur, [sid]: !cur[sid] } });
  }
  if (a === 'mx-quick')          return callMeridian(node.getAttribute('data-prompt'));
  if (a === 'mx-reset-key')      { localStorage.removeItem('anthropic_api_key'); return toast('API key cleared — next send will prompt again'); }
  if (a === 'mx-clear')          { const eng = currentEng(); if (eng) state.meridianHistory[eng.engagement_id] = []; return render(); }
  if (a === 'open-save-snapshot')return setState({ modal: 'saveSnapshot' });
  if (a === 'open-snap')         return toast('Snapshot restore — coming soon');
  if (a === 'export-snap')       return toast('PDF export — coming soon');
  if (a === 'generate-report')   return toast('Report export — stub');
  if (a === 'toggle-scenario')   return toggleScenarioActive(node.getAttribute('data-sid'));
  if (a === 'input-preset')      return applyInputPreset(node.getAttribute('data-preset'));
  if (a === 'edit-input-val' || a === 'deal-edit'){
    if (node.getAttribute('contenteditable') === 'true') return;
    node.setAttribute('contenteditable','true'); node.focus();
    const r = document.createRange(); r.selectNodeContents(node); const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
    return;
  }
});
document.addEventListener('input', e => {
  const node = e.target.closest('[data-action]'); if (!node) return;
  const a = node.getAttribute('data-action');
  if (a === 'slider-input') onSliderInput(node.getAttribute('data-key'), node.value);
  if (a === 'vefa-import-input'){
    // Mutate silently — no setState — so the textarea keeps focus mid-type
    // (lesson 2026-04-23: search-input focus loss on full re-render).
    state.vefAssist.importText = node.value;
    const btn = document.querySelector('[data-action="vefa-extract"]');
    if (btn) btn.disabled = !node.value.trim() || state.vefAssist.extracting;
  }
  if (a === 'vefa-field'){
    // Silent per-keystroke mutation so text/date/textarea inputs keep focus.
    state.vefAssist[node.getAttribute('data-key')] = node.value;
  }
  if (a === 'vefa-scen-search'){
    // Targeted list subtree refresh — search input never re-renders,
    // focus persists mid-keystroke (lesson 2026-04-23).
    state.vefAssist.step2Search = node.value;
    paintVEFAScenList();
  }
});
document.addEventListener('focusout', e => {
  const node = e.target.closest('[data-action="edit-input-val"],[data-action="deal-edit"]');
  if (!node || node.getAttribute('contenteditable') !== 'true') return;
  node.setAttribute('contenteditable','false');
  const action = node.getAttribute('data-action');
  if (action === 'edit-input-val'){
    const eng = currentEng(); if (!eng) return;
    const key = node.getAttribute('data-key');
    const num = parseFloat(node.textContent.replace(/,/g,''));
    if (!isFinite(num)) return render();
    upsertInputValue(eng.engagement_id, key, num, 'analyst'); toast('Saved'); render();
  } else {
    patchEngField(node.getAttribute('data-field'), node.textContent.trim() || null);
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state.modal){
    e.preventDefault();
    if (state.modal === 'vefAssist') return closeVEFAssist(true);
    setState({ modal: null });
  }
});
document.addEventListener('input', e => {
  const node = e.target.closest('[data-action]');
  if (!node || node.getAttribute('data-action') !== 'home-search') return;
  state.homeSearch = node.value;
  const wrap = document.querySelector('.table-wrap');
  if (wrap) wrap.outerHTML = renderAnalysisTable(homeRows());
});
document.addEventListener('change', e => {
  const node = e.target.closest('[data-action]');
  if (!node) return;
  const a = node.getAttribute('data-action');
  if (a === 'vefa-select'){
    const key = node.getAttribute('data-key');
    state.vefAssist[key] = node.value;
    if (key === 'domainId') vefaOnDomainChange();
    return;
  }
  if (a === 'vefa-scen-toggle'){
    const sid = node.getAttribute('data-sid');
    const set = state.vefAssist.selectedScenarioIds;
    const row = node.closest('.vefa-scen-row');
    if (node.checked){ set.add(sid); if (row) row.classList.add('is-checked'); }
    else { set.delete(sid); if (row) row.classList.remove('is-checked'); }
    vefaPaintNextButton();
    return;
  }
  if (a === 'home-sort')     return setState({ homeSort: node.value });
  if (a === 'deal-select' || a === 'deal-date') return patchEngField(node.getAttribute('data-field'), node.value || null);
  if (a === 'deal-textarea') return patchEngField(node.getAttribute('data-field'), node.value || null);
  if (a === 'impl-cost'){
    const eng = currentEng(); const v = parseFloat(node.value);
    if (eng && isFinite(v)) upsertInputValue(eng.engagement_id, 'implementation_cost', v, 'analyst');
  }
});

/* ---------- BOOT ---------- */
function init(){ render(); }
document.addEventListener('DOMContentLoaded', init);
</script>
