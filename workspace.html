<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alt Meridian — Value Enablement Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f6f3; --surface:#ffffff; --border:#e8e5e0; --border2:#d4d0ca;
  --ink:#1a1918; --ink2:#6b6560; --ink3:#a8a39d;
  --red:#d63b2f; --red-dim:#fdf1f0; --red-hover:#b8322a;
  --green:#2d7d4f; --green-dim:#f0f7f3;
  --amber:#b45309; --amber-dim:#fef3e2;
  --blue:#1d4ed8; --blue-dim:#eff6ff;
  --topbar-bg:#141210; --topbar-text:#e8e5e0;
  --display:'Syne',ui-sans-serif,system-ui,sans-serif;
  --mono:'DM Mono',ui-monospace,SFMono-Regular,monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06);
  --r:3px; --r-chip:2px; --r-in:1px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:12px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--display);font-weight:600;letter-spacing:-.01em;margin:0;color:var(--ink)}
h1{font-size:20px;font-weight:700} h2{font-size:15px} h3{font-size:13px}
p{margin:0} a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
/* Topbar */
.topbar{position:sticky;top:0;z-index:50;background:var(--topbar-bg);color:var(--topbar-text);height:44px;display:flex;align-items:center;padding:0 16px;gap:14px;border-bottom:1px solid #000}
.wordmark{font-family:var(--display);font-weight:700;letter-spacing:.04em;font-size:13px}
.wordmark .alt{color:var(--red)} .wordmark .md{color:var(--topbar-text)}
.topbar-label{font-family:var(--mono);font-size:10px;color:#7a7470;text-transform:uppercase;letter-spacing:.1em}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.topbar-user{color:#a8a39d;font-size:11px;padding:3px 8px;background:#1f1d1a;border-radius:var(--r-chip)}
.topbar-divider{width:1px;height:18px;background:#2a2724}
.back-link{color:#a8a39d;font-size:11px;padding:4px 8px;border-radius:var(--r);transition:background .12s,color .12s}
.back-link:hover{background:#1f1d1a;color:var(--topbar-text)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r);font-family:var(--mono);font-size:11px;font-weight:500;transition:background .15s,color .15s,border-color .15s;border:1px solid transparent;white-space:nowrap;letter-spacing:.02em}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-hover)}
.btn-ghost{background:transparent;color:var(--ink2);border-color:var(--border2)}
.btn-ghost:hover{background:var(--surface);color:var(--ink)}
.btn-dark-ghost{background:transparent;color:var(--topbar-text);border-color:#2a2724}
.btn-dark-ghost:hover{background:#1f1d1a}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:var(--red-dim)}
.btn-sm{padding:4px 9px;font-size:10px}
.btn-block{width:100%;justify-content:center;padding:9px 14px;font-size:12px}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
.card-pad{padding:16px}
/* Chips */
.chip{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--r-chip);background:#eceae6;color:var(--ink2);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.chip-grey{background:#eceae6;color:var(--ink2)}
.chip-blue{background:var(--blue-dim);color:var(--blue)}
.chip-amber{background:var(--amber-dim);color:var(--amber)}
.chip-green{background:var(--green-dim);color:var(--green)}
.chip-red{background:var(--red-dim);color:var(--red)}
.chip-ink{background:#1f1d1a;color:var(--topbar-text)}
.chip-outline{background:transparent;border:1px solid var(--border2)}
/* Forms */
.input,.select,.textarea{display:block;width:100%;background:#fff;border:1px solid var(--border2);border-radius:var(--r-in);padding:8px 10px;font-family:var(--mono);font-size:12px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.textarea{resize:vertical;min-height:72px}
.input:focus,.select:focus,.textarea:focus{outline:0;border-color:var(--red);box-shadow:0 0 0 2px var(--red-dim)}
.label{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:4px;font-weight:500}
.label .req{color:var(--red);margin-left:2px}
.field{margin-bottom:12px} .field:last-child{margin-bottom:0}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Layout */
.page{min-height:calc(100vh - 44px)}
.container{max-width:1480px;margin:0 auto;padding:20px 24px}
/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(20,18,16,.45);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .15s ease-out}
.modal-card{background:#fff;border-radius:var(--r);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modal-in .18s ease-out}
.modal-head{padding:18px 20px 12px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700} .modal-sub{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.modal-body{padding:16px 20px}
.modal-foot{padding:12px 20px 16px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border)}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes modal-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* Toast */
#toast-root{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--ink);color:#fff;padding:8px 14px;border-radius:var(--r);font-size:11px;box-shadow:var(--shadow-lg);animation:toast-in .18s ease-out;pointer-events:auto;max-width:360px}
.toast.err{background:var(--red)}
@keyframes toast-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* Utility */
.muted{color:var(--ink3)} .mono{font-family:var(--mono)} .display{font-family:var(--display)}
.hstack{display:flex;align-items:center;gap:8px} .vstack{display:flex;flex-direction:column;gap:4px}
.sk{background:linear-gradient(90deg,#ede9e3,#f7f6f3,#ede9e3);background-size:200% 100%;animation:sk 1.3s infinite;border-radius:var(--r)}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.boot{padding:80px 24px;text-align:center;color:var(--ink3);font-size:12px;letter-spacing:.05em;text-transform:uppercase}
/* Login */
.login-page{display:flex;align-items:center;justify-content:center;padding:60px 20px;min-height:calc(100vh - 44px)}
.login-wrap{width:100%;max-width:400px}
.login-card{padding:32px 32px 28px}
.login-brand{font-family:var(--display);font-weight:700;letter-spacing:.06em;font-size:11px;color:var(--ink3);margin-bottom:20px;text-transform:uppercase}
.login-brand .alt{color:var(--red)}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px;line-height:1.2}
.login-sub{font-size:12px;color:var(--ink3);font-style:italic;margin-bottom:22px;line-height:1.4;font-family:var(--display)}
/* Home */
.home-sub{background:#fff;border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:44px;z-index:40}
.home-tabs{display:flex;gap:2px}
.home-tab{padding:4px 10px;border-radius:var(--r);font-size:11px;font-family:var(--mono);color:var(--ink3);background:transparent;border:1px solid transparent;transition:all .12s}
.home-tab:hover{color:var(--ink);background:var(--bg)}
.home-tab.is-active{background:var(--red);color:#fff;border-color:var(--red)}
.home-search{flex:1;max-width:280px;margin-left:auto;padding:5px 10px;font-size:11px}
.home-sort{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
.home-sort .select{width:auto;padding:5px 8px;font-size:11px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:6px}
.stat-value{font-family:var(--display);font-size:22px;font-weight:700;letter-spacing:-.01em;line-height:1.1}
.stat-value.accent{color:var(--red)}
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl thead th{background:#faf8f4;text-align:left;padding:8px 12px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl tbody td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--ink2);vertical-align:middle}
.tbl tbody tr{cursor:pointer;transition:background .12s}
.tbl tbody tr:hover{background:var(--bg)}
.tbl tbody tr:last-child td{border-bottom:0}
.an-cell{min-width:200px}
.an-name{font-family:var(--display);font-weight:600;color:var(--ink);font-size:13px;margin-bottom:1px;line-height:1.25}
.an-cust{font-size:11px;color:var(--ink2)}
.cell-mono{font-family:var(--mono);color:var(--ink2);white-space:nowrap}
.cell-arv{font-family:var(--mono);color:var(--red);font-weight:500;white-space:nowrap;text-align:right}
.cell-arv.zero{color:var(--ink3)}
.cell-overdue{color:var(--red);font-weight:500}
.empty-state{padding:40px 20px;text-align:center;color:var(--ink3);font-size:12px}
/* Form grid (modal) */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
.form-grid .field{margin:0} .form-grid .full{grid-column:1/-1}
.form-section{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin:10px 0 2px;grid-column:1/-1;font-weight:500;border-top:1px solid var(--border);padding-top:10px}
.form-section.first{border-top:0;margin-top:0;padding-top:0}
/* Workspace */
.ws-topbar{padding:0 14px;gap:10px}
.ws-back{color:var(--ink3);font-size:11px;padding:5px 9px;border-radius:var(--r);transition:background .12s,color .12s;font-family:var(--mono)}
.ws-back:hover{background:#1f1d1a;color:var(--topbar-text)}
.ws-crumb{display:flex;flex-direction:column;line-height:1.15;min-width:0;margin-right:4px}
.ws-crumb-name{font-family:var(--display);font-weight:600;color:#fff;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.ws-crumb-cust{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
.ws-topbar-chips{display:flex;gap:4px}
.ws-layout{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 44px)}
.ws-sidebar{background:#fff;border-right:1px solid var(--border);padding:14px 0;display:flex;flex-direction:column;gap:12px;position:sticky;top:44px;align-self:start;height:calc(100vh - 44px);overflow-y:auto}
.ws-meta{padding:0 14px 12px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid var(--border)}
.ws-meta-row{display:flex;flex-direction:column;gap:1px}
.ws-meta-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3)}
.ws-meta-value{font-size:11px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.ws-nav{display:flex;flex-direction:column;gap:1px}
.ws-nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;font-family:var(--mono);font-size:12px;color:var(--ink2);text-align:left;border-left:3px solid transparent;transition:background .12s,color .12s,border-color .12s;width:100%}
.ws-nav-item:hover{background:var(--bg);color:var(--ink)}
.ws-nav-item.is-active{background:var(--red-dim);color:var(--red);border-left-color:var(--red);font-weight:500}
.ws-nav-icon{width:14px;font-size:11px;text-align:center;opacity:.9}
.fd-link{margin-top:auto;padding:10px 14px;border-top:1px solid var(--border);font-size:10px}
.fd-link a{color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;transition:color .12s}
.fd-link a:hover{color:var(--red)}
.ws-main{padding:20px 24px;overflow-x:auto}
.tab-placeholder{padding:40px 20px;text-align:center;color:var(--ink3);font-size:12px;background:#fff;border:1px dashed var(--border);border-radius:var(--r)}
/* Value Case */
.vc-narrative{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;font-family:var(--display);font-style:italic;font-size:14px;color:var(--ink2);line-height:1.5;box-shadow:var(--shadow)}
.vc-narrative b{color:var(--ink);font-style:normal;font-weight:600}
.vc-signals{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.vc-signal{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.vc-signal-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:6px}
.vc-signal-value{font-family:var(--display);font-size:24px;font-weight:700;letter-spacing:-.01em;line-height:1.05}
.vc-signal-value.red{color:var(--red)} .vc-signal-value.amber{color:var(--amber)} .vc-signal-value.ink{color:var(--ink)}
.vc-signal-value .u{font-size:11px;opacity:.5;margin-left:2px;font-weight:500}
.vc-signal-sub{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:4px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.section-title{font-family:var(--display);font-size:15px;font-weight:600;color:var(--ink)}
.section-count{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-left:8px;text-transform:uppercase;letter-spacing:.08em;font-weight:400}
.sc-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;box-shadow:var(--shadow);margin-bottom:10px;transition:opacity .12s} .sc-card.inactive{opacity:.55}
.sc-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start} .sc-head-left{flex:1;min-width:0} .sc-head-right{text-align:right;white-space:nowrap}
.sc-top{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.sc-name{font-family:var(--display);font-weight:600;color:var(--ink);font-size:14px;margin-bottom:3px;line-height:1.3} .sc-one{font-family:var(--mono);font-size:11px;color:var(--ink2)}
.sc-annual{font-family:var(--display);font-weight:700;font-size:22px;color:var(--red);letter-spacing:-.01em;line-height:1.05} .sc-annual.muted{color:var(--ink3)}
.sc-monthly{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-top:3px}
.sc-foot{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);align-items:center;flex-wrap:wrap}
.sc-switch{display:inline-flex;align-items:center;gap:8px;padding:3px 9px;border-radius:var(--r);border:1px solid var(--border2);color:var(--ink3);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;transition:all .12s;background:#fff}
.sc-switch:hover{color:var(--ink)}
.sc-switch.is-on{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.sc-switch-track{width:24px;height:12px;background:#d1ccc5;border-radius:999px;position:relative;display:inline-block;transition:background .12s}
.sc-switch-track::after{content:'';position:absolute;top:1px;left:1px;width:10px;height:10px;background:#fff;border-radius:50%;transition:transform .12s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.sc-switch.is-on .sc-switch-track{background:var(--green)}.sc-switch.is-on .sc-switch-track::after{transform:translateX(12px)}
.sc-collapse{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);padding:3px 8px;border-radius:var(--r);transition:color .12s,background .12s} .sc-collapse:hover{color:var(--ink);background:var(--bg)} .sc-collapse.is-open{color:var(--red)}
.sc-evidence,.sc-cfo{margin-top:10px;padding:10px 12px;border-radius:var(--r);font-size:12px;color:var(--ink2);line-height:1.5;font-family:var(--mono)}
.sc-evidence{background:var(--bg);border-left:3px solid var(--ink3)} .sc-cfo{background:var(--amber-dim);border-left:3px solid var(--amber)}
.sc-sl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:4px;font-weight:500} .sc-sl.amber{color:var(--amber)}
.shadow-section{margin-top:14px;background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.shadow-head{width:100%;text-align:left;padding:10px 16px;font-family:var(--mono);font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em;transition:background .12s} .shadow-head:hover{background:var(--bg)}
.shadow-body{padding:6px 16px 12px;border-top:1px solid var(--border)}
.shadow-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px;border-bottom:1px solid var(--border)} .shadow-row:last-child{border-bottom:0}
.shadow-name{flex:1;color:var(--ink2)}
.caret{display:inline-block;transition:transform .15s;margin-right:4px} .is-open .caret{transform:rotate(90deg)}
/* Inputs tab */
.preset-bar{display:flex;gap:4px}
.preset-btn{padding:4px 10px;border-radius:var(--r);font-size:10px;font-family:var(--mono);color:var(--ink3);border:1px solid var(--border2);background:#fff;cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.06em}
.preset-btn:hover{color:var(--ink)}
.preset-btn.is-active{background:var(--ink);color:#fff;border-color:var(--ink)}
.ig-group{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.ig-head{background:#faf8f4;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.ig-name{font-family:var(--display);font-size:13px;font-weight:600;color:var(--ink)}
.ig-count{font-family:var(--mono);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
.ig-row{padding:12px 16px;border-bottom:1px solid var(--border)} .ig-row:last-child{border-bottom:0}
.ig-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ig-chip-col{display:flex;flex-direction:column;gap:3px;min-width:64px}
.ig-label{flex:1;color:var(--ink);font-size:12px}
.ig-value{font-family:var(--mono);color:var(--ink);font-weight:500;padding:2px 6px;border-radius:2px;border:1px solid transparent;cursor:text;font-size:13px}
.ig-value:hover{background:var(--bg);border-color:var(--border)}
.ig-value[contenteditable="true"]{background:#fff;border-color:var(--red);outline:0;box-shadow:0 0 0 2px var(--red-dim)}
.ig-unit{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-left:4px}
.ig-prompt{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:#eceae6;color:var(--ink3);font-size:10px;cursor:help;font-family:var(--mono);font-weight:700;position:relative}
.ig-prompt:hover{background:var(--red-dim);color:var(--red)}
.ig-prompt:hover::after{content:attr(data-p);position:absolute;bottom:22px;right:0;background:var(--ink);color:#fff;padding:8px 10px;border-radius:var(--r);font-size:11px;font-family:var(--mono);white-space:normal;width:240px;z-index:10;box-shadow:var(--shadow-lg);text-transform:none;letter-spacing:0;line-height:1.4;font-weight:400}
.ig-slider{width:100%;margin:4px 0 3px;accent-color:var(--red)}
.ig-range{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:.04em}
.sensitivity-tag{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:1px 6px;border-radius:2px;font-weight:500}

<body>
<div id="app"><div class="boot">Initializing workspace…</div></div>
<div id="modal-root"></div>
<div id="toast-root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================================================================
   Alt Meridian — Value Enablement Workspace (v2)
   Single-file SPA · Supabase REST · Anthropic direct fetch
   ========================================================================= */

/* ---------- STATE ---------- */
const state = {
  screen:'login', engagements:[], domains:{}, activeEngagementId:null,
  scenarios:{}, inputDefs:{}, inputValues:{}, snapshots:{}, evidence:{},
  activeTab:'value-case', meridianOpen:false, meridianHistory:{},
  homeFilter:'all', homeSearch:'', homeSort:'updated',
  modal:null, loading:false, poolShadowOpen:false,
  vefAssist: makeVEFAssistState()
};
function setState(patch){ Object.assign(state, patch); if (typeof render === 'function') render(); }

/* ---------- UTILITIES ---------- */
const ESC = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, c => ESC[c]); }
function toast(msg, err=false){
  const t = document.createElement('div');
  t.className = 'toast' + (err?' err':''); t.textContent = msg;
  document.getElementById('toast-root').appendChild(t);
  setTimeout(() => t.remove(), 2800);
}
function fmtMoney(n){
  if (n == null || !isFinite(n)) return '—';
  if (Math.abs(n) >= 1e6) return '$' + (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (Math.abs(n) >= 1e3) return '$' + Math.round(n/1e3) + 'K';
  return '$' + Math.round(n).toLocaleString();
}
function fmtDate(d){ return d ? String(d).slice(0,10) : '—'; }
function daysUntil(d){ return d ? Math.round((new Date(d) - new Date()) / 86400000) : null; }
function relTime(iso){
  if (!iso) return '—';
  const diff = (Date.now() - new Date(iso)) / 86400000;
  if (diff < 1) return 'today';
  if (diff < 30) return Math.floor(diff) + 'd ago';
  if (diff < 365) return Math.floor(diff/30) + 'mo ago';
  return Math.floor(diff/365) + 'y ago';
}
function uid(p='id'){ return p + '-' + Math.random().toString(36).slice(2,8); }

/* ---------- SUPABASE ---------- */
const SUPABASE_URL = 'https://kpecdezcolcycgpuqbgs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZWNkZXpjb2xjeWNncHVxYmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODIyMDYsImV4cCI6MjA5MTI1ODIwNn0.rKHzdjjkYToEZWdS0ngg3Kgigh_gDWt5cRbLBCE44rg';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function sbSelect(table, q){
  let b = sb.from(table).select('*');
  if (q?.eq)    for (const [k,v] of Object.entries(q.eq)) b = b.eq(k, v);
  if (q?.order) b = b.order(q.order[0], { ascending: q.order[1] !== false });
  const { data, error } = await b;
  if (error) throw error;
  return data || [];
}
async function sbInsert(table, row){ const { data, error } = await sb.from(table).insert(row).select(); if (error) throw error; return data?.[0] || null; }
async function sbUpsert(table, row, onConflict){ const { data, error } = await sb.from(table).upsert(row, onConflict?{onConflict}:{}).select(); if (error) throw error; return data?.[0] || null; }
async function sbPatch(table, eq, patch){
  let b = sb.from(table).update(patch);
  for (const [k,v] of Object.entries(eq)) b = b.eq(k, v);
  const { data, error } = await b.select();
  if (error) throw error; return data?.[0] || null;
}

/* ---------- DATA LOADERS ---------- */
async function loadDomains(){ const arr = await sbSelect('vef_domains'); const m = {}; arr.forEach(d => m[d.domain_id]=d); return m; }
async function loadEngagements(){ return sbSelect('vef_engagements', { order:['intake_date',false] }); }
async function loadScenariosForEngagement(engId, domainId){
  const [sels, scens] = await Promise.all([
    sbSelect('vef_scenario_selections', { eq:{engagement_id:engId} }),
    sbSelect('vef_value_scenarios',     { eq:{domain_id:domainId} })
  ]);
  const sm = {}; sels.forEach(s => sm[s.scenario_id] = s);
  return scens.map(s => ({ ...s, selection_id: sm[s.scenario_id]?.id ?? null, active: sm[s.scenario_id]?.active ?? !!s.active_by_default }));
}
async function loadInputDefs(domainId){
  // vef_input_definitions has duplicate input_key rows per domain (e.g. RFD
  // has loaded_rate × 5, productivity_uplift_pct × 5). resolvedInputs
  // overwrites on collision, so fetch order affected which variant's
  // default/typical landed on the slider. Fetch ordered by id and dedupe
  // client-side keeping the lowest-id row per input_key so every load
  // resolves to the same inputs.
  const rows = await sbSelect('vef_input_definitions',
    { eq:{domain_id:domainId}, order:['id', true] });
  const seen = new Set();
  return rows.filter(r => seen.has(r.input_key) ? false : (seen.add(r.input_key), true));
}
async function loadInputValues(engId){ const arr = await sbSelect('vef_input_values', { eq:{engagement_id:engId} }); const m = {}; arr.forEach(iv => m[iv.input_key]=iv); return m; }
async function loadSnapshots(engId){ return sbSelect('vef_output_snapshots', { eq:{engagement_id:engId}, order:['created_at',false] }); }
async function loadAllSnapshots(){ return sbSelect('vef_output_snapshots', { order:['created_at',false] }); }
async function loadEvidence(domainId){ return sbSelect('vef_evidence_registry', { eq:{domain_id:domainId} }); }

/* ---------- FORMULA ENGINE ---------- */
const RAMPS = [0.5, 1.0, 1.0];   // Y1 50% ramp, Y2/Y3 full adoption
const DISCOUNT = 0.10;

function evalFormula(formula, inputs){
  if (!formula || typeof formula !== 'string') return null;
  const keys = Object.keys(inputs || {});
  const vals = keys.map(k => {
    const v = inputs[k];
    return (v == null || isNaN(Number(v))) ? 0 : Number(v);
  });
  try {
    const fn = new Function(...keys, '"use strict";return (' + formula + ');');
    const r = fn(...vals);
    return (typeof r === 'number' && isFinite(r)) ? r : null;
  } catch(_){ return null; }
}

function resolvedInputs(inputsMap, inputDefs){
  const out = {};
  (inputDefs || []).forEach(d => {
    const p = inputsMap?.[d.input_key]?.provided_value;
    out[d.input_key] = p != null ? Number(p) : Number(d.typical_value ?? d.default_value ?? 0);
  });
  return out;
}

function computeAnalysis(engagement, scenarios, inputsMap, inputDefs){
  const inputs = resolvedInputs(inputsMap, inputDefs);
  // Engagement-load diagnostic — fires once per distinct engagement (keyed
  // on engagement_id via a function property so it survives renders without
  // polluting the shared `state` object). Dumps enough to pinpoint the
  // source of ARV=$0: missing scenarios, empty inputs, or the evaluator
  // returning null for a valid-looking formula. Remove once the RET-RFD
  // cause is understood.
  const engId = engagement?.engagement_id ?? null;
  if (engId && computeAnalysis._lastLoggedEng !== engId) {
    computeAnalysis._lastLoggedEng = engId;
    const sample = (scenarios || [])[0];
    console.log('[compute]', {
      engagementId:  engId,
      scenarioCount: (scenarios || []).length,
      activeCount:   (scenarios || []).filter(s => s.active).length,
      inputKeyCount: Object.keys(inputs).length,
      sampleFormula: sample?.value_scenario_formula ?? null,
      sampleResult:  sample ? evalFormula(sample.value_scenario_formula, inputs) : null,
    });
  }
  const per = (scenarios || []).map(s => {
    const arv = evalFormula(s.value_scenario_formula, inputs) || 0;
    const delay = evalFormula(s.delay_cost_formula, inputs) || (arv/12);
    const coi = evalFormula(s.cost_of_inaction_formula, inputs) || (arv*3);
    return { scenario_id: s.scenario_id, theme: s.value_theme || 'other', active: !!s.active, arv, delay, coi, pool_shadow: false };
  });
  // Pool-share guard: in each theme, only highest-ARV active scenario counts
  const best = {};
  per.filter(p => p.active).forEach(p => { if (!best[p.theme] || p.arv > best[p.theme].arv) best[p.theme] = p; });
  per.forEach(p => { if (p.active && best[p.theme] && best[p.theme].scenario_id !== p.scenario_id) p.pool_shadow = true; });
  const counted = per.filter(p => p.active && !p.pool_shadow);
  const arvFull     = counted.reduce((s,p) => s + p.arv, 0);
  const arvY1       = arvFull * RAMPS[0];
  const arvY2       = arvFull * RAMPS[1];
  const arvY3       = arvFull * RAMPS[2];
  const monthlyDelay= counted.reduce((s,p) => s + p.delay, 0);
  const coi3yr      = counted.reduce((s,p) => s + p.coi, 0);
  const impl        = Number(inputsMap?.implementation_cost?.provided_value) || 0;
  const npv     = impl > 0 ? arvY1 + arvY2/(1+DISCOUNT) + arvY3/(1+DISCOUNT)**2 - impl : null;
  const payback = impl > 0 && arvY1 > 0 ? impl / (arvY1/12) : null;
  const bcr     = impl > 0 ? (arvY1 + arvY2 + arvY3) / impl : null;
  return { arvY1, arvY2, arvY3, arvFull, monthlyDelay, coi3yr, npv, payback, bcr, perScenario: per, impl };
}

/* ---------- RENDER DISPATCH ---------- */
function render(){
  const app = document.getElementById('app');
  if (state.screen === 'login')          app.innerHTML = renderLogin();
  else if (state.screen === 'home')      app.innerHTML = renderHome();
  else if (state.screen === 'workspace') app.innerHTML = renderWorkspace();
  renderModal();
  requestAnimationFrame(afterRender);
}
function renderModal(){
  const root = document.getElementById('modal-root');
  if (!state.modal){ root.innerHTML = ''; return; }
  if (state.modal === 'newAnalysis')  root.innerHTML = renderNewAnalysisModal();
  if (state.modal === 'saveSnapshot') root.innerHTML = renderSaveSnapshotModal();
  if (state.modal === 'vefAssist')    root.innerHTML = renderVEFAssist();
}
function afterRender(){
  const body = document.querySelector('.mx-body');
  if (body && state.meridianOpen) body.scrollTop = body.scrollHeight;
  if (state.meridianOpen){
    const inp = document.querySelector('.mx-input');
    if (inp && !inp.disabled && document.activeElement !== inp) inp.focus();
  }
  if (state.modal === 'vefAssist'){
    const card = document.querySelector('.vefa-card');
    if (card && !card.contains(document.activeElement)){
      const first = card.querySelector('.vefa-body textarea, .vefa-body input:not([type=hidden]):not([type=checkbox]):not([type=radio]), .vefa-body select');
      if (first) first.focus();
    }
  }
}

/* ---------- VEF ASSIST ---------- */
// 4-step full-screen modal (Import → Context → Scenarios → Evidence & Audit).
// State container; render + open/close helpers here. Chunk A2 adds the shell;
// later chunks fill each step. Update-mode pre-fill (parse notes sidecar) and
// DB writes live in Chunk F so the uncertain-schema boundary stays in one place.
function makeVEFAssistState(){
  return {
    open:false, mode:'new', engagementId:null, step:0,
    importText:'', extractedClaims:[], extracting:false, extractError:null,
    analysisName:'', customer:'', vendor:'', domainId:'',
    stage:'Discovery', phase:'Pre-Sale',
    championEmail:'', economicBuyerEmail:'', nextFollowUp:'',
    whatToProve:'', valueFocus:[],
    availableScenarios:[], selectedScenarioIds:new Set(),
    step2Search:'', step2ThemeFilter:'all',
    evidenceNotes:'', domainSignals:[], domainThemes:[]
  };
}
function openVEFAssist(opts){
  const o = opts || {};
  const va = makeVEFAssistState();
  va.open = true;
  va.mode = o.mode || 'new';
  va.engagementId = o.engagementId || null;
  setState({ modal:'vefAssist', vefAssist: va });
}
function closeVEFAssist(confirmIfDirty){
  if (confirmIfDirty !== false && vefAssistIsDirty()){
    if (!confirm('Close VEF Assist? Unsaved data will be lost.')) return;
  }
  setState({ modal:null, vefAssist: makeVEFAssistState() });
}
function vefAssistIsDirty(){
  const v = state.vefAssist; if (!v) return false;
  return Boolean(v.importText || (v.extractedClaims && v.extractedClaims.length) ||
    v.analysisName || v.customer || v.vendor || v.domainId ||
    v.championEmail || v.economicBuyerEmail || v.nextFollowUp ||
    v.whatToProve || (v.valueFocus && v.valueFocus.length) ||
    (v.selectedScenarioIds && v.selectedScenarioIds.size) ||
    v.evidenceNotes);
}

const VEFA_STEP_LABELS = ['Import','Context','Scenarios','Evidence & Audit'];
const VEFA_STEP_TITLES = {
  0: { title:'Import existing analysis or start fresh',
       sub:'Paste a vendor ROI claim, sales deck summary, or Excel model numbers. VEF Assist will extract claims and map them to governed mechanisms. Or skip to start from scratch.' },
  1: { title:'Analysis context',
       sub:'Tell us who this is for, what you want to prove, and where you are in the deal.' },
  2: { title:'Select scenarios for this analysis',
       sub:'' },
  3: { title:'Evidence & audit',
       sub:'Confirm what carries evidence and what is explicit assumption.' }
};
function renderVEFAssist(){
  const v = state.vefAssist; if (!v || !v.open) return '';
  return `<div class="vefa-overlay" data-action="vefa-backdrop">
    <div class="vefa-card">
      ${renderVEFAssistHead(v)}
      ${renderVEFAssistProgress(v)}
      <div class="vefa-body">${renderVEFAssistStep(v)}</div>
      ${renderVEFAssistFooter(v)}
    </div>
  </div>`;
}
function renderVEFAssistHead(v){
  const h = VEFA_STEP_TITLES[v.step] || { title:'VEF Assist', sub:'' };
  return `<div class="vefa-head">
    <div class="vefa-head-text">
      <h2 class="vefa-title">${escapeHtml(h.title)}</h2>
      ${h.sub ? `<p class="vefa-sub">${escapeHtml(h.sub)}</p>` : ''}
    </div>
    <button class="vefa-close" data-action="vefa-close" title="Close">×</button>
  </div>`;
}
function renderVEFAssistProgress(v){
  const parts = [];
  VEFA_STEP_LABELS.forEach((label,i) => {
    const cls = i < v.step ? 'is-done' : (i === v.step ? 'is-current' : '');
    const dotTxt = i < v.step ? '✓' : String(i + 1);
    parts.push(`<div class="vefa-node ${cls}">
      <div class="vefa-dot ${cls}">${dotTxt}</div>
      <div class="vefa-step-label">${escapeHtml(label)}</div>
    </div>`);
    if (i < VEFA_STEP_LABELS.length - 1){
      parts.push(`<div class="vefa-connector ${i < v.step ? 'is-done' : ''}"></div>`);
    }
  });
  return `<div class="vefa-progress">${parts.join('')}</div>`;
}
function renderVEFAssistStep(v){
  switch (v.step){
    case 0: return renderVEFAssistStep0(v);
    case 1: return renderVEFAssistStep1(v);
    case 2: return renderVEFAssistStep2(v);
    case 3: return renderVEFAssistStep3(v);
    default: return '';
  }
}
function renderVEFAssistFooter(v){
  const back = v.step > 0
    ? `<button class="btn btn-ghost btn-sm" data-action="vefa-back">← Back</button>`
    : `<span></span>`;
  let nextLabel = 'Next →', nextDisabled = '';
  if (v.step === 2){
    const n = v.selectedScenarioIds ? v.selectedScenarioIds.size : 0;
    nextLabel = `Next → ${n} selected`;
    if (n === 0) nextDisabled = 'disabled';
  } else if (v.step === 3){
    nextLabel = v.mode === 'update' ? 'Update Analysis →' : 'Create Analysis →';
  }
  const nextAction = v.step < 3 ? 'vefa-next' : 'vefa-finish';
  return `<div class="vefa-footer">
    ${back}
    <div class="vefa-footer-right">
      <button class="btn btn-ghost btn-sm" data-action="vefa-close">Close</button>
      <button class="btn btn-primary btn-sm" data-action="${nextAction}" ${nextDisabled}>${escapeHtml(nextLabel)}</button>
    </div>
  </div>`;
}
function vefaStep(delta){
  const v = state.vefAssist;
  const next = Math.max(0, Math.min(3, v.step + delta));
  if (next === v.step) return;
  setState({ vefAssist: { ...v, step: next } });
  if (next === 2) vefaLoadStep2Scenarios();
}

/* ---------- VEF ASSIST · STEP 0 (IMPORT) ---------- */
const VEFA_EXTRACT_SYSTEM = `You are a value engineering analyst. Extract all quantified claims from the provided text. For each claim identify: the metric name, the claimed value/percentage, the timeframe if stated, and the context. Return ONLY valid JSON in this exact format with no other text:
{
  "claims": [
    {
      "metric": "cycle count time reduction",
      "value": "30%",
      "timeframe": "annual",
      "context": "warehouse operations",
      "raw": "original text fragment"
    }
  ]
}`;

function renderVEFAssistStep0(v){
  const canExtract = !!v.importText && v.importText.trim() && !v.extracting;
  const extractLabel = v.extracting ? 'Analyzing claims…' : 'Extract & Map →';
  return `<div class="vefa-layout">
    <div class="vefa-panel-l">
      <textarea class="vefa-import-ta" data-action="vefa-import-input" rows="8"
        placeholder="Paste vendor ROI claims, key metrics, or business case summary here...&#10;&#10;e.g. 'Vendor claims 30% reduction in cycle count time, $2.4M annual savings, 18-month payback for a 200-store rollout. Based on RFID deployment at 3 pilot stores.'">${escapeHtml(v.importText || '')}</textarea>
      <div class="vefa-import-hint">Paste text content from PDFs, decks, or Excel models. Include any quantified claims, percentages, dollar figures, or timeframes.</div>
      <div class="vefa-import-actions">
        <button class="btn btn-primary btn-sm" data-action="vefa-extract" ${canExtract ? '' : 'disabled'}>${escapeHtml(extractLabel)}</button>
        <button class="btn btn-ghost btn-sm" data-action="vefa-skip" ${v.extracting ? 'disabled' : ''}>Skip — start from scratch →</button>
      </div>
    </div>
    <div class="vefa-panel-r">${renderVEFAssistClaimsPanel(v)}</div>
  </div>`;
}
function renderVEFAssistClaimsPanel(v){
  if (v.extracting){
    return `<div class="vefa-claims vefa-claims-loading">
      <div class="vefa-spinner" aria-hidden="true"></div>
      <div class="vefa-claims-state">Analyzing claims…</div>
    </div>`;
  }
  if (v.extractError){
    return `<div class="vefa-claims vefa-claims-error">
      <div class="vefa-claims-state">${escapeHtml(v.extractError)}</div>
      <div class="vefa-claims-hint">You can retry, or click Skip to proceed without extraction.</div>
    </div>`;
  }
  if (!v.extractedClaims || !v.extractedClaims.length){
    return `<div class="vefa-claims vefa-claims-empty">
      <div class="vefa-claims-icon">◇</div>
      <div class="vefa-claims-state">Extracted claims will appear here</div>
    </div>`;
  }
  return `<div class="vefa-claims">
    <div class="vefa-claims-head">
      <div class="vefa-claims-title">Extracted Claims</div>
      <span class="vefa-claims-count">${v.extractedClaims.length}</span>
    </div>
    <div class="vefa-claims-list">${v.extractedClaims.map(renderVEFAssistClaimRow).join('')}</div>
  </div>`;
}
function renderVEFAssistClaimRow(c){
  const metric = (c.metric || '').trim() || '—';
  const val = (c.value || '').trim();
  const tf = (c.timeframe || '').trim();
  const vClass = 'vefa-v-' + (c.verdict || 'adjust').toLowerCase();
  const mech = c.matchedOneLiner

async function vefaExtract(){

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'content-type':'application/json', 'x-api-key':key, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: VEFA_EXTRACT_SYSTEM,
        messages: [{ role:'user', content: state.vefAssist.importText.trim() }]
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || ('HTTP ' + res.status));
    const raw = data.content?.[0]?.text || '';
    vefaProcessExtraction(raw);
  } catch (err){
    const cur = state.vefAssist;
    setState({ vefAssist: { ...cur, extracting:false, extractError:'Extraction failed: ' + (err.message || err) } });
  }
}
async function vefaProcessExtraction(raw){
  const cur = state.vefAssist;
  const parsed = vefaParseClaimsJson(raw);
  if (!parsed || !Array.isArray(parsed.claims)){
    setState({ vefAssist: { ...cur, extracting:false,
      extractError:'Could not parse claims from the model response. Try again, or Skip to proceed without extraction.' } });
    return;
  }
  // Fetch and cache the global scenario pool once per modal open.
  let pool = cur._matchPool;
  if (!pool){
    try { pool = await sbSelect('vef_value_scenarios'); }
    catch { pool = []; }
  }
  const claims = parsed.claims.map(c => vefaMatchAndVerdict(c, pool));
  const cur2 = state.vefAssist;
  const nextSel = new Set(cur2.selectedScenarioIds);
  claims.forEach(c => { if (c.matchedScenarioId) nextSel.add(c.matchedScenarioId); });
  setState({ vefAssist: { ...cur2, extracting:false, extractError:null,
    extractedClaims: claims, _matchPool: pool, selectedScenarioIds: nextSel } });
  const matches = claims.filter(c => c.matchedScenarioId).length;
  toast(matches
    ? `${claims.length} claim(s) extracted · ${matches} matched to governed mechanisms`
    : `${claims.length} claim(s) extracted · no mechanism matches yet`);
}
function vefaParseClaimsJson(raw){
  if (!raw) return null;
  let s = String(raw).trim();
  s = s.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '').trim();
  if (s[0] !== '{'){ const m = s.match(/\{[\s\S]*\}/); if (m) s = m[0]; }
  try { return JSON.parse(s); } catch { return null; }
}
const VEFA_STOPWORDS = new Set(['the','and','for','with','from','that','this','into','over','per','any','all','has','are','was','were','not','its','via']);
function vefaTokens(text){
  return String(text || '').toLowerCase().split(/[^a-z0-9]+/)
    .filter(t => t.length >= 3 && !VEFA_STOPWORDS.has(t));
}
function vefaMatchScenario(claim, pool){
  const claimTokens = new Set(vefaTokens((claim.metric || '') + ' ' + (claim.context || '')));
  if (!claimTokens.size || !pool || !pool.length) return null;
  let best = null, bestScore = -1;
  for (const s of pool){
    const body = (s.one_liner || '') + ' ' + (s.description || '') + ' ' + (s.mechanism_label || '');
    const strong = (s.mechanism_label || '') + ' ' + (s.value_theme || '');
    const bodyT = new Set(vefaTokens(body)), strongT = new Set(vefaTokens(strong));
    let hits = 0, strongHits = 0;
    for (const t of claimTokens){
      if (bodyT.has(t)){ hits++; if (strongT.has(t) && t.length >= 6) strongHits++; }
    }
    if (hits < 2 && strongHits < 1) continue;
    const score = hits * 10 + strongHits * 5 - (s.print_priority || 99);
    if (score > bestScore){ best = s; bestScore = score; }
  }
  return best;
}
function vefaParseNumber(s){
  if (s == null) return null;
  const m = String(s).match(/-?\d[\d,]*(?:\.\d+)?/);
  if (!m) return null;
  const n = parseFloat(m[0].replace(/,/g, ''));
  return isFinite(n) ? n : null;
}
function vefaParseRange(text){
  if (!text) return null;
  const m = String(text).match(/(-?\$?\d[\d,]*(?:\.\d+)?)\s*(?:-|–|—|to)\s*(-?\$?\d[\d,]*(?:\.\d+)?)/i);
  if (!m) return null;
  const lo = vefaParseNumber(m[1]), hi = vefaParseNumber(m[2]);
  if (lo == null || hi == null) return null;
  return { lo: Math.min(lo, hi), hi: Math.max(lo, hi) };
}
function vefaComputeVerdict(claim, match){
  if (!match) return 'Challenge';
  const ev = (match.evidence_strength || '').toLowerCase();
  if (!ev || ev === 'weak' || ev === 'none') return 'Challenge';
  if (ev === 'strong'){
    const range = vefaParseRange(match.typical_baseline_assumption);
    const n = vefaParseNumber(claim.value);
    if (range && n != null && n >= range.lo && n <= range.hi) return 'Accept';
  }
  return 'Adjust';
}

function vefaMatchAndVerdict(claim, pool){

const VEFA_META_RE = /\[VEF-ASSIST-META\]\s*([\s\S]*?)\s*\[\/VEF-ASSIST-META\]/;
function vefaPackNotes(body, meta){
  const b = (body || '').trim();
  const m = meta && Object.keys(meta).length
    ? `\n\n[VEF-ASSIST-META]\n${JSON.stringify(meta)}\n[/VEF-ASSIST-META]` : '';
  return (b + m) || null;
}
function vefaUnpackNotes(notes){
  if (!notes) return { body:'', meta:null };
  const m = notes.match(VEFA_META_RE);
  let meta = null;
  if (m){ try { meta = JSON.parse(m[1]); } catch {} }
  return { body: notes.replace(VEFA_META_RE, '').trim(), meta };
}
function vefaGenerateEngagementId(domainId){
  const d = new Date(), p = n => String(n).padStart(2, '0');
  return `ENG-VEFA-${(domainId || 'X').toUpperCase()}-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
}
function vefaBuildEngagementRow(v){
  // Documented columns (mirror onNewAnalysisSubmit row keys + Deal-tab reads).
  // Speculative fields go into a sidecar JSON block in `notes` per
  // 2026-04-24 lesson; never as top-level columns.
  const meta = {};
  if (v.whatToProve)               meta.whatToProve = v.whatToProve;
  if ((v.valueFocus||[]).length)   meta.valueFocus  = v.valueFocus;
  if ((v.extractedClaims||[]).length){
    meta.claims = v.extractedClaims.map(c => ({
      metric:c.metric, value:c.value, verdict:c.verdict, matchedScenarioId:c.matchedScenarioId
    }));
  }
  return {
    analysis_name:        v.analysisName.trim() || null,
    prospect_name:        v.customer.trim()     || null,
    vendor_name:          v.vendor.trim()       || null,
    domain_id:            v.domainId            || null,
    deal_stage:           v.stage               || null,
    phase:                v.phase               || null,
    champion_email:       v.championEmail.trim()       || null,
    economic_buyer_email: v.economicBuyerEmail.trim()  || null,
    next_followup_date:   v.nextFollowUp        || null,
    notes:                vefaPackNotes(v.evidenceNotes, meta)
  };
}
function vefaValidateRequired(v){
  const missing = [];
  if (!v.analysisName.trim()) missing.push('Analysis Name');
  if (!v.customer.trim())     missing.push('Customer / Account');
  if (!v.vendor.trim())       missing.push('Vendor / Solution');
  if (!v.domainId)            missing.push('Domain');
  if (missing.length){ toast('Missing required: ' + missing.join(', '), true); return false; }
  if (!v.selectedScenarioIds.size){ toast('Pick at least one scenario in Step 2', true); return false; }
  return true;
}
async function createAnalysisFromVEF(){
  const v = state.vefAssist;
  if (!vefaValidateRequired(v)) return;
  const today = new Date().toISOString().slice(0, 10);
  const row = {
    engagement_id: vefaGenerateEngagementId(v.domainId),
    ...vefaBuildEngagementRow(v),
    artifact_purpose:  'deal_acceleration',
    intake_source:     'vef-assist',
    intake_date:       today,

        'engagement_id,scenario_id')));

  const dom = state.domains[e.domain_id]?.domain_name || 'this domain';
  const top = counted.slice().sort((a,b) => b.arv - a.arv)[0];
  const topTheme = top ? (scenarios.find(s => s.scenario_id === top.scenario_id)?.value_theme || 'no clear lead') : 'no active mechanism';
  const consArv = analysis.arvFull * 0.75, aggArv = analysis.arvFull * 1.25;
  const narrative = scenarios.length
    ? `This analysis covers <b>${counted.length}</b> active mechanism${counted.length===1?'':'s'} for <b>${escapeHtml(e.prospect_name || 'the prospect')}</b> in <b>${escapeHtml(dom)}</b>. The current defensible range is <b>${fmtMoney(consArv)} — ${fmtMoney(aggArv)}</b>, led by <b>${escapeHtml(topTheme)}</b>.`
    : `No scenarios have been loaded for this engagement yet. Check that the domain has scenarios seeded in vef_value_scenarios.`;
  const shadowIds = new Set(shadowed.map(p => p.scenario_id));
  const mainScenarios = scenarios.filter(s => !shadowIds.has(s.scenario_id));
  return `
    <div class="vc-narrative">${narrative}</div>
    <div class="vc-signals">
      <div class="vc-signal"><div class="vc-signal-label">Value of Acting</div><div class="vc-signal-value red">${fmtMoney(analysis.arvFull)}</div><div class="vc-signal-sub">Annual · full adoption</div></div>
      <div class="vc-signal"><div class="vc-signal-label">Cost of Delay</div><div class="vc-signal-value amber">${fmtMoney(analysis.monthlyDelay)}<span class="u">/mo</span></div><div class="vc-signal-sub">Per month of inaction</div></div>
      <div class="vc-signal"><div class="vc-signal-label">Cost of Doing Nothing</div><div class="vc-signal-value ink">${fmtMoney(analysis.coi3yr)}</div><div class="vc-signal-sub">3-year cumulative</div></div>
    </div>
    <div class="section-head">
      <h2 class="section-title">Economic Mechanisms<span class="section-count">${counted.length} active · ${scenarios.length} total · evidence: ${evidenceSummary(scenarios.filter(s => s.active))}</span></h2>
    </div>
    ${scenarios.length
      ? mainScenarios.map(s => renderScenarioCard(s, analysis.perScenario.find(p => p.scenario_id === s.scenario_id))).join('')
      : `<div class="tab-placeholder">No scenarios seeded for domain <b>${escapeHtml(e.domain_id)}</b>.</div>`}
    ${shadowed.length ? renderShadowed(scenarios, shadowed) : ''}
  `;
}

function evidenceSummary(active){
  if (!active.length) return 'n/a';
  const c = {t1:0,t2:0,t3:0};
  active.forEach(s => {
    const v = (s.evidence_strength||'').toLowerCase();
    if (v.includes('1')||v.includes('customer')) c.t1++;
    else if (v.includes('2')||v.includes('benchmark')) c.t2++;
    else c.t3++;
  });
  return `T1×${c.t1} · T2×${c.t2} · T3×${c.t3}`;
}

const debouncers = {};
function debounce(key, fn, ms=800){ clearTimeout(debouncers[key]); debouncers[key] = setTimeout(fn, ms); }

function inputGroup(key){
  const first = (key || '').split('_')[0] || 'other';
  return first.charAt(0).toUpperCase() + first.slice(1);
}
function discoveryFor(key, scenarios){
  for (const s of scenarios){
    const req = s.inputs_required, arr = Array.isArray(req) ? req : typeof req === 'string' ? req.split(',').map(k=>k.trim()) : [];
    if (arr.includes(key) && s.discovery_questions) return s.discovery_questions;
  }
  return '';
}

function renderInputGroup(name, list, ivs, scenarios){
  const confirmed = list.filter(d => ivs[d.input_key]?.value_source === 'prospect').length;

function renderInputRow(d, iv, scenarios){
  const provided = iv?.provided_value;
  const current = provided != null ? Number(provided) : Number(d.typical_value ?? d.default_value ?? 0);
  const hasVal = provided != null || d.typical_value != null || d.default_value != null;
  const src = iv?.value_source === 'prospect' ? {c:'chip-green',l:'Buyer'} : (provided != null ? {c:'chip-blue',l:'Analyst'} : hasVal ? {c:'chip-grey',l:'Default'} : {c:'chip-amber',l:'Needs Input'});
  const sens = (d.sensitivity || '').toLowerCase();
  const sensKey = sens.includes('high') ? 'High' : sens.includes('med') ? 'Medium' : 'Low';
  const min = Number(d.min_value ?? 0), max = Number(d.max_value ?? Math.max(current * 2, 1000));
  const step = max > 1000 ? Math.max(1, Math.round((max-min)/100)) : (max-min)/100;
  const prompt = discoveryFor(d.input_key, scenarios) || d.label || d.input_key;
  return `<div class="ig-row">
    <div class="ig-top">
      <div class="ig-chip-col"><span class="chip ${src.c}">${src.l}</span><span class="sensitivity-tag sensitivity-${sensKey}">${sensKey}</span></div>
      <div class="ig-label">${escapeHtml(d.label || d.input_key)}</div>
      <span class="ig-value editable" data-action="edit-input-val" data-key="${escapeHtml(d.input_key)}">${escapeHtml(current.toLocaleString('en-US'))}</span>
      <span class="ig-unit">${escapeHtml(d.unit || '')}</span>
      <span class="ig-prompt" data-p="${escapeHtml(prompt)}">?</span>
    </div>
    <input type="range" class="ig-slider" min="${min}" max="${max}" step="${step}" value="${current}" data-action="slider-input" data-key="${escapeHtml(d.input_key)}"/>
    <div class="ig-range"><span>${escapeHtml(String(min))}</span><span>${escapeHtml(String(max))}</span></div>
  </div>`;
}

async function applyInputPreset(preset){
  state.preset = preset;
  const eng = currentEng(); if (!eng){ return render(); }
  const defs = state.inputDefs[eng.domain_id] || [];
  const ivs = state.inputValues[eng.engagement_id] = state.inputValues[eng.engagement_id] || {};
  const rows = [];
  defs.forEach(d => {
    const k = preset === 'conservative' ? 'conservative_value' : preset === 'aggressive' ? 'aggressive_value' : 'typical_value';
    const v = d[k] ?? d.typical_value ?? d.default_value;
    if (v == null) return;
    const row = { engagement_id: eng.engagement_id, input_key: d.input_key, provided_value: Number(v), value_source: 'analyst' };
    ivs[d.input_key] = row; rows.push(row);
  });
  render();
  try { for (const r of rows) await sbUpsert('vef_input_values', r, 'engagement_id,input_key'); toast('Applied ' + preset + ' preset'); }
  catch (err) { toast('Save failed: ' + (err.message || err), true); }
}

async function onSaveSnapshotSubmit(e){
  e.preventDefault();
  const f = e.target;
  const eng = currentEng(); if (!eng) return;
  const scenarios = state.scenarios[eng.engagement_id] || [];
  const defs = state.inputDefs[eng.domain_id] || [];
  const ivs = state.inputValues[eng.engagement_id] || {};
  const a = computeAnalysis(eng, scenarios, ivs, defs);
  const existing = state.snapshots[eng.engagement_id] || [];
  const version = (existing.reduce((m,s) => Math.max(m, s.snapshot_version || 0), 0) || 0) + 1;
  const inputSnap = { _meta: { stage: eng.deal_stage, phase: eng.phase, preset: state.preset || 'typical' } };
  defs.forEach(d => { inputSnap[d.input_key] = ivs[d.input_key]?.provided_value ?? d.typical_value ?? d.default_value ?? null; });
  const row = {
    engagement_id: eng.engagement_id, domain_id: eng.domain_id,
    snapshot_label: f.label.value, intent: f.intent.value, snapshot_version: version,
    annual_value: a.arvFull, payback_mo: a.payback, bcr: a.bcr, monthly_delay_cost: a.monthlyDelay,
    active_scenario_ids: scenarios.filter(s => s.active).map(s => s.scenario_id).join(','),
    input_snapshot: inputSnap, notes: f.notes.value.trim() || null
  };
  try {
    const created = await sbInsert('vef_output_snapshots', row);
    const snap = created || { ...row, id: uid('snap'), created_at: new Date().toISOString() };
    (state.snapshots[eng.engagement_id] = state.snapshots[eng.engagement_id] || []).unshift(snap);
    setState({ modal: null });
    toast('Snapshot saved · ' + snap.snapshot_label);
  } catch (err) { console.error(err); toast('Save failed: ' + (err.message || err), true); }
}

/* ---------- MERIDIAN AI DRAWER ---------- */
const QUICK_PROMPTS = {
  'value-case': ["What's the weakest assumption?", "Draft CFO narrative", "Which scenario will get challenged?"],
  inputs:       ["What inputs am I missing?", "What discovery question unlocks the most value?"],
  outputs:      ["Is this number defensible?", "What's my cost of inaction story?"],
  snapshots:    ["What changed since last snapshot?", "Generate follow-up email"],
  deal:         ["What's the next best action?"]
};

function getAnthropicKey(){
  let key = localStorage.getItem('anthropic_api_key');
  if (!key){
    key = prompt('Paste your Anthropic API key (stored in this browser only, never sent to any server besides api.anthropic.com):');
    if (key) localStorage.setItem('anthropic_api_key', key.trim());
  }
  return key ? key.trim() : null;
}

function buildMeridianSystem(e){
  const scenarios = state.scenarios[e.engagement_id] || [];
  const defs = state.inputDefs[e.domain_id] || [];
  const ivs = state.inputValues[e.engagement_id] || {};
  const snaps = state.snapshots[e.engagement_id] || [];
  const a = computeAnalysis(e, scenarios, ivs, defs);
  const active = scenarios.filter(s => s.active);
  const inputs = defs.map(d => {
    const p = ivs[d.input_key]?.provided_value;
    const v = p != null ? p : (d.typical_value ?? d.default_value);
    return `- ${d.label || d.input_key} = ${v} ${d.unit || ''} (${p != null ? 'provided' : 'default'})`;
  });
  const last = snaps[0];
  return `You are Meridian, Alt Meridian's value-engineering coach helping a seller working with ${e.prospect_name || 'this prospect'}. You help them defend, tighten, and communicate the economic case. Be concise (≤ 160 words), specific, and CFO-credible. No hedging, no vendor-speak.

ENGAGEMENT
Name: ${e.analysis_name || '—'}
Customer: ${e.prospect_name || '—'}
Domain: ${state.domains[e.domain_id]?.domain_name || e.domain_id || '—'}
Stage: ${e.deal_stage || '—'}  ·  Phase: ${e.phase || '—'}
Seller's current tab: ${state.activeTab}

ACTIVE MECHANISMS (${active.length})
${active.map(s => `- ${s.mechanism_label || s.scenario_id} · ${s.value_theme || 'other'} · ${s.evidence_strength || 'tier-3'}`).join('\n') || '- (none)'}

MODEL STATE
ARV Y1 ${fmtMoney(a.arvY1)} · Full ARV ${fmtMoney(a.arvFull)} · Monthly delay ${fmtMoney(a.monthlyDelay)} · 3-yr CoI ${fmtMoney(a.coi3yr)}
NPV ${a.npv != null ? fmtMoney(a.npv) : 'N/A'} · Payback ${a.payback != null ? a.payback.toFixed(1)+'mo' : 'N/A'} · BCR ${a.bcr != null ? a.bcr.toFixed(2)+'x' : 'N/A'} · Impl ${a.impl ? fmtMoney(a.impl) : 'not set'}

INPUTS (${defs.length})
${inputs.join('\n')}

LATEST SNAPSHOT
${last ? `${last.snapshot_label} v${last.snapshot_version} · ARV ${fmtMoney(last.annual_value)}` : '(none)'}`;
}

async function callMeridian(userMsg){
  const eng = currentEng(); if (!eng || !userMsg.trim()) return;
  const key = getAnthropicKey();
  if (!key) return toast('Meridian needs an API key', true);
  const history = state.meridianHistory[eng.engagement_id] = state.meridianHistory[eng.engagement_id] || [];
  history.push({ role: 'user', content: userMsg.trim() });
  history.push({ role: 'assistant', content: '__thinking__' });
  render();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'content-type':'application/json', 'x-api-key':key, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: buildMeridianSystem(eng),
        messages: history.slice(0,-1).filter(m => m.content !== '__thinking__').map(m => ({ role: m.role === 'error' ? 'assistant' : m.role, content: m.content }))
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || ('HTTP ' + res.status));
    history[history.length - 1] = { role: 'assistant', content: data.content?.[0]?.text || '—' };
  } catch (err) {
    history[history.length - 1] = { role: 'error', content: 'Meridian failed: ' + (err.message || err) };
  }
  render();
}

function renderMeridianDrawer(){
  const e = currentEng(); if (!e) return '';
  const prompts = QUICK_PROMPTS[state.activeTab] || QUICK_PROMPTS['value-case'];
  const history = state.meridianHistory[e.engagement_id] || [];
  return `
    <aside class="mx-drawer ${state.meridianOpen?'is-open':''}">
      <div class="mx-head">
        <div class="mx-title"><span class="dot">◆</span>Meridian</div>
        <div class="mx-head-actions">
          <button class="mx-icon-btn" data-action="mx-reset-key" title="Change API key">Key</button>
          <button class="mx-icon-btn" data-action="mx-clear" title="Clear chat">Clear</button>
          <button class="mx-close" data-action="toggle-meridian" title="Close">×</button>
        </div>
      </div>
      <div class="mx-body">${history.length === 0
        ? `<div class="mx-empty">No chat yet — pick a prompt below or type a question.</div>`
        : history.map(m => {
            if (m.content === '__thinking__') return `<div class="mx-msg thinking">Meridian is thinking…</div>`;
            return `<div class="mx-msg ${m.role}">${escapeHtml(m.content)}</div>`;
          }).join('')}</div>
      <div class="mx-chips">${prompts.map(p => `<button class="mx-chip" data-action="mx-quick" data-prompt="${escapeHtml(p)}">${escapeHtml(p)}</button>`).join('')}</div>
      <form class="mx-input-row" data-action="mx-submit" autocomplete="off">
        <input class="mx-input" name="msg" placeholder="Ask Meridian…" ${history.some(m => m.content === '__thinking__') ? 'disabled' : ''}/>
        <button class="mx-send" type="submit" ${history.some(m => m.content === '__thinking__') ? 'disabled' : ''}>Send</button>
      </form>
    </aside>`;
}

async function patchEngField(field, value){
  const eng = currentEng(); if (!eng) return;
  if (eng[field] === value) return;
  eng[field] = value;
  try { await sbPatch('vef_engagements', { engagement_id: eng.engagement_id }, { [field]: value }); toast('Saved'); }
  catch (err) { toast('Save failed: ' + (err.message || err), true); }
}

async function onLoginSubmit(e){
  e.preventDefault();
  setState({ screen: 'home', loading: true });
  try {
    const [domains, engagements, allSnaps] = await Promise.all([
      loadDomains(), loadEngagements(), loadAllSnapshots().catch(() => [])
    ]);
    const snapshots = {};
    (allSnaps || []).forEach(s => (snapshots[s.engagement_id] = snapshots[s.engagement_id] || []).push(s));
    setState({ domains, engagements, snapshots, loading: false });
  } catch (err) {
    console.error(err);
    toast('Load failed: ' + (err.message || err), true);
    setState({ loading: false });
  }
}

/* ---------- EVENT DELEGATION ---------- */
document.addEventListener('submit', e => {
  const form = e.target.closest('form[data-action]');
  if (!form) return;
  const action = form.getAttribute('data-action');
  if (action === 'login-submit')         return onLoginSubmit(e);
  if (action === 'new-analysis-submit')  return onNewAnalysisSubmit(e);
  if (action === 'save-snap-submit')     return onSaveSnapshotSubmit(e);
  if (action === 'mx-submit'){
    e.preventDefault();
    const input = form.querySelector('input[name="msg"]');
    const msg = input?.value || '';
    if (input) input.value = '';
    return callMeridian(msg);
  }
});
document.addEventListener('click', e => {
  const node = e.target.closest('[data-action]');
  if (!node || node.tagName === 'FORM') return;
  const a = node.getAttribute('data-action');
  if (a === 'home-tab')          return setState({ homeFilter: node.getAttribute('data-tab') });
  if (a === 'open-engagement')   return onOpenEngagement(node.getAttribute('data-id'));
  if (a === 'open-new-analysis') return openVEFAssist({ mode:'new' });
  if (a === 'close-modal')       return setState({ modal: null });
  if (a === 'modal-backdrop' && e.target === node) return setState({ modal: null });
  if (a === 'vefa-backdrop' && e.target === node) return closeVEFAssist(true);
  if (a === 'vefa-close')        return closeVEFAssist(true);
  if (a === 'vefa-next')         return vefaStep(+1);
  if (a === 'vefa-back')         return vefaStep(-1);
  if (a === 'vefa-extract')      return vefaExtract();
  if (a === 'vefa-skip')         return vefaSkipImport();
  if (a === 'vefa-focus-toggle'){
    // Toggle chip imperatively — no setState — so the form keeps its typed state.
    const f = node.getAttribute('data-focus');
    const arr = state.vefAssist.valueFocus || (state.vefAssist.valueFocus = []);
    const i = arr.indexOf(f); if (i >= 0) arr.splice(i, 1); else arr.push(f);
    node.classList.toggle('is-on'); return;
  }
  if (a === 'vefa-select-recommended') return vefaSelectRecommended();
  if (a === 'vefa-clear-all')          return vefaClearAll();
  if (a === 'vefa-theme-filter'){
    const t = node.getAttribute('data-theme');
    state.vefAssist.step2ThemeFilter = t;
    document.querySelectorAll('[data-action="vefa-theme-filter"]').forEach(btn => {
      btn.classList.toggle('is-on', btn.getAttribute('data-theme') === t);
    });
    paintVEFAScenList(); return;
  }
  if (a === 'vefa-finish'){
    if (state.vefAssist.mode === 'update') return toast('Update path lands in Chunk F2');
    return createAnalysisFromVEF();
  }
  if (a === 'back-to-home')      return setState({ screen:'home', activeEngagementId:null, activeTab:'value-case' });
  if (a === 'ws-tab')            return setState({ activeTab: node.getAttribute('data-tab') });
  if (a === 'toggle-meridian')   return setState({ meridianOpen: !state.meridianOpen });
  if (a === 'mx-quick')          return callMeridian(node.getAttribute('data-prompt'));
  if (a === 'mx-reset-key')      { localStorage.removeItem('anthropic_api_key'); return toast('API key cleared — next send will prompt again'); }
  if (a === 'mx-clear')          { const eng = currentEng(); if (eng) state.meridianHistory[eng.engagement_id] = []; return render(); }
  if (a === 'open-save-snapshot')return setState({ modal: 'saveSnapshot' });
  if (a === 'open-snap')         return toast('Snapshot restore — coming soon');
  if (a === 'export-snap')       return toast('PDF export — coming soon');
  if (a === 'generate-report')   return toast('Report export — stub');
  if (a === 'toggle-scenario')   return toggleScenarioActive(node.getAttribute('data-sid'));
  if (a === 'toggle-evidence' || a === 'toggle-cfo'){ const bag = a === 'toggle-cfo' ? (state.cfoOpen = state.cfoOpen || {}) : (state.evOpen = state.evOpen || {}); const sid = node.getAttribute('data-sid'); bag[sid] = !bag[sid]; return render(); }
  if (a === 'toggle-shadow')     return setState({ poolShadowOpen: !state.poolShadowOpen });
  if (a === 'input-preset')      return applyInputPreset(node.getAttribute('data-preset'));
  if (a === 'edit-input-val' || a === 'deal-edit'){
    if (node.getAttribute('contenteditable') === 'true') return;
    node.setAttribute('contenteditable','true'); node.focus();
    const r = document.createRange(); r.selectNodeContents(node); const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
    return;
  }
});
document.addEventListener('input', e => {
  const node = e.target.closest('[data-action]'); if (!node) return;
  const a = node.getAttribute('data-action');
  if (a === 'slider-input') onSliderInput(node.getAttribute('data-key'), node.value);
  if (a === 'vefa-import-input'){
    // Mutate silently — no setState — so the textarea keeps focus mid-type
    // (lesson 2026-04-23: search-input focus loss on full re-render).
    state.vefAssist.importText = node.value;
    const btn = document.querySelector('[data-action="vefa-extract"]');
    if (btn) btn.disabled = !node.value.trim() || state.vefAssist.extracting;
  }
  if (a === 'vefa-field'){
    // Silent per-keystroke mutation so text/date/textarea inputs keep focus.
    state.vefAssist[node.getAttribute('data-key')] = node.value;
  }
  if (a === 'vefa-scen-search'){
    // Targeted list subtree refresh — search input never re-renders,
    // focus persists mid-keystroke (lesson 2026-04-23).
    state.vefAssist.step2Search = node.value;
    paintVEFAScenList();
  }
});
document.addEventListener('focusout', e => {
  const node = e.target.closest('[data-action="edit-input-val"],[data-action="deal-edit"]');
  if (!node || node.getAttribute('contenteditable') !== 'true') return;
  node.setAttribute('contenteditable','false');
  const action = node.getAttribute('data-action');
  if (action === 'edit-input-val'){
    const eng = currentEng(); if (!eng) return;
    const key = node.getAttribute('data-key');
    const num = parseFloat(node.textContent.replace(/,/g,''));
    if (!isFinite(num)) return render();
    upsertInputValue(eng.engagement_id, key, num, 'analyst'); toast('Saved'); render();
  } else {
    patchEngField(node.getAttribute('data-field'), node.textContent.trim() || null);
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state.modal){
    e.preventDefault();
    if (state.modal === 'vefAssist') return closeVEFAssist(true);
    setState({ modal: null });
  }
});
document.addEventListener('input', e => {
  const node = e.target.closest('[data-action]');
  if (!node || node.getAttribute('data-action') !== 'home-search') return;
  state.homeSearch = node.value;
  const wrap = document.querySelector('.table-wrap');
  if (wrap) wrap.outerHTML = renderAnalysisTable(homeRows());
});
document.addEventListener('change', e => {
  const node = e.target.closest('[data-action]');
  if (!node) return;
  const a = node.getAttribute('data-action');
  if (a === 'vefa-select'){
    const key = node.getAttribute('data-key');
    state.vefAssist[key] = node.value;
    if (key === 'domainId') vefaOnDomainChange();
    return;
  }
  if (a === 'vefa-scen-toggle'){
    const sid = node.getAttribute('data-sid');
    const set = state.vefAssist.selectedScenarioIds;
    const row = node.closest('.vefa-scen-row');
    if (node.checked){ set.add(sid); if (row) row.classList.add('is-checked'); }
    else { set.delete(sid); if (row) row.classList.remove('is-checked'); }
    vefaPaintNextButton();
    return;
  }
  if (a === 'home-sort')     return setState({ homeSort: node.value });
  if (a === 'deal-select' || a === 'deal-date') return patchEngField(node.getAttribute('data-field'), node.value || null);
  if (a === 'deal-textarea') return patchEngField(node.getAttribute('data-field'), node.value || null);
  if (a === 'impl-cost'){
    const eng = currentEng(); const v = parseFloat(node.value);
    if (eng && isFinite(v)) upsertInputValue(eng.engagement_id, 'implementation_cost', v, 'analyst');
  }
});

/* ---------- BOOT ---------- */
function init(){ render(); }
document.addEventListener('DOMContentLoaded', init);
</script>
