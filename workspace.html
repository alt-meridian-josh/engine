<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alt Meridian — Value Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f7f5; --card:#ffffff; --topbar:#141414;
  --ink:#1a1a1a; --ink-2:#444; --ink-3:#888; --ink-4:#bbb;
  --accent:#d63b2f; --accent-hover:#b8322a; --accent-soft:#fbeceb;
  --border:#e5e3e0; --border-strong:#d8d5d0; --row-hover:#faf9f7;
  --ok:#2f8f5a; --ok-dark:#1d6b42;
  --warn:#c98a1f; --warn-2:#c96b1f; --info:#2d6fb8;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04);
  --font-display:'Syne',system-ui,sans-serif;
  --font-mono:'DM Mono',ui-monospace,SFMono-Regular,monospace;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--font-mono);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;letter-spacing:-.01em;margin:0;color:var(--ink)}
h1{font-size:28px} h2{font-size:20px} h3{font-size:16px} h4{font-size:14px}
p{margin:0} a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
/* Topbar */
.topbar{position:sticky;top:0;z-index:50;background:var(--topbar);color:#f5f5f5;height:56px;display:flex;align-items:center;padding:0 24px;gap:20px;border-bottom:1px solid #000}
.wordmark{font-family:var(--font-display);font-weight:700;letter-spacing:.02em;font-size:16px}
.wordmark .alt{color:var(--accent)} .wordmark .meridian{color:#f5f5f5}
.topbar-label{font-family:var(--font-mono);font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.1em}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.topbar-user{color:var(--ink-4);font-size:12px}
.topbar-divider{width:1px;height:20px;background:#2a2a2a}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:6px;font-family:var(--font-mono);font-size:13px;font-weight:500;transition:background .15s,color .15s,border-color .15s;border:1px solid transparent;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--border)}
.btn-ghost:hover{background:#f0eeeb}
.btn-dark-ghost{background:transparent;color:#f5f5f5;border-color:#2a2a2a}
.btn-dark-ghost:hover{background:#1f1f1f}
.btn-sm{padding:6px 12px;font-size:12px}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-sm)}
.card-pad{padding:20px}
/* Chips */
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:500;padding:3px 9px;border-radius:999px;background:#efece8;color:var(--ink-2);letter-spacing:.02em;white-space:nowrap}
.chip-grey{background:#eeece8;color:#555}
.chip-blue{background:#e4eef8;color:#1f4d82}
.chip-amber{background:#faeed0;color:#8a5e0e}
.chip-orange{background:#fbe0cf;color:#a24815}
.chip-green{background:#dcefe2;color:#1d6b42}
.chip-dark-green{background:#c8e0d0;color:#0f4a2b}
.chip-red{background:var(--accent-soft);color:var(--accent)}
.chip-ink{background:#eceae6;color:var(--ink)}
/* Forms */
.input,.select,.textarea{display:block;width:100%;background:#fff;border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-family:var(--font-mono);font-size:13px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.textarea{resize:vertical;min-height:80px}
.input:focus,.select:focus,.textarea:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.label{display:block;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin-bottom:6px}
.field{margin-bottom:16px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* Layout */
.page{min-height:calc(100vh - 56px)}
.container{max-width:1400px;margin:0 auto;padding:32px 24px}
/* Toast */
#toast-root{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--ink);color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;box-shadow:var(--shadow-md);animation:toast-in .2s ease-out}
@keyframes toast-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(20,20,20,.45);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade-in .15s ease-out}
.modal-card{background:#fff;border-radius:10px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modal-in .2s ease-out}
.modal-head{padding:22px 24px 14px;border-bottom:1px solid var(--border)}
.modal-body{padding:20px 24px}
.modal-foot{padding:14px 24px 20px;display:flex;justify-content:flex-end;gap:10px;border-top:1px solid var(--border)}
.modal-title{font-size:18px;margin-bottom:4px}
.modal-sub{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px}
.form-grid .field{margin:0}
.form-grid .full{grid-column:1/-1}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes modal-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* Utility */
.muted{color:var(--ink-3)} .mono{font-family:var(--font-mono)} .display{font-family:var(--font-display)}
.row-flex{display:flex;align-items:center;gap:12px}
.boot{padding:80px 24px;text-align:center;color:var(--ink-3);font-size:13px}
/* Home */
.sub-header{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.home-tabs{display:flex;gap:4px}
.home-tab{padding:6px 14px;border-radius:999px;font-size:12px;font-family:var(--font-mono);color:var(--ink-3);background:transparent;border:1px solid transparent;transition:all .15s}
.home-tab:hover{color:var(--ink)}
.home-tab.is-active{background:var(--accent);color:#fff}
.sub-header-search{flex:1;max-width:340px;margin-left:auto}
.sub-header-sort{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-3)}
.sub-header-sort .label{margin:0}
.sub-header-sort .select{width:auto;padding:6px 10px;font-size:12px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px 20px}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-bottom:8px}
.stat-value{font-family:var(--font-display);font-size:28px;font-weight:600;letter-spacing:-.02em;color:var(--ink);line-height:1.1}
.stat-value.accent{color:var(--accent)}
.stat-value.small{font-size:22px}
/* Table */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow-sm)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead th{background:#faf9f7;text-align:left;padding:11px 16px;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl tbody td{padding:14px 16px;border-bottom:1px solid var(--border);color:var(--ink-2);vertical-align:middle}
.tbl tbody tr{cursor:pointer;transition:background .12s}
.tbl tbody tr:hover{background:var(--row-hover)}
.tbl tbody tr:last-child td{border-bottom:0}
.analysis-cell{min-width:220px}
.analysis-name{font-family:var(--font-display);font-weight:600;color:var(--ink);font-size:14px;margin-bottom:2px}
.analysis-customer{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em}
.cell-arv{font-family:var(--font-mono);color:var(--accent);font-weight:500;text-align:right;white-space:nowrap}
.cell-mono{font-family:var(--font-mono);font-size:12px;color:var(--ink-2);white-space:nowrap}
.empty-state{padding:48px 24px;text-align:center;color:var(--ink-3);font-size:13px}
/* Workspace */
.ws-topbar{padding:0 20px;gap:14px}
.ws-back{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:6px;color:#f5f5f5;font-size:18px;transition:background .15s}
.ws-back:hover{background:#1f1f1f}
.ws-breadcrumb{display:flex;flex-direction:column;line-height:1.2;min-width:0;margin-right:4px}
.ws-crumb-name{font-family:var(--font-display);font-weight:600;color:#f5f5f5;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:320px}
.ws-crumb-customer{font-size:10px;color:var(--ink-4);text-transform:uppercase;letter-spacing:.1em}
.ws-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 56px)}
.ws-sidebar{background:#f1efeb;border-right:1px solid var(--border);padding:22px 0;display:flex;flex-direction:column;gap:16px;position:sticky;top:56px;align-self:start;height:calc(100vh - 56px);overflow-y:auto}
.ws-meta{padding:0 20px 18px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border)}
.ws-meta-row{display:flex;flex-direction:column;gap:2px}
.ws-meta-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3)}
.ws-meta-value{font-size:12px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-nav{display:flex;flex-direction:column;gap:2px}
.ws-nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-family:var(--font-mono);font-size:13px;color:var(--ink-2);text-align:left;border-left:3px solid transparent;transition:background .12s,color .12s,border-color .12s;width:100%}
.ws-nav-item:hover{background:#e8e6e2;color:var(--ink)}
.ws-nav-item.is-active{background:var(--accent-soft);color:var(--accent);border-left-color:var(--accent);font-weight:500}
.ws-nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:.8}
.ws-main{padding:28px 32px;overflow-x:auto}
.ws-section{margin-bottom:32px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:12px}
.section-title{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--ink)}
.section-count{font-family:var(--font-mono);font-size:12px;color:var(--ink-3);margin-left:8px;font-weight:400}
.tab-placeholder{padding:48px 24px;text-align:center;color:var(--ink-3);font-size:13px;background:#fff;border:1px dashed var(--border);border-radius:8px}
/* Overview — KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:18px 20px;box-shadow:var(--shadow-sm)}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-bottom:10px}
.kpi-value{font-family:var(--font-display);font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1.1}
.kpi-value .u{font-size:13px;opacity:.6;margin-left:4px;font-weight:500}
.kpi-sub{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);margin-top:8px}
.kpi-red{color:var(--accent)}.kpi-amber{color:#c98a1f}.kpi-green{color:var(--ok-dark)}.kpi-ink{color:var(--ink)}
/* Health */
.health-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.health-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:18px 20px;box-shadow:var(--shadow-sm)}
.health-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-bottom:10px}
.health-value{font-family:var(--font-display);font-size:20px;color:var(--ink);margin-bottom:10px;line-height:1.1}
.progress{background:#eceae6;border-radius:999px;height:8px;overflow:hidden}
.progress-fill{background:var(--accent);height:100%;border-radius:999px;transition:width .3s}
.progress-fill.ok{background:var(--ok)}
.evidence-breakdown{display:flex;flex-direction:column;gap:6px;font-family:var(--font-mono);font-size:12px}
.evidence-row{display:flex;justify-content:space-between;color:var(--ink-2)}
/* Scenarios mini */
.scenarios-mini{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.mini-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.mini-name{font-family:var(--font-display);font-weight:600;color:var(--ink);font-size:13px;line-height:1.3;min-height:34px}
.mini-impact{font-family:var(--font-mono);font-size:15px;color:var(--accent);font-weight:500}
.mini-impact.inactive{color:var(--ink-3)}
/* Timeline */
.timeline{background:#fff;border:1px solid var(--border);border-radius:8px;padding:20px 24px;box-shadow:var(--shadow-sm)}
.timeline-group{margin-bottom:18px} .timeline-group:last-child{margin-bottom:0}
.timeline-group-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-bottom:8px}
.timeline-bar{display:flex;gap:4px;margin-bottom:8px}
.timeline-step{flex:1;height:6px;background:#eceae6;border-radius:3px}
.timeline-step.done{background:var(--ok)}
.timeline-step.curr{background:var(--accent)}
.timeline-labels{display:flex;gap:4px;font-family:var(--font-mono);font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em}
.timeline-labels span{flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.timeline-labels span.curr{color:var(--accent);font-weight:500}
/* Scenarios tab */
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:999px;font-size:11px;font-family:var(--font-mono);font-weight:500;color:var(--ink-3);border:1px solid var(--border);background:#fff;transition:all .15s;letter-spacing:.02em}
.filter-chip:hover{color:var(--ink);border-color:var(--border-strong)}
.filter-chip.is-active{background:var(--accent);color:#fff;border-color:var(--accent)}
.scenario-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:20px 24px;box-shadow:var(--shadow-sm);margin-bottom:12px;transition:opacity .15s}
.scenario-card.inactive{opacity:.6}
.scenario-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:4px}
.scenario-title-block{flex:1;min-width:0}
.scenario-theme{margin-bottom:10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.scenario-name{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--ink);margin-bottom:4px;line-height:1.3}
.scenario-one-liner{font-family:var(--font-mono);font-size:12px;color:var(--ink-3)}
.scenario-impact{font-family:var(--font-display);font-size:24px;font-weight:600;color:var(--accent);letter-spacing:-.02em;white-space:nowrap;text-align:right}
.scenario-impact.inactive{color:var(--ink-3)}
.scenario-impact-label{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;text-align:right}
.scenario-foot{display:flex;align-items:center;gap:12px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap}
.switch{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:12px;color:var(--ink-2);cursor:pointer}
.switch-track{width:32px;height:18px;background:#d1ccc5;border-radius:999px;position:relative;transition:background .15s;display:inline-block}
.switch-track::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.switch.is-on .switch-track{background:var(--accent)} .switch.is-on .switch-track::after{transform:translateX(14px)}
.cfo-toggle{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;padding:4px 8px;border-radius:4px;transition:color .12s,background .12s}
.cfo-toggle:hover{color:var(--ink);background:var(--row-hover)}
.cfo-caret{display:inline-block;transition:transform .15s}
.cfo-toggle.is-open .cfo-caret{transform:rotate(90deg)}
.cfo-body{margin-top:10px;padding:12px 14px;background:#faf9f7;border-radius:6px;font-size:13px;color:var(--ink-2);border-left:3px solid var(--warn)}
.cfo-body-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--warn-2);margin-bottom:4px;font-family:var(--font-mono)}
/* Inputs tab */
.preset-bar{display:flex;gap:6px}
.preset-btn{padding:6px 12px;border-radius:6px;font-size:11px;font-family:var(--font-mono);color:var(--ink-2);border:1px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;letter-spacing:.02em}
.preset-btn:hover{color:var(--ink);border-color:var(--border-strong)}
.preset-btn.is-active{background:var(--ink);color:#fff;border-color:var(--ink)}
.input-group{background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow-sm)}
.input-group-head{background:#faf9f7;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.input-group-name{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--ink)}
.input-group-count{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em}
.input-row{display:grid;grid-template-columns:1.5fr 1fr .45fr 1.1fr .7fr .25fr;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);align-items:center;font-size:13px}
.input-row:last-child{border-bottom:0}
.input-row-label{color:var(--ink-2)}
.editable{font-family:var(--font-mono);color:var(--ink);font-weight:500;padding:4px 8px;border-radius:4px;border:1px solid transparent;cursor:text;transition:background .12s,border-color .12s;display:inline-block;min-width:80px}
.editable:hover{background:var(--row-hover);border-color:var(--border)}
.editable[contenteditable="true"]{background:#fff;border-color:var(--accent);outline:0;box-shadow:0 0 0 3px var(--accent-soft)}
.input-row-unit{font-family:var(--font-mono);font-size:12px;color:var(--ink-3)}
.sensitivity-tag{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:4px;display:inline-block;font-weight:500}
.sensitivity-High{background:var(--accent-soft);color:var(--accent)}
.sensitivity-Medium{background:#faeed0;color:#8a5e0e}
.sensitivity-Low{background:#eceae6;color:var(--ink-3)}
.prompt-icon{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:#eceae6;color:var(--ink-3);font-size:11px;cursor:help;font-family:var(--font-mono);font-weight:700;position:relative}
.prompt-icon:hover{background:var(--accent-soft);color:var(--accent)}
.prompt-icon:hover::after{content:attr(data-prompt);position:absolute;bottom:26px;right:0;background:var(--ink);color:#fff;padding:8px 12px;border-radius:6px;font-size:12px;font-family:var(--font-mono);font-weight:400;white-space:normal;width:260px;z-index:10;box-shadow:var(--shadow-md);letter-spacing:0;text-transform:none;line-height:1.4}
/* Outputs tab */
.three-q{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.big-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:24px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:8px}
.big-card.acting{border-top:4px solid var(--accent)}
.big-card.delay{border-top:4px solid var(--warn)}
.big-card.nothing{border-top:4px solid var(--ink)}
.big-card-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3)}
.big-card-value{font-family:var(--font-display);font-size:34px;font-weight:600;letter-spacing:-.02em;line-height:1.05}
.big-card-value.acting{color:var(--accent)} .big-card-value.delay{color:var(--warn-2)} .big-card-value.nothing{color:var(--ink)}

  ));

function toast(msg){

  setTimeout(() => t.remove(), 2600);
}
function fmtMoney(n){
  if (!n) return '$0';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(n >= 1e7 ? 1 : 2).replace(/\.?0+$/,'') + 'M';
  if (n >= 1e3) return '$' + Math.round(n/1e3) + 'K';
  return '$' + n;
}
function fmtDate(iso){ return iso ? iso : '—'; }
function daysUntil(iso){

/* ---------- OVERVIEW tab ---------- */
function computeArv(a){
  const s = scenariosByAnalysis[a.id] || [];
  return s.filter(x => x.active).reduce((sum,x) => sum + x.annualImpact, 0);
}
function computeCompleteness(a){
  const groups = inputsByAnalysis[a.id] || [];
  let filled=0, total=0;
  groups.forEach(g => g.items.forEach(i => { total++; if (i.value !== '' && i.value != null) filled++; }));
  return total ? Math.round(filled/total*100) : 0;
}
function evidenceBreakdown(a){
  const s = (scenariosByAnalysis[a.id] || []).filter(x=>x.active);
  const b = {tier1:0,tier2:0,tier3:0};
  s.forEach(x => b[x.evidence]++);
  return b;
}
function computeConfidence(a){
  const b = evidenceBreakdown(a);
  const total = b.tier1+b.tier2+b.tier3;
  if (!total) return 'Low';
  const score = (b.tier1*3 + b.tier2*2 + b.tier3) / total;
  return score >= 2.4 ? 'High' : score >= 1.7 ? 'Medium' : 'Low';
}
function lastSnapshot(a){
  const s = snapshotsByAnalysis[a.id] || [];
  return s.length ? s[s.length-1] : null;
}

function applyPreset(preset){
  state.assumptionTier = preset;
  const a = findAnalysis(state.activeAnalysisId);
  if (a){
    const scenarios = scenariosByAnalysis[a.id] || [];
    const mult = preset === 'Conservative' ? 0.75 : preset === 'Aggressive' ? 1.25 : 1;
    scenarios.forEach(s => {
      if (s.baselineImpact == null) s.baselineImpact = s.annualImpact;
      s.annualImpact = Math.round(s.baselineImpact * mult);
    });
    a.arv = computeArv(a);
  }
  render();
  toast(`Preset · ${preset}`);
}

function computeFinancial(a){
  const pre = outputsByAnalysis[a.id]?.financial;
  if (pre) return pre;
  const arv = computeArv(a);
  if (!arv) return null;
  return {
    y1: Math.round(arv * 0.75),
    y2: arv,
    y3: Math.round(arv * 1.1),
    npv: Math.round(arv * 2.8),
    payback: 12,
    irr: 0.35
  };
}

function onSaveSnapshotSubmit(e){
  e.preventDefault();
  const f = e.target;
  const a = findAnalysis(state.activeAnalysisId);
  if (!a) return;
  const arv = computeArv(a);
  const fin = computeFinancial(a);
  const denom = Math.max(arv * 0.3, 150000);
  const snap = {
    id: uid('snap'),
    label: f.label.value,
    date: new Date().toISOString().slice(0,10),
    stage: a.stage,
    phase: a.phase,
    arv,
    payback: fin?.payback ?? 12,
    bcr: arv > 0 ? +((fin?.npv || arv*3) / denom).toFixed(1) : 0,
    notes: f.notes.value.trim()
  };
  (snapshotsByAnalysis[a.id] = snapshotsByAnalysis[a.id] || []).push(snap);
  setState({ modal: null });
  toast(`Snapshot saved · ${snap.label}`);
}

  e.preventDefault();

  const a = {

    domain: f.domain.value,
    stage: f.stage.value,

  setState({ modal: null, screen: 'workspace', activeAnalysisId: a.id, workspaceTab: 'overview' });
  toast(`Analysis created — ${a.name}`);
}

            <div class="field">
              <label class="label">Email</label>
              <input class="input" type="email" name="email" value="seller@altmeridian.com"/>
            </div>
            <div class="field">
              <label class="label">Password</label>
              <input class="input" type="password" name="password" value="password123"/>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Enter Workspace →</button>
          </form>
          <p class="login-tagline">Value belongs to mechanisms, not solutions.</p>
        </div>
      </div>
    </main>
  `;
}

function onLoginSubmit(e){
  e.preventDefault();
  const form = e.target;
  const email = form.elements.email.value || 'seller@altmeridian.com';
  setState({ screen: 'home', user: email });
}

/* ---------- SCREEN 2 — ANALYSIS HOME ---------- */
function renderHome(){
  const s = computeHomeStats();
  return `
    <header class="topbar">
      <div class="wordmark"><span class="alt">ALT</span> <span class="meridian">MERIDIAN</span></div>
      <span class="topbar-label">Value Workspace</span>
      <div class="topbar-right">
        <span class="topbar-user">${escapeHtml(state.user || 'seller@altmeridian.com')}</span>
        <span class="topbar-divider"></span>
        <button class="btn btn-primary btn-sm" data-action="open-new-analysis">+ New Analysis</button>
      </div>
    </header>
    <nav class="sub-header">
      <div class="home-tabs">
        ${['all','active','pilot','completed'].map(t => `
          <button class="home-tab ${state.homeFilterTab===t?'is-active':''}" data-action="home-tab" data-tab="${t}">${t[0].toUpperCase()+t.slice(1)}</button>
        `).join('')}
      </div>
      <input class="input sub-header-search" placeholder="Search analyses…" value="${escapeHtml(state.homeSearch)}" data-action="home-search"/>
      <div class="sub-header-sort">
        <span class="label">Sort</span>
        <select class="select" data-action="home-sort">
          <option value="updated" ${state.homeSort==='updated'?'selected':''}>Updated</option>
          <option value="arv"     ${state.homeSort==='arv'?'selected':''}>ARV</option>
          <option value="stage"   ${state.homeSort==='stage'?'selected':''}>Stage</option>
        </select>
      </div>
    </nav>
    <main class="page">
      <div class="container">
        <div class="stats-row">
          <div class="stat-card"><div class="stat-label">Total Analyses</div><div class="stat-value">${s.total}</div></div>
          <div class="stat-card"><div class="stat-label">Active Deals</div><div class="stat-value">${s.active}</div></div>
          <div class="stat-card"><div class="stat-label">In Pilot</div><div class="stat-value">${s.pilot}</div></div>
          <div class="stat-card"><div class="stat-label">Avg ARV</div><div class="stat-value accent">${fmtMoney(s.avgArv)}</div></div>
        </div>
        ${renderAnalysisTable(homeRows())}
      </div>
    </main>
  `;
}

function computeHomeStats(){
  const total  = analyses.length;
  const active = analyses.filter(isActive).length;
  const pilot  = analyses.filter(isPilot).length;
  const nonZero = analyses.filter(a => a.arv > 0);
  const avgArv = nonZero.length ? nonZero.reduce((s,a)=>s+a.arv,0) / nonZero.length : 0;
  return { total, active, pilot, avgArv };
}

/* ---------- HOME FILTER / SORT ---------- */
const ACTIVE_STAGES = ['Discovery','Validation','Proposal','Finance Review'];
function isActive(a){    return ACTIVE_STAGES.includes(a.stage) && a.status !== 'Draft'; }
function isPilot(a){     return a.phase && a.phase.startsWith('Pilot'); }
function isCompleted(a){ return a.status === 'Completed'; }

function filterAnalyses(list){
  let out = list;
  if (state.homeFilterTab === 'active')         out = out.filter(isActive);
  else if (state.homeFilterTab === 'pilot')     out = out.filter(isPilot);
  else if (state.homeFilterTab === 'completed') out = out.filter(isCompleted);
  const q = state.homeSearch.trim().toLowerCase();
  if (q){
    out = out.filter(a => [
      a.name, a.customer, a.domain, a.championEmail, a.stage, a.phase, a.status
    ].some(v => v && String(v).toLowerCase().includes(q)));
  }
  return out;
}

function sortAnalyses(list){
  const out = list.slice();
  if (state.homeSort === 'updated')    out.sort((a,b) => (b.updated||'').localeCompare(a.updated||''));
  else if (state.homeSort === 'arv')   out.sort((a,b) => (b.arv||0) - (a.arv||0));
  else if (state.homeSort === 'stage') out.sort((a,b) => STAGES.indexOf(a.stage) - STAGES.indexOf(b.stage));
  return out;
}

function homeRows(){ return sortAnalyses(filterAnalyses(analyses)); }

function renderAnalysisTable(rows){
  if (!rows.length) return `<div class="table-wrap"><div class="empty-state">No analyses match the current filters.</div></div>`;
  return `
    <div class="table-wrap">
      <table class="tbl">
        <thead><tr>
          <th class="analysis-cell">Analysis · Customer</th>
          <th>Domain</th><th>Stage</th><th>Phase</th>
          <th>Champion</th><th>Pilot Start</th><th>Next Follow-Up</th>
          <th style="text-align:right">ARV</th><th>Status</th><th>Updated</th>
        </tr></thead>
        <tbody>${rows.map(renderAnalysisRow).join('')}</tbody>
      </table>
    </div>
  `;
}

function renderAnalysisRow(a){
  return `
    <tr data-action="open-analysis" data-id="${a.id}">
      <td class="analysis-cell">
        <div class="analysis-name">${escapeHtml(a.name)}</div>
        <div class="analysis-customer">${escapeHtml(a.customer)}</div>
      </td>
      <td class="cell-mono">${escapeHtml(a.domain)}</td>
      <td><span class="chip ${STAGE_CHIP[a.stage]||'chip-grey'}">${escapeHtml(a.stage)}</span></td>
      <td><span class="chip ${PHASE_CHIP[a.phase]||'chip-grey'}">${escapeHtml(a.phase)}</span></td>
      <td class="cell-mono">${escapeHtml(a.championEmail)}</td>
      <td class="cell-mono">${fmtDate(a.pilotStart)}</td>
      <td class="cell-mono">${fmtDate(a.nextFollowUp)}</td>
      <td class="cell-arv">${fmtMoney(a.arv)}</td>
      <td><span class="chip ${STATUS_CHIP[a.status]||'chip-grey'}">${escapeHtml(a.status)}</span></td>
      <td class="cell-mono">${fmtDate(a.updated)}</td>
    </tr>
  `;
}

/* ---------- EVENT DELEGATION ---------- */
document.addEventListener('submit', e => {
  const form = e.target.closest('form[data-action]');
  if (!form) return;
  const action = form.getAttribute('data-action');
  if (action === 'login-submit') return onLoginSubmit(e);
  if (action === 'new-analysis-submit')  return onNewAnalysisSubmit(e);
  if (action === 'save-snapshot-submit') return onSaveSnapshotSubmit(e);
});

document.addEventListener('click', e => {
  const node = e.target.closest('[data-action]');
  if (!node || node.tagName === 'FORM') return;
  const action = node.getAttribute('data-action');
  if (action === 'open-analysis'){
    const id = node.getAttribute('data-id');
    return goTo('workspace', { activeAnalysisId:id, workspaceTab:'overview' });
  }
  if (action === 'open-new-analysis'){
    return setState({ modal: 'newAnalysis' });
  }
  if (action === 'close-modal'){
    return setState({ modal: null });
  }
  if (action === 'modal-backdrop' && e.target === node){
    return setState({ modal: null });
  }
  if (action === 'home-tab'){
    return setState({ homeFilterTab: node.getAttribute('data-tab') });
  }
  if (action === 'back-to-home'){
    return goTo('home');
  }
  if (action === 'ws-tab'){
    return setState({ workspaceTab: node.getAttribute('data-tab') });
  }
  if (action === 'open-save-snapshot'){
    return setState({ modal: 'saveSnapshot' });
  }
  if (action === 'open-snapshot'){
    return toast('Snapshot detail view — coming soon');
  }
  if (action === 'export-snapshot-pdf'){
    return toast('PDF export — coming soon');
  }
  if (action === 'generate-report'){
    return toast('Report export — coming soon');
  }
  if (action === 'scenario-filter'){
    return setState({ scenarioFilter: node.getAttribute('data-theme') });
  }
  if (action === 'toggle-scenario'){
    const id = node.getAttribute('data-id');
    const a = findAnalysis(state.activeAnalysisId);
    if (!a) return;
    const s = (scenariosByAnalysis[a.id] || []).find(x => x.id === id);
    if (!s) return;
    s.active = !s.active;
    a.arv = computeArv(a);
    a.updated = new Date().toISOString().slice(0,10);
    return render();
  }
  if (action === 'toggle-cfo'){
    const id = node.getAttribute('data-id');
    state.cfoOpen = state.cfoOpen || {};
    state.cfoOpen[id] = !state.cfoOpen[id];
    return render();
  }
  if (action === 'preset'){
    return applyPreset(node.getAttribute('data-preset'));
  }
  if (action === 'edit-input' || action === 'edit-field'){
    if (node.getAttribute('contenteditable') === 'true') return;
    node.setAttribute('contenteditable','true');
    node.focus();
    const r = document.createRange(); r.selectNodeContents(node);
    const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
    return;
  }
});

document.addEventListener('focusout', e => {
  const node = e.target.closest('[data-action="edit-field"]');
  if (!node || node.getAttribute('contenteditable') !== 'true') return;
  node.setAttribute('contenteditable','false');
  const a = findAnalysis(state.activeAnalysisId);
  if (!a) return;
  const field = node.getAttribute('data-field');
  const val = node.textContent.trim();
  if (a[field] === val) return;
  a[field] = val;
  a.updated = new Date().toISOString().slice(0,10);
  toast('Saved');
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state.modal){
    e.preventDefault();
    return setState({ modal: null });
  }
  if (e.key === 'Enter' && !e.shiftKey){
    const editing = e.target.closest('[contenteditable="true"]');
    if (editing){ e.preventDefault(); editing.blur(); }
  }
});

document.addEventListener('focusout', e => {
  const node = e.target.closest('[data-action="edit-input"]');
  if (!node || node.getAttribute('contenteditable') !== 'true') return;
  node.setAttribute('contenteditable','false');
  const a = findAnalysis(state.activeAnalysisId);
  if (!a) return;
  const gi = +node.getAttribute('data-gi');
  const ii = +node.getAttribute('data-ii');
  const group = (inputsByAnalysis[a.id] || [])[gi];
  if (!group || !group.items[ii]) return;
  const raw = node.textContent.trim().replace(/,/g,'');
  const num = parseFloat(raw);
  group.items[ii].value = (raw !== '' && !isNaN(num)) ? num : raw;
  a.updated = new Date().toISOString().slice(0,10);
  toast('Saved');
  render();
});

document.addEventListener('input', e => {
  const node = e.target.closest('[data-action]');
  if (!node) return;
  if (node.getAttribute('data-action') === 'home-search'){
    state.homeSearch = node.value;
    // targeted table update preserves search input focus
    const wrap = document.querySelector('.table-wrap');
    if (wrap) wrap.outerHTML = renderAnalysisTable(homeRows());
  }
});

document.addEventListener('change', e => {
  const node = e.target.closest('[data-action]');
  if (!node) return;
  if (node.getAttribute('data-action') === 'home-sort'){
    setState({ homeSort: node.value });
  }
});

/* ---------- BOOT ---------- */
function init(){ render(); }
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
