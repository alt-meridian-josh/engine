<style>
:root{
  --bg:#f8f7f5; --card:#ffffff; --topbar:#141414;
  --ink:#1a1a1a; --ink-2:#444; --ink-3:#888; --ink-4:#bbb;
  --accent:#d63b2f; --accent-hover:#b8322a; --accent-soft:#fbeceb;
  --border:#e5e3e0; --border-strong:#d8d5d0; --row-hover:#faf9f7;
  --ok:#2f8f5a; --ok-dark:#1d6b42;
  --warn:#c98a1f; --warn-2:#c96b1f; --info:#2d6fb8;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04);
  --font-display:'Syne',system-ui,sans-serif;
  --font-mono:'DM Mono',ui-monospace,SFMono-Regular,monospace;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--font-mono);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;letter-spacing:-.01em;margin:0;color:var(--ink)}
h1{font-size:28px} h2{font-size:20px} h3{font-size:16px} h4{font-size:14px}
p{margin:0} a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
/* Topbar */
.topbar{position:sticky;top:0;z-index:50;background:var(--topbar);color:#f5f5f5;height:56px;display:flex;align-items:center;padding:0 24px;gap:20px;border-bottom:1px solid #000}
.wordmark{font-family:var(--font-display);font-weight:700;letter-spacing:.02em;font-size:16px}
.wordmark .alt{color:var(--accent)} .wordmark .meridian{color:#f5f5f5}
.topbar-label{font-family:var(--font-mono);font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.1em}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.topbar-user{color:var(--ink-4);font-size:12px}
.topbar-divider{width:1px;height:20px;background:#2a2a2a}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:6px;font-family:var(--font-mono);font-size:13px;font-weight:500;transition:background .15s,color .15s,border-color .15s;border:1px solid transparent;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--border)}
.btn-ghost:hover{background:#f0eeeb}
.btn-dark-ghost{background:transparent;color:#f5f5f5;border-color:#2a2a2a}
.btn-dark-ghost:hover{background:#1f1f1f}
.btn-sm{padding:6px 12px;font-size:12px}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-sm)}
.card-pad{padding:20px}
/* Chips */
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;font-weight:500;padding:3px 9px;border-radius:999px;background:#efece8;color:var(--ink-2);letter-spacing:.02em;white-space:nowrap}
.chip-grey{background:#eeece8;color:#555}
.chip-blue{background:#e4eef8;color:#1f4d82}
.chip-amber{background:#faeed0;color:#8a5e0e}
.chip-orange{background:#fbe0cf;color:#a24815}
.chip-green{background:#dcefe2;color:#1d6b42}
.chip-dark-green{background:#c8e0d0;color:#0f4a2b}
.chip-red{background:var(--accent-soft);color:var(--accent)}
.chip-ink{background:#eceae6;color:var(--ink)}
/* Forms */
.input,.select,.textarea{display:block;width:100%;background:#fff;border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-family:var(--font-mono);font-size:13px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.textarea{resize:vertical;min-height:80px}
.input:focus,.select:focus,.textarea:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.label{display:block;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin-bottom:6px}
.field{margin-bottom:16px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* Layout */
.page{min-height:calc(100vh - 56px)}
.container{max-width:1400px;margin:0 auto;padding:32px 24px}
/* Toast */
#toast-root{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--ink);color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;box-shadow:var(--shadow-md);animation:toast-in .2s ease-out}
@keyframes toast-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(20,20,20,.45);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade-in .15s ease-out}
.modal-card{background:#fff;border-radius:10px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modal-in .2s ease-out}
.modal-head{padding:22px 24px 14px;border-bottom:1px solid var(--border)}
.modal-body{padding:20px 24px}
.modal-foot{padding:14px 24px 20px;display:flex;justify-content:flex-end;gap:10px;border-top:1px solid var(--border)}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes modal-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* Utility */
.muted{color:var(--ink-3)} .mono{font-family:var(--font-mono)} .display{font-family:var(--font-display)}
.row-flex{display:flex;align-items:center;gap:12px}
.boot{padding:80px 24px;text-align:center;color:var(--ink-3);font-size:13px}
/* Home */

.home-tabs{display:flex;gap:4px}

.home-tab:hover{color:var(--ink)}
.home-tab.is-active{background:var(--accent);color:#fff}

.sub-header-sort .select{width:auto;padding:6px 10px;font-size:12px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px 20px}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);margin-bottom:8px}
.stat-value{font-family:var(--font-display);font-size:28px;font-weight:600;letter-spacing:-.02em;color:var(--ink);line-height:1.1}
.stat-value.accent{color:var(--accent)}
.stat-value.small{font-size:22px}

.table-wrap{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow-sm)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead th{background:#faf9f7;text-align:left;padding:11px 16px;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl tbody td{padding:14px 16px;border-bottom:1px solid var(--border);color:var(--ink-2);vertical-align:middle}
.tbl tbody tr{cursor:pointer;transition:background .12s}
.tbl tbody tr:hover{background:var(--row-hover)}
.tbl tbody tr:last-child td{border-bottom:0}

.btn-block{width:100%;justify-content:center;padding:12px 16px;font-size:14px}

</head>

}

  if (!n) return '$0';

  if (n >= 1e3) return '$' + Math.round(n/1e3) + 'K';
  return '$' + n;
}
function fmtDate(iso){ return iso ? iso : '—'; }
function daysUntil(iso){

function render(){
  const app = document.getElementById('app');
  if (state.screen === 'login')      app.innerHTML = renderLogin();

              <label class="label">Password</label>
              <input class="input" type="password" name="password" value="password123"/>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Enter Workspace →</button>
          </form>
          <p class="login-tagline">Value belongs to mechanisms, not solutions.</p>
        </div>
      </div>
    </main>
  `;
}

function onLoginSubmit(e){
  e.preventDefault();
  const form = e.target;
  const email = form.elements.email.value || 'seller@altmeridian.com';
  setState({ screen: 'home', user: email });
}

/* ---------- SCREEN 2 — ANALYSIS HOME ---------- */
function renderHome(){
  const s = computeHomeStats();
  return `
    <header class="topbar">
      <div class="wordmark"><span class="alt">ALT</span> <span class="meridian">MERIDIAN</span></div>
      <span class="topbar-label">Value Workspace</span>
      <div class="topbar-right">
        <span class="topbar-user">${escapeHtml(state.user || 'seller@altmeridian.com')}</span>
        <span class="topbar-divider"></span>
        <button class="btn btn-primary btn-sm" data-action="open-new-analysis">+ New Analysis</button>
      </div>
    </header>
    <nav class="sub-header">
      <div class="home-tabs">
        ${['all','active','pilot','completed'].map(t => `
          <button class="home-tab ${state.homeFilterTab===t?'is-active':''}" data-action="home-tab" data-tab="${t}">${t[0].toUpperCase()+t.slice(1)}</button>
        `).join('')}
      </div>
      <input class="input sub-header-search" placeholder="Search analyses…" value="${escapeHtml(state.homeSearch)}" data-action="home-search"/>
      <div class="sub-header-sort">
        <span class="label">Sort</span>
        <select class="select" data-action="home-sort">
          <option value="updated" ${state.homeSort==='updated'?'selected':''}>Updated</option>
          <option value="arv"     ${state.homeSort==='arv'?'selected':''}>ARV</option>
          <option value="stage"   ${state.homeSort==='stage'?'selected':''}>Stage</option>
        </select>
      </div>
    </nav>
    <main class="page">
      <div class="container">
        <div class="stats-row">
          <div class="stat-card"><div class="stat-label">Total Analyses</div><div class="stat-value">${s.total}</div></div>
          <div class="stat-card"><div class="stat-label">Active Deals</div><div class="stat-value">${s.active}</div></div>
          <div class="stat-card"><div class="stat-label">In Pilot</div><div class="stat-value">${s.pilot}</div></div>
          <div class="stat-card"><div class="stat-label">Avg ARV</div><div class="stat-value accent">${fmtMoney(s.avgArv)}</div></div>
        </div>
        ${renderAnalysisTable(analyses)}
      </div>
    </main>
  `;
}

function computeHomeStats(){
  const total  = analyses.length;
  const active = analyses.filter(a => ['Discovery','Validation','Proposal','Finance Review'].includes(a.stage)).length;
  const pilot  = analyses.filter(a => a.phase && a.phase.startsWith('Pilot')).length;
  const nonZero = analyses.filter(a => a.arv > 0);
  const avgArv = nonZero.length ? nonZero.reduce((s,a)=>s+a.arv,0) / nonZero.length : 0;
  return { total, active, pilot, avgArv };
}

function renderAnalysisTable(rows){
  if (!rows.length) return `<div class="table-wrap"><div class="empty-state">No analyses match the current filters.</div></div>`;
  return `
    <div class="table-wrap">
      <table class="tbl">
        <thead><tr>
          <th class="analysis-cell">Analysis · Customer</th>
          <th>Domain</th><th>Stage</th><th>Phase</th>
          <th>Champion</th><th>Pilot Start</th><th>Next Follow-Up</th>
          <th style="text-align:right">ARV</th><th>Status</th><th>Updated</th>
        </tr></thead>
        <tbody>${rows.map(renderAnalysisRow).join('')}</tbody>
      </table>
    </div>
  `;
}

function renderAnalysisRow(a){
  return `
    <tr data-action="open-analysis" data-id="${a.id}">
      <td class="analysis-cell">
        <div class="analysis-name">${escapeHtml(a.name)}</div>
        <div class="analysis-customer">${escapeHtml(a.customer)}</div>
      </td>
      <td class="cell-mono">${escapeHtml(a.domain)}</td>
      <td><span class="chip ${STAGE_CHIP[a.stage]||'chip-grey'}">${escapeHtml(a.stage)}</span></td>
      <td><span class="chip ${PHASE_CHIP[a.phase]||'chip-grey'}">${escapeHtml(a.phase)}</span></td>
      <td class="cell-mono">${escapeHtml(a.championEmail)}</td>
      <td class="cell-mono">${fmtDate(a.pilotStart)}</td>
      <td class="cell-mono">${fmtDate(a.nextFollowUp)}</td>
      <td class="cell-arv">${fmtMoney(a.arv)}</td>
      <td><span class="chip ${STATUS_CHIP[a.status]||'chip-grey'}">${escapeHtml(a.status)}</span></td>
      <td class="cell-mono">${fmtDate(a.updated)}</td>
    </tr>
  `;
}

/* ---------- EVENT DELEGATION ---------- */
document.addEventListener('submit', e => {
  const form = e.target.closest('form[data-action]');
  if (!form) return;
  const action = form.getAttribute('data-action');
  if (action === 'login-submit') return onLoginSubmit(e);
});

document.addEventListener('click', e => {
  const node = e.target.closest('[data-action]');
  if (!node || node.tagName === 'FORM') return;
  const action = node.getAttribute('data-action');
  if (action === 'open-analysis'){
    const id = node.getAttribute('data-id');
    return goTo('workspace', { activeAnalysisId:id, workspaceTab:'overview' });
  }
  if (action === 'open-new-analysis'){
    return toast('New Analysis modal lands in Chunk 6');
  }
});

/* ---------- BOOT ---------- */
function init(){ render(); }
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
