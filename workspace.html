<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alt Meridian — Value Enablement Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e0e; --surface:#141414; --surface-2:#1a1a1a; --chip-bg:#242424;
  --border:#222222; --border2:#2e2e2e;
  --ink:#e8e8e8; --ink2:#888888; --ink3:#444444; --ink4:#2a2a2a;
  --red:#d63b2f; --red-dim:#2a1614; --red-hover:#b8322a;
  --green:#2d7d4f; --green-dim:#0e2018;
  --amber:#b45309; --amber-dim:#2a1f10;
  --blue:#1d4ed8; --blue-dim:#0f1a2e;
  --out-visibility:#1d4ed8; --out-throughput:#b45309; --out-compliance:#7c3aed;
  --out-risk:#d63b2f; --out-intelligence:#0f766e; --out-performance:#15803d; --out-revenue:#065f46;
  --topbar-bg:#0a0a0a; --topbar-text:#e8e5e0;
  --display:'Syne',ui-sans-serif,system-ui,sans-serif;
  --mono:'DM Mono',ui-monospace,SFMono-Regular,monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06);
  --r:3px; --r-chip:2px; --r-in:1px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:12px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--display);font-weight:600;letter-spacing:-.01em;margin:0;color:var(--ink)}
h1{font-size:20px;font-weight:700} h2{font-size:15px} h3{font-size:13px}
p{margin:0} a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
/* Topbar */
.topbar{position:sticky;top:0;z-index:50;background:var(--topbar-bg);color:var(--topbar-text);height:44px;display:flex;align-items:center;padding:0 16px;gap:14px;border-bottom:1px solid #000}
.wordmark{font-family:var(--display);font-weight:700;letter-spacing:.04em;font-size:13px}
.wordmark .alt{color:var(--red)} .wordmark .md{color:var(--topbar-text)}
.topbar-label{font-family:var(--mono);font-size:10px;color:#7a7470;text-transform:uppercase;letter-spacing:.1em}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.topbar-user{color:#a8a39d;font-size:11px;padding:3px 8px;background:#1f1d1a;border-radius:var(--r-chip)}
.topbar-divider{width:1px;height:18px;background:#2a2724}
.back-link{color:#a8a39d;font-size:11px;padding:4px 8px;border-radius:var(--r);transition:background .12s,color .12s}
.back-link:hover{background:#1f1d1a;color:var(--topbar-text)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r);font-family:var(--mono);font-size:11px;font-weight:500;transition:background .15s,color .15s,border-color .15s;border:1px solid transparent;white-space:nowrap;letter-spacing:.02em}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-hover)}
.btn-ghost{background:transparent;color:var(--ink2);border-color:var(--border2)}
.btn-ghost:hover{background:var(--surface);color:var(--ink)}
.btn-dark-ghost{background:transparent;color:var(--topbar-text);border-color:#2a2724}
.btn-dark-ghost:hover{background:#1f1d1a}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:var(--red-dim)}
.btn-sm{padding:4px 9px;font-size:10px}
.btn-block{width:100%;justify-content:center;padding:9px 14px;font-size:12px}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
.card-pad{padding:16px}
/* Chips */
.chip{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--r-chip);background:var(--chip-bg);color:var(--ink2);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.chip-grey{background:var(--chip-bg);color:var(--ink2)}
.chip-blue{background:var(--blue-dim);color:var(--blue)}
.chip-amber{background:var(--amber-dim);color:var(--amber)}
.chip-green{background:var(--green-dim);color:var(--green)}
.chip-red{background:var(--red-dim);color:var(--red)}
.chip.out-visibility{background:var(--blue-dim);color:#93c5fd}
.chip.out-throughput{background:var(--amber-dim);color:#fbbf24}
.chip.out-compliance{background:#1a1238;color:#c4b5fd}
.chip.out-risk{background:var(--red-dim);color:#f87171}
.chip.out-intelligence{background:#0a2622;color:#5eead4}
.chip.out-performance{background:var(--green-dim);color:#86efac}
.chip.out-revenue{background:#062a22;color:#6ee7b7}
.an-dom-stack{display:flex;flex-direction:column;gap:3px;align-items:flex-start}
.an-dom-name{font-family:var(--mono);font-size:10px;color:var(--ink3);line-height:1.3}
.chip-ink{background:#1f1d1a;color:var(--topbar-text)}
.chip-outline{background:transparent;border:1px solid var(--border2)}
/* Forms */
.input,.select,.textarea{display:block;width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-in);padding:8px 10px;font-family:var(--mono);font-size:12px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.textarea{resize:vertical;min-height:72px}
.input:focus,.select:focus,.textarea:focus{outline:0;border-color:var(--red);box-shadow:0 0 0 2px var(--red-dim)}
.label{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:4px;font-weight:500}
.label .req{color:var(--red);margin-left:2px}
.field{margin-bottom:12px} .field:last-child{margin-bottom:0}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Layout */
.page{min-height:calc(100vh - 44px)}
.container{max-width:1480px;margin:0 auto;padding:20px 24px}
/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(20,18,16,.45);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .15s ease-out}
.modal-card{background:var(--surface);border-radius:var(--r);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modal-in .18s ease-out}
.modal-head{padding:18px 20px 12px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700} .modal-sub{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.modal-body{padding:16px 20px}
.modal-foot{padding:12px 20px 16px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border)}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes modal-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* Toast */
#toast-root{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--ink);color:var(--bg);padding:8px 14px;border-radius:var(--r);font-size:11px;box-shadow:var(--shadow-lg);animation:toast-in .18s ease-out;pointer-events:auto;max-width:360px}
.toast.err{background:var(--red)}
@keyframes toast-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* Utility */
.muted{color:var(--ink3)} .mono{font-family:var(--mono)} .display{font-family:var(--display)}
.hstack{display:flex;align-items:center;gap:8px} .vstack{display:flex;flex-direction:column;gap:4px}
.sk{background:linear-gradient(90deg,var(--surface-2),#222,var(--surface-2));background-size:200% 100%;animation:sk 1.3s infinite;border-radius:var(--r)}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.boot{padding:80px 24px;text-align:center;color:var(--ink3);font-size:12px;letter-spacing:.05em;text-transform:uppercase}
/* Login */
.login-page{display:flex;align-items:center;justify-content:center;padding:60px 20px;min-height:calc(100vh - 44px)}
.login-wrap{width:100%;max-width:400px}
.login-card{padding:32px 32px 28px}
.login-brand{font-family:var(--display);font-weight:700;letter-spacing:.06em;font-size:11px;color:var(--ink3);margin-bottom:20px;text-transform:uppercase}
.login-brand .alt{color:var(--red)}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px;line-height:1.2}
.login-sub{font-size:12px;color:var(--ink3);font-style:italic;margin-bottom:22px;line-height:1.4;font-family:var(--display)}
/* Home */
.home-sub{background:var(--bg);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:44px;z-index:40}
.home-tabs{display:flex;gap:14px}
.home-tab{padding:6px 0;font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink3);background:transparent;border:0;border-bottom:2px solid transparent;border-radius:0;transition:color .12s,border-color .12s}
.home-tab:hover{color:var(--ink2)}
.home-tab.is-active{color:var(--red);border-bottom-color:var(--red)}
.home-search{flex:1;max-width:300px;margin-left:auto;padding:6px 10px;font-size:11px;background:var(--surface-2);border:1px solid transparent;color:var(--ink)}
.home-search::placeholder{color:var(--ink3)}
.home-search:focus{border-color:var(--border2);box-shadow:none}
.home-sort{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em}
.home-sort .select{width:auto;padding:4px 8px;font-size:10px;background:transparent;border:0;color:var(--ink3)}
.home-sort .select:focus{outline:0;color:var(--ink);box-shadow:none}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:20px}
.stat-card{padding:16px 20px;background:transparent;border:0;border-right:1px solid var(--border);border-radius:0;box-shadow:none;display:flex;flex-direction:column;gap:6px;min-height:108px}
.stat-card:last-child{border-right:0}
.stat-card:first-child{border-top:2px solid var(--red);padding-top:14px}
.stat-label{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink3);margin:0}
.stat-value{font-family:var(--display);font-weight:700;font-size:32px;line-height:1;letter-spacing:-.02em;color:var(--ink)}
.stat-value.accent{color:var(--red)}
.stat-sub{font-family:var(--mono);font-size:9px;color:var(--ink3);margin-top:auto}
.table-wrap{background:transparent;border:0;border-radius:0;overflow:visible;box-shadow:none}
.tbl{width:100%;border-collapse:collapse}
.tbl thead th{background:transparent;text-align:left;padding:0 12px;height:32px;font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink3);font-weight:500;border-bottom:1px solid var(--border2);white-space:nowrap;vertical-align:middle}
.tbl tbody td{padding:0 12px;height:44px;border-bottom:1px solid var(--border);color:var(--ink2);vertical-align:middle}
.tbl tbody tr{cursor:pointer;transition:background .12s}
.tbl tbody tr:hover{background:rgba(214,59,47,.035)}
.tbl tbody tr:last-child td{border-bottom:0}
.an-cell{min-width:200px}
.an-name{font-family:var(--display);font-weight:600;color:var(--ink);font-size:13px;margin-bottom:2px;line-height:1.25}
.an-cust{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.cell-mono{font-family:var(--mono);font-size:10px;color:var(--ink3);white-space:nowrap}
.cell-arv{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--red);white-space:nowrap;text-align:right}
.cell-arv.zero{color:var(--ink3)}
.cell-overdue{color:var(--red);font-weight:500}
.empty-state{padding:40px 20px;text-align:center;color:var(--ink3);font-size:12px}
/* Form grid (modal) */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
.form-grid .field{margin:0} .form-grid .full{grid-column:1/-1}
.form-section{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin:10px 0 2px;grid-column:1/-1;font-weight:500;border-top:1px solid var(--border);padding-top:10px}
.form-section.first{border-top:0;margin-top:0;padding-top:0}
/* Workspace */
.ws-topbar{padding:0 14px;gap:10px}
.ws-back{color:var(--ink3);font-size:11px;padding:5px 9px;border-radius:var(--r);transition:background .12s,color .12s;font-family:var(--mono)}
.ws-back:hover{background:#1f1d1a;color:var(--topbar-text)}
.ws-crumb{display:flex;flex-direction:column;line-height:1.15;min-width:0;margin-right:4px;position:relative;padding-left:14px}
.ws-crumb::before{content:'·';position:absolute;left:0;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:14px;line-height:1}
.ws-crumb-name{font-family:var(--display);font-weight:600;color:var(--ink);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.ws-crumb-cust{font-family:var(--mono);font-size:10px;color:var(--ink3)}
.ws-topbar-chips{display:flex;gap:4px}
.ws-topbar-chips .chip{font-size:8px;padding:2px 8px;letter-spacing:.08em}
.ws-layout{display:grid;grid-template-columns:180px 1fr;min-height:calc(100vh - 44px)}
.ws-sidebar{background:var(--surface);border-right:1px solid var(--border);padding:14px 0;display:flex;flex-direction:column;gap:12px;position:sticky;top:44px;align-self:start;height:calc(100vh - 44px);overflow-y:auto}
.ws-meta{padding:0 14px 12px;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--border)}
.ws-meta-row{display:flex;flex-direction:column;gap:1px;line-height:1.3}
.ws-meta-label{font-family:var(--mono);font-size:7px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink3)}
.ws-meta-value{font-family:var(--mono);font-size:10px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-nav{display:flex;flex-direction:column;gap:0}
.ws-nav-item{display:flex;align-items:center;gap:9px;padding:0 14px;height:36px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);text-align:left;border-left:3px solid transparent;transition:background .12s,color .12s,border-color .12s;width:100%}
.ws-nav-item:hover{background:rgba(214,59,47,.04);color:var(--ink2)}
.ws-nav-item.is-active{background:rgba(214,59,47,.06);color:var(--red);border-left-color:var(--red);font-weight:500}
.ws-nav-icon{width:14px;font-size:13px;text-align:center;opacity:.9}
.fd-link{margin-top:auto;padding:10px 14px;border-top:1px solid var(--border);font-size:8px}
.fd-link a{color:var(--ink4);text-transform:uppercase;letter-spacing:.08em;transition:color .12s;font-family:var(--mono)}
.fd-link a:hover{color:var(--ink3)}
/* Live Assumptions Rail — scoped under .ws-sidebar so shared classes elsewhere are untouched */
.ws-sidebar{padding:0;gap:0}
.ws-sidebar .ws-nav-item{font-size:9px}
.ws-rail-top{display:flex;flex-direction:column;gap:10px;padding:14px 0 12px;border-bottom:1px solid var(--border)}
.ws-rail-top .ws-meta{border-bottom:0;padding-bottom:0}
.ws-rail-bottom{display:flex;flex-direction:column;gap:14px;padding:14px}
.ws-rail-section-label{font-family:var(--mono);font-size:8px;color:var(--red);text-transform:uppercase;letter-spacing:.14em;font-weight:600}
.ws-asmp-empty{font-family:var(--mono);font-size:10px;color:var(--ink3);line-height:1.4}
.ws-asmp{display:flex;flex-direction:column;gap:14px}
.ws-asmp-row{display:flex;flex-direction:column;gap:5px}
.ws-asmp-label{font-family:var(--mono);font-size:9px;color:var(--ink2);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ws-asmp-vrow{display:flex;align-items:baseline;justify-content:space-between;gap:6px}
.ws-asmp-value{font-family:var(--mono);font-size:12px;color:var(--ink);cursor:text;border-bottom:1px dashed transparent;padding:0 1px;transition:border-color .12s,color .12s}
.ws-asmp-value:hover{border-bottom-color:var(--ink3)}
.ws-asmp-value[contenteditable="true"]{outline:none;border-bottom-color:var(--red);color:var(--red)}
.ws-asmp-unit{font-family:var(--mono);font-size:9px;color:var(--ink3);text-align:right}
.ws-asmp-slider{-webkit-appearance:none;appearance:none;width:100%;height:2px;background:var(--border);border-radius:1px;cursor:pointer;margin:2px 0}
.ws-asmp-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:10px;height:10px;border-radius:50%;background:var(--red);cursor:pointer;border:0}
.ws-asmp-slider::-moz-range-thumb{width:10px;height:10px;border-radius:50%;background:var(--red);cursor:pointer;border:0}
.ws-asmp-src{font-family:var(--mono);font-size:7px;text-transform:uppercase;letter-spacing:.1em;padding:1px 5px;border-radius:2px;align-self:flex-start;font-weight:600}
.ws-asmp-src.is-buyer{background:var(--green-dim);color:var(--green)}
.ws-asmp-src.is-default{background:var(--chip-bg);color:var(--ink3)}
.ws-asmp-metrics{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid var(--border)}
.ws-asmp-arv{display:flex;flex-direction:column;gap:2px}
.ws-asmp-arv-label{font-family:var(--mono);font-size:7px;color:var(--ink3);text-transform:uppercase;letter-spacing:.12em}
.ws-asmp-arv-value{font-family:var(--mono);font-size:11px;color:var(--red);font-weight:600;line-height:1}
.ws-asmp-conf{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.1em;padding:2px 6px;border-radius:2px;font-weight:600;margin-left:auto}
.ws-asmp-conf.is-governed{background:var(--green-dim);color:var(--green)}
.ws-asmp-conf.is-exploratory{background:var(--amber-dim);color:var(--amber)}
.ws-asmp-conf.is-default{background:var(--chip-bg);color:var(--ink2)}
/* Active Context Bar — sticky below 44px topbar; pushes sidebar offset to 76px */
.ws-ctxbar{position:sticky;top:44px;z-index:45;height:32px;background:var(--surface-2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px}
.ws-ctxbar-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.ws-ctxbar-left::-webkit-scrollbar{display:none}
.ws-ctxbar-right{font-family:var(--mono);font-size:8px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.ws-ctx-chip{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;font-family:var(--mono);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--ink2);background:var(--surface);border:1px solid var(--border);border-radius:2px;white-space:nowrap}
.ws-ctx-chip.is-clickable{cursor:pointer;transition:border-color .12s,color .12s}
.ws-ctx-chip.is-clickable:hover{border-color:var(--ink3);color:var(--ink)}
.ws-ctx-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block;background:var(--ink3)}
.ws-ctx-out-visibility{background:#93c5fd}.ws-ctx-out-throughput{background:#fbbf24}.ws-ctx-out-compliance{background:#c4b5fd}.ws-ctx-out-risk{background:#f87171}.ws-ctx-out-intelligence{background:#5eead4}.ws-ctx-out-performance{background:#86efac}.ws-ctx-out-revenue{background:#6ee7b7}
.ws-ctx-tier-key{color:var(--ink3);margin-right:2px}
.ws-ctx-comp.is-good{border-color:var(--green);color:var(--green)}
.ws-ctx-comp.is-mid{border-color:var(--amber);color:var(--amber)}
.ws-ctx-comp.is-bad{border-color:var(--red);color:var(--red)}
.ws-sidebar{top:76px;height:calc(100vh - 76px)}
.ws-main{padding:20px 24px;overflow-x:auto}
.tab-placeholder{padding:40px 20px;text-align:center;color:var(--ink3);font-size:12px;background:var(--surface);border:1px dashed var(--border);border-radius:var(--r)}
/* Value Case */
/* ---------- VALUE CASE TAB v3 — SECTION 1: HEADLINE ---------- */
.vc-headline{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;padding:4px 4px 16px;margin-bottom:20px;flex-wrap:wrap}
.vc-headline-left{min-width:0;flex:1 1 240px}
.vc-customer{font-family:var(--display);font-weight:700;font-size:24px;color:var(--ink);letter-spacing:-.02em;line-height:1.1}
.vc-domain{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:6px}
.vc-metrics{display:flex;align-items:stretch;gap:0;flex-shrink:0;flex-wrap:wrap}

.vc-metric+.vc-metric{border-left:1px solid var(--border)}

.vc-metric-value.is-red{color:var(--red)}
.vc-metric-value.is-amber{color:var(--amber)}

.vc-conf-chip{font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:6px 12px;border-radius:var(--r-chip);white-space:nowrap}

.vc-conf-exploratory{background:var(--amber-dim);color:var(--amber)}
.vc-conf-default{background:var(--chip-bg);color:var(--ink2)}
/* ---------- VALUE CASE TAB v3 — SECTION 2: STATUS BLOCK ---------- */
.vc-status-grid{display:grid;grid-template-columns:55fr 45fr;gap:24px;margin-bottom:24px}
.vc-status-left,.vc-status-right{min-width:0}
.vc-status-right{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:14px}
.vc-status-header{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink3);margin-bottom:10px}
.vc-mech-row{display:flex;align-items:center;gap:10px;padding:0 4px;height:36px;border-bottom:1px solid var(--border);font-size:12px;line-height:1.4}
.vc-mech-row:last-child{border-bottom:0}
.vc-mech-icon{flex-shrink:0;width:6px;height:6px;border-radius:50%;font-size:0;line-height:0;text-indent:-9999px;overflow:hidden}
.vc-mech-active .vc-mech-icon{background:var(--green)}

.vc-mech-inactive .vc-mech-icon{background:var(--ink4)}
.vc-mech-text{flex:1 1 auto;min-width:0;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vc-mech-shadowed .vc-mech-text{color:var(--ink3)}
.vc-mech-inactive .vc-mech-text{color:var(--ink4)}
.vc-mech-tag{font-family:var(--mono);font-size:7px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;flex-shrink:0}
.vc-mech-row .chip{font-size:7px;padding:1px 6px;letter-spacing:.1em}
.vc-mech-arv{font-family:var(--mono);font-size:12px;font-weight:500;flex-shrink:0;text-align:right;min-width:80px;color:var(--ink3)}
.vc-mech-arv.is-red{color:var(--red)}
.vc-mech-inactive .vc-mech-arv{color:var(--ink4)}
.vc-empty{padding:14px 4px;color:var(--ink3);font-size:12px;font-style:italic}
.vc-link{color:var(--red);text-decoration:none;cursor:pointer;font-style:normal;background:none;border:0;padding:0;font-family:inherit;font-size:inherit}
.vc-link:hover{text-decoration:underline}
.vc-gap-row{display:flex;align-items:center;gap:10px;height:32px;font-family:var(--mono);font-size:11px;line-height:1.4;color:var(--ink2)}
.vc-gap-row+.vc-gap-row{border-top:1px solid var(--border)}
.vc-gap-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:var(--ink3)}
.vc-gap-dot.is-amber{background:var(--amber)}
.vc-gap-dot.is-red{background:var(--red)}
.vc-gap-dot.is-grey{background:var(--ink3)}
.vc-gap-label{flex:1 1 auto;min-width:0}
.vc-gap-more{font-family:var(--mono);font-size:9px;color:var(--ink3);padding-top:8px;margin-top:8px;border-top:1px solid var(--border);text-transform:uppercase;letter-spacing:.1em}
.vc-empty-gaps{color:var(--ink3);font-size:12px;font-style:italic;padding:6px 0}
/* ---------- VALUE CASE TAB v3 — SECTION 3: NEXT ACTION ---------- */
.vc-next{background:var(--surface);border:1px solid var(--border2);border-left:3px solid var(--red);border-radius:0 3px 3px 0;padding:14px 16px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.vc-next-header{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.14em;color:var(--red);font-weight:600;flex-shrink:0}
.vc-next-body{flex:1 1 240px;color:var(--ink2);font-family:var(--mono);font-size:11px;line-height:1.55}
.vc-next-body b{font-weight:600;color:var(--ink)}
.vc-next-btn{flex-shrink:0}
/* ---------- VALUE CASE TAB v3 — SECTION 4: SCENARIO DETAIL ---------- */
.vc-detail{margin-bottom:24px}
.vc-detail-toggle{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink3);background:none;border:0;cursor:pointer;padding:6px 0;transition:color .12s}
.vc-detail-toggle:hover{color:var(--ink2)}
.vc-detail-toggle.is-open{color:var(--ink2)}
.vc-detail-toggle .caret{transition:transform .12s;display:inline-block}
.vc-detail-toggle.is-open .caret{transform:rotate(90deg)}
.vc-detail-body{margin-top:6px;display:flex;flex-direction:column;gap:0}
.vc-scen-card{background:transparent;border:0;border-bottom:1px solid var(--border);border-radius:0;padding:10px 4px;transition:opacity .12s}
.vc-scen-card:last-child{border-bottom:0}
.vc-scen-card.is-inactive{opacity:.6}
.vc-scen-card-row{display:flex;align-items:center;gap:12px;cursor:pointer}
.vc-scen-card-left{flex:1 1 auto;min-width:0;display:flex;align-items:center;gap:10px}
.vc-scen-one{flex:1 1 auto;min-width:0;font-family:var(--display);font-weight:600;color:var(--ink);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vc-scen-card-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.vc-scen-card-arv{font-family:var(--mono);font-size:12px;color:var(--ink3);font-weight:500;min-width:80px;text-align:right}
.vc-scen-card-arv.is-red{color:var(--red)}
.vc-scen-card-detail{padding-top:10px;margin-top:8px;border-top:1px solid var(--border);font-size:11px;line-height:1.5;display:grid;grid-template-columns:120px 1fr;gap:6px 12px;font-family:var(--mono)}
.vc-scen-card-detail dt{color:var(--ink3);text-transform:uppercase;letter-spacing:.14em;font-size:8px;padding-top:2px}
.vc-scen-card-detail dd{margin:0;color:var(--ink2)}
/* ---------- VALUE CASE TAB v3 — SECTION 5: HEALTH STRIP ---------- */
.vc-health{display:flex;flex-wrap:wrap;gap:0;padding:14px 0 4px;border-top:1px solid var(--border);margin-top:8px}
.vc-health-chip{display:flex;align-items:center;gap:8px;padding:6px 16px;background:transparent;border:0;border-radius:0;font-family:var(--mono);font-size:9px;color:var(--ink3)}
.vc-health-chip+.vc-health-chip{border-left:1px solid var(--border2)}
.vc-health-chip:first-child{padding-left:0}
.vc-health-label{color:var(--ink3);text-transform:uppercase;letter-spacing:.14em;font-size:9px}
.vc-health-value{color:var(--ink3)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.section-title{font-family:var(--display);font-size:15px;font-weight:600;color:var(--ink)}
.section-count{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-left:8px;text-transform:uppercase;letter-spacing:.08em;font-weight:400}
/* .sc-switch + .sc-switch-track survive: reused by Value Case Section 4 toggle. */
.sc-switch{display:inline-flex;align-items:center;gap:8px;padding:3px 9px;border-radius:var(--r);border:1px solid var(--border2);color:var(--ink3);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;transition:all .12s;background:var(--surface)}
.sc-switch:hover{color:var(--ink)}
.sc-switch.is-on{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.sc-switch-track{width:24px;height:12px;background:var(--border2);border-radius:999px;position:relative;display:inline-block;transition:background .12s}
.sc-switch-track::after{content:'';position:absolute;top:1px;left:1px;width:10px;height:10px;background:#fff;border-radius:50%;transition:transform .12s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.sc-switch.is-on .sc-switch-track{background:var(--green)}.sc-switch.is-on .sc-switch-track::after{transform:translateX(12px)}
.caret{display:inline-block;transition:transform .15s;margin-right:4px} .is-open .caret{transform:rotate(90deg)}
/* Inputs tab */
.preset-bar{display:flex;gap:4px}
.preset-btn{padding:4px 10px;border-radius:var(--r);font-size:10px;font-family:var(--mono);color:var(--ink3);border:1px solid var(--border2);background:var(--surface);cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.06em}
.preset-btn:hover{color:var(--ink)}
.preset-btn.is-active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.ig-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.ig-head{background:var(--surface-2);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.ig-name{font-family:var(--display);font-size:13px;font-weight:600;color:var(--ink)}
.ig-count{font-family:var(--mono);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
.ig-row{padding:12px 16px;border-bottom:1px solid var(--border)} .ig-row:last-child{border-bottom:0}
.ig-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ig-chip-col{display:flex;flex-direction:column;gap:3px;min-width:64px}
.ig-label{flex:1;color:var(--ink);font-size:12px}
.ig-value{font-family:var(--mono);color:var(--ink);font-weight:500;padding:2px 6px;border-radius:2px;border:1px solid transparent;cursor:text;font-size:13px}
.ig-value:hover{background:var(--bg);border-color:var(--border)}
.ig-value[contenteditable="true"]{background:var(--bg);border-color:var(--red);outline:0;box-shadow:0 0 0 2px var(--red-dim)}
.ig-unit{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-left:4px}
.ig-prompt{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--chip-bg);color:var(--ink3);font-size:10px;cursor:help;font-family:var(--mono);font-weight:700;position:relative}
.ig-prompt:hover{background:var(--red-dim);color:var(--red)}
.ig-prompt:hover::after{content:attr(data-p);position:absolute;bottom:22px;right:0;background:var(--ink);color:var(--bg);padding:8px 10px;border-radius:var(--r);font-size:11px;font-family:var(--mono);white-space:normal;width:240px;z-index:10;box-shadow:var(--shadow-lg);text-transform:none;letter-spacing:0;line-height:1.4;font-weight:400}
.ig-slider{width:100%;margin:4px 0 3px;accent-color:var(--red)}
.ig-range{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:.04em}
.sensitivity-tag{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:1px 6px;border-radius:2px;font-weight:500}
.sensitivity-High{background:var(--red-dim);color:var(--red)} .sensitivity-Medium{background:var(--amber-dim);color:var(--amber)} .sensitivity-Low{background:var(--chip-bg);color:var(--ink3)}
/* Outputs tab */
.three-q{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.tq-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 22px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px}
.tq-card.acting{border-top:3px solid var(--red)} .tq-card.delay{border-top:3px solid var(--amber)} .tq-card.nothing{border-top:3px solid var(--ink)}
.tq-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3)}
.tq-value{font-family:var(--display);font-size:28px;font-weight:700;letter-spacing:-.01em;line-height:1.05}
.tq-value.red{color:var(--red)} .tq-value.amber{color:var(--amber)} .tq-value.ink{color:var(--ink)}
.tq-value .u{font-size:13px;opacity:.5;margin-left:2px;font-weight:500}
.tq-sub{font-family:var(--mono);font-size:10px;color:var(--ink2)}
.tq-tier{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-top:2px}
.wf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 20px;box-shadow:var(--shadow);margin-bottom:16px}
.wf-row{display:grid;grid-template-columns:220px 1fr 80px 60px 90px;gap:10px;align-items:center;padding:6px 0;font-size:11px}
.wf-row.shadow{opacity:.55}
.wf-name{color:var(--ink2);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wf-bar-wrap{background:var(--surface-2);border-radius:2px;height:18px;overflow:hidden}
.wf-bar{height:100%;background:var(--red);border-radius:2px;transition:width .3s} .wf-bar.shadow{background:var(--border2)}
.wf-val{font-family:var(--mono);text-align:right;color:var(--ink);font-weight:500}
.wf-pct{font-family:var(--mono);text-align:right;color:var(--ink3)}
.wf-status{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);text-align:right}
.fin-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.fin-tbl{width:100%;border-collapse:collapse;font-size:12px}
.fin-tbl td{padding:10px 16px;border-bottom:1px solid var(--border)}
.fin-tbl td:first-child{color:var(--ink2);font-family:var(--mono);text-transform:uppercase;font-size:10px;letter-spacing:.06em}
.fin-tbl td:last-child{text-align:right;font-family:var(--mono);color:var(--ink);font-weight:500}
.fin-tbl tr:last-child td{border-bottom:0}
.fin-tbl tr.emph td{background:var(--surface-2);font-weight:600} .fin-tbl tr.emph td:last-child{color:var(--red)}
.fin-note{padding:10px 16px;background:var(--amber-dim);color:var(--amber);font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);border-top:1px solid var(--border)}
/* Snapshots */
.snap-timeline{position:relative;padding-left:20px}
.snap-timeline::before{content:'';position:absolute;left:4px;top:10px;bottom:10px;width:2px;background:var(--red)}
.snap-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow);margin-bottom:12px;position:relative}
.snap-card::before{content:'';position:absolute;left:-20px;top:18px;width:10px;height:10px;border-radius:50%;background:var(--surface);border:2px solid var(--red)}
.snap-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.snap-label-big{font-family:var(--display);font-size:14px;font-weight:600;color:var(--ink)}
.snap-meta{font-family:var(--mono);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.snap-chips{display:flex;gap:4px;flex-wrap:wrap}
.snap-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:10px}
.snap-metric{display:flex;flex-direction:column;gap:1px}
.snap-metric-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3)}
.snap-metric-value{font-family:var(--display);font-size:14px;font-weight:600;color:var(--ink)} .snap-metric-value.accent{color:var(--red)}
.snap-notes{font-family:var(--mono);font-size:11px;color:var(--ink2);margin-bottom:10px;line-height:1.5}
.snap-actions{display:flex;gap:6px}
/* Deal tab */
.deal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.deal-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow)}
.deal-col-title{font-family:var(--display);font-size:13px;font-weight:600;margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.deal-col-title.mid{margin-top:18px}
.deal-field{display:grid;grid-template-columns:110px 1fr;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.deal-field:last-child{border-bottom:0}
.deal-field.stack{grid-template-columns:1fr;gap:5px;align-items:flex-start}
.deal-field-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3)}
.deal-field-value{font-family:var(--mono);color:var(--ink);font-weight:500}
.deal-edit{font-family:var(--mono);color:var(--ink);font-weight:500;padding:3px 6px;border-radius:2px;border:1px solid transparent;cursor:text;transition:all .12s;display:inline-block;min-width:160px}
.deal-edit:hover{background:var(--bg);border-color:var(--border)}
.deal-edit[contenteditable="true"]{background:var(--bg);border-color:var(--red);outline:0;box-shadow:0 0 0 2px var(--red-dim)}
.deal-select,.deal-date,.deal-textarea,.impl-input{font-family:var(--mono);font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:2px;background:var(--surface);color:var(--ink);width:100%;transition:border-color .12s,box-shadow .12s}
.deal-select:focus,.deal-date:focus,.deal-textarea:focus,.impl-input:focus{outline:0;border-color:var(--red);box-shadow:0 0 0 2px var(--red-dim)}
.deal-textarea{min-height:72px;resize:vertical;padding:7px 9px}
.deal-date.deal-overdue{color:var(--red);font-weight:500}
.impl-block{background:var(--red-dim);border:1px solid var(--red);border-radius:var(--r);padding:12px 14px;margin-top:14px}
.impl-title{font-family:var(--display);font-size:12px;font-weight:600;color:var(--red);margin-bottom:2px}
.impl-sub{font-family:var(--mono);font-size:10px;color:var(--amber);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.impl-input{padding:8px 10px;font-size:13px}
/* Meridian drawer */
.mx-drawer{position:fixed;top:44px;right:0;width:320px;height:calc(100vh - 44px);background:var(--surface);border-left:1px solid var(--border);box-shadow:-4px 0 16px rgba(0,0,0,.3);z-index:45;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s ease-out}
.mx-drawer.is-open{transform:translateX(0)}
.mx-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface-2)}
.mx-title{font-family:var(--mono);font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--red);display:flex;align-items:center;gap:5px}
.mx-title .dot{color:var(--red);font-size:10px}
.mx-model{font-family:var(--mono);font-size:8px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-left:auto}
.mx-close{color:var(--ink3);padding:2px 8px;border-radius:var(--r);font-size:18px;line-height:1} .mx-close:hover{background:var(--bg);color:var(--ink)}
.mx-body{flex:1;overflow-y:auto;padding:18px 14px 12px;display:flex;flex-direction:column;gap:8px}
.mx-msg{font-family:var(--mono);font-size:11px;line-height:1.6;padding:9px 11px;color:var(--ink);word-wrap:break-word;white-space:pre-wrap;max-width:88%;position:relative;margin-top:14px}
.mx-msg::before{position:absolute;top:-12px;font-family:var(--mono);font-size:7px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3)}
.mx-msg.assistant{background:var(--surface-2);border:1px solid var(--border);border-radius:2px 8px 8px 8px;align-self:flex-start}
.mx-msg.assistant::before{content:'ASSISTANT';left:0}
.mx-msg.user{background:rgba(214,59,47,.08);border:1px solid rgba(214,59,47,.18);border-radius:8px 2px 8px 8px;align-self:flex-end}
.mx-msg.user::before{content:'YOU';right:0}
.mx-msg.error{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(180,83,9,.3);border-radius:var(--r);align-self:flex-start}
.mx-msg.error::before{content:'ERROR';left:0;color:var(--amber)}
.mx-msg.thinking{color:var(--ink3);font-style:italic;background:transparent;border:0;padding:4px 0;margin-top:0;align-self:flex-start}
.mx-msg.thinking::before{display:none}
.mx-empty{padding:24px 12px;text-align:center;color:var(--ink3);font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;line-height:1.5}
.mx-chips{display:flex;flex-wrap:wrap;gap:5px;padding:9px 14px;border-top:1px solid var(--border);background:var(--surface-2)}

async function sbSelect(table, q){
  let b = sb.from(table).select('*');
  if (q?.eq)    for (const [k,v] of Object.entries(q.eq)) b = b.eq(k, v);
  if (q?.order) b = b.order(q.order[0], { ascending: q.order[1] !== false });
  const { data, error } = await b;
  if (error) throw error;
  return data || [];
}
async function sbInsert(table, row){ const { data, error } = await sb.from(table).insert(row).select(); if (error) throw error; return data?.[0] || null; }
async function sbUpsert(table, row, onConflict){ const { data, error } = await sb.from(table).upsert(row, onConflict?{onConflict}:{}).select(); if (error) throw error; return data?.[0] || null; }
async function sbPatch(table, eq, patch){
  let b = sb.from(table).update(patch);
  for (const [k,v] of Object.entries(eq)) b = b.eq(k, v);
  const { data, error } = await b.select();
  if (error) throw error; return data?.[0] || null;
}

async function loadInputDefs(domainId){
  // vef_input_definitions has duplicate input_key rows per domain (e.g. RFD
  // has loaded_rate × 5, productivity_uplift_pct × 5). resolvedInputs
  // overwrites on collision, so fetch order affected which variant's
  // default/typical landed on the slider. Fetch ordered by id and dedupe
  // client-side keeping the lowest-id row per input_key so every load
  // resolves to the same inputs.
  const rows = await sbSelect('vef_input_definitions',
    { eq:{domain_id:domainId}, order:['id', true] });
  const seen = new Set();
  return rows.filter(r => seen.has(r.input_key) ? false : (seen.add(r.input_key), true));

/* ---------- FORMULA ENGINE ---------- */
const RAMPS = [0.5, 1.0, 1.0];   // Y1 50% ramp, Y2/Y3 full adoption
const DISCOUNT = 0.10;
const MERIDIAN_MODEL       = 'claude-sonnet-4-20250514';
const MERIDIAN_MODEL_LABEL = 'Sonnet 4';

function evalFormula(formula, inputs){
  if (!formula || typeof formula !== 'string') return null;
  const keys = Object.keys(inputs || {});
  const vals = keys.map(k => {
    const v = inputs[k];
    return (v == null || isNaN(Number(v))) ? 0 : Number(v);
  });
  try {
    const fn = new Function(...keys, '"use strict";return (' + formula + ');');
    const r = fn(...vals);
    return (typeof r === 'number' && isFinite(r)) ? r : null;
  } catch(_){ return null; }
}

function resolvedInputs(inputsMap, inputDefs){
  const out = {};
  (inputDefs || []).forEach(d => {
    const p = inputsMap?.[d.input_key]?.provided_value;
    out[d.input_key] = p != null ? Number(p) : Number(d.typical_value ?? d.default_value ?? 0);
  });
  return out;
}

function computeAnalysis(engagement, scenarios, inputsMap, inputDefs){
  const inputs = resolvedInputs(inputsMap, inputDefs);
  // Engagement-load diagnostic — fires once per distinct engagement (keyed
  // on engagement_id via a function property so it survives renders without
  // polluting the shared `state` object). Dumps enough to pinpoint the
  // source of ARV=$0: missing scenarios, empty inputs, or the evaluator
  // returning null for a valid-looking formula. Remove once the RET-RFD
  // cause is understood.
  const engId = engagement?.engagement_id ?? null;
  if (engId && computeAnalysis._lastLoggedEng !== engId) {
    computeAnalysis._lastLoggedEng = engId;
    const sample = (scenarios || [])[0];
    console.log('[compute]', {
      engagementId:  engId,
      scenarioCount: (scenarios || []).length,
      activeCount:   (scenarios || []).filter(s => s.active).length,
      inputKeyCount: Object.keys(inputs).length,
      sampleFormula: sample?.value_scenario_formula ?? null,
      sampleResult:  sample ? evalFormula(sample.value_scenario_formula, inputs) : null,
    });
  }
  const per = (scenarios || []).map(s => {
    const arv = evalFormula(s.value_scenario_formula, inputs) || 0;
    const delay = evalFormula(s.delay_cost_formula, inputs) || (arv/12);
    const coi = evalFormula(s.cost_of_inaction_formula, inputs) || (arv*3);
    return { scenario_id: s.scenario_id, theme: s.value_theme || 'other', active: !!s.active, arv, delay, coi, pool_shadow: false };
  });
  // Pool-share guard: in each theme, only highest-ARV active scenario counts
  const best = {};
  per.filter(p => p.active).forEach(p => { if (!best[p.theme] || p.arv > best[p.theme].arv) best[p.theme] = p; });
  per.forEach(p => { if (p.active && best[p.theme] && best[p.theme].scenario_id !== p.scenario_id) p.pool_shadow = true; });
  const counted = per.filter(p => p.active && !p.pool_shadow);
  const arvFull     = counted.reduce((s,p) => s + p.arv, 0);
  const arvY1       = arvFull * RAMPS[0];
  const arvY2       = arvFull * RAMPS[1];
  const arvY3       = arvFull * RAMPS[2];
  const monthlyDelay= counted.reduce((s,p) => s + p.delay, 0);
  const coi3yr      = counted.reduce((s,p) => s + p.coi, 0);
  const impl        = Number(inputsMap?.implementation_cost?.provided_value) || 0;
  const npv     = impl > 0 ? arvY1 + arvY2/(1+DISCOUNT) + arvY3/(1+DISCOUNT)**2 - impl : null;
  const payback = impl > 0 && arvY1 > 0 ? impl / (arvY1/12) : null;
  const bcr     = impl > 0 ? (arvY1 + arvY2 + arvY3) / impl : null;
  return { arvY1, arvY2, arvY3, arvFull, monthlyDelay, coi3yr, npv, payback, bcr, perScenario: per, impl };
}

  if (v.step === 1){
    if (!(v.outcomeTiles && v.outcomeTiles.length)) nextDisabled = 'disabled';
  } else if (v.step === 2){
    const n = v.selectedScenarioIds ? v.selectedScenarioIds.size : 0;
    nextLabel = `Next → ${n} selected`;
    if (n === 0) nextDisabled = 'disabled';
  } else if (v.step === 3){
    nextLabel = v.mode === 'update' ? 'Update Analysis →' : 'Create Analysis →';
  }
  const nextAction = v.step < 3 ? 'vefa-next' : 'vefa-finish';
  return `<div class="vefa-footer">
    ${back}
    <div class="vefa-footer-right">
      <button class="btn btn-ghost btn-sm" data-action="vefa-close">Close</button>
      <button class="btn btn-primary btn-sm" data-action="${nextAction}" ${nextDisabled}>${escapeHtml(nextLabel)}</button>
    </div>
  </div>`;
}
function vefaStep(delta){
  const v = state.vefAssist;
  const next = Math.max(0, Math.min(3, v.step + delta));
  if (next === v.step) return;
  setState({ vefAssist: { ...v, step: next } });
  if (next === 2) vefaLoadStep2Scenarios();
}

async function vefaExtract(){

async function vefaProcessExtraction(raw){
  const cur = state.vefAssist;
  const parsed = vefaParseClaimsJson(raw);
  if (!parsed || !Array.isArray(parsed.claims)){
    setState({ vefAssist: { ...cur, extracting:false,
      extractError:'Could not parse claims from the model response. Try again, or Skip to proceed without extraction.' } });
    return;
  }
  // Fetch and cache the global scenario pool once per modal open.
  let pool = cur._matchPool;
  if (!pool){
    try { pool = await sbSelect('vef_value_scenarios'); }
    catch { pool = []; }
  }
  const claims = parsed.claims.map(c => vefaMatchAndVerdict(c, pool));
  const cur2 = state.vefAssist;
  const nextSel = new Set(cur2.selectedScenarioIds);
  claims.forEach(c => { if (c.matchedScenarioId) nextSel.add(c.matchedScenarioId); });
  setState({ vefAssist: { ...cur2, extracting:false, extractError:null,
    extractedClaims: claims, _matchPool: pool, selectedScenarioIds: nextSel } });
  const matches = claims.filter(c => c.matchedScenarioId).length;
  toast(matches
    ? `${claims.length} claim(s) extracted · ${matches} matched to governed mechanisms`
    : `${claims.length} claim(s) extracted · no mechanism matches yet`);
}
function vefaParseClaimsJson(raw){
  if (!raw) return null;
  let s = String(raw).trim();
  s = s.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '').trim();
  if (s[0] !== '{'){ const m = s.match(/\{[\s\S]*\}/); if (m) s = m[0]; }
  try { return JSON.parse(s); } catch { return null; }
}
const VEFA_STOPWORDS = new Set(['the','and','for','with','from','that','this','into','over','per','any','all','has','are','was','were','not','its','via']);
function vefaTokens(text){
  return String(text || '').toLowerCase().split(/[^a-z0-9]+/)
    .filter(t => t.length >= 3 && !VEFA_STOPWORDS.has(t));
}
function vefaMatchScenario(claim, pool){
  const claimTokens = new Set(vefaTokens((claim.metric || '') + ' ' + (claim.context || '')));
  if (!claimTokens.size || !pool || !pool.length) return null;
  let best = null, bestScore = -1;
  for (const s of pool){
    const body = (s.one_liner || '') + ' ' + (s.description || '') + ' ' + (s.mechanism_label || '');
    const strong = (s.mechanism_label || '') + ' ' + (s.value_theme || '');
    const bodyT = new Set(vefaTokens(body)), strongT = new Set(vefaTokens(strong));
    let hits = 0, strongHits = 0;
    for (const t of claimTokens){
      if (bodyT.has(t)){ hits++; if (strongT.has(t) && t.length >= 6) strongHits++; }
    }
    if (hits < 2 && strongHits < 1) continue;
    const score = hits * 10 + strongHits * 5 - (s.print_priority || 99);
    if (score > bestScore){ best = s; bestScore = score; }
  }
  return best;
}
function vefaParseNumber(s){
  if (s == null) return null;
  const m = String(s).match(/-?\d[\d,]*(?:\.\d+)?/);
  if (!m) return null;
  const n = parseFloat(m[0].replace(/,/g, ''));
  return isFinite(n) ? n : null;
}
function vefaParseRange(text){
  if (!text) return null;
  const m = String(text).match(/(-?\$?\d[\d,]*(?:\.\d+)?)\s*(?:-|–|—|to)\s*(-?\$?\d[\d,]*(?:\.\d+)?)/i);
  if (!m) return null;
  const lo = vefaParseNumber(m[1]), hi = vefaParseNumber(m[2]);
  if (lo == null || hi == null) return null;
  return { lo: Math.min(lo, hi), hi: Math.max(lo, hi) };
}
function vefaComputeVerdict(claim, match){
  if (!match) return 'Challenge';
  const ev = (match.evidence_strength || '').toLowerCase();
  if (!ev || ev === 'weak' || ev === 'none') return 'Challenge';
  if (ev === 'strong'){
    const range = vefaParseRange(match.typical_baseline_assumption);
    const n = vefaParseNumber(claim.value);
    if (range && n != null && n >= range.lo && n <= range.hi) return 'Accept';
  }
  return 'Adjust';
}

const VEFA_FOCI = ['Cost Reduction','Throughput','Compliance','Risk','Revenue','Experience','Strategic'];
const OUTCOMES = [
  { key:'Visibility',   desc:'Know where things are and what condition they\'re in' },
  { key:'Throughput',   desc:'Move things faster through your operation' },
  { key:'Compliance',   desc:'Prove what happened and when' },
  { key:'Risk',         desc:'Predict and prevent financial exposure' },
  { key:'Intelligence', desc:'Turn data into faster decisions' },
  { key:'Performance',  desc:'Get more from equipment and assets' },
  { key:'Revenue',      desc:'Capture value that\'s being lost' }
];
const OUTCOME_DESC = OUTCOMES.reduce((m,o) => (m[o.key]=o.desc, m), {});
function cleanDomainName(name){ return (name || '').replace(/^[A-Z][A-Z0-9]+\s+—\s+/, ''); }
function vefaReqTag(r){ return r ? ' <span class="req">*</span>' : ''; }
function vefaInput(key, label, req, type, val){
  return `<div class="vefa-field"><label class="vefa-label">${escapeHtml(label)}${vefaReqTag(req)}</label>
    <input class="vefa-input" type="${type}" data-action="vefa-field" data-key="${key}" value="${escapeHtml(val || '')}"/></div>`;
}
function vefaSelectField(key, label, req, options, val){
  const opts = options.map(o => `<option value="${escapeHtml(o)}"${o===val?' selected':''}>${escapeHtml(o)}</option>`).join('');
  return `<div class="vefa-field"><label class="vefa-label">${escapeHtml(label)}${vefaReqTag(req)}</label>
    <select class="vefa-select" data-action="vefa-select" data-key="${key}">${opts}</select></div>`;
}
function vefaTextareaField(key, label, placeholder, val){
  return `<div class="vefa-field"><label class="vefa-label">${escapeHtml(label)}</label>
    <textarea class="vefa-textarea" data-action="vefa-field" data-key="${key}" placeholder="${escapeHtml(placeholder)}" rows="3">${escapeHtml(val || '')}</textarea></div>`;
}
function renderVEFAOutcomeSection(v){
  const set = new Set(v.outcomeTiles || []);
  const tiles = OUTCOMES.map(o => `<button type="button" class="vefa-tile ${set.has(o.key)?'is-on':''}" data-action="vefa-outcome-toggle" data-outcome="${escapeHtml(o.key)}">
    <div class="vefa-tile-name">${escapeHtml(o.key)}</div>
    <div class="vefa-tile-desc">${escapeHtml(o.desc)}</div>
  </button>`).join('');
  return `<div class="vefa-tile-section"><div class="vefa-tile-q">What are we trying to improve?${vefaReqTag(true)}</div>
    <div class="vefa-tile-grid" id="vefa-outcome-grid">${tiles}</div></div>`;
}
function renderVEFADomainTiles(v){
  return `<div class="vefa-tile-section" id="vefa-domain-tiles">${renderVEFADomainTilesInner(v)}</div>`;
}
function renderVEFADomainTilesInner(v){
  const picked = v.outcomeTiles || [];
  if (!picked.length) return '';
  const counts = v._domainScenarioCounts;
  if (counts === 'loading') return `<div class="vefa-tile-q">Which vertical?</div><div class="vefa-tile-empty">Loading domains…</div>`;
  const matches = Object.values(state.domains || {}).filter(d => {
    const tiles = d.outcome_tiles || [];
    return tiles.some(t => picked.includes(t)) && (counts ? (counts[d.domain_id] || 0) > 0 : true);
  }).sort((a,b) => (a.domain_name||'').localeCompare(b.domain_name||''));
  if (v.domainId){
    const dom = state.domains[v.domainId];
    if (!dom) return '';
    return `<div class="vefa-tile-q">Vertical</div>
      <div class="vefa-tile-resolved">Resolved engine: <strong>${escapeHtml(cleanDomainName(dom.domain_name) || dom.domain_id)}</strong> · ${escapeHtml(dom.technology || 'Other')}</div>`;
  }
  if (!matches.length) return `<div class="vefa-tile-q">Which vertical?</div><div class="vefa-tile-empty">No domains match the selected outcomes yet.</div>`;
  const tiles = matches.map(d => {
    const c = counts ? (counts[d.domain_id] || 0) : null;
    return `<button type="button" class="vefa-tile" data-action="vefa-domain-tile" data-domain="${escapeHtml(d.domain_id)}">
      <div class="vefa-tile-name">${escapeHtml(cleanDomainName(d.domain_name) || d.domain_id)}</div>
      <div class="vefa-tile-meta"><span class="vefa-tile-tech">${escapeHtml(d.technology || 'Other')}</span>${c!=null?`<span class="vefa-tile-count">${c} scenario${c===1?'':'s'}</span>`:''}</div>
    </button>`;
  }).join('');
  return `<div class="vefa-tile-q">Which vertical?</div><div class="vefa-tile-grid">${tiles}</div>`;
}
function paintVEFADomainTiles(){
  const node = document.getElementById('vefa-domain-tiles');
  if (node) node.innerHTML = renderVEFADomainTilesInner(state.vefAssist);
}
async function vefaLoadDomainScenarioCounts(){
  const v = state.vefAssist;
  if (v._domainScenarioCounts && v._domainScenarioCounts !== 'loading') return;
  v._domainScenarioCounts = 'loading';
  try {
    const rows = await sbSelect('vef_value_scenarios');
    const m = {}; (rows || []).forEach(s => { m[s.domain_id] = (m[s.domain_id] || 0) + 1; });
    state.vefAssist._domainScenarioCounts = m;
  } catch { state.vefAssist._domainScenarioCounts = {}; }
  paintVEFADomainTiles();
}
function vefaToggleOutcome(key){
  const v = state.vefAssist;
  const arr = v.outcomeTiles || (v.outcomeTiles = []);
  const i = arr.indexOf(key); if (i >= 0) arr.splice(i, 1); else arr.push(key);
  // domainId must clear when outcome set changes — picked domain may no longer match.
  if (v.domainId){
    v.domainId = ''; v.domainSignals=[]; v.domainThemes=[]; v._domainScenarioCount=null;
    paintVEFAInterp();
  }
  document.querySelectorAll('[data-action="vefa-outcome-toggle"]').forEach(btn => {
    btn.classList.toggle('is-on', arr.includes(btn.getAttribute('data-outcome')));
  });
  if (arr.length && (!v._domainScenarioCounts || v._domainScenarioCounts === 'loading')) vefaLoadDomainScenarioCounts();
  paintVEFADomainTiles();
  vefaPaintNextButton();
}
async function vefaPickDomain(domainId){
  const v = state.vefAssist;
  v.domainId = domainId;
  paintVEFADomainTiles();
  vefaPaintNextButton();
  await vefaOnDomainChange();
}
function renderVEFAValueFocus(v){
  const set = new Set(v.valueFocus || []);
  const chips = VEFA_FOCI.map(f => `<button type="button" class="vefa-focus-chip ${set.has(f)?'is-on':''}" data-action="vefa-focus-toggle" data-focus="${escapeHtml(f)}">${escapeHtml(f)}</button>`).join('');
  return `<div class="vefa-field"><label class="vefa-label">Primary Value Focus</label><div class="vefa-focus-row">${chips}</div></div>`;
}
function renderVEFAssistStep1(v){
  return `<div class="vefa-layout">
    <div class="vefa-panel-l"><div class="vefa-form">
      ${vefaInput('analysisName','Analysis Name',true,'text',v.analysisName)}
      ${vefaInput('customer','Customer / Account',true,'text',v.customer)}
      ${vefaInput('vendor','Vendor / Solution',true,'text',v.vendor)}
      ${renderVEFAOutcomeSection(v)}
      ${renderVEFADomainTiles(v)}
      <div class="vefa-row-2">${vefaSelectField('stage','Sales Stage',true,STAGES,v.stage)}${vefaSelectField('phase','Delivery Phase',true,PHASES,v.phase)}</div>
      <div class="vefa-row-2">${vefaInput('championEmail','Champion Email',false,'email',v.championEmail)}${vefaInput('economicBuyerEmail','Economic Buyer Email',false,'email',v.economicBuyerEmail)}</div>
      ${vefaInput('nextFollowUp','Next Follow-Up Date',false,'date',v.nextFollowUp)}
      ${vefaTextareaField('whatToProve','What are we trying to prove?','e.g. Show CFO that RFID pays back in under 12 months for 200-store rollout',v.whatToProve)}
      ${renderVEFAValueFocus(v)}
    </div></div>
    <div class="vefa-panel-r vefa-panel-tinted"><div id="vefa-interp">${renderVEFAInterpretation(v)}</div></div>
  </div>`;
}
function renderVEFAInterpretation(v){
  if (!v.domainId){
    return `<div class="vefa-interp-title">VEF Interpretation</div><div class="vefa-interp-sub">Pick a domain to see recommended signals and themes.</div>`;
  }
  if (v.interpLoading){
    return `<div class="vefa-interp-title">VEF Interpretation</div><div class="vefa-interp-sub">Loading VEF data…</div>`;
  }
  const dom = state.domains[v.domainId];
  const sigs = (v.domainSignals || []).slice(0,4);
  const themes = v.domainThemes || [];
  const count = (v._domainScenarioCount != null) ? String(v._domainScenarioCount) : '—';
  const sigHtml = sigs.length
    ? `<div class="vefa-interp-chips">${sigs.map(s => `<span class="chip">${escapeHtml(s.signal_name || s.signal_id || '—')}</span>`).join('')}</div>`
    : `<div class="vefa-interp-empty">No signals configured for this domain</div>`;
  const themeHtml = themes.length
    ? `<div class="vefa-interp-chips">${themes.map(t => `<span class="theme-chip theme-${escapeHtml((t||'').replace(/\s+/g,''))}">${escapeHtml(t)}</span>`).join('')}</div>`
    : `<div class="vefa-interp-empty">—</div>`;
  return `<div class="vefa-interp-title">VEF Interpretation</div>
    <div class="vefa-interp-block"><div class="vefa-interp-label">Detected signals</div>${sigHtml}</div>
    <div class="vefa-interp-block"><div class="vefa-interp-label">Value themes</div>${themeHtml}</div>
    <div class="vefa-interp-block"><div class="vefa-interp-label">Recommended engine</div><div class="vefa-interp-val">${escapeHtml(dom?.domain_name || v.domainId)}</div></div>
    <div class="vefa-interp-block"><div class="vefa-interp-label">Scenarios available</div><div class="vefa-interp-val">${escapeHtml(count)}</div></div>`;
}
function paintVEFAInterp(){
  const node = document.getElementById('vefa-interp');
  if (node) node.innerHTML = renderVEFAInterpretation(state.vefAssist);
}
async function vefaOnDomainChange(){
  const v = state.vefAssist;
  if (!v.domainId){ v.domainSignals=[]; v.domainThemes=[]; v._domainScenarioCount=null; paintVEFAInterp(); return; }
  v.interpLoading = true; paintVEFAInterp();
  const [sigs, scens] = await Promise.all([
    sbSelect('vef_value_signals', { eq:{domain_id:v.domainId} }).catch(() => []),
    sbSelect('vef_value_scenarios', { eq:{domain_id:v.domainId} }).catch(() => [])
  ]);
  v.domainSignals = sigs || [];
  const seen = new Set(); const themes = [];
  (scens || []).forEach(s => { const t = (s.value_theme || '').trim(); if (t && !seen.has(t)){ seen.add(t); themes.push(t); } });
  v.domainThemes = themes;
  v._domainScenarioCount = (scens || []).length;
  v.interpLoading = false; paintVEFAInterp();
}

/* ---------- VEF ASSIST · STEP 2 (SCENARIOS) ---------- */
async function vefaLoadStep2Scenarios(){
  const v = state.vefAssist;
  if (!v.domainId){ v.availableScenarios = []; v.step2Loading = false; paintVEFAStep2(); return; }
  v.step2Loading = true; paintVEFAStep2();
  const primary = await sbSelect('vef_value_scenarios', { eq:{domain_id:v.domainId} }).catch(() => []);
  let scens = primary || [];
  if (!scens.length){
    const dom = state.domains[v.domainId];
    if (dom && dom.technology === 'RFID' && v.domainId !== 'RFD'){
      scens = await sbSelect('vef_value_scenarios', { eq:{domain_id:'RFD'} }).catch(() => []);
    }
  }
  v.availableScenarios = scens;
  // Default checks: active_by_default unions into the existing Set (which may
  // already carry matches from Step 0 or update-mode pre-fills from Chunk F).
  scens.forEach(s => { if (s.active_by_default) v.selectedScenarioIds.add(s.scenario_id); });
  v.step2Loading = false; paintVEFAStep2();
}
function paintVEFAStep2(){
  const body = document.querySelector('.vefa-body');
  if (body && state.vefAssist.step === 2) body.innerHTML = renderVEFAssistStep2(state.vefAssist);
  vefaPaintNextButton();
}
function vefaPaintNextButton(){
  const v = state.vefAssist;
  const btn = document.querySelector('[data-action="vefa-next"]');
  if (!btn) return;
  if (v.step === 1){
    if (!(v.outcomeTiles && v.outcomeTiles.length)) btn.setAttribute('disabled','');
    else btn.removeAttribute('disabled');
    return;
  }
  if (v.step !== 2) return;
  const n = v.selectedScenarioIds ? v.selectedScenarioIds.size : 0;
  btn.textContent = `Next → ${n} selected`;
  if (n === 0) btn.setAttribute('disabled', ''); else btn.removeAttribute('disabled');
}
function renderVEFAssistStep2(v){
  const dom = state.domains[v.domainId];
  const domName = dom?.domain_name || v.domainId || 'No domain';
  const foci = (v.valueFocus || []).map(f => `<span class="chip">${escapeHtml(f)}</span>`).join('');
  const header = `<div class="vefa-step2-meta">
    <div class="vefa-step2-dom">${escapeHtml(domName)}</div>
    ${foci ? `<div class="vefa-step2-foci">${foci}</div>` : ''}
  </div>`;
  if (v.step2Loading) return `<div class="vefa-step2">${header}<div class="vefa-placeholder">Loading scenarios…</div></div>`;
  if (!(v.availableScenarios || []).length) return `<div class="vefa-step2">${header}<div class="vefa-empty">No scenarios found for this domain.</div></div>`;
  const filtered = vefaFilteredScenarios(v);
  const body = filtered.length
    ? filtered.map(s => renderVEFAScenRow(s, v)).join('')
    : '<div class="vefa-empty">No scenarios match your filters.</div>';
  return `<div class="vefa-step2">
    ${header}
    ${renderVEFAStep2Banner(v)}
    ${renderVEFAStep2Actions(v)}
    <div class="vefa-scen-list" id="vefa-scen-list">${body}</div>
  </div>`;
}
function vefaFilteredScenarios(v){
  let list = (v.availableScenarios || []).slice();
  const theme = v.step2ThemeFilter || 'all';
  if (theme !== 'all') list = list.filter(s => (s.value_theme || '') === theme);
  const q = (v.step2Search || '').toLowerCase().trim();
  if (q){
    list = list.filter(s => {
      const hay = ((s.mechanism_label||'') + ' ' + (s.one_liner||'') + ' ' + (s.description||'') + ' ' + (s.scenario_id||'')).toLowerCase();
      return hay.includes(q);
    });
  }
  return list.sort((a,b) => (a.print_priority || 99) - (b.print_priority || 99));
}
function renderVEFAStep2Banner(v){
  const matched = (v.extractedClaims || []).filter(c => c.matchedScenarioId).length;
  if (!matched) return '';
  return `<div class="vefa-step2-banner">${matched} claim${matched===1?'':'s'} matched to scenarios below. Matched scenarios are pre-selected.</div>`;
}
function renderVEFAStep2Actions(v){
  const themes = Array.from(new Set((v.availableScenarios || []).map(s => (s.value_theme || '').trim()).filter(Boolean)));
  const active = v.step2ThemeFilter || 'all';
  const themeChips = [['all','All'], ...themes.map(t => [t, t])].map(([val, label]) => {
    const on = active === val ? ' is-on' : '';
    return `<button type="button" class="vefa-theme-chip${on}" data-action="vefa-theme-filter" data-theme="${escapeHtml(val)}">${escapeHtml(label)}</button>`;
  }).join('');
  return `<div class="vefa-step2-actions">
    <button class="btn btn-ghost btn-sm" data-action="vefa-select-recommended">Select all recommended</button>
    <button class="btn btn-ghost btn-sm" data-action="vefa-clear-all">Clear all</button>
    <input type="text" class="vefa-scen-search" data-action="vefa-scen-search" placeholder="Search scenarios…" value="${escapeHtml(v.step2Search || '')}"/>
    <div class="vefa-theme-filters">${themeChips}</div>
  </div>`;
}
function paintVEFAScenList(){
  const list = document.getElementById('vefa-scen-list');
  if (!list) return;
  const v = state.vefAssist;
  const filtered = vefaFilteredScenarios(v);
  list.innerHTML = filtered.length
    ? filtered.map(s => renderVEFAScenRow(s, v)).join('')
    : '<div class="vefa-empty">No scenarios match your filters.</div>';
}
function vefaSelectRecommended(){
  const v = state.vefAssist;
  (v.availableScenarios || []).forEach(s => { if (s.active_by_default) v.selectedScenarioIds.add(s.scenario_id); });
  paintVEFAScenList(); vefaPaintNextButton();
}
function vefaClearAll(){
  state.vefAssist.selectedScenarioIds.clear();
  paintVEFAScenList(); vefaPaintNextButton();
}
function renderVEFAScenRow(s, v){
  const checked = v.selectedScenarioIds.has(s.scenario_id);
  const theme = (s.value_theme || '').trim();
  const themeCls = theme ? 'theme-' + theme.replace(/\s+/g,'') : '';
  const ev = (s.evidence_strength || '').toLowerCase();
  const evCls = ev === 'strong' ? 'vefa-ev-strong' : ev === 'moderate' ? 'vefa-ev-moderate' : 'vefa-ev-weak';
  const p = s.print_priority || 99;
  const impLbl = p <= 3 ? 'High' : p <= 6 ? 'Medium' : 'Supporting';
  const impCls = p <= 3 ? 'vefa-imp-high' : p <= 6 ? 'vefa-imp-med' : 'vefa-imp-sup';
  const rec = s.active_by_default ? `<span class="vefa-chip vefa-chip-rec">Recommended</span>` : '';
  const matched = (v.extractedClaims || []).some(c => c.matchedScenarioId === s.scenario_id);
  const mch = matched ? `<span class="vefa-chip vefa-chip-matched">Matched</span>` : '';
  return `<label class="vefa-scen-row ${checked?'is-checked':''}" data-sid="${escapeHtml(s.scenario_id)}">
    <input type="checkbox" class="vefa-scen-cb" data-action="vefa-scen-toggle" data-sid="${escapeHtml(s.scenario_id)}" ${checked?'checked':''}/>
    <div class="vefa-scen-main">
      ${theme ? `<span class="theme-chip ${themeCls}">${escapeHtml(theme)}</span>` : ''}
      <div class="vefa-scen-name">${escapeHtml(s.mechanism_label || s.scenario_id || 'Mechanism')}</div>
      <div class="vefa-scen-one">${escapeHtml(s.one_liner || s.description || '—')}</div>
      <div class="vefa-scen-mech">${escapeHtml(s.scenario_id || '')}</div>
    </div>
    <div class="vefa-scen-badges">
      <span class="vefa-chip ${evCls}">${escapeHtml(s.evidence_strength || 'None')}</span>
      <span class="vefa-chip ${impCls}">${escapeHtml(impLbl)}</span>
      ${rec}${mch}
    </div>
  </label>`;
}

function vefaMatchAndVerdict(claim, pool){
  const match = vefaMatchScenario(claim, pool);
  return {
    metric: claim.metric || '', value: claim.value || '',
    timeframe: claim.timeframe || '', context: claim.context || '',
    raw: claim.raw || '',
    matchedScenarioId: match ? match.scenario_id : null,
    matchedOneLiner:   match ? match.one_liner   : null,
    matchedRange:      match ? match.typical_baseline_assumption : null,
    matchedEvidence:   match ? match.evidence_strength : null,
    verdict: vefaComputeVerdict(claim, match)
  };
}

/* ---------- VEF ASSIST · STEP 3 (EVIDENCE & AUDIT) ---------- */
function renderVEFAssistStep3(v){
  const selected = (v.availableScenarios || []).filter(s => v.selectedScenarioIds.has(s.scenario_id));
  return `<div class="vefa-step3">
    <div class="vefa-step3-section">
      <h3 class="vefa-step3-title">Evidence coverage for selected scenarios</h3>
      <p class="vefa-step3-sub">Scenarios with weak or no evidence will be treated as explicit assumptions in the output.</p>
      ${renderVEFAEvidenceTable(selected)}
    </div>
    ${(v.extractedClaims || []).length ? renderVEFAAuditSection(v) : ''}
    <div class="vefa-step3-section">
      <h3 class="vefa-step3-title">What evidence will we gather before finance review?</h3>
      <textarea class="vefa-textarea vefa-notes" data-action="vefa-field" data-key="evidenceNotes" rows="4" placeholder="e.g. Customer ops to share Q1 cycle-count timing data; finance to share rollout cost from prior pilot.">${escapeHtml(v.evidenceNotes || '')}</textarea>
    </div>
  </div>`;
}
function vefaSourcesCount(s){
  if (s.evidence_ids){
    return String(s.evidence_ids).split(',').map(x => x.trim()).filter(Boolean).length;
  }
  // Fallback to vef_evidence_registry loaded at onOpenEngagement (state.evidence[domain_id]).
  // On the "new" VEF Assist path the registry isn't loaded yet → degrades to 0 (prior behavior).
  const reg = state.evidence && state.evidence[s.domain_id];
  if (!Array.isArray(reg)) return 0;
  return reg.filter(r => r && r.scenario_id === s.scenario_id).length;
}
function vefaEvidenceStatus(s, sources){
  const ev = (s.evidence_strength || '').toLowerCase();
  if (ev === 'strong' && sources > 0) return { label:'Good to go', cls:'vefa-st-go' };
  if (ev === 'moderate')              return { label:'Needs customer data', cls:'vefa-st-needs' };
  return                                     { label:'Assumption', cls:'vefa-st-assumption' };
}
function vefaThemeClass(t){ return 'theme-' + String(t || '').replace(/\s+/g, ''); }
function vefaEvChip(strength){
  const ev = strength || 'None';
  return `<span class="vefa-ev-chip vefa-ev-${ev.toLowerCase()}">${escapeHtml(ev)}</span>`;
}
function renderVEFAEvidenceTable(selected){
  if (!selected.length) return `<div class="vefa-empty">No scenarios selected — go back to Step 2.</div>`;
  const rows = selected.map(s => {
    const sources = vefaSourcesCount(s);
    const status = vefaEvidenceStatus(s, sources);
    const oneLiner = (s.one_liner || s.mechanism_label || '—');
    const truncated = oneLiner.length > 50 ? oneLiner.slice(0, 50) + '…' : oneLiner;
    return `<tr>
      <td class="vefa-cell-scen" title="${escapeHtml(oneLiner)}">${escapeHtml(truncated)}</td>
      <td><span class="theme-chip ${vefaThemeClass(s.value_theme)}">${escapeHtml(s.value_theme || '—')}</span></td>
      <td>${vefaEvChip(s.evidence_strength)}</td>
      <td class="vefa-cell-num">${sources}</td>
      <td><span class="vefa-status ${status.cls}">${escapeHtml(status.label)}</span></td>
    </tr>`;
  }).join('');
  return `<table class="vefa-table">
    <thead><tr><th>Scenario</th><th>Theme</th><th>Evidence</th><th>Sources</th><th>Status</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}
/* ---------- VEF ASSIST · F1 (CREATE PATH + WIRING) ---------- */
const VEFA_META_RE = /\[VEF-ASSIST-META\]\s*([\s\S]*?)\s*\[\/VEF-ASSIST-META\]/;
function vefaPackNotes(body, meta){
  const b = (body || '').trim();
  const m = meta && Object.keys(meta).length
    ? `\n\n[VEF-ASSIST-META]\n${JSON.stringify(meta)}\n[/VEF-ASSIST-META]` : '';
  return (b + m) || null;
}
function vefaUnpackNotes(notes){
  if (!notes) return { body:'', meta:null };
  const m = notes.match(VEFA_META_RE);
  let meta = null;
  if (m){ try { meta = JSON.parse(m[1]); } catch {} }
  return { body: notes.replace(VEFA_META_RE, '').trim(), meta };
}
function vefaGenerateEngagementId(domainId){
  const d = new Date(), p = n => String(n).padStart(2, '0');
  return `ENG-VEFA-${(domainId || 'X').toUpperCase()}-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
}
function vefaBuildEngagementRow(v){
  // Documented columns only — must match vef_engagements schema and Deal-tab reads.
  // Speculative fields go into a sidecar JSON block in `notes` per
  // 2026-04-24 lesson; never as top-level columns.
  const meta = {};
  if (v.whatToProve)               meta.whatToProve = v.whatToProve;
  if ((v.valueFocus||[]).length)   meta.valueFocus  = v.valueFocus;
  if ((v.extractedClaims||[]).length){
    meta.claims = v.extractedClaims.map(c => ({
      metric:c.metric, value:c.value, verdict:c.verdict, matchedScenarioId:c.matchedScenarioId
    }));
  }
  return {
    analysis_name:        v.analysisName.trim() || null,
    prospect_name:        v.customer.trim()     || null,
    vendor_name:          v.vendor.trim()       || null,
    domain_id:            v.domainId            || null,
    deal_stage:           v.stage               || null,
    phase:                v.phase               || null,
    champion_email:       v.championEmail.trim()       || null,
    economic_buyer_email: v.economicBuyerEmail.trim()  || null,
    next_followup_date:   v.nextFollowUp        || null,
    notes:                vefaPackNotes(v.evidenceNotes, meta)
  };
}
function vefaValidateRequired(v){
  const missing = [];
  if (!v.analysisName.trim()) missing.push('Analysis Name');
  if (!v.customer.trim())     missing.push('Customer / Account');
  if (!v.vendor.trim())       missing.push('Vendor / Solution');
  if (!v.domainId)            missing.push('Domain');
  if (missing.length){ toast('Missing required: ' + missing.join(', '), true); return false; }
  if (!v.selectedScenarioIds.size){ toast('Pick at least one scenario in Step 2', true); return false; }
  return true;
}

function vefaPrefillFromEngagement(va, engId){
  const eng = state.engagements.find(e => e.engagement_id === engId);
  if (!eng) return;
  va.engagementId = engId;
  va.analysisName       = eng.analysis_name  || '';
  va.customer           = eng.prospect_name  || '';
  va.vendor             = eng.vendor_name    || '';
  va.domainId           = eng.domain_id      || '';
  const dom = state.domains[va.domainId];
  va.outcomeTiles = (dom && Array.isArray(dom.outcome_tiles)) ? dom.outcome_tiles.slice() : [];
  va.stage              = eng.deal_stage     || 'Discovery';
  va.phase              = eng.phase          || 'Pre-Sale';
  va.championEmail      = eng.champion_email        || '';
  va.economicBuyerEmail = eng.economic_buyer_email  || '';
  va.nextFollowUp       = eng.next_followup_date    || '';
  const { body, meta } = vefaUnpackNotes(eng.notes);
  va.evidenceNotes = body;
  if (meta){
    va.whatToProve = meta.whatToProve || '';
    va.valueFocus  = Array.isArray(meta.valueFocus) ? meta.valueFocus.slice() : [];
  }
  (state.scenarios[engId] || []).forEach(s => { if (s.active) va.selectedScenarioIds.add(s.scenario_id); });
}
async function vefaSaveQuickSnapshot(engId){
  const eng = state.engagements.find(e => e.engagement_id === engId); if (!eng) return;
  const scens = state.scenarios[engId] || [];
  const defs  = state.inputDefs[eng.domain_id] || [];
  const ivs   = state.inputValues[engId] || {};
  const a     = computeAnalysis(eng, scens, ivs, defs);
  const ex    = state.snapshots[engId] || [];
  const ver   = (ex.reduce((m,s) => Math.max(m, s.snapshot_version || 0), 0) || 0) + 1;
  const inputSnap = { _meta:{ stage: eng.deal_stage, phase: eng.phase, source: 'vef-assist-pre-update' } };
  defs.forEach(d => { inputSnap[d.input_key] = ivs[d.input_key]?.provided_value ?? d.typical_value ?? d.default_value ?? null; });
  const row = {
    engagement_id: engId, domain_id: eng.domain_id,
    snapshot_label: 'Pre-VEF-Assist Update', intent: 'Track', snapshot_version: ver,
    annual_value: a.arvFull, payback_mo: a.payback, bcr: a.bcr, monthly_delay_cost: a.monthlyDelay,
    active_scenario_ids: scens.filter(s => s.active).map(s => s.scenario_id).join(','),
    input_snapshot: inputSnap, notes: 'Auto-snapshot before VEF Assist update'
  };
  const snap = (await sbInsert('vef_output_snapshots', row)) || row;
  (state.snapshots[engId] = state.snapshots[engId] || []).unshift(snap);
}
function vefaUpdateInitiate(){
  // DOM-injected strip (non-blocking, no nested modal) — Q8.
  if (document.getElementById('vefa-update-strip')) return;
  const body = document.querySelector('.vefa-body'); if (!body) return;
  const wrap = document.createElement('div');
  wrap.id = 'vefa-update-strip';
  wrap.className = 'vefa-update-confirm';
  wrap.innerHTML = `<span class="vefa-update-text">Save snapshot before updating?</span>
    <button class="btn btn-ghost btn-sm" data-action="vefa-update-skip">Skip</button>
    <button class="btn btn-primary btn-sm" data-action="vefa-update-snap">Save Snapshot</button>`;
  body.appendChild(wrap);
  body.scrollTop = body.scrollHeight;
}
async function updateAnalysisFromVEF(saveSnapFirst){
  const v = state.vefAssist;
  if (!v.engagementId) return toast('No engagement to update', true);
  if (!vefaValidateRequired(v)) return;
  try {
    if (saveSnapFirst) await vefaSaveQuickSnapshot(v.engagementId);
    const patch = vefaBuildEngagementRow(v);
    await sbPatch('vef_engagements', { engagement_id: v.engagementId }, patch);
    const eng = state.engagements.find(e => e.engagement_id === v.engagementId);
    if (eng) Object.assign(eng, patch);
    // Sync selections: for every scenario that's in availableScenarios OR in state.scenarios[engId],
    // upsert with active = membership in selectedScenarioIds. Union ensures we deactivate rows that
    // were previously active but unchecked in Step 2.
    const pool = new Map();
    (v.availableScenarios || []).forEach(s => pool.set(s.scenario_id, s));
    (state.scenarios[v.engagementId] || []).forEach(s => pool.set(s.scenario_id, s));
    await Promise.all(Array.from(pool.keys()).map(sid => sbUpsert('vef_scenario_selections',
      { engagement_id: v.engagementId, scenario_id: sid, active: v.selectedScenarioIds.has(sid) },
      'engagement_id,scenario_id')));
    closeVEFAssist(false);
    toast(saveSnapFirst ? 'Snapshot saved · analysis updated' : 'Analysis updated');
    onOpenEngagement(v.engagementId);
  } catch (err) {
    console.error(err);
    toast('Update failed: ' + (err.message || err), true);
  }
}

  else if (state.homeFilter === 'completed') out = out.filter(isCompleted);

  if (q) out = out.filter(e => [e.analysis_name,e.vendor_name,e.prospect_name,e.champion_email,e.deal_stage,e.phase]

// Top-N high-sensitivity inputs ranked by total ARV of active scenarios that
// require them. inputs_required may be array OR comma-separated string — same
// duck-typing as vcConfidence.
function topHighSensInputs(defs, scenarios, analysis, n){
  const high = (defs || []).filter(d => (d.sensitivity || '').toLowerCase().includes('high'));
  if (!high.length) return [];
  const arvByKey = {};
  (scenarios || []).forEach(s => {
    const p = (analysis.perScenario || []).find(x => x.scenario_id === s.scenario_id);
    if (!p || !p.active || p.pool_shadow) return;
    const req = s.inputs_required;
    const arr = Array.isArray(req) ? req : typeof req === 'string' ? req.split(',').map(k => k.trim()).filter(Boolean) : [];
    arr.forEach(k => { arvByKey[k] = (arvByKey[k] || 0) + (p.arv || 0); });
  });
  return high
    .map(d => ({ d, score: arvByKey[d.input_key] || 0 }))
    .sort((a,b) => b.score - a.score)
    .slice(0, n)
    .map(x => x.d);
}

// Returns 'governed' | 'exploratory' | 'default' per spec:
//   default     = no buyer inputs at all
//   governed    = govInputs >= 3 OR every active non-shadowed scenario is grounded
//   exploratory = otherwise
function vcConfidence(scenarios, ivs, analysis){
  const provided = Object.values(ivs || {}).filter(v => {
    const x = v && v.provided_value;
    return x != null && String(x).trim() !== '';
  });
  if (!provided.length) return 'default';
  const govInputs = provided.length;
  const activeIds = new Set((analysis.perScenario || []).filter(p => p.active && !p.pool_shadow).map(p => p.scenario_id));
  const grounded = (scenarios || []).filter(s => {
    if (!activeIds.has(s.scenario_id)) return false;
    const req = s.inputs_required;
    const arr = Array.isArray(req) ? req : typeof req === 'string' ? req.split(',').map(k => k.trim()).filter(Boolean) : [];
    if (!arr.length) return true;
    return arr.every(k => {
      const v = ivs[k] && ivs[k].provided_value;
      return v != null && String(v).trim() !== '';
    });
  });
  const allGrounded = activeIds.size > 0 && grounded.length === activeIds.size;
  return (govInputs >= 3 || allGrounded) ? 'governed' : 'exploratory';
}
