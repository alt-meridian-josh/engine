<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alt Meridian — Value Enablement Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f6f3; --surface:#ffffff; --border:#e8e5e0; --border2:#d4d0ca;
  --ink:#1a1918; --ink2:#6b6560; --ink3:#a8a39d;
  --red:#d63b2f; --red-dim:#fdf1f0; --red-hover:#b8322a;
  --green:#2d7d4f; --green-dim:#f0f7f3;
  --amber:#b45309; --amber-dim:#fef3e2;
  --blue:#1d4ed8; --blue-dim:#eff6ff;
  --topbar-bg:#141210; --topbar-text:#e8e5e0;
  --display:'Syne',ui-sans-serif,system-ui,sans-serif;
  --mono:'DM Mono',ui-monospace,SFMono-Regular,monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06);
  --r:3px; --r-chip:2px; --r-in:1px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:12px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--display);font-weight:600;letter-spacing:-.01em;margin:0;color:var(--ink)}
h1{font-size:20px;font-weight:700} h2{font-size:15px} h3{font-size:13px}
p{margin:0} a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
input,select,textarea{font:inherit;color:inherit}
/* Topbar */
.topbar{position:sticky;top:0;z-index:50;background:var(--topbar-bg);color:var(--topbar-text);height:44px;display:flex;align-items:center;padding:0 16px;gap:14px;border-bottom:1px solid #000}
.wordmark{font-family:var(--display);font-weight:700;letter-spacing:.04em;font-size:13px}
.wordmark .alt{color:var(--red)} .wordmark .md{color:var(--topbar-text)}
.topbar-label{font-family:var(--mono);font-size:10px;color:#7a7470;text-transform:uppercase;letter-spacing:.1em}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.topbar-user{color:#a8a39d;font-size:11px;padding:3px 8px;background:#1f1d1a;border-radius:var(--r-chip)}
.topbar-divider{width:1px;height:18px;background:#2a2724}
.back-link{color:#a8a39d;font-size:11px;padding:4px 8px;border-radius:var(--r);transition:background .12s,color .12s}
.back-link:hover{background:#1f1d1a;color:var(--topbar-text)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r);font-family:var(--mono);font-size:11px;font-weight:500;transition:background .15s,color .15s,border-color .15s;border:1px solid transparent;white-space:nowrap;letter-spacing:.02em}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-hover)}
.btn-ghost{background:transparent;color:var(--ink2);border-color:var(--border2)}
.btn-ghost:hover{background:var(--surface);color:var(--ink)}
.btn-dark-ghost{background:transparent;color:var(--topbar-text);border-color:#2a2724}
.btn-dark-ghost:hover{background:#1f1d1a}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:var(--red-dim)}
.btn-sm{padding:4px 9px;font-size:10px}
.btn-block{width:100%;justify-content:center;padding:9px 14px;font-size:12px}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
.card-pad{padding:16px}
/* Chips */
.chip{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--r-chip);background:#eceae6;color:var(--ink2);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.chip-grey{background:#eceae6;color:var(--ink2)}
.chip-blue{background:var(--blue-dim);color:var(--blue)}
.chip-amber{background:var(--amber-dim);color:var(--amber)}
.chip-green{background:var(--green-dim);color:var(--green)}
.chip-red{background:var(--red-dim);color:var(--red)}
.chip-ink{background:#1f1d1a;color:var(--topbar-text)}
.chip-outline{background:transparent;border:1px solid var(--border2)}
/* Forms */
.input,.select,.textarea{display:block;width:100%;background:#fff;border:1px solid var(--border2);border-radius:var(--r-in);padding:8px 10px;font-family:var(--mono);font-size:12px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.textarea{resize:vertical;min-height:72px}
.input:focus,.select:focus,.textarea:focus{outline:0;border-color:var(--red);box-shadow:0 0 0 2px var(--red-dim)}
.label{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:4px;font-weight:500}
.label .req{color:var(--red);margin-left:2px}
.field{margin-bottom:12px} .field:last-child{margin-bottom:0}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Layout */
.page{min-height:calc(100vh - 44px)}
.container{max-width:1480px;margin:0 auto;padding:20px 24px}
/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(20,18,16,.45);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .15s ease-out}
.modal-card{background:#fff;border-radius:var(--r);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modal-in .18s ease-out}
.modal-head{padding:18px 20px 12px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700} .modal-sub{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.modal-body{padding:16px 20px}
.modal-foot{padding:12px 20px 16px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border)}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes modal-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* Toast */
#toast-root{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--ink);color:#fff;padding:8px 14px;border-radius:var(--r);font-size:11px;box-shadow:var(--shadow-lg);animation:toast-in .18s ease-out;pointer-events:auto;max-width:360px}
.toast.err{background:var(--red)}
@keyframes toast-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* Utility */
.muted{color:var(--ink3)} .mono{font-family:var(--mono)} .display{font-family:var(--display)}
.hstack{display:flex;align-items:center;gap:8px} .vstack{display:flex;flex-direction:column;gap:4px}
.sk{background:linear-gradient(90deg,#ede9e3,#f7f6f3,#ede9e3);background-size:200% 100%;animation:sk 1.3s infinite;border-radius:var(--r)}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.boot{padding:80px 24px;text-align:center;color:var(--ink3);font-size:12px;letter-spacing:.05em;text-transform:uppercase}
/* Login */
.login-page{display:flex;align-items:center;justify-content:center;padding:60px 20px;min-height:calc(100vh - 44px)}
.login-wrap{width:100%;max-width:400px}
.login-card{padding:32px 32px 28px}
.login-brand{font-family:var(--display);font-weight:700;letter-spacing:.06em;font-size:11px;color:var(--ink3);margin-bottom:20px;text-transform:uppercase}
.login-brand .alt{color:var(--red)}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px;line-height:1.2}
.login-sub{font-size:12px;color:var(--ink3);font-style:italic;margin-bottom:22px;line-height:1.4;font-family:var(--display)}
</style>
</head>
<body>
<div id="app"><div class="boot">Initializing workspace…</div></div>
<div id="modal-root"></div>
<div id="toast-root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================================================================
   Alt Meridian — Value Enablement Workspace (v2)
   Single-file SPA · Supabase REST · Anthropic direct fetch
   ========================================================================= */

/* ---------- STATE ---------- */
const state = {
  screen:'login', engagements:[], domains:{}, activeEngagementId:null,
  scenarios:{}, inputDefs:{}, inputValues:{}, snapshots:{}, evidence:{},
  activeTab:'value-case', meridianOpen:false, meridianHistory:{},
  homeFilter:'all', homeSearch:'', homeSort:'updated',
  modal:null, loading:false, poolShadowOpen:false
};
function setState(patch){ Object.assign(state, patch); if (typeof render === 'function') render(); }

/* ---------- UTILITIES ---------- */
const ESC = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, c => ESC[c]); }
function toast(msg, err=false){
  const t = document.createElement('div');
  t.className = 'toast' + (err?' err':''); t.textContent = msg;
  document.getElementById('toast-root').appendChild(t);
  setTimeout(() => t.remove(), 2800);
}
function fmtMoney(n){
  if (n == null || !isFinite(n)) return '—';
  if (Math.abs(n) >= 1e6) return '$' + (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (Math.abs(n) >= 1e3) return '$' + Math.round(n/1e3) + 'K';
  return '$' + Math.round(n).toLocaleString();
}
function fmtDate(d){ return d ? String(d).slice(0,10) : '—'; }
function daysUntil(d){ return d ? Math.round((new Date(d) - new Date()) / 86400000) : null; }
function relTime(iso){
  if (!iso) return '—';
  const diff = (Date.now() - new Date(iso)) / 86400000;
  if (diff < 1) return 'today';
  if (diff < 30) return Math.floor(diff) + 'd ago';
  if (diff < 365) return Math.floor(diff/30) + 'mo ago';
  return Math.floor(diff/365) + 'y ago';
}
function uid(p='id'){ return p + '-' + Math.random().toString(36).slice(2,8); }

/* ---------- SUPABASE ---------- */
const SUPABASE_URL = 'https://kpecdezcolcycgpuqbgs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZWNkZXpjb2xjeWNncHVxYmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODIyMDYsImV4cCI6MjA5MTI1ODIwNn0.rKHzdjjkYToEZWdS0ngg3Kgigh_gDWt5cRbLBCE44rg';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function sbSelect(table, q){
  let b = sb.from(table).select('*');
  if (q?.eq)    for (const [k,v] of Object.entries(q.eq)) b = b.eq(k, v);
  if (q?.order) b = b.order(q.order[0], { ascending: q.order[1] !== false });
  const { data, error } = await b;
  if (error) throw error;
  return data || [];
}
async function sbInsert(table, row){ const { data, error } = await sb.from(table).insert(row).select(); if (error) throw error; return data?.[0] || null; }
async function sbUpsert(table, row, onConflict){ const { data, error } = await sb.from(table).upsert(row, onConflict?{onConflict}:{}).select(); if (error) throw error; return data?.[0] || null; }
async function sbPatch(table, eq, patch){
  let b = sb.from(table).update(patch);
  for (const [k,v] of Object.entries(eq)) b = b.eq(k, v);
  const { data, error } = await b.select();
  if (error) throw error; return data?.[0] || null;
}

/* ---------- DATA LOADERS ---------- */
async function loadDomains(){ const arr = await sbSelect('vef_domains'); const m = {}; arr.forEach(d => m[d.domain_id]=d); return m; }
async function loadEngagements(){ return sbSelect('vef_engagements', { order:['intake_date',false] }); }
async function loadScenariosForEngagement(engId, domainId){
  const [sels, scens] = await Promise.all([
    sbSelect('vef_scenario_selections', { eq:{engagement_id:engId} }),
    sbSelect('vef_value_scenarios',     { eq:{domain_id:domainId} })
  ]);
  const sm = {}; sels.forEach(s => sm[s.scenario_id] = s);
  return scens.map(s => ({ ...s, selection_id: sm[s.scenario_id]?.id ?? null, active: sm[s.scenario_id]?.active ?? !!s.active_by_default }));
}
async function loadInputDefs(domainId){ return sbSelect('vef_input_definitions', { eq:{domain_id:domainId} }); }
async function loadInputValues(engId){ const arr = await sbSelect('vef_input_values', { eq:{engagement_id:engId} }); const m = {}; arr.forEach(iv => m[iv.input_key]=iv); return m; }
async function loadSnapshots(engId){ return sbSelect('vef_output_snapshots', { eq:{engagement_id:engId}, order:['created_at',false] }); }
async function loadEvidence(domainId){ return sbSelect('vef_evidence_registry', { eq:{domain_id:domainId} }); }

/* ---------- FORMULA ENGINE ---------- */
const RAMPS = [0.5, 1.0, 1.0];   // Y1 50% ramp, Y2/Y3 full adoption
const DISCOUNT = 0.10;

function evalFormula(formula, inputs){
  if (!formula || typeof formula !== 'string') return null;
  const keys = Object.keys(inputs || {});
  const vals = keys.map(k => {
    const v = inputs[k];
    return (v == null || isNaN(Number(v))) ? 0 : Number(v);
  });
  try {
    const fn = new Function(...keys, '"use strict";return (' + formula + ');');
    const r = fn(...vals);
    return (typeof r === 'number' && isFinite(r)) ? r : null;
  } catch(_){ return null; }
}

function resolvedInputs(inputsMap, inputDefs){
  const out = {};
  (inputDefs || []).forEach(d => {
    const p = inputsMap?.[d.input_key]?.provided_value;
    out[d.input_key] = p != null ? Number(p) : Number(d.typical_value ?? d.default_value ?? 0);
  });
  return out;
}

function computeAnalysis(engagement, scenarios, inputsMap, inputDefs){
  const inputs = resolvedInputs(inputsMap, inputDefs);
  const per = (scenarios || []).map(s => {
    const arv = evalFormula(s.value_scenario_formula, inputs) || 0;
    const delay = evalFormula(s.delay_cost_formula, inputs) || (arv/12);
    const coi = evalFormula(s.cost_of_inaction_formula, inputs) || (arv*3);
    return { scenario_id: s.scenario_id, theme: s.value_theme || 'other', active: !!s.active, arv, delay, coi, pool_shadow: false };
  });
  // Pool-share guard: in each theme, only highest-ARV active scenario counts
  const best = {};
  per.filter(p => p.active).forEach(p => { if (!best[p.theme] || p.arv > best[p.theme].arv) best[p.theme] = p; });
  per.forEach(p => { if (p.active && best[p.theme] && best[p.theme].scenario_id !== p.scenario_id) p.pool_shadow = true; });
  const counted = per.filter(p => p.active && !p.pool_shadow);
  const arvFull     = counted.reduce((s,p) => s + p.arv, 0);
  const arvY1       = arvFull * RAMPS[0];
  const arvY2       = arvFull * RAMPS[1];
  const arvY3       = arvFull * RAMPS[2];
  const monthlyDelay= counted.reduce((s,p) => s + p.delay, 0);
  const coi3yr      = counted.reduce((s,p) => s + p.coi, 0);
  const impl        = Number(inputsMap?.implementation_cost?.provided_value) || 0;
  const npv     = impl > 0 ? arvY1 + arvY2/(1+DISCOUNT) + arvY3/(1+DISCOUNT)**2 - impl : null;
  const payback = impl > 0 && arvY1 > 0 ? impl / (arvY1/12) : null;
  const bcr     = impl > 0 ? (arvY1 + arvY2 + arvY3) / impl : null;
  return { arvY1, arvY2, arvY3, arvFull, monthlyDelay, coi3yr, npv, payback, bcr, perScenario: per, impl };
}

/* ---------- RENDER DISPATCH ---------- */
function render(){
  const app = document.getElementById('app');
  if (state.screen === 'login')          app.innerHTML = renderLogin();
  else if (state.screen === 'home')      app.innerHTML = renderHome();
  else if (state.screen === 'workspace') app.innerHTML = renderWorkspace();
  renderModal();
}
function renderModal(){ document.getElementById('modal-root').innerHTML = ''; /* Chunk 5/10 fill this */ }
function renderHome(){
  const n = state.engagements.length;
  return `<div class="boot">Analysis Home — lands in Chunk 4${state.loading?' · loading':` · ${n} engagement${n===1?'':'s'} loaded`}</div>`;
}
function renderWorkspace(){ return `<div class="boot">Workspace — lands in Chunk 6</div>`; }

/* ---------- SCREEN 1 — LOGIN ---------- */
function renderLogin(){
  return `
    <header class="topbar">
      <div class="wordmark"><span class="alt">ALT</span> <span class="md">MERIDIAN</span></div>
      <span class="topbar-label">Value Workspace</span>
    </header>
    <main class="page login-page">
      <div class="login-wrap">
        <div class="card login-card">
          <div class="login-brand"><span class="alt">ALT</span> MERIDIAN</div>
          <h1 class="login-title">Sign in to your workspace</h1>
          <p class="login-sub">Value belongs to mechanisms, not solutions.</p>
          <form data-action="login-submit" autocomplete="off">
            <div class="field">
              <label class="label">Email</label>
              <input class="input" type="email" name="email" value="seller@altmeridian.com"/>
            </div>
            <div class="field">
              <label class="label">Password</label>
              <input class="input" type="password" name="password" value="altmeridian2026"/>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Enter Workspace →</button>
          </form>
        </div>
      </div>
    </main>
  `;
}

async function onLoginSubmit(e){
  e.preventDefault();
  setState({ screen: 'home', loading: true });
  try {
    const [domains, engagements] = await Promise.all([loadDomains(), loadEngagements()]);
    setState({ domains, engagements, loading: false });
  } catch (err) {
    console.error(err);
    toast('Load failed: ' + (err.message || err), true);
    setState({ loading: false });
  }
}

/* ---------- EVENT DELEGATION ---------- */
document.addEventListener('submit', e => {
  const form = e.target.closest('form[data-action]');
  if (!form) return;
  const action = form.getAttribute('data-action');
  if (action === 'login-submit') return onLoginSubmit(e);
});
document.addEventListener('click', e => {
  const node = e.target.closest('[data-action]');
  if (!node || node.tagName === 'FORM') return;
  /* click handlers for subsequent chunks dispatch here */
});

/* ---------- BOOT ---------- */
function init(){ render(); }
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
