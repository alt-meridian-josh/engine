<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alt Meridian — Value Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0B0C; --s1:#101012; --s2:#151517; --s3:#1A1A1D; --s4:#1F1F23;
  --b1:#252528; --b2:#2F2F33; --b3:#3A3A40;
  --acc:#C84B2F; --acc2:#A83D26; --adim:rgba(200,75,47,.10); --aline:rgba(200,75,47,.20);
  --text:#E2DED6; --t2:#97938D; --t3:#545250;
  --green:#3A9B60; --gdim:rgba(58,155,96,.12);
  --amber:#C4852A; --amdim:rgba(196,133,42,.12);
  --red:#BD4242; --rdim:rgba(189,66,66,.12);
  --r:3px; --r2:5px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:300;line-height:1.6;display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;}

/* ── TOPBAR ────────────────────────────────────────── */
.topbar{height:44px;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0;}
.tbl{display:flex;align-items:center;gap:12px}
.back{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.07em;
  color:var(--t3);text-decoration:none;transition:color .15s;display:flex;align-items:center;gap:4px;}
.back:hover{color:var(--t2)}
.vr{width:1px;height:15px;background:var(--b2)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:.05em}
.logo em{color:var(--acc);font-style:normal}
.epill{display:flex;align-items:center;gap:5px;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--t3);}
.epulse{width:6px;height:6px;border-radius:50%;background:var(--acc);
  box-shadow:0 0 5px var(--acc);animation:ep 2s infinite;}
@keyframes ep{0%,100%{opacity:1}50%{opacity:.2}}
.mode-sw{display:flex;gap:2px;background:var(--bg);border:1px solid var(--b1);
  border-radius:var(--r);padding:3px;}
.msw{padding:4px 13px;border-radius:2px;font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  border:none;background:transparent;color:var(--t3);cursor:pointer;transition:all .15s;}
.msw.on{background:var(--s3);color:var(--text)}
.resetbtn{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);
  background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
.resetbtn:hover{color:var(--t2)}

/* ── LAYOUT ────────────────────────────────────────── */
.body{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── TILES COL ─────────────────────────────────────── */
.tcol{width:224px;flex-shrink:0;border-right:1px solid var(--b1);
  display:flex;flex-direction:column;background:var(--s1);overflow:hidden;}
.col-top{padding:10px 12px 8px;border-bottom:1px solid var(--b1);flex-shrink:0;}
.clbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
.tfilters{display:flex;flex-wrap:wrap;gap:3px}
.tf{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;
  border-radius:2px;border:1px solid var(--b1);background:transparent;
  color:var(--t3);cursor:pointer;transition:all .15s;}
.tf.on{border-color:var(--acc);color:var(--acc);background:var(--adim)}
.tlist{flex:1;overflow-y:auto;padding:6px;}
.tlist::-webkit-scrollbar{width:3px}
.tlist::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.thdr{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--t3);padding:8px 4px 3px;
  margin-top:2px;display:flex;align-items:center;gap:5px;}
.thdr-dot{display:inline-block;width:5px;height:5px;border-radius:50%;}
.stile{padding:8px 9px;border:1px solid var(--b1);border-radius:var(--r);
  margin-bottom:4px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.stile:hover{border-color:var(--b3);background:var(--s2)}
.stile.on{border-color:var(--aline);background:var(--adim)}
.stile.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--acc);}
.tname{font-size:11px;color:var(--t2);line-height:1.35;margin-bottom:2px}
.stile.on .tname{color:var(--text)}
.tval{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);font-weight:500;}
.stile.on .tval{color:var(--acc)}

/* ── CHAT COL ──────────────────────────────────────── */
.ccol{width:300px;flex-shrink:0;border-right:1px solid var(--b1);
  display:flex;flex-direction:column;background:var(--s1);}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.msg{display:flex;flex-direction:column;gap:3px;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.msg.user{align-items:flex-end}.msg.bot{align-items:flex-start}
.mwho{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--t3);padding:0 2px}
.mbub{max-width:92%;padding:7px 11px;border-radius:var(--r2);font-size:12.5px;line-height:1.65;}
.msg.user .mbub{background:var(--adim);border:1px solid var(--aline);
  color:var(--text);border-bottom-right-radius:1px;}
.msg.bot  .mbub{background:var(--s2);border:1px solid var(--b1);
  color:var(--text);border-bottom-left-radius:1px;}
.mbub strong{font-weight:500}.mbub em{color:var(--t2);font-style:italic}

/* model-updated badge in chat */
.model-badge{display:inline-flex;align-items:center;gap:4px;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;
  color:var(--green);background:var(--gdim);border:1px solid rgba(58,155,96,.2);
  border-radius:2px;padding:2px 7px;margin-top:4px;}

.qrs{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;max-width:92%}
.qr{padding:3px 9px;border:1px solid var(--b2);border-radius:12px;
  background:transparent;color:var(--t2);font-size:11px;cursor:pointer;
  transition:all .15s;font-family:'DM Mono',monospace;letter-spacing:.03em;}
.qr:hover{border-color:var(--acc);color:var(--acc)}

.typing{display:flex;gap:4px;align-items:center;padding:7px 11px;
  background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);
  border-bottom-left-radius:1px;width:fit-content;}
.typing span{width:4px;height:4px;border-radius:50%;background:var(--t3);animation:td 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

.starters{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.starter{padding:7px 9px;border:1px solid var(--b1);border-radius:var(--r);
  cursor:pointer;background:var(--s2);text-align:left;transition:all .15s;}
.starter:hover{border-color:var(--acc);background:var(--adim)}
.slbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--acc);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;}
.stxt{font-size:11px;color:var(--t2);line-height:1.4}
.starter:hover .stxt{color:var(--text)}

.inp-row{padding:9px 11px;border-top:1px solid var(--b1);background:var(--s2);
  flex-shrink:0;display:flex;gap:7px;align-items:flex-end;}
.cinput{flex:1;background:var(--s3);border:1px solid var(--b2);border-radius:var(--r2);
  padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--text);
  outline:none;resize:none;min-height:34px;max-height:96px;line-height:1.5;transition:border-color .15s;}
.cinput:focus{border-color:var(--b3)}.cinput::placeholder{color:var(--t3)}
.csend{width:34px;height:34px;border-radius:var(--r);background:var(--acc);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;}
.csend:hover{background:var(--acc2)}.csend:disabled{background:var(--s4);cursor:not-allowed}
.csend svg{color:#fff}

/* ── ANALYSIS COL ──────────────────────────────────── */
.acol{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.ahead{padding:10px 15px 8px;border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.atitle{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--t3);}
.conf-sw{display:flex;gap:2px;background:var(--s2);border:1px solid var(--b1);
  border-radius:2px;padding:2px;}
.csw{padding:3px 10px;border-radius:1px;border:none;background:transparent;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;
  color:var(--t3);cursor:pointer;transition:all .15s;}
.csw.on{background:var(--s4);color:var(--text)}
.abody{flex:1;overflow-y:auto;padding:12px 15px;display:flex;flex-direction:column;gap:10px;}
.abody::-webkit-scrollbar{width:3px}
.abody::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px;gap:7px;}
.eico{font-size:22px;opacity:.15;margin-bottom:4px}
.etit{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--t3)}
.esub{font-size:11px;color:var(--t3);max-width:200px;line-height:1.7;opacity:.7}

/* ── VEF TRIO ──────────────────────────────────────── */
.trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.vcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:11px 12px;transition:border-color .3s;}
.vcard.pri{border-color:var(--aline);background:var(--adim);}
.vcard.warn{border-left:2px solid var(--acc);}
.vcard.dng{border-left:2px solid var(--red);}
.vq{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;line-height:1.35}
.vn{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;line-height:1;color:var(--text);transition:all .25s;}
.vcard.pri .vn,.vcard.warn .vn{color:var(--acc)}
.vcard.dng .vn{color:var(--red)}
.vsub{font-size:10px;color:var(--t3);margin-top:3px;}

/* ── SECONDARY ─────────────────────────────────────── */
.sec3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.sm{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:9px 11px;}
.smq{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:3px;}
.smn{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--text);line-height:1;transition:all .25s;}
.smb{font-size:10px;color:var(--t3);margin-top:2px;}

/* ── BREAKDOWN ─────────────────────────────────────── */
.breakdown{display:flex;flex-direction:column;gap:3px;}
.brow{display:flex;align-items:center;gap:7px;padding:7px 10px;
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden;}
.brow:hover{border-color:var(--b3)}
.brow.on{border-color:var(--aline);background:var(--adim)}
.bfill{position:absolute;left:0;top:0;bottom:0;background:rgba(200,75,47,.055);
  transition:width .35s ease;pointer-events:none;}
.bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;position:relative;z-index:1;}
.bname{font-size:11px;color:var(--t2);flex:1;line-height:1.35;position:relative;z-index:1;}
.brow.on .bname{color:var(--text)}
.bval{font-family:'DM Mono',monospace;font-size:11px;color:var(--acc);
  white-space:nowrap;position:relative;z-index:1;font-weight:500;}

/* ── SLIDERS ───────────────────────────────────────── */
.sliders{display:flex;flex-direction:column;gap:10px;}
.srow{display:flex;flex-direction:column;gap:3px;}
.stop{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.slbl2{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;
  color:var(--t2);text-transform:uppercase;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sval{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);
  font-weight:500;white-space:nowrap;transition:color .2s;}
.sval.buyer{color:var(--green)}
.sval.just-changed{color:var(--amber)}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;
  border-radius:2px;background:var(--b2);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;
  border-radius:50%;background:var(--acc);cursor:pointer;border:2px solid var(--bg);
  box-shadow:0 0 0 1px var(--acc);transition:transform .15s;}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.25)}
.shints{display:flex;justify-content:space-between;}
.sh{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);}

/* ── SAVE ──────────────────────────────────────────── */
.srow2{display:flex;align-items:center;gap:8px;}
.savebtn{flex:1;padding:9px;border-radius:var(--r);background:var(--s2);
  border:1px solid var(--b2);color:var(--t2);font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.savebtn:hover:not(:disabled){background:var(--acc);border-color:var(--acc);color:#fff;}
.savebtn:disabled{opacity:.35;cursor:not-allowed;}
.savest{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);}

/* ── UTILS ─────────────────────────────────────────── */
.sep{height:1px;background:var(--b1);flex-shrink:0;}
.sec-hd{display:flex;align-items:center;justify-content:space-between;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--t3);}

/* ── GATE CARD ─────────────────────────────────────────────────────── */
.gate-card{
  background:#0F0F10;border:1px solid var(--aline);border-radius:var(--r2);
  padding:16px 16px 14px;max-width:92%;animation:fi .25s ease;
}
.gate-card.shake{animation:gshake .42s cubic-bezier(.36,.07,.19,.97) both}
@keyframes gshake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-4px)}40%,60%{transform:translateX(4px)}}
.gate-headline{
  font-family:'Syne',sans-serif;font-weight:700;font-size:14px;
  color:var(--text);margin-bottom:4px;
}
.gate-sub{font-size:12px;color:var(--t2);margin-bottom:12px;line-height:1.5}
.gate-row{display:flex;gap:7px;}
.gate-input{
  flex:1;background:var(--s3);border:1px solid var(--b2);border-radius:var(--r);
  padding:8px 10px;font-family:'DM Mono',monospace;font-size:12px;
  color:var(--text);outline:none;transition:border-color .15s;
}
.gate-input:focus{border-color:var(--acc)}
.gate-input::placeholder{color:var(--t3)}
.gate-btn{
  padding:8px 14px;background:var(--acc);border:none;border-radius:var(--r);
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;
  text-transform:uppercase;color:#fff;cursor:pointer;white-space:nowrap;
  transition:background .15s;flex-shrink:0;
}
.gate-btn:hover{background:var(--acc2)}
.gate-btn:disabled{background:var(--s4);cursor:not-allowed}
.gate-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);margin-top:7px;letter-spacing:.04em}

/* ── ANALYSIS CARDS ─────────────────────────────────────────────── */
.acard{width:100%;animation:fi .2s ease;}
.acard-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;
  color:var(--text);margin-bottom:10px;line-height:1.2;}
.acard-section{margin-bottom:10px;}
.acard-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
.signal-row{display:flex;gap:7px;align-items:flex-start;
  padding:6px 9px;background:var(--s3);border-radius:var(--r);margin-bottom:3px;}
.signal-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);
  flex-shrink:0;margin-top:5px;}
.signal-name{font-size:11px;font-weight:500;color:var(--text);margin-bottom:1px;}
.signal-desc{font-size:11px;color:var(--t2);line-height:1.45;}
.mech-box{padding:8px 10px;background:var(--adim);border:1px solid var(--aline);
  border-radius:var(--r);}
.mech-name{font-size:12px;font-weight:500;color:var(--acc);margin-bottom:3px;}
.mech-desc{font-size:11px;color:var(--t2);line-height:1.5;}
.ev-row{display:flex;gap:7px;align-items:flex-start;
  padding:5px 9px;background:var(--s3);border-radius:var(--r);margin-bottom:3px;}
.ev-tier{font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;
  border-radius:2px;flex-shrink:0;margin-top:1px;}
.ev-t1{background:rgba(58,155,96,.15);color:var(--green);}
.ev-t2{background:var(--adim);color:var(--acc);}
.ev-t3{background:var(--amdim);color:var(--amber);}
.ev-t4{background:var(--rdim);color:var(--red);}
.ev-cite{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);}
.ev-claim{font-size:11px;color:var(--t2);line-height:1.45;}
.scen-row{padding:7px 10px;background:var(--s3);border-radius:var(--r);
  margin-bottom:3px;}
.scen-name{font-size:11px;font-weight:500;color:var(--text);margin-bottom:2px;}
.scen-what{font-size:11px;color:var(--t2);margin-bottom:4px;}
.scen-range{font-family:'DM Mono',monospace;font-size:12px;color:var(--acc);
  font-weight:500;}
.scen-horizon{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);
  margin-left:8px;}
.coi-box{padding:9px 11px;background:var(--s2);
  border-left:2px solid var(--acc);border-radius:var(--r);}
.coi-num{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;
  color:var(--acc);line-height:1;}
.coi-frame{font-size:11px;color:var(--t2);margin-top:3px;}
.cfo-box{padding:8px 10px;background:var(--s3);border-radius:var(--r);}
.cfo-obj{font-size:11px;font-weight:500;color:var(--text);margin-bottom:3px;}
.cfo-ans{font-size:11px;color:var(--t2);line-height:1.5;}
.acard-followup{font-size:11px;color:var(--t3);font-style:italic;
  margin-top:8px;padding-top:8px;border-top:1px solid var(--b1);}
/* Audit card */
.audit-verdict{display:inline-block;font-family:'DM Mono',monospace;font-size:9px;
  padding:2px 7px;border-radius:2px;margin-right:6px;}
.v-accept{background:rgba(58,155,96,.15);color:var(--green);}
.v-adjust{background:var(--amdim);color:var(--amber);}
.v-remove{background:var(--rdim);color:var(--red);}
.audit-row{padding:8px 10px;background:var(--s3);border-radius:var(--r);
  margin-bottom:4px;}
.audit-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;}
.audit-line{display:flex;align-items:center;margin-bottom:2px;gap:4px;}
.audit-rationale{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.45;}
.audit-totals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;}
.audit-total-cell{background:var(--s2);border-radius:var(--r);padding:8px 10px;}
.atc-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.atc-val{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--text);}

.tile-more-btn{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);
  background:none;border:none;cursor:pointer;text-decoration:underline;
  text-underline-offset:2px;letter-spacing:.06em;}
.tile-more-btn:hover{color:var(--t2)}

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SB   = 'https://kpecdezcolcycgpuqbgs.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZWNkZXpjb2xjeWNncHVxYmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODIyMDYsImV4cCI6MjA5MTI1ODIwNn0.rKHzdjjkYToEZWdS0ngg3Kgigh_gDWt5cRbLBCE44rg';
const CHAT = `${SB}/functions/v1/value-chat`;

// ─── THEME PALETTE ────────────────────────────────────────────────────────────
const TH = {
  'Labor & Human Capacity':                     {c:'#5B8DD9', s:'Labor'},
  'Operational Efficiency & Asset Utilization': {c:'#6BC49A', s:'Ops'},
  'Direct Cost & Spend Optimization':           {c:'#D4B45A', s:'Cost'},
  'Risk/Compliance & Working Capital':          {c:'#C47C5A', s:'Risk'},
  'Revenue/Margin & Commercial Performance':    {c:'#9B7BD4', s:'Revenue'},
  'Strategic & Data Second-Order Effects':      {c:'#7DB8C4', s:'Strategic'},
};

// ─── STATE ────────────────────────────────────────────────────────────────────
const S = {
  mode: 'discovery',
  conf: 'typical',
  engines: [], scenarios: [], defs: {},
  inputs: {},
  pendingSliderChanges: {},
  activeScens: new Set(),
  activeThemes: new Set(),
  history: [], turns: 0,
  engine: null, loaded: false,
  sid: 's' + Date.now(),
  ctx: '', loading: false,
  // Gate
  gateUnlocked: false,
  gateShown: false,
  lastDomains: [],
  lastStructured: null,
};

// ─── SUPABASE ─────────────────────────────────────────────────────────────────
async function sbGet(t, q = '') {
  const r = await fetch(`${SB}/rest/v1/${t}?${q}`, {
    headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
  });
  if (!r.ok) throw new Error(`SB ${r.status}`);
  return r.json();
}
async function sbIns(t, d) {
  const r = await fetch(`${SB}/rest/v1/${t}`, {
    method: 'POST',
    headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`,
      'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(d)
  });
  if (!r.ok) throw new Error(`SB ins ${r.status}`);
  return r.json();
}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function load() {
  try {
    S.engines = await sbGet('vef_builds', 'engine_status=in.(Active,Production)&select=*');
    const ids = S.engines.map(e => e.engine_id).join(',');
    S.scenarios = await sbGet('vef_value_scenarios',
      `engine_id=in.(${ids})&active_by_default=eq.true&select=*&order=print_priority.asc`);
    const rd = await sbGet('vef_input_definitions', `engine_id=in.(${ids})&select=*`);
    // Deduplicate defs by input_key (keep highest default)
    const seen = {};
    rd.forEach(d => {
      if (!seen[d.input_key] || parseFloat(d.default_value) > parseFloat(seen[d.input_key].default_value || 0)) {
        seen[d.input_key] = d;
      }
    });
    S.defs = seen;
    seedDefaults();
    document.getElementById('eng-lbl').textContent = S.engines.map(e => e.vendor_category).join(' · ');
    document.getElementById('csend').disabled = false;
    S.loaded = true;
    showWelcome();
  } catch (e) {
    console.error(e);
    document.getElementById('eng-lbl').textContent = 'Load error';
  }
}

function cval(def) {
  if (S.conf === 'conservative') return def.conservative_value ?? def.typical_value ?? def.default_value;
  if (S.conf === 'aggressive')   return def.aggressive_value  ?? def.typical_value ?? def.default_value;
  return def.typical_value ?? def.default_value;
}

function seedDefaults() {
  Object.values(S.defs).forEach(d => {
    const v = parseFloat(cval(d));
    if (!isNaN(v)) S.inputs[d.input_key] = { value: v, source: 'engine' };
  });
}

// ─── TILES ───────────────────────────────────────────────────────────────────
// Tiles are empty on load — populated after turn 1 with top 3 scenarios
// for the matched domains, ranked by print_priority.
// User can click to toggle a scenario on/off for the analysis panel.

function renderTopTiles(domainIds) {
  // Filter scenarios to the matched domains, take top 3 by print_priority
  const matched = S.scenarios
    .filter(s => domainIds.some(d =>
      s.domain_id === d ||
      (s.scenario_id || '').toLowerCase().startsWith(d.substring(0,3).toLowerCase())
    ))
    .filter(s => s.print_priority != null)
    .sort((a, b) => (a.print_priority || 99) - (b.print_priority || 99))
    .slice(0, 3);

  // Fallback: top 3 from all scenarios if no domain match
  const tiles = matched.length >= 1 ? matched
    : S.scenarios
        .filter(s => s.print_priority != null)
        .sort((a, b) => (a.print_priority || 99) - (b.print_priority || 99))
        .slice(0, 3);

  const list = document.getElementById('tlist');
  const empty = document.getElementById('tile-empty');
  if (empty) empty.remove();

  // Auto-activate these top 3
  tiles.forEach(s => S.activeScens.add(s.scenario_id));

  list.innerHTML = '';
  tiles.forEach(s => {
    const tile = document.createElement('div');
    tile.className = 'stile on'; // start active
    tile.dataset.sid = s.scenario_id;
    const v = evalF(s.value_scenario_formula);
    const meta = TH[s.value_theme] || { c: '#888' };
    tile.innerHTML = `
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
        <div style="width:5px;height:5px;border-radius:50%;background:${meta.c};flex-shrink:0"></div>
        <div class="tname">${s.one_liner || s.description.substring(0, 55)}</div>
      </div>
      <div class="tval">${v && v > 0 ? fmt(v) + '/yr' : '—'}</div>`;
    tile.onclick = () => toggleScen(s.scenario_id);
    list.appendChild(tile);
  });

  // "Show all" link below
  const more = document.createElement('div');
  more.style.cssText = 'padding:8px 12px;text-align:center;';
  more.innerHTML = '<button onclick="showAllTiles()" class="tile-more-btn">Show all scenarios</button>';
  list.appendChild(more);

  const sub = document.getElementById('tile-sub');
  if (sub) sub.textContent = `${tiles.length} of ${S.scenarios.length} scenarios`;

  updateAnalysis();
}

function showAllTiles() {
  const list = document.getElementById('tlist');
  list.innerHTML = '';
  const sub = document.getElementById('tile-sub');
  if (sub) sub.textContent = `All ${S.scenarios.length} scenarios`;

  // Group by theme
  const groups = {};
  S.scenarios.forEach(s => {
    const t = s.value_theme || 'Other';
    if (!groups[t]) groups[t] = [];
    groups[t].push(s);
  });

  Object.entries(groups).forEach(([theme, scens]) => {
    const meta = TH[theme] || { c: '#888', s: theme.split(' ')[0] };
    const hdr = document.createElement('div');
    hdr.className = 'thdr';
    hdr.innerHTML = `<span class="thdr-dot" style="background:${meta.c}"></span>${meta.s}`;
    list.appendChild(hdr);
    scens.forEach(s => {
      const tile = document.createElement('div');
      tile.className = 'stile' + (S.activeScens.has(s.scenario_id) ? ' on' : '');
      tile.dataset.sid = s.scenario_id;
      const v = evalF(s.value_scenario_formula);
      tile.innerHTML = `<div class="tname">${s.one_liner || s.description.substring(0, 55)}</div>
        <div class="tval">${v && v > 0 ? fmt(v) + '/yr' : '—'}</div>`;
      tile.onclick = () => toggleScen(s.scenario_id);
      list.appendChild(tile);
    });
  });

  // "Show top 3" link
  const less = document.createElement('div');
  less.style.cssText = 'padding:8px 12px;text-align:center;';
  less.innerHTML = '<button onclick="renderTopTiles(S.lastDomains||[])" class="tile-more-btn">Back to top 3</button>';
  list.appendChild(less);
}

function toggleScen(sid) {
  if (S.activeScens.has(sid)) S.activeScens.delete(sid);
  else S.activeScens.add(sid);
  // Refresh tile active state
  document.querySelectorAll('.stile').forEach(t => {
    t.classList.toggle('on', S.activeScens.has(t.dataset.sid));
  });
  updateAnalysis();
}

function toggleScen(sid) {
  if (S.activeScens.has(sid)) S.activeScens.delete(sid);
  else S.activeScens.add(sid);
  renderTiles();
  updateAnalysis();
}

// ─── FORMULA ENGINE ───────────────────────────────────────────────────────────
function evalF(formula) {
  if (!formula) return null;
  let expr = formula;
  const keys = Object.keys(S.defs).sort((a, b) => b.length - a.length);
  keys.forEach(k => {
    const v = S.inputs[k]?.value ?? 0;
    expr = expr.replace(new RegExp(`\\b${k}\\b`, 'g'), isNaN(v) ? 0 : v);
  });
  try {
    if (/^[\d\s\+\-\*\/\(\)\.,]+$/.test(expr))
      return Function('"use strict";return(' + expr + ')')();
  } catch (_) {}
  return null;
}

// ─── CONF SWITCH ─────────────────────────────────────────────────────────────
function setConf(c) {
  S.conf = c;
  document.querySelectorAll('.csw').forEach(b => b.classList.toggle('on', b.textContent.toLowerCase() === c));
  Object.values(S.defs).forEach(d => {
    if (S.inputs[d.input_key]?.source === 'engine') {
      const v = parseFloat(cval(d));
      if (!isNaN(v)) S.inputs[d.input_key] = { value: v, source: 'engine' };
    }
  });
  updateAnalysis();
}

// ─── ANALYSIS PANEL ──────────────────────────────────────────────────────────
function updateAnalysis() {
  const active = S.activeScens.size > 0
    ? S.scenarios.filter(s => S.activeScens.has(s.scenario_id))
    : S.scenarios;

  const computed = active
    .map(s => ({ s, v: evalF(s.value_scenario_formula) }))
    .filter(x => x.v && x.v > 0 && isFinite(x.v))
    .sort((a, b) => b.v - a.v);

  if (computed.length === 0) return;

  document.getElementById('empty').style.display = 'none';
  const body = document.getElementById('abody');

  const total  = computed.reduce((s, x) => s + x.v, 0);
  const impl   = S.inputs['implementation_cost']?.value || 85000;
  const mo     = total / 12;
  const npv    = total * 2.487 - impl;
  const pay    = total > 0 ? (impl / total * 12) : null;
  const bcr    = impl > 0 ? (npv + impl) / impl : null;
  const cod3yr = mo * 36;

  const maxV = computed[0]?.v || 1;

  // Priority slider keys
  const pkeys = priorityKeys(active, 6);

  let html = '';

  // ── THREE VEF QUESTIONS
  html += `<div>
  <div class="sec-hd" style="margin-bottom:8px">
    <span>The Three Questions</span>
    <span style="font-size:9px">${computed.length} scenarios · ${S.conf}</span>
  </div>
  <div class="trio">
    <div class="vcard pri">
      <div class="vq">Value of Acting</div>
      <div class="vn" id="v-act">${fmt(total)}</div>
      <div class="vsub">Annual · all active scenarios</div>
    </div>
    <div class="vcard warn">
      <div class="vq">Cost of Delay</div>
      <div class="vn" id="v-dly">${fmt(mo)}</div>
      <div class="vsub">Per month of inaction</div>
    </div>
    <div class="vcard dng">
      <div class="vq">Cost of Doing Nothing</div>
      <div class="vn" id="v-cdn">${fmt(cod3yr)}</div>
      <div class="vsub">3-year unrealized value</div>
    </div>
  </div></div>`;

  // ── SECONDARY METRICS
  html += `<div class="sec3">
    <div class="sm"><div class="smq">3-Yr NPV</div><div class="smn" id="v-npv">${fmt(npv)}</div><div class="smb">10% discount rate</div></div>
    <div class="sm"><div class="smq">Payback</div><div class="smn" id="v-pay">${pay ? pay.toFixed(1) + 'mo' : '—'}</div><div class="smb">months to breakeven</div></div>
    <div class="sm"><div class="smq">BCR</div><div class="smn" id="v-bcr">${bcr ? bcr.toFixed(1) + 'x' : '—'}</div><div class="smb">benefit-cost ratio</div></div>
  </div>`;

  html += '<div class="sep"></div>';

  // ── SCENARIO BREAKDOWN
  html += `<div>
  <div class="sec-hd" style="margin-bottom:7px"><span>Scenario Breakdown</span><span>${computed.length} active</span></div>
  <div class="breakdown" id="breakdown">`;
  computed.slice(0, 10).forEach(({ s, v }) => {
    const meta = TH[s.value_theme] || { c: '#888' };
    const pct = Math.round((v / maxV) * 100);
    const on = S.activeScens.has(s.scenario_id);
    html += `<div class="brow${on ? ' on' : ''}" onclick="toggleScen('${s.scenario_id}')" data-sid="${s.scenario_id}">
      <div class="bfill" style="width:${pct}%"></div>
      <div class="bdot" style="background:${meta.c}"></div>
      <div class="bname">${s.one_liner || s.description.substring(0, 52)}</div>
      <div class="bval">${fmt(v)}</div>
    </div>`;
  });
  html += `</div></div><div class="sep"></div>`;

  // ── SLIDERS
  if (pkeys.length) {
    html += `<div>
    <div class="sec-hd" style="margin-bottom:8px">
      <span>Key Inputs</span>
      <span style="font-size:9px;font-style:italic">drag or describe in chat</span>
    </div>
    <div class="sliders" id="sliders">`;
    pkeys.forEach(key => {
      const def = S.defs[key]; if (!def) return;
      const inp = S.inputs[key];
      const cur = inp?.value ?? parseFloat(cval(def)) ?? 0;
      const src = inp?.source || 'engine';
      const mn  = parseFloat(def.min_value) || 0;
      const mx  = parseFloat(def.max_value) || Math.max(cur * 3, 100);
      const isDec = def.unit === 'decimal';
      const step  = isDec ? 0.01 : Math.max(1, Math.round((mx - mn) / 100));
      const disp  = isDec ? pctFmt(cur) : rawFmt(cur, def.unit);
      html += `<div class="srow">
        <div class="stop">
          <div class="slbl2" title="${def.label}">${def.label}</div>
          <div class="sval${src === 'buyer' || src === 'chat' ? ' buyer' : ''}" id="sv-${key}">${disp}</div>
        </div>
        <input type="range" min="${mn}" max="${mx}" step="${step}" value="${cur}"
          oninput="onSlide('${key}',this.value,'${def.unit || ''}')">
        <div class="shints">
          <span class="sh">${isDec ? pctFmt(mn) : rawFmt(mn, def.unit)}</span>
          <span class="sh">${isDec ? pctFmt(mx) : rawFmt(mx, def.unit)}</span>
        </div>
      </div>`;
    });
    html += `</div></div><div class="sep"></div>`;
  }

  // ── SAVE
  html += `<div class="srow2">
    <button class="savebtn" id="savebtn" onclick="saveEng()">Save Engagement</button>
    <div class="savest" id="savest"></div>
  </div>
  <div class="export-row">
    <button class="expbtn pdf" id="pdf-btn" onclick="downloadPDF()" disabled title="Run a value analysis first to enable PDF export">↓ PDF</button>
    <button class="expbtn" id="pptx-btn" onclick="downloadPPTX()" disabled title="Run a value analysis first to enable PPTX export">↓ PPTX</button>
  </div>`;

  body.innerHTML = html;
}

function priorityKeys(scenarios, max) {
  const scores = {}, ss = { High: 3, high: 3, Medium: 2, medium: 2, Low: 1 };
  scenarios.forEach(s => {
    if (!s.inputs_required) return;
    s.inputs_required.split(',').map(k => k.trim()).forEach(k => {
      const def = S.defs[k];
      if (!def || !def.min_value || !def.max_value) return;
      scores[k] = (scores[k] || 0) + (ss[def.sensitivity] || 1);
    });
  });
  return Object.entries(scores).sort((a, b) => b[1] - a[1]).slice(0, max).map(([k]) => k);
}

// ─── SLIDER HANDLER ───────────────────────────────────────────────────────────
function onSlide(key, val, unit) {
  const v = parseFloat(val);
  S.inputs[key] = { value: v, source: 'buyer' };
  S.pendingSliderChanges[key] = v; // queue for next chat turn

  // Update display
  const el = document.getElementById(`sv-${key}`);
  if (el) {
    const isDec = unit === 'decimal';
    el.textContent = isDec ? pctFmt(v) : rawFmt(v, unit);
    el.className = 'sval just-changed';
    setTimeout(() => { if (el) el.className = 'sval buyer'; }, 1200);
  }
  refreshNumbers();
}

// Patch numbers in place without full re-render
function refreshNumbers() {
  const active = S.activeScens.size > 0
    ? S.scenarios.filter(s => S.activeScens.has(s.scenario_id))
    : S.scenarios;
  const computed = active
    .map(s => ({ s, v: evalF(s.value_scenario_formula) }))
    .filter(x => x.v && x.v > 0 && isFinite(x.v))
    .sort((a, b) => b.v - a.v);

  const total = computed.reduce((s, x) => s + x.v, 0);
  const impl  = S.inputs['implementation_cost']?.value || 85000;
  const mo    = total / 12;
  const npv   = total * 2.487 - impl;
  const pay   = total > 0 ? (impl / total * 12) : null;
  const bcr   = impl > 0 ? (npv + impl) / impl : null;

  const p = (id, t) => { const el = document.getElementById(id); if (el) el.textContent = t; };
  p('v-act', fmt(total)); p('v-dly', fmt(mo)); p('v-cdn', fmt(mo * 36));
  p('v-npv', fmt(npv)); p('v-pay', pay ? pay.toFixed(1) + 'mo' : '—');
  p('v-bcr', bcr ? bcr.toFixed(1) + 'x' : '—');

  const maxV = computed[0]?.v || 1;
  document.querySelectorAll('.brow').forEach(row => {
    const found = computed.find(x => x.s.scenario_id === row.dataset.sid);
    if (!found) return;
    const pct = Math.round((found.v / maxV) * 100);
    const fill = row.querySelector('.bfill'); const bval = row.querySelector('.bval');
    if (fill) fill.style.width = pct + '%';
    if (bval) bval.textContent = fmt(found.v);
  });
  document.querySelectorAll('.stile').forEach(t => {
    const s = S.scenarios.find(x => x.scenario_id === t.dataset.sid);
    if (!s) return;
    const v = evalF(s.value_scenario_formula);
    const el = t.querySelector('.tval');
    if (el) el.textContent = v && v > 0 ? fmt(v) + '/yr' : '—';
  });
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function rz(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 96) + 'px'; }
function useStarter(msg) {
  document.getElementById('cin').value = msg;
  rz(document.getElementById('cin'));
  send();
}

async function send() {
  const el = document.getElementById('cin');
  const text = el.value.trim();
  if (!text || S.loading) return;
  // Block if gate is shown but not yet submitted — highlight card + focus email.
  if (S.gateShown && !S.gateUnlocked) {
    const emailEl = document.getElementById('gate-email');
    const card = document.querySelector('#gate-msg .gate-card');
    if (emailEl) emailEl.focus();
    if (card) {
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 500);
    }
    return;
  }
  el.value = ''; el.style.height = 'auto';
  const sw = document.getElementById('sw'); if (sw) sw.remove();
  if (S.turns === 0) S.ctx = text;

  // Show badge for any pending slider changes (before they're consumed by discTurn)
  const changedKeys = Object.keys(S.pendingSliderChanges);
  if (changedKeys.length > 0) {
    const changeList = changedKeys.map(k => {
      const def = S.defs[k];
      const v = S.pendingSliderChanges[k];
      const isDec = def?.unit === 'decimal';
      return `${def?.label || k}: ${isDec ? pctFmt(v) : rawFmt(v, def?.unit || '')}`;
    }).join(', ');
    const msgs = document.getElementById('msgs');
    const badge = document.createElement('div');
    badge.style.cssText = 'display:flex;justify-content:flex-end;padding:0 2px;';
    badge.innerHTML = `<div class="model-badge">⟳ ${changeList}</div>`;
    msgs.appendChild(badge);
    msgs.scrollTop = msgs.scrollHeight;
    // Note: pendingSliderChanges is cleared inside discTurn after buildModelState() reads it
  }

  userMsg(text);
  S.history.push({ role: 'user', content: text });
  S.turns++;

  if (S.mode === 'discovery') await discTurn(text);
  else await cfoTurn(text);
}

// Build compact model_state object — edge function formats it into ~50 tokens.
// Only sends: current total, scenario count, confidence, and the delta (what changed).
// The query string stays clean — no prose injection.
function buildModelState() {
  const active = S.activeScens.size > 0
    ? S.scenarios.filter(s => S.activeScens.has(s.scenario_id))
    : S.scenarios;
  const computed = active
    .map(s => ({ s, v: evalF(s.value_scenario_formula) }))
    .filter(x => x.v && x.v > 0 && isFinite(x.v));
  const total = computed.reduce((s, x) => s + x.v, 0);

  // changed: only keys that differ from engine default — short label=value strings
  const changed = Object.entries(S.pendingSliderChanges).map(([k, v]) => {
    const def = S.defs[k];
    const isDec = def?.unit === 'decimal';
    const disp = isDec ? pctFmt(v) : rawFmt(v, def?.unit || '');
    return `${def?.label || k}=${disp}`;
  });

  return {
    total: Math.round(total),
    scenarios: computed.length,
    conf: S.conf,
    changed: changed.length > 0 ? changed : undefined,
  };
}

async function discTurn(text) {
  setLoad(true);
  if (S.turns === 1 && !S.engine) detectEng(text);

  const modelState = buildModelState();
  S.pendingSliderChanges = {};

  try {
    const res = await fetch(CHAT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${KEY}`, 'apikey': KEY },
      body: JSON.stringify({
        query: text,
        history: S.history.slice(0, -1),
        session_id: S.sid,
        solution_context: S.ctx,
        model_state: modelState,
      })
    });
    const data = await res.json();
    const structured = data.structured || { type: 'text', text: data.error || 'Unable to generate.' };

    // Store structured in history for multi-turn tool reconstruction
    S.history.push({ role: 'assistant', structured, content: JSON.stringify(structured) });
    if (S.history.length > 14) S.history = S.history.slice(-14);

    extractNums(text);
    if (S.turns === 1 && data.domains_matched?.length) activateDomain(data.domains_matched);

    renderStructured(structured);
    updateAnalysis();

    // Show gate after turn 1 response renders
    if (S.turns === 1 && !S.gateShown && !S.gateUnlocked) {
      showGate();
    }
  } catch (e) {
    console.error(e);
    botMsgError(text, 'discovery');
  }
  setLoad(false);
}

async function submitGate() {
  const emailEl = document.getElementById('gate-email');
  const btn = document.getElementById('gate-btn');
  const err = document.getElementById('gate-err');
  const email = emailEl?.value?.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    if (emailEl) emailEl.style.borderColor = 'var(--red)';
    if (err) err.style.display = 'block';
    emailEl?.focus();
    return;
  }
  if (err) err.style.display = 'none';
  if (emailEl) emailEl.style.borderColor = '';
  btn.disabled = true;
  btn.textContent = 'Sending...';

  // Compute current COI for the email
  const active = S.activeScens.size > 0
    ? S.scenarios.filter(s => S.activeScens.has(s.scenario_id))
    : S.scenarios;
  const computed = active.map(s => ({ s, v: evalF(s.value_scenario_formula) })).filter(x => x.v && x.v > 0 && isFinite(x.v));
  const total = computed.reduce((s, x) => s + x.v, 0);
  const lastAnalysis = S.history.filter(m => m.role === 'assistant').slice(-1)[0]?.content || '';

  try {
    await fetch(`${SB}/functions/v1/notify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${KEY}`, 'apikey': KEY },
      body: JSON.stringify({
        email,
        solution: S.ctx,
        domains: S.engine || '',
        coi_number: total,
        scenario_text: lastAnalysis,
        session_id: S.sid,
      })
    });

    // Mark lead in vef_chat_leads
    await fetch(`${SB}/rest/v1/vef_chat_leads`, {
      method: 'POST',
      headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ email, solution_description: S.ctx, domain_ids: S.engine || '', conversation: S.history, session_id: S.sid, emailed: true })
    });

    // Unlock
    S.gateUnlocked = true;
    document.getElementById('csend').disabled = false;
    document.getElementById('cin').disabled = false;
    document.getElementById('cin').placeholder = 'Ask a follow-up question...';

    // Replace gate card with confirmation
    const gateMsg = document.getElementById('gate-msg');
    if (gateMsg) {
      gateMsg.querySelector('.gate-card').innerHTML = `
        <div class="gate-headline" style="color:var(--green)">✓ Sent to ${email}</div>
        <div class="gate-sub" style="margin-bottom:0">Check your inbox. Ask me anything — the model is live.</div>`;
    }
    document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;

  } catch (e) {
    console.error(e);
    btn.disabled = false;
    btn.textContent = 'Send it →';
    if (emailEl) emailEl.style.borderColor = 'var(--red)';
  }
}

// Extract numbers from user text → fill inputs
function extractNums(text) {
  const pats = [
    { re: /(\d[\d,]*)\s*(?:store|location|site|facility)/i,            key: 'num_stores' },
    { re: /(\d[\d,]*)\s*(?:sku|item|style)/i,                          key: 'total_sku_locations' },
    { re: /(\d[\d,.]+)\s*(?:million|M)\s*(?:revenue|sales)/i,          key: 'annual_store_revenue', m: 1e6 },
    { re: /\$?(\d[\d,]+)[kK]\s*(?:deal|contract|acv)/i,               key: 'implementation_cost', m: 1e3 },
    { re: /(\d[\d,]*)\s*(?:associate|employee|staff|fte)/i,            key: 'associates_per_store' },
    { re: /(\d[\d,]*)\s*(?:cycle|count per year)/i,                    key: 'annual_count_cycles' },
    { re: /\$?(\d[\d,]+)\s*(?:per hour|\/hr|loaded rate)/i,           key: 'loaded_rate' },
    { re: /(\d[\d,.]+)\s*%\s*(?:margin|gm|gross margin)/i,            key: 'gross_margin_pct', d: 100 },
    { re: /(\d[\d,.]+)\s*%\s*(?:shrink)/i,                            key: 'shrink_pct_baseline', d: 100 },
    { re: /(\d[\d,]*)\s*(?:markdown|mark.?down)\s*(?:spend|budget)/i,  key: 'annual_markdown_spend' },
    { re: /(\d[\d,]*)\s*(?:order|omni)/i,                             key: 'annual_omni_orders' },
  ];
  let anyExtracted = false;
  pats.forEach(({ re, key, m = 1, d = 1 }) => {
    if (S.inputs[key]?.source === 'buyer') return; // don't overwrite manual slider
    const match = text.match(re);
    if (match) {
      const v = parseFloat(match[1].replace(/,/g, ''));
      if (!isNaN(v)) {
        S.inputs[key] = { value: (v * m) / d, source: 'chat' };
        anyExtracted = true;
        // Sync slider if it exists
        const sliderEl = document.querySelector(`input[oninput*="'${key}'"]`);
        if (sliderEl) {
          sliderEl.value = (v * m) / d;
          const svEl = document.getElementById(`sv-${key}`);
          if (svEl) {
            const def = S.defs[key];
            svEl.textContent = def?.unit === 'decimal' ? pctFmt((v * m) / d) : rawFmt((v * m) / d, def?.unit || '');
            svEl.className = 'sval buyer';
          }
        }
      }
    }
  });
  if (anyExtracted) refreshNumbers();
}

function detectEng(text) {
  const lc = text.toLowerCase();
  const map = {
    'ENG-RFD-001': ['rfid', 'radio frequency', 'item level'],
    'ENG-AIP-001': ['ai platform', 'enterprise ai', 'machine learning'],
    'VEN-VEF-001': ['value engineering', 'value case', 'roi tool'],
  };
  for (const [id, kws] of Object.entries(map)) {
    if (kws.some(kw => lc.includes(kw))) { setEng(id); return; }
  }
  if (S.engines.length) setEng(S.engines[0].engine_id);
}
function setEng(id) {
  S.engine = id;
  const e = S.engines.find(x => x.engine_id === id);
  if (e) document.getElementById('eng-lbl').textContent = `${e.engine_id} · ${e.engine_status}`;
}

      .map(s => ({ s, v: evalF(s.value_scenario_formula) }))

  if (!s || s.type === 'text') {

    inner += '<div class="mbub acard">';

    }

      s.evidence.forEach(ev => {
        const tc = ev.tier === 'T1' ? 'ev-t1' : ev.tier === 'T2' ? 'ev-t2' : ev.tier === 'T3' ? 'ev-t3' : 'ev-t4';
        inner += `<div class="ev-row">
          <span class="ev-tier ${tc}">${esc(ev.tier||'')}</span>
          <div>
            <div class="ev-cite">${esc(ev.publisher)} · ${esc(String(ev.year||''))}</div>
            <div class="ev-claim">${esc(ev.claim)}</div>

      });

    if (s.scenarios?.length) {

      s.scenarios.forEach(sc => {
        inner += `<div class="scen-row">

          <div class="coi-num">${esc(s.coi.monthly)}</div>

    }

        const tc = c.tier === 'T1' ? 'ev-t1' : c.tier === 'T2' ? 'ev-t2' : c.tier === 'T3' ? 'ev-t3' : 'ev-t4';
        inner += `<div class="audit-row">

            <span class="audit-verdict ${vc}">${esc(c.verdict)}</span>
            <span class="ev-tier ${tc}">${esc(c.tier||'')}</span>

            </span>
          </div>
          <div class="audit-rationale">${esc(c.rationale)}</div>

      });

    inner += `<div class="audit-total-cell"><div class="atc-lbl">Verified High</div><div class="atc-val" style="color:var(--acc)">${esc(s.verified_high||'—')}</div></div>`;

    }

    inner += '</div>';
  }

  d.innerHTML = inner;
  m.appendChild(d); m.scrollTop = m.scrollHeight;

function setMode(m) {
  const prev = S.mode;
  if (prev === m) return;

  if (S.turns > 0 && !confirm(`Switch to ${m === 'cfo' ? 'CFO Audit' : 'Value Discovery'}? The current conversation will be cleared.`)) {
    return;
  }
  S.mode = m;
  document.getElementById('tab-d').classList.toggle('on', m === 'discovery');
  document.getElementById('tab-c').classList.toggle('on', m === 'cfo');
  document.getElementById('atitle').textContent = m === 'discovery' ? 'Value Analysis' : 'Claim Audit';
  document.getElementById('cin').placeholder = m === 'discovery'
    ? 'Describe your solution and buyer...'
    : "Paste the vendor's ROI claim...";

  // Switching modes clears chat + history so discovery and audit contexts don't bleed.
  S.history = [];
  S.turns = 0;
  S.lastStructured = null;

  } else {
    showWelcome();

}

function rmId(id) { const el = document.getElementById(id); if (el) el.remove(); }
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(n) {
  if (!n || !isFinite(n)) return '—';
  if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return '$' + Math.round(n / 1000) + 'K';
  return '$' + Math.round(n).toLocaleString();
}
function pctFmt(n) { return Math.round(n * 100) + '%'; }
function rawFmt(n, unit) {
  n = Number(n);
  if (unit === '$') return '$' + n.toLocaleString(undefined, { maximumFractionDigits: 0 });
  if (unit === 'decimal') return pctFmt(n);
  return n.toLocaleString(undefined, { maximumFractionDigits: 1 }) + (unit ? ' ' + unit : '');
}

function downloadPDF() {
  const s = S.lastStructured;
  if (!s) return;
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'pt', format: 'letter' });
    const W = 612, L = 20, R = W - 20, TW = W - 40;
    const ACC = [200, 75, 47], INK = [15, 15, 15], MUT = [136, 128, 120];
    const RULE = [224, 221, 214], WHITE = [255, 255, 255], LTBG = [249, 247, 243];
    const GREEN = [58, 155, 96], AMBER = [196, 133, 42], RED = [189, 66, 66];
    const TIER_C = { T1: GREEN, T2: ACC, T3: AMBER, T4: RED };
    let y = 0;

    function setC(rgb) { doc.setTextColor(...rgb); }
    function setF(rgb) { doc.setFillColor(...rgb); }
    function setD(rgb) { doc.setDrawColor(...rgb); }
    function px(size) { doc.setFontSize(size); }

    // ── PAGE HEADER
    setF(INK); doc.rect(0, 0, W, 60, 'F');
    // Wordmark
    px(11); setC(ACC); doc.setFont('helvetica','bold');
    doc.text('ALT', L, 22);
    const altW = doc.getTextWidth('ALT');
    setC(WHITE); doc.text(' MERIDIAN', L + altW, 22);
    // Eyebrow
    px(7); setC(MUT); doc.setFont('helvetica','normal');
    doc.text('GOVERNED VALUE ANALYSIS', L, 36);
    // Title
    px(18); setC(WHITE); doc.setFont('helvetica','bold');
    const titleLines = doc.splitTextToSize(s.title || 'Value Analysis', TW);
    doc.text(titleLines, L, 52);
    y = 60 + titleLines.length * 20 + 8;

    // Accent rule
    setD(ACC); doc.setLineWidth(1.5);
    doc.line(L, y, R, y); y += 16;

    function sectionHeader(label) {
      if (y > 700) { doc.addPage(); y = 30; }
      setD(RULE); doc.setLineWidth(0.5); doc.line(L, y, R, y); y += 8;
      px(7); setC(MUT); doc.setFont('helvetica','bold');
      doc.text(label.toUpperCase(), L, y); y += 12;
    }

    function bodyText(text, maxW, color) {
      px(9.5); setC(color || INK); doc.setFont('helvetica','normal');
      const lines = doc.splitTextToSize(text, maxW || TW);
      if (y + lines.length * 13 > 740) { doc.addPage(); y = 30; }
      doc.text(lines, L, y); y += lines.length * 13 + 4;
    }

    // ── SIGNALS
    if (s.signals?.length) {
      sectionHeader('Signals');
      s.signals.forEach(sig => {
        if (y > 700) { doc.addPage(); y = 30; }
        // Dot
        setF(ACC); doc.circle(L + 3, y - 3, 2.5, 'F');
        // Name
        px(10); setC(INK); doc.setFont('helvetica','bold');
        doc.text(sig.name, L + 10, y); y += 13;
        // Desc
        bodyText(sig.description, TW - 10, MUT);
        y += 2;
      });
    }

    // ── MECHANISM
    if (s.mechanism) {
      sectionHeader('Primary Mechanism');
      px(11); setC(ACC); doc.setFont('helvetica','bold');
      doc.text(s.mechanism.name, L, y); y += 14;
      bodyText(s.mechanism.description, TW, [58, 56, 50]);
    }

    // ── EVIDENCE
    if (s.evidence?.length) {
      sectionHeader('Evidence');
      s.evidence.forEach(ev => {
        if (y > 700) { doc.addPage(); y = 30; }
        const tc = TIER_C[ev.tier] || MUT;
        // Row bg
        setF(LTBG); setD(RULE); doc.setLineWidth(0.5);
        const h = 36;
        doc.roundedRect(L, y - 10, TW, h, 2, 2, 'FD');
        // Tier badge
        setF(tc); doc.roundedRect(L + 4, y - 7, 22, 14, 2, 2, 'F');
        px(8); setC(WHITE); doc.setFont('courier','bold');
        doc.text(ev.tier || '', L + 6, y + 3);
        // Claim
        px(9); setC(INK); doc.setFont('helvetica','normal');
        const claimLines = doc.splitTextToSize(ev.claim, TW - 36);
        doc.text(claimLines[0], L + 32, y + 3);
        // Cite
        px(7.5); setC(MUT); doc.setFont('courier','normal');
        doc.text(`${ev.publisher} · ${ev.year || ''}`, L + 32, y + 16);
        y += h + 4;
      });
    }

    // ── SCENARIOS
    if (s.scenarios?.length) {
      sectionHeader('Value Scenarios');
      s.scenarios.forEach((sc, i) => {
        if (y > 680) { doc.addPage(); y = 30; }
        setF(LTBG); setD(RULE); doc.setLineWidth(0.5);
        doc.roundedRect(L, y - 10, TW, 54, 2, 2, 'FD');
        // Divider
        setD(RULE); doc.line(L + TW - 140, y - 10, L + TW - 140, y + 44);
        // Number
        px(10); setC(ACC); doc.setFont('helvetica','bold');
        doc.text(String(i + 1).padStart(2, '0'), L + 6, y + 4);
        // Name
        px(10); setC(INK);
        doc.text(sc.name, L + 22, y + 4);
        // What
        px(8.5); setC(MUT); doc.setFont('helvetica','normal');
        const whatLines = doc.splitTextToSize(sc.what, TW - 160);
        doc.text(whatLines[0], L + 22, y + 18);
        // Range
        px(13); setC(ACC); doc.setFont('helvetica','bold');
        const rangeStr = `${sc.range_low} – ${sc.range_high}`;
        const rw = doc.getTextWidth(rangeStr);
        doc.text(rangeStr, R - 8 - rw, y + 6);
        // Horizon
        px(7.5); setC(MUT); doc.setFont('courier','normal');
        const hw = doc.getTextWidth(sc.horizon || '');
        doc.text(sc.horizon || '', R - 8 - hw, y + 22);
        y += 62;
      });
    }

    // ── COI
    if (s.coi) {
      if (y > 660) { doc.addPage(); y = 30; }
      y += 8;
      setF(INK); doc.rect(L - 8, y - 14, TW + 16, 70, 'F');
      px(7); setC(MUT); doc.setFont('helvetica','normal');
      doc.text('COST OF INACTION', L, y - 2); y += 6;
      px(26); setC(ACC); doc.setFont('helvetica','bold');
      doc.text(s.coi.monthly || '', L, y + 14); y += 22;
      px(9.5); setC(WHITE); doc.setFont('helvetica','normal');
      const framingLines = doc.splitTextToSize(s.coi.framing || '', TW);
      doc.text(framingLines, L, y + 4); y += framingLines.length * 13 + 20;
    }

    // ── CFO CHALLENGE
    if (s.cfo_challenge) {
      sectionHeader('CFO Challenge');
      if (y > 660) { doc.addPage(); y = 30; }
      const objLines = doc.splitTextToSize(`"${s.cfo_challenge.objection}"`, TW - 12);
      const ansLines = doc.splitTextToSize(s.cfo_challenge.answer, TW - 12);
      const boxH = objLines.length * 13 + ansLines.length * 13 + 28;
      setF(LTBG); setD(RULE); doc.setLineWidth(0.5);
      doc.roundedRect(L, y - 10, TW, boxH, 2, 2, 'FD');
      // Accent left bar
      setF(ACC); doc.rect(L, y - 10, 3, boxH, 'F');
      px(10); setC(INK); doc.setFont('helvetica','bold');
      doc.text(objLines, L + 10, y + 2); y += objLines.length * 13 + 8;
      px(9.5); setC([58, 56, 50]); doc.setFont('helvetica','normal');
      doc.text(ansLines, L + 10, y + 2); y += ansLines.length * 13 + 20;
    }

    // ── FOOTER
    if (y > 720) { doc.addPage(); y = 760; }
    else { y = 760; }
    setD(RULE); doc.setLineWidth(0.5); doc.line(L, y, R, y);
    px(7.5); setC(MUT); doc.setFont('helvetica','normal');
    const footTxt = 'Alt Meridian · Value belongs to mechanisms, not solutions. · altmeridian.com';
    doc.text(footTxt, W / 2, y + 12, { align: 'center' });

    // Save
    const slug = (s.title || 'value-analysis').toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 40);
    doc.save(`${slug}.pdf`);
  } catch(e) {
    console.error('PDF generation failed:', e);
    alert('PDF generation failed — check console for details.');
  }
}
