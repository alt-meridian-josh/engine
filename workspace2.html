<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alt Meridian · Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { bg:'#0e0e0e', surface:'#141414', surface2:'#1a1a1a', border1:'#222', border2:'#2d2d2d', ink:'#e8e8e8', ink2:'#888', ink3:'#444', red:'#d63b2f' },
      fontFamily: { display:['Syne','sans-serif'], mono:['"DM Mono"','monospace'], sans:['Syne','system-ui','sans-serif'] }
    } } };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html, body, #root { height: 100%; }
    body { background: #0e0e0e; color: #e8e8e8; font-family: 'Syne', system-ui, sans-serif; }
    input, textarea, button, select { font-family: inherit; }
    input[type=range] { accent-color: #d63b2f; }
  </style>
</head>
<body class="bg-bg text-ink">
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    /* ---------- SUPABASE ---------- */
    const SUPABASE_URL = 'https://kpecdezcolcycgpuqbgs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZWNkZXpjb2xjeWNncHVxYmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODIyMDYsImV4cCI6MjA5MTI1ODIwNn0.rKHzdjjkYToEZWdS0ngg3Kgigh_gDWt5cRbLBCE44rg';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ---------- DB HELPERS ---------- */
    async function sbSelect(table, q) {
      let b = sb.from(table).select('*');
      if (q?.eq) Object.entries(q.eq).forEach(([k, v]) => b = b.eq(k, v));
      if (q?.in) Object.entries(q.in).forEach(([k, vs]) => b = b.in(k, vs));
      if (q?.order) b = b.order(q.order[0], { ascending: q.order[1] !== false });
      if (q?.limit) b = b.limit(q.limit);
      const { data, error } = await b;
      if (error) throw error;
      return data || [];
    }
    async function sbInsert(table, row) {
      const { data, error } = await sb.from(table).insert(row).select();
      if (error) throw error;
      return data?.[0] || null;
    }
    async function sbUpsert(table, row, onConflict) {
      const { data, error } = await sb.from(table).upsert(row, onConflict ? { onConflict } : {}).select();
      if (error) throw error;
      return data?.[0] || null;
    }
    async function sbUpdate(table, patch, q) {
      let b = sb.from(table).update(patch);
      if (q?.eq) Object.entries(q.eq).forEach(([k, v]) => b = b.eq(k, v));
      const { data, error } = await b.select();
      if (error) throw error;
      return data || [];
    }

    /* ---------- LOADERS ---------- */
    async function loadDomains() {
      const arr = await sbSelect('vef_domains');
      const m = {}; arr.forEach(d => m[d.domain_id] = d); return m;
    }
    const loadEngagements = () => sbSelect('vef_engagements', { order: ['intake_date', false] });
    const loadValueSignals = (domainId) =>
      sbSelect('vef_value_signals', { eq: { domain_id: domainId } }).catch(() => []);
    const loadEvidence = (domainId) =>
      sbSelect('vef_evidence_registry', { eq: { domain_id: domainId } }).catch(() => []);
    const loadSnapshots = (engId) =>
      sbSelect('vef_output_snapshots', { eq: { engagement_id: engId }, order: ['created_at', false] });
    const loadScenarioSelections = (engId) =>
      sbSelect('vef_scenario_selections', { eq: { engagement_id: engId } });
    async function loadInputValues(engId) {
      const arr = await sbSelect('vef_input_values', { eq: { engagement_id: engId } });
      const m = {}; arr.forEach(iv => m[iv.input_key] = iv); return m;
    }
    // RFID fallback: synthetic domain ids like WH-RFD have no scenarios/inputs of their own;
    // retry with the canonical 'RFD' bucket. See workspace.html:1340 for original logic.
    async function loadScenariosForDomain(domainId, domain) {
      let scens = await sbSelect('vef_value_scenarios', { eq: { domain_id: domainId } }).catch(() => []);
      if (!scens.length && domain?.technology === 'RFID' && domainId !== 'RFD') {
        scens = await sbSelect('vef_value_scenarios', { eq: { domain_id: 'RFD' } }).catch(() => []);
      }
      return scens;
    }
    async function loadInputDefinitions(domainId, domain) {
      let rows = await sbSelect('vef_input_definitions', { eq: { domain_id: domainId } }).catch(() => []);
      if (!rows.length && domain?.technology === 'RFID' && domainId !== 'RFD') {
        rows = await sbSelect('vef_input_definitions', { eq: { domain_id: 'RFD' } }).catch(() => []);
      }
      const seen = new Set();
      return rows.filter(r => seen.has(r.input_key) ? false : (seen.add(r.input_key), true));
    }
    async function loadEngagementBundle(engagementId) {
      const rows = await sbSelect('vef_engagements', { eq: { engagement_id: engagementId }, limit: 1 });
      const eng = rows[0];
      if (!eng) return null;
      const domains = await loadDomains();
      const domain = domains[eng.domain_id];
      const [selections, scenarios, defs, values, snapshots, evidence, signals] = await Promise.all([
        loadScenarioSelections(eng.engagement_id),
        loadScenariosForDomain(eng.domain_id, domain),
        loadInputDefinitions(eng.domain_id, domain),
        loadInputValues(eng.engagement_id),
        loadSnapshots(eng.engagement_id),
        loadEvidence(eng.domain_id),
        loadValueSignals(eng.domain_id)
      ]);
      return { engagement: eng, domain, domains, selections, scenarios, defs, values, snapshots, evidence, signals };
    }

    /* ---------- FORMULA ENGINE ---------- */
    const RAMPS = [0.5, 1.0, 1.0];   // Y1 50% ramp, Y2/Y3 full adoption
    const DISCOUNT = 0.10;

    function evalFormula(formula, inputs) {
      if (!formula || typeof formula !== 'string') return null;
      const keys = Object.keys(inputs || {});
      const vals = keys.map(k => {
        const v = inputs[k];
        return (v == null || isNaN(Number(v))) ? 0 : Number(v);
      });
      try {
        const fn = new Function(...keys, '"use strict"; return (' + formula + ');');
        const r = fn(...vals);
        return (typeof r === 'number' && isFinite(r)) ? r : null;
      } catch (_) { return null; }
    }

    // Flatten {input_key: {provided_value:N}} → {input_key:N}, fall back to typical/default.
    function resolvedInputs(inputsMap, inputDefs) {
      const out = {};
      (inputDefs || []).forEach(d => {
        const p = inputsMap?.[d.input_key]?.provided_value;
        out[d.input_key] = p != null ? Number(p) : Number(d.typical_value ?? d.default_value ?? 0);
      });
      return out;
    }

    // Pool-share guard: in each value_theme, only the highest-ARV active scenario contributes.
    // Lower-ARV active scenarios in the same theme are flagged pool_shadow:true and skipped.
    function computeAnalysis(scenarios, inputsMap, inputDefs) {
      const inputs = resolvedInputs(inputsMap, inputDefs);
      const per = (scenarios || []).map(s => {
        const arv = evalFormula(s.value_scenario_formula, inputs) || 0;
        const delay = evalFormula(s.delay_cost_formula, inputs) || (arv / 12);
        const coi = evalFormula(s.cost_of_inaction_formula, inputs) || (arv * 3);
        return { scenario_id: s.scenario_id, theme: s.value_theme || 'other', active: !!s.active, arv, delay, coi, pool_shadow: false };
      });
      const best = {};
      per.filter(p => p.active).forEach(p => { if (!best[p.theme] || p.arv > best[p.theme].arv) best[p.theme] = p; });
      per.forEach(p => { if (p.active && best[p.theme] && best[p.theme].scenario_id !== p.scenario_id) p.pool_shadow = true; });
      const counted = per.filter(p => p.active && !p.pool_shadow);
      const arvFull = counted.reduce((s, p) => s + p.arv, 0);
      const arvY1 = arvFull * RAMPS[0];
      const arvY2 = arvFull * RAMPS[1];
      const arvY3 = arvFull * RAMPS[2];
      const monthlyDelay = counted.reduce((s, p) => s + p.delay, 0);
      const coi3yr = counted.reduce((s, p) => s + p.coi, 0);
      const impl = Number(inputsMap?.implementation_cost?.provided_value) || 0;
      const npv = impl > 0 ? arvY1 + arvY2 / (1 + DISCOUNT) + arvY3 / (1 + DISCOUNT) ** 2 - impl : null;
      const payback = impl > 0 && arvY1 > 0 ? impl / (arvY1 / 12) : null;
      const bcr = impl > 0 ? (arvY1 + arvY2 + arvY3) / impl : null;
      return { arvY1, arvY2, arvY3, arvFull, monthlyDelay, coi3yr, npv, payback, bcr, perScenario: per, impl };
    }

    /* ---------- FORMAT HELPERS ---------- */
    function fmtMoney(n) {
      if (n == null || !isFinite(n)) return '—';
      const abs = Math.abs(n);
      if (abs >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
      if (abs >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
      if (abs >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
      return '$' + Math.round(n).toLocaleString();
    }
    const fmtPercent = (n, d = 0) => (n == null || !isFinite(n)) ? '—' : (n * 100).toFixed(d) + '%';
    const fmtMonths = (n) => (n == null || !isFinite(n)) ? '—' : n.toFixed(1) + ' mo';
    const fmtMultiple = (n) => (n == null || !isFinite(n)) ? '—' : n.toFixed(2) + 'x';
    function fmtDate(s) {
      if (!s) return '—';
      const d = new Date(s);
      return isNaN(d) ? s : d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }
    function fmtRelative(s) {
      if (!s) return '—';
      const ms = Date.now() - new Date(s).getTime();
      if (ms < 60_000) return 'just now';
      if (ms < 3_600_000) return Math.floor(ms / 60_000) + 'm ago';
      if (ms < 86_400_000) return Math.floor(ms / 3_600_000) + 'h ago';
      return Math.floor(ms / 86_400_000) + 'd ago';
    }

    /* ---------- AUTH HOOK ---------- */
    function useAuth() {
      const [user, setUser] = useState(null);
      const [ready, setReady] = useState(false);
      useEffect(() => {
        sb.auth.getSession().then(({ data }) => {
          setUser(data?.session?.user || null);
          setReady(true);
        });
        const { data: sub } = sb.auth.onAuthStateChange((_evt, session) => {
          setUser(session?.user || null);
        });
        return () => sub?.subscription?.unsubscribe?.();
      }, []);
      const signIn = async (email, password) => {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      };
      const signOut = () => sb.auth.signOut();
      return { user, ready, signIn, signOut };
    }

    /* ---------- LOGIN SCREEN ---------- */
    function LoginScreen({ onSignIn }) {
      const [email, setEmail] = useState('seller@altmeridian.com');
      const [password, setPassword] = useState('altmeridian2026');
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState('');
      const submit = async (e) => {
        e.preventDefault();
        setErr(''); setBusy(true);
        try { await onSignIn(email, password); }
        catch (ex) { setErr(ex.message || 'Sign-in failed'); }
        finally { setBusy(false); }
      };
      return (
        <div className="min-h-full grid place-items-center bg-bg px-4">
          <form onSubmit={submit} className="w-[380px] bg-surface border border-border1 p-8">
            <div className="font-display text-2xl tracking-wide mb-1">
              <span className="text-red">ALT</span> <span className="text-ink">MERIDIAN</span>
            </div>
            <div className="font-mono text-[10px] text-ink2 uppercase tracking-widest mb-8">
              Workspace · Sign in
            </div>
            <label className="block text-[11px] font-mono uppercase text-ink2 mb-1.5 tracking-wider">Email</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)}
              className="w-full bg-surface2 border border-border1 px-3 py-2 mb-4 text-sm focus:border-red outline-none" />
            <label className="block text-[11px] font-mono uppercase text-ink2 mb-1.5 tracking-wider">Password</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)}
              className="w-full bg-surface2 border border-border1 px-3 py-2 mb-6 text-sm focus:border-red outline-none" />
            {err && <div className="text-red text-xs mb-3 font-mono">{err}</div>}
            <button type="submit" disabled={busy}
              className="w-full bg-red hover:bg-red/90 disabled:opacity-50 disabled:cursor-not-allowed text-white py-2.5 text-sm font-display tracking-wide transition-colors">
              {busy ? 'Signing in…' : 'Enter Workspace →'}
            </button>
            <div className="text-[11px] text-ink2 mt-8 italic font-mono leading-relaxed">
              "Value belongs to mechanisms, not solutions."
            </div>
          </form>
        </div>
      );
    }

    /* ---------- VOCABULARY ---------- */
    const OUTCOMES = [
      { key: 'Visibility',   color: '#93c5fd', desc: "Know where things are and what condition they're in" },
      { key: 'Throughput',   color: '#fbbf24', desc: 'Move things faster through your operation' },
      { key: 'Compliance',   color: '#c4b5fd', desc: 'Prove what happened and when' },
      { key: 'Risk',         color: '#f87171', desc: 'Predict and prevent financial exposure' },
      { key: 'Intelligence', color: '#5eead4', desc: 'Turn data into faster decisions' },
      { key: 'Performance',  color: '#86efac', desc: 'Get more from equipment and assets' },
      { key: 'Revenue',      color: '#6ee7b7', desc: "Capture value that's being lost" }
    ];
    const OUTCOME_BY = OUTCOMES.reduce((m, o) => (m[o.key] = o, m), {});
    const cleanDomainName = (n) => (n || '').replace(/^[A-Z][A-Z0-9]+\s+—\s+/, '');
    const isActive = (e) => !(e.deal_stage || '').toLowerCase().includes('closed') && !(e.engagement_status || '').toLowerCase().includes('completed');
    const isPilot = (e) => (e.phase || '').toLowerCase().includes('pilot');
    const isCompleted = (e) => (e.engagement_status || '').toLowerCase().includes('completed');
    const STAGE_TONE = { 'discovery':'blue', 'validation':'blue', 'proposal':'amber', 'finance review':'amber', 'closed won':'green', 'closed lost':'ink' };
    const TONE_CLASS = { blue:'bg-blue-900/40 text-blue-300', amber:'bg-amber-900/40 text-amber-300', green:'bg-green-900/40 text-green-300', ink:'bg-surface2 text-ink2', grey:'bg-surface2 text-ink2' };
    const stageTone = (s) => STAGE_TONE[(s || '').toLowerCase()] || 'grey';

    /* ---------- HOME SCREEN ---------- */
    function OutcomeChip({ outcome }) {
      const o = OUTCOME_BY[outcome];
      if (!o) return <span className="text-[10px] font-mono uppercase tracking-wider text-ink3">Unmapped</span>;
      return (
        <span title={o.desc} className="inline-flex items-center gap-1.5 text-[10px] font-mono uppercase tracking-wider" style={{ color: o.color }}>
          <span className="w-1.5 h-1.5 rounded-full" style={{ background: o.color }} />{o.key}
        </span>
      );
    }
    function StageChip({ stage }) {
      return <span className={`px-2 py-0.5 text-[10px] font-mono uppercase tracking-wider ${TONE_CLASS[stageTone(stage)]}`}>{stage || '—'}</span>;
    }
    function HomeScreen({ onOpen, onNew, signOut, userEmail }) {
      const [engagements, setEngagements] = useState([]);
      const [domains, setDomains] = useState({});
      const [arvByEng, setArvByEng] = useState({});
      const [filter, setFilter] = useState('all');
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        (async () => {
          try {
            const [engs, doms, snaps] = await Promise.all([
              loadEngagements(),
              loadDomains(),
              sbSelect('vef_output_snapshots', { order: ['created_at', false] }).catch(() => [])
            ]);
            setEngagements(engs); setDomains(doms);
            const by = {};
            snaps.forEach(s => { if (!by[s.engagement_id]) by[s.engagement_id] = Number(s.annual_value) || 0; });
            setArvByEng(by);
          } finally { setLoading(false); }
        })();
      }, []);
      const stats = useMemo(() => ({
        totalArv: engagements.reduce((s, e) => s + (arvByEng[e.engagement_id] || 0), 0),
        total: engagements.length,
        active: engagements.filter(isActive).length,
        pilot: engagements.filter(isPilot).length
      }), [engagements, arvByEng]);
      const rows = useMemo(() => {
        const filtered = engagements.filter(e =>
          filter === 'all' ? true : filter === 'active' ? isActive(e) : filter === 'pilot' ? isPilot(e) : isCompleted(e)
        );
        return filtered.slice().sort((a, b) => (arvByEng[b.engagement_id] || 0) - (arvByEng[a.engagement_id] || 0));
      }, [engagements, filter, arvByEng]);
      const counts = { all: engagements.length, active: engagements.filter(isActive).length, pilot: engagements.filter(isPilot).length, completed: engagements.filter(isCompleted).length };
      return (
        <div className="min-h-full bg-bg">
          <header className="h-11 px-6 border-b border-border1 flex items-center justify-between bg-surface">
            <div className="font-display text-lg tracking-wide"><span className="text-red">ALT</span> <span className="text-ink">MERIDIAN</span></div>
            <div className="flex items-center gap-4">
              <span className="text-[11px] font-mono text-ink2">{userEmail || ''}</span>
              <button onClick={onNew} className="bg-red hover:bg-red/90 text-white px-3 py-1.5 text-xs font-display tracking-wide">+ New Analysis</button>
              <button onClick={signOut} className="text-[11px] font-mono text-ink2 hover:text-red">Sign out</button>
            </div>
          </header>
          <main className="max-w-[1200px] mx-auto px-6 py-8">
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Total ARV', value: fmtMoney(stats.totalArv), accent: true },
                { label: 'Analyses', value: stats.total },
                { label: 'Active', value: stats.active },
                { label: 'In Pilot', value: stats.pilot }
              ].map(s => (
                <div key={s.label} className="bg-surface border border-border1 p-4">
                  <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-2">{s.label}</div>
                  <div className={`font-display text-2xl ${s.accent ? 'text-red' : 'text-ink'}`}>{s.value}</div>
                </div>
              ))}
            </div>
            <div className="flex items-center gap-6 border-b border-border1 mb-1">
              {['all','active','pilot','completed'].map(t => (
                <button key={t} onClick={() => setFilter(t)}
                  className={`pb-2 text-[11px] font-mono uppercase tracking-widest transition-colors border-b-2 -mb-px ${filter === t ? 'text-red border-red' : 'text-ink2 border-transparent hover:text-ink'}`}>
                  {t} <span className="text-ink3 ml-1">{counts[t]}</span>
                </button>
              ))}
            </div>
            {loading ? (
              <div className="py-16 text-center text-ink2 font-mono text-xs">Loading analyses…</div>
            ) : rows.length === 0 ? (
              <div className="py-16 text-center text-ink2 font-mono text-xs">No analyses match the current filter.</div>
            ) : (
              <div>
                {rows.map((e, i) => {
                  const d = domains[e.domain_id];
                  const arv = arvByEng[e.engagement_id] || 0;
                  const hero = i === 0;
                  return (
                    <button key={e.engagement_id} onClick={() => onOpen(e.engagement_id)}
                      className={`w-full text-left grid grid-cols-12 gap-4 items-center px-4 ${hero ? 'py-5 border-t-2 border-t-red bg-surface/40' : 'py-3'} border-b border-border1 hover:bg-red/5 transition-colors`}>
                      <div className="col-span-3">
                        <OutcomeChip outcome={d?.primary_outcome} />
                        <div className="text-xs text-ink2 mt-1.5">{cleanDomainName(d?.domain_name) || e.domain_id || '—'}</div>
                      </div>
                      <div className="col-span-4">
                        <div className={`font-display ${hero ? 'text-lg' : 'text-sm'} text-ink`}>{e.analysis_name || e.vendor_name || 'Untitled analysis'}</div>
                        <div className="text-[11px] font-mono text-ink2 mt-0.5">{e.prospect_name || '—'}</div>
                      </div>
                      <div className="col-span-2 flex flex-col gap-1">
                        <StageChip stage={e.deal_stage} />
                        <span className="text-[10px] font-mono uppercase tracking-wider text-ink2">{e.phase || '—'}</span>
                      </div>
                      <div className={`col-span-2 text-right font-display ${hero ? 'text-2xl' : 'text-base'} ${arv > 0 ? 'text-red' : 'text-ink3'}`}>{arv > 0 ? fmtMoney(arv) : '—'}</div>
                      <div className="col-span-1 text-right text-[11px] font-mono text-ink2">{fmtRelative(e.intake_date)}</div>
                    </button>
                  );
                })}
              </div>
            )}
          </main>
        </div>
      );
    }
    function EngagementShell({ engagementId, onBack }) {
      return (
        <div className="p-12 font-mono text-xs text-ink2">
          <div className="mb-4">engagement_id: {engagementId} · [ chunk W5+ ]</div>
          <button onClick={onBack} className="hover:text-red">← Back</button>
        </div>
      );
    }

    /* ---------- APP ROOT ---------- */
    function App() {
      const { user, ready, signIn, signOut } = useAuth();
      const [activeId, setActiveId] = useState(null);
      useEffect(() => {
        const eng = new URLSearchParams(location.search).get('engagement');
        if (eng) setActiveId(eng);
      }, []);
      if (!ready) {
        return <div className="min-h-full grid place-items-center text-ink2 font-mono text-xs">Loading…</div>;
      }
      if (!user) return <LoginScreen onSignIn={signIn} />;
      if (activeId) return <EngagementShell engagementId={activeId} onBack={() => setActiveId(null)} signOut={signOut} />;
      return <HomeScreen onOpen={setActiveId} onNew={() => { location.href = 'vef2.html'; }} signOut={signOut} userEmail={user.email} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
