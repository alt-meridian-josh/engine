<body class="bg-bg text-ink">

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    /* ---------- SUPABASE ---------- */
    const SUPABASE_URL = 'https://kpecdezcolcycgpuqbgs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZWNkZXpjb2xjeWNncHVxYmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODIyMDYsImV4cCI6MjA5MTI1ODIwNn0.rKHzdjjkYToEZWdS0ngg3Kgigh_gDWt5cRbLBCE44rg';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ---------- DB HELPERS ---------- */
    async function sbSelect(table, q) {
      let b = sb.from(table).select('*');
      if (q?.eq) Object.entries(q.eq).forEach(([k, v]) => b = b.eq(k, v));
      if (q?.in) Object.entries(q.in).forEach(([k, vs]) => b = b.in(k, vs));
      if (q?.order) b = b.order(q.order[0], { ascending: q.order[1] !== false });
      if (q?.limit) b = b.limit(q.limit);
      const { data, error } = await b;
      if (error) throw error;
      return data || [];
    }
    async function sbInsert(table, row) {
      const { data, error } = await sb.from(table).insert(row).select();
      if (error) throw error;
      return data?.[0] || null;
    }
    async function sbUpsert(table, row, onConflict) {
      const { data, error } = await sb.from(table).upsert(row, onConflict ? { onConflict } : {}).select();
      if (error) throw error;
      return data?.[0] || null;
    }
    async function sbUpdate(table, patch, q) {
      let b = sb.from(table).update(patch);
      if (q?.eq) Object.entries(q.eq).forEach(([k, v]) => b = b.eq(k, v));
      const { data, error } = await b.select();
      if (error) throw error;
      return data || [];
    }

    /* ---------- LOADERS ---------- */
    async function loadDomains() {
      const arr = await sbSelect('vef_domains');
      const m = {}; arr.forEach(d => m[d.domain_id] = d); return m;
    }
    const loadEngagements = () => sbSelect('vef_engagements', { order: ['intake_date', false] });
    const loadValueSignals = (domainId) =>
      sbSelect('vef_value_signals', { eq: { domain_id: domainId } }).catch(() => []);
    const loadEvidence = (domainId) =>
      sbSelect('vef_evidence_registry', { eq: { domain_id: domainId } }).catch(() => []);
    const loadSnapshots = (engId) =>
      sbSelect('vef_output_snapshots', { eq: { engagement_id: engId }, order: ['created_at', false] });
    const loadScenarioSelections = (engId) =>
      sbSelect('vef_scenario_selections', { eq: { engagement_id: engId } });
    async function loadInputValues(engId) {
      const arr = await sbSelect('vef_input_values', { eq: { engagement_id: engId } });
      const m = {}; arr.forEach(iv => m[iv.input_key] = iv); return m;
    }
    // RFID fallback: synthetic domain ids like WH-RFD have no scenarios/inputs of their own;
    // retry with the canonical 'RFD' bucket. See workspace.html:1340 for original logic.
    async function loadScenariosForDomain(domainId, domain) {
      let scens = await sbSelect('vef_value_scenarios', { eq: { domain_id: domainId } }).catch(() => []);
      if (!scens.length && domain?.technology === 'RFID' && domainId !== 'RFD') {
        scens = await sbSelect('vef_value_scenarios', { eq: { domain_id: 'RFD' } }).catch(() => []);
      }
      return scens;
    }
    async function loadInputDefinitions(domainId, domain) {
      let rows = await sbSelect('vef_input_definitions', { eq: { domain_id: domainId } }).catch(() => []);
      if (!rows.length && domain?.technology === 'RFID' && domainId !== 'RFD') {
        rows = await sbSelect('vef_input_definitions', { eq: { domain_id: 'RFD' } }).catch(() => []);
      }
      const seen = new Set();
      return rows.filter(r => seen.has(r.input_key) ? false : (seen.add(r.input_key), true));
    }
    async function loadEngagementBundle(engagementId) {
      const rows = await sbSelect('vef_engagements', { eq: { engagement_id: engagementId }, limit: 1 });
      const eng = rows[0];
      if (!eng) return null;
      const domains = await loadDomains();
      const domain = domains[eng.domain_id];
      const [selections, scenarios, defs, values, snapshots, evidence, signals] = await Promise.all([
        loadScenarioSelections(eng.engagement_id),
        loadScenariosForDomain(eng.domain_id, domain),
        loadInputDefinitions(eng.domain_id, domain),
        loadInputValues(eng.engagement_id),
        loadSnapshots(eng.engagement_id),
        loadEvidence(eng.domain_id),
        loadValueSignals(eng.domain_id)
      ]);
      return { engagement: eng, domain, domains, selections, scenarios, defs, values, snapshots, evidence, signals };
    }

    /* ---------- FORMULA ENGINE ---------- */
    const RAMPS = [0.5, 1.0, 1.0];   // Y1 50% ramp, Y2/Y3 full adoption
    const DISCOUNT = 0.10;

    function evalFormula(formula, inputs) {
      if (!formula || typeof formula !== 'string') return null;
      const keys = Object.keys(inputs || {});
      const vals = keys.map(k => {
        const v = inputs[k];
        return (v == null || isNaN(Number(v))) ? 0 : Number(v);
      });
      try {
        const fn = new Function(...keys, '"use strict"; return (' + formula + ');');
        const r = fn(...vals);
        return (typeof r === 'number' && isFinite(r)) ? r : null;
      } catch (_) { return null; }
    }

    // Flatten {input_key: {provided_value:N}} → {input_key:N}, fall back to typical/default.
    function resolvedInputs(inputsMap, inputDefs) {
      const out = {};
      (inputDefs || []).forEach(d => {
        const p = inputsMap?.[d.input_key]?.provided_value;
        out[d.input_key] = p != null ? Number(p) : Number(d.typical_value ?? d.default_value ?? 0);
      });
      return out;
    }

    // Pool-share guard: in each value_theme, only the highest-ARV active scenario contributes.
    // Lower-ARV active scenarios in the same theme are flagged pool_shadow:true and skipped.
    function computeAnalysis(scenarios, inputsMap, inputDefs) {
      const inputs = resolvedInputs(inputsMap, inputDefs);
      const per = (scenarios || []).map(s => {
        const arv = evalFormula(s.value_scenario_formula, inputs) || 0;
        const delay = evalFormula(s.delay_cost_formula, inputs) || (arv / 12);
        const coi = evalFormula(s.cost_of_inaction_formula, inputs) || (arv * 3);
        return { scenario_id: s.scenario_id, theme: s.value_theme || 'other', active: !!s.active, arv, delay, coi, pool_shadow: false };
      });
      const best = {};
      per.filter(p => p.active).forEach(p => { if (!best[p.theme] || p.arv > best[p.theme].arv) best[p.theme] = p; });
      per.forEach(p => { if (p.active && best[p.theme] && best[p.theme].scenario_id !== p.scenario_id) p.pool_shadow = true; });
      const counted = per.filter(p => p.active && !p.pool_shadow);
      const arvFull = counted.reduce((s, p) => s + p.arv, 0);
      const arvY1 = arvFull * RAMPS[0];
      const arvY2 = arvFull * RAMPS[1];
      const arvY3 = arvFull * RAMPS[2];
      const monthlyDelay = counted.reduce((s, p) => s + p.delay, 0);
      const coi3yr = counted.reduce((s, p) => s + p.coi, 0);
      const impl = Number(inputsMap?.implementation_cost?.provided_value) || 0;
      const npv = impl > 0 ? arvY1 + arvY2 / (1 + DISCOUNT) + arvY3 / (1 + DISCOUNT) ** 2 - impl : null;
      const payback = impl > 0 && arvY1 > 0 ? impl / (arvY1 / 12) : null;
      const bcr = impl > 0 ? (arvY1 + arvY2 + arvY3) / impl : null;
      return { arvY1, arvY2, arvY3, arvFull, monthlyDelay, coi3yr, npv, payback, bcr, perScenario: per, impl };
    }

    /* ---------- FORMAT HELPERS ---------- */
    function fmtMoney(n) {
      if (n == null || !isFinite(n)) return '—';
      const abs = Math.abs(n);
      if (abs >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
      if (abs >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
      if (abs >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
      return '$' + Math.round(n).toLocaleString();
    }
    const fmtPercent = (n, d = 0) => (n == null || !isFinite(n)) ? '—' : (n * 100).toFixed(d) + '%';
    const fmtMonths = (n) => (n == null || !isFinite(n)) ? '—' : n.toFixed(1) + ' mo';
    const fmtMultiple = (n) => (n == null || !isFinite(n)) ? '—' : n.toFixed(2) + 'x';
    function fmtDate(s) {
      if (!s) return '—';
      const d = new Date(s);
      return isNaN(d) ? s : d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }
    function fmtRelative(s) {
      if (!s) return '—';
      const ms = Date.now() - new Date(s).getTime();
      if (ms < 60_000) return 'just now';
      if (ms < 3_600_000) return Math.floor(ms / 60_000) + 'm ago';
      if (ms < 86_400_000) return Math.floor(ms / 3_600_000) + 'h ago';
      return Math.floor(ms / 86_400_000) + 'd ago';
    }

    /* ---------- SENSITIVITY + CONFIDENCE ---------- */
    // Rank input_defs by ARV impact: perturb each input ±20% and measure |ΔarvFull|.
    function topSensitiveInputs(scenarios, defs, valuesMap, n = 4) {
      if (!defs?.length || !scenarios?.length) return [];
      const base = computeAnalysis(scenarios, valuesMap, defs).arvFull;
      const candidates = defs.filter(d => d.input_key !== 'implementation_cost');
      const scored = candidates.map(d => {
        const cur = Number(valuesMap?.[d.input_key]?.provided_value ?? d.typical_value ?? d.default_value ?? 0);
        const probe = cur === 0 ? 1 : cur * 1.2;
        const probed = { ...valuesMap, [d.input_key]: { ...(valuesMap?.[d.input_key] || {}), provided_value: probe } };
        const arv = computeAnalysis(scenarios, probed, defs).arvFull;
        return { def: d, delta: Math.abs(arv - base) };
      });
      return scored.filter(x => x.delta > 0).sort((a, b) => b.delta - a.delta).slice(0, n).map(x => x.def);
    }

    function confidenceTier(scenarios) {
      const active = (scenarios || []).filter(s => s.active);
      if (!active.length) return { tier: 'EXPLORATORY', pct: 25, color: '#888' };
      const tally = { Strong: 0, Moderate: 0, Weak: 0 };
      active.forEach(s => { const e = s.evidence_strength || 'Moderate'; if (tally[e] != null) tally[e]++; });
      const score = (tally.Strong * 1 + tally.Moderate * 0.6 + tally.Weak * 0.3) / active.length;
      if (score >= 0.75) return { tier: 'STRONG', pct: 90, color: '#86efac' };
      if (score >= 0.45) return { tier: 'MODERATE', pct: 60, color: '#fbbf24' };
      return { tier: 'EXPLORATORY', pct: 30, color: '#888' };
    }

    /* ---------- SLIDER + SOURCE CHIP ---------- */
    function Slider({ value, min, max, step, onChange, onCommit }) {
      const commit = () => onCommit?.(Number(value));
      return (
        <input type="range" value={value} min={min} max={max} step={step}
          onChange={e => onChange(Number(e.target.value))}
          onMouseUp={commit} onTouchEnd={commit} onKeyUp={commit}
          className="w-full h-1 accent-red bg-border1 cursor-pointer" />
      );
    }
    function SourceChip({ source }) {
      const isBuyer = source && source !== 'default';
      return (
        <span className={`text-[9px] font-mono uppercase tracking-widest px-1.5 py-0.5 ${isBuyer ? 'bg-green-900/40 text-green-300' : 'bg-surface2 text-ink3'}`}>
          {isBuyer ? 'BUYER' : 'DEFAULT'}
        </span>
      );
    }

    /* ---------- LIVE ASSUMPTIONS RAIL ---------- */
    function LiveAssumptions({ scenarios, defs, values, analysis, onSlide, onCommit }) {
      const top = useMemo(() => topSensitiveInputs(scenarios, defs, values, 4), [scenarios, defs, values]);
      const conf = useMemo(() => confidenceTier(scenarios), [scenarios]);
      if (!top.length) {
        return <div className="text-[11px] font-mono text-ink3 italic">No sensitivity signal yet.</div>;
      }
      return (
        <div className="space-y-3">
          {top.map(d => {
            const iv = values?.[d.input_key];
            const cur = Number(iv?.provided_value ?? d.typical_value ?? d.default_value ?? 0);
            const min = Number(d.min_value ?? 0);
            const max = Number(d.max_value ?? Math.max(cur * 2, 1000));
            const step = Number(d.step_value ?? Math.max((max - min) / 100, 0.01));
            return (
              <div key={d.input_key}>
                <div className="flex items-center justify-between mb-1">
                  <span className="text-[10px] font-mono uppercase tracking-wider text-ink2 truncate">{d.input_label || d.input_key}</span>
                  <SourceChip source={iv?.value_source} />
                </div>
                <Slider value={cur} min={min} max={max} step={step}
                  onChange={(v) => onSlide(d.input_key, v)}
                  onCommit={(v) => onCommit(d.input_key, v)} />
                <div className="text-[11px] font-mono text-ink mt-0.5">{cur.toLocaleString(undefined, { maximumFractionDigits: 2 })} <span className="text-ink3">{d.input_unit || ''}</span></div>
              </div>
            );
          })}
          <div className="pt-3 mt-3 border-t border-border1">
            <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mb-1">Live ARV</div>
            <div className="font-display text-xl text-red leading-none">{fmtMoney(analysis?.arvY1 || 0)}</div>
            <div className="mt-1.5 inline-flex items-center gap-1.5 text-[9px] font-mono uppercase tracking-widest" style={{ color: conf.color }}>
              <span className="w-1.5 h-1.5 rounded-full" style={{ background: conf.color }} />{conf.tier}
            </div>
          </div>
        </div>
      );
    }

    /* ---------- AUTH HOOK ---------- */
    function useAuth() {
      const [user, setUser] = useState(null);
      const [ready, setReady] = useState(false);
      useEffect(() => {
        sb.auth.getSession().then(({ data }) => {
          setUser(data?.session?.user || null);
          setReady(true);
        });
        const { data: sub } = sb.auth.onAuthStateChange((_evt, session) => {
          setUser(session?.user || null);
        });
        return () => sub?.subscription?.unsubscribe?.();
      }, []);
      const signIn = async (email, password) => {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      };
      const signOut = () => sb.auth.signOut();
      return { user, ready, signIn, signOut };
    }

    /* ---------- LOGIN SCREEN ---------- */
    function LoginScreen({ onSignIn }) {
      const [email, setEmail] = useState('seller@altmeridian.com');
      const [password, setPassword] = useState('altmeridian2026');
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState('');
      const submit = async (e) => {
        e.preventDefault();
        setErr(''); setBusy(true);
        try { await onSignIn(email, password); }
        catch (ex) { setErr(ex.message || 'Sign-in failed'); }
        finally { setBusy(false); }
      };
      return (
        <div className="min-h-full grid place-items-center bg-bg px-4">
          <form onSubmit={submit} className="w-[380px] bg-surface border border-border1 p-8">
            <div className="font-display text-2xl tracking-wide mb-1">
              <span className="text-red">ALT</span> <span className="text-ink">MERIDIAN</span>
            </div>
            <div className="font-mono text-[10px] text-ink2 uppercase tracking-widest mb-8">
              Workspace · Sign in
            </div>
            <label className="block text-[11px] font-mono uppercase text-ink2 mb-1.5 tracking-wider">Email</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)}
              className="w-full bg-surface2 border border-border1 px-3 py-2 mb-4 text-sm focus:border-red outline-none" />
            <label className="block text-[11px] font-mono uppercase text-ink2 mb-1.5 tracking-wider">Password</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)}
              className="w-full bg-surface2 border border-border1 px-3 py-2 mb-6 text-sm focus:border-red outline-none" />
            {err && <div className="text-red text-xs mb-3 font-mono">{err}</div>}
            <button type="submit" disabled={busy}
              className="w-full bg-red hover:bg-red/90 disabled:opacity-50 disabled:cursor-not-allowed text-white py-2.5 text-sm font-display tracking-wide transition-colors">
              {busy ? 'Signing in…' : 'Enter Workspace →'}
            </button>
            <div className="text-[11px] text-ink2 mt-8 italic font-mono leading-relaxed">
              "Value belongs to mechanisms, not solutions."
            </div>
          </form>
        </div>
      );
    }

    /* ---------- VOCABULARY ---------- */
    const OUTCOMES = [
      { key: 'Visibility',   color: '#93c5fd', desc: "Know where things are and what condition they're in" },
      { key: 'Throughput',   color: '#fbbf24', desc: 'Move things faster through your operation' },
      { key: 'Compliance',   color: '#c4b5fd', desc: 'Prove what happened and when' },
      { key: 'Risk',         color: '#f87171', desc: 'Predict and prevent financial exposure' },
      { key: 'Intelligence', color: '#5eead4', desc: 'Turn data into faster decisions' },
      { key: 'Performance',  color: '#86efac', desc: 'Get more from equipment and assets' },
      { key: 'Revenue',      color: '#6ee7b7', desc: "Capture value that's being lost" }
    ];
    const OUTCOME_BY = OUTCOMES.reduce((m, o) => (m[o.key] = o, m), {});
    const cleanDomainName = (n) => (n || '').replace(/^[A-Z][A-Z0-9]+\s+—\s+/, '');
    const isActive = (e) => !(e.deal_stage || '').toLowerCase().includes('closed') && !(e.engagement_status || '').toLowerCase().includes('completed');
    const isPilot = (e) => (e.phase || '').toLowerCase().includes('pilot');
    const isCompleted = (e) => (e.engagement_status || '').toLowerCase().includes('completed');
    const STAGE_TONE = { 'discovery':'blue', 'validation':'blue', 'proposal':'amber', 'finance review':'amber', 'closed won':'green', 'closed lost':'ink' };
    const TONE_CLASS = { blue:'bg-blue-900/40 text-blue-300', amber:'bg-amber-900/40 text-amber-300', green:'bg-green-900/40 text-green-300', ink:'bg-surface2 text-ink2', grey:'bg-surface2 text-ink2' };
    const stageTone = (s) => STAGE_TONE[(s || '').toLowerCase()] || 'grey';

    /* ---------- HOME SCREEN ---------- */
    function OutcomeChip({ outcome }) {
      const o = OUTCOME_BY[outcome];
      if (!o) return <span className="text-[10px] font-mono uppercase tracking-wider text-ink3">Unmapped</span>;
      return (
        <span title={o.desc} className="inline-flex items-center gap-1.5 text-[10px] font-mono uppercase tracking-wider" style={{ color: o.color }}>
          <span className="w-1.5 h-1.5 rounded-full" style={{ background: o.color }} />{o.key}
        </span>
      );
    }
    function StageChip({ stage }) {
      return <span className={`px-2 py-0.5 text-[10px] font-mono uppercase tracking-wider ${TONE_CLASS[stageTone(stage)]}`}>{stage || '—'}</span>;
    }
    function HomeScreen({ onOpen, onNew, signOut, userEmail }) {
      const [engagements, setEngagements] = useState([]);
      const [domains, setDomains] = useState({});
      const [arvByEng, setArvByEng] = useState({});
      const [filter, setFilter] = useState('all');
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        (async () => {
          try {
            const [engs, doms, snaps] = await Promise.all([
              loadEngagements(),
              loadDomains(),
              sbSelect('vef_output_snapshots', { order: ['created_at', false] }).catch(() => [])
            ]);
            setEngagements(engs); setDomains(doms);
            const by = {};
            snaps.forEach(s => { if (!by[s.engagement_id]) by[s.engagement_id] = Number(s.annual_value) || 0; });
            setArvByEng(by);
          } finally { setLoading(false); }
        })();
      }, []);
      const stats = useMemo(() => ({
        totalArv: engagements.reduce((s, e) => s + (arvByEng[e.engagement_id] || 0), 0),
        total: engagements.length,
        active: engagements.filter(isActive).length,
        pilot: engagements.filter(isPilot).length
      }), [engagements, arvByEng]);
      const rows = useMemo(() => {
        const filtered = engagements.filter(e =>
          filter === 'all' ? true : filter === 'active' ? isActive(e) : filter === 'pilot' ? isPilot(e) : isCompleted(e)
        );
        return filtered.slice().sort((a, b) => (arvByEng[b.engagement_id] || 0) - (arvByEng[a.engagement_id] || 0));
      }, [engagements, filter, arvByEng]);
      const counts = { all: engagements.length, active: engagements.filter(isActive).length, pilot: engagements.filter(isPilot).length, completed: engagements.filter(isCompleted).length };
      return (
        <div className="min-h-full bg-bg">
          <header className="h-11 px-6 border-b border-border1 flex items-center justify-between bg-surface">
            <div className="font-display text-lg tracking-wide"><span className="text-red">ALT</span> <span className="text-ink">MERIDIAN</span></div>
            <div className="flex items-center gap-4">
              <span className="text-[11px] font-mono text-ink2">{userEmail || ''}</span>
              <button onClick={onNew} className="bg-red hover:bg-red/90 text-white px-3 py-1.5 text-xs font-display tracking-wide">+ New Analysis</button>
              <button onClick={signOut} className="text-[11px] font-mono text-ink2 hover:text-red">Sign out</button>
            </div>
          </header>
          <main className="max-w-[1200px] mx-auto px-6 py-8">
            <div className="grid grid-cols-4 gap-4 mb-8">
              {[
                { label: 'Total ARV', value: fmtMoney(stats.totalArv), accent: true },
                { label: 'Analyses', value: stats.total },
                { label: 'Active', value: stats.active },
                { label: 'In Pilot', value: stats.pilot }
              ].map(s => (
                <div key={s.label} className="bg-surface border border-border1 p-4">
                  <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-2">{s.label}</div>
                  <div className={`font-display text-2xl ${s.accent ? 'text-red' : 'text-ink'}`}>{s.value}</div>
                </div>
              ))}
            </div>
            <div className="flex items-center gap-6 border-b border-border1 mb-1">
              {['all','active','pilot','completed'].map(t => (
                <button key={t} onClick={() => setFilter(t)}
                  className={`pb-2 text-[11px] font-mono uppercase tracking-widest transition-colors border-b-2 -mb-px ${filter === t ? 'text-red border-red' : 'text-ink2 border-transparent hover:text-ink'}`}>
                  {t} <span className="text-ink3 ml-1">{counts[t]}</span>
                </button>
              ))}
            </div>
            {loading ? (
              <div className="py-16 text-center text-ink2 font-mono text-xs">Loading analyses…</div>
            ) : rows.length === 0 ? (
              <div className="py-16 text-center text-ink2 font-mono text-xs">No analyses match the current filter.</div>
            ) : (
              <div>
                {rows.map((e, i) => {
                  const d = domains[e.domain_id];
                  const arv = arvByEng[e.engagement_id] || 0;
                  const hero = i === 0;
                  return (
                    <button key={e.engagement_id} onClick={() => onOpen(e.engagement_id)}
                      className={`w-full text-left grid grid-cols-12 gap-4 items-center px-4 ${hero ? 'py-5 border-t-2 border-t-red bg-surface/40' : 'py-3'} border-b border-border1 hover:bg-red/5 transition-colors`}>
                      <div className="col-span-3">
                        <OutcomeChip outcome={d?.primary_outcome} />
                        <div className="text-xs text-ink2 mt-1.5">{cleanDomainName(d?.domain_name) || e.domain_id || '—'}</div>
                      </div>
                      <div className="col-span-4">
                        <div className={`font-display ${hero ? 'text-lg' : 'text-sm'} text-ink`}>{e.analysis_name || e.vendor_name || 'Untitled analysis'}</div>
                        <div className="text-[11px] font-mono text-ink2 mt-0.5">{e.prospect_name || '—'}</div>
                      </div>
                      <div className="col-span-2 flex flex-col gap-1">
                        <StageChip stage={e.deal_stage} />
                        <span className="text-[10px] font-mono uppercase tracking-wider text-ink2">{e.phase || '—'}</span>
                      </div>
                      <div className={`col-span-2 text-right font-display ${hero ? 'text-2xl' : 'text-base'} ${arv > 0 ? 'text-red' : 'text-ink3'}`}>{arv > 0 ? fmtMoney(arv) : '—'}</div>
                      <div className="col-span-1 text-right text-[11px] font-mono text-ink2">{fmtRelative(e.intake_date)}</div>
                    </button>
                  );
                })}
              </div>
            )}
          </main>
        </div>
      );
    }
    /* ---------- ENGAGEMENT SHELL ---------- */
    const TABS = [
      { key: 'overview',  label: 'Overview' },
      { key: 'scenarios', label: 'Scenarios' },
      { key: 'inputs',    label: 'Inputs' },
      { key: 'outputs',   label: 'Outputs' },
      { key: 'snapshots', label: 'Snapshots' }
    ];

    function mergeScenarios(scenarios, selections) {
      return (scenarios || []).map(s => {
        const sel = (selections || []).find(x => x.scenario_id === s.scenario_id);
        return { ...s, active: sel ? sel.is_active !== false : !!s.active_by_default };
      });
    }
    function governedPct(values, defs) {
      if (!defs?.length) return 0;
      const provided = defs.filter(d => values?.[d.input_key]?.provided_value != null).length;
      return Math.round((provided / defs.length) * 100);
    }

    function Topbar({ engagement, domain, analysis, onBack, onToggleMeridian, drawerOpen }) {
      return (
        <header className="h-11 px-4 border-b border-border1 bg-surface flex items-center justify-between flex-shrink-0">
          <div className="flex items-center gap-4">
            <button onClick={onBack} className="text-ink2 hover:text-red text-xs font-mono">←</button>
            <div className="font-display text-sm tracking-wide"><span className="text-red">ALT</span> <span className="text-ink">MERIDIAN</span></div>
            <div className="h-5 w-px bg-border1" />
            <div className="flex items-center gap-2">
              <span className="font-display text-sm text-ink">{engagement.analysis_name || engagement.vendor_name || 'Untitled'}</span>
              <span className="text-ink3">/</span>
              <span className="font-mono text-[11px] text-ink2">{engagement.prospect_name || '—'}</span>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <StageChip stage={engagement.deal_stage} />
            <button onClick={onToggleMeridian} className={`px-2.5 py-1 text-[11px] font-mono uppercase tracking-wider border ${drawerOpen ? 'border-red text-red' : 'border-border2 text-ink2 hover:text-ink'}`}>Meridian ◆</button>
            <button className="px-2.5 py-1 text-[11px] font-mono uppercase tracking-wider border border-border2 text-ink2 hover:text-ink" data-action="snapshot">Save Snapshot</button>
            <button className="bg-red hover:bg-red/90 text-white px-3 py-1 text-[11px] font-mono uppercase tracking-wider">Generate Report</button>
          </div>
        </header>
      );
    }

    function ContextBar({ engagement, domain, scenarios, tier, onTierCycle, governed, savedAgo }) {
      const o = OUTCOME_BY[domain?.primary_outcome];
      const activeCount = scenarios.filter(s => s.active).length;
      return (
        <div className="h-8 px-4 bg-surface border-b border-border1 flex items-center gap-3 text-[10px] font-mono uppercase tracking-wider flex-shrink-0">
          <span className="inline-flex items-center gap-1.5" style={{ color: o?.color || '#888' }}>
            <span className="w-1.5 h-1.5 rounded-full" style={{ background: o?.color || '#444' }} />
            {cleanDomainName(domain?.domain_name) || engagement.domain_id || '—'}
          </span>
          <span className="text-ink3">·</span>
          <span className="text-ink2">{activeCount} <span className="text-ink3">scenarios</span></span>
          <span className="text-ink3">·</span>
          <button onClick={onTierCycle} title="Cycle assumption tier" className="text-ink hover:text-red">{tier}</button>
          <span className="text-ink3">·</span>
          <span className="text-ink2">{governed}% <span className="text-ink3">governed</span></span>
          <span className="text-ink3">·</span>
          <span className="text-ink2">{savedAgo}</span>
        </div>
      );
    }

    function LeftRail({ tab, onTab, scenarios, defs, values, analysis, onSlide, onCommit }) {
      return (
        <aside className="w-[200px] bg-surface border-r border-border1 flex flex-col flex-shrink-0 overflow-hidden">
          <nav className="py-3 flex-shrink-0">
            {TABS.map(t => (
              <button key={t.key} onClick={() => onTab(t.key)}
                className={`w-full text-left px-4 py-2 text-[11px] font-mono uppercase tracking-widest border-l-2 transition-colors ${tab === t.key ? 'border-red text-red bg-red/5' : 'border-transparent text-ink2 hover:text-ink'}`}>
                {t.label}
              </button>
            ))}
          </nav>
          <div className="mt-auto px-4 py-4 border-t border-border1 overflow-y-auto">
            <div className="text-[10px] font-mono uppercase tracking-widest text-ink3 mb-3">Live Assumptions</div>
            <LiveAssumptions scenarios={scenarios} defs={defs} values={values} analysis={analysis} onSlide={onSlide} onCommit={onCommit} />
          </div>
        </aside>
      );
    }

    /* ---------- THEME COLORS for value_theme chips/bars ---------- */
    const THEME_COLORS = {
      'Operational Efficiency': '#fbbf24',
      'Compliance & Risk': '#c4b5fd',
      'Asset Performance': '#86efac',
      'Inventory Accuracy': '#93c5fd',
      'Throughput': '#f59e0b',
      'Visibility': '#60a5fa',
      'Revenue': '#6ee7b7',
      'Labor Productivity': '#5eead4'
    };
    const themeColor = (t) => THEME_COLORS[t] || '#888';

    function priorityAction({ governed, scenarios, snapshots, conf }) {
      const active = scenarios.filter(s => s.active);
      if (governed < 40) return { headline: 'Gather buyer inputs', body: `Only ${governed}% of assumptions are buyer-confirmed. The analysis is mostly running on defaults.`, cta: 'Open Inputs' };
      if (!active.length) return { headline: 'Activate at least one scenario', body: 'No mechanisms are active — ARV is $0 by definition.', cta: 'Open Scenarios' };
      const weak = active.filter(s => (s.evidence_strength || '') === 'Weak').length;
      if (weak > 0) return { headline: 'Strengthen weak evidence', body: `${weak} active scenario${weak > 1 ? 's are' : ' is'} resting on weak proof. Pull case studies or proof points before the CFO sees this.`, cta: 'Open Scenarios' };
      if (!snapshots?.length) return { headline: 'Save the baseline snapshot', body: 'Capture this state so changes from here have a reference point.', cta: 'Save Snapshot' };
      return { headline: 'Schedule customer review', body: `Analysis is at ${conf.tier} confidence. Time to walk it through with the customer.`, cta: 'Generate Report' };
    }

    /* ---------- INPUTS TAB ---------- */
    const FORMULA_KEY_RE = /\b[a-z_][a-z0-9_]*\b/g;
    function extractKeys(formula, knownKeys) {
      if (!formula) return new Set();
      const set = new Set();
      const matches = formula.match(FORMULA_KEY_RE) || [];
      matches.forEach(m => { if (knownKeys.has(m)) set.add(m); });
      return set;
    }
    function groupInputsByScenario(scenarios, defs) {
      const known = new Set((defs || []).map(d => d.input_key));
      const used = new Set();
      const groups = scenarios.filter(s => s.active).map(s => {
        const keys = new Set([
          ...extractKeys(s.value_scenario_formula, known),
          ...extractKeys(s.delay_cost_formula, known),
          ...extractKeys(s.cost_of_inaction_formula, known)
        ]);
        keys.forEach(k => used.add(k));
        return { name: s.mechanism_label || s.scenario_label || s.scenario_id, defs: defs.filter(d => keys.has(d.input_key)) };
      }).filter(g => g.defs.length);
      const other = defs.filter(d => !used.has(d.input_key) && d.input_key !== 'implementation_cost');
      if (other.length) groups.push({ name: 'Other', defs: other });
      const impl = defs.filter(d => d.input_key === 'implementation_cost');
      if (impl.length) groups.push({ name: 'Implementation', defs: impl });
      return groups;
    }
    function InputRow({ def, iv, onSlide, onCommit }) {
      const cur = Number(iv?.provided_value ?? def.typical_value ?? def.default_value ?? 0);
      const min = Number(def.min_value ?? 0);
      const max = Number(def.max_value ?? Math.max(cur * 2, 1000));
      const step = Number(def.step_value ?? Math.max((max - min) / 100, 0.01));
      return (
        <div className="grid grid-cols-12 gap-3 items-center py-2">
          <div className="col-span-4">
            <div className="flex items-center gap-1.5">
              <span className="text-xs text-ink truncate">{def.input_label || def.input_key}</span>
              {def.discovery_prompt && (
                <span title={def.discovery_prompt} className="text-[10px] text-ink3 cursor-help">ⓘ</span>
              )}
            </div>
            <div className="text-[10px] font-mono text-ink3 mt-0.5">{def.input_key}</div>
          </div>
          <div className="col-span-5">
            <Slider value={cur} min={min} max={max} step={step}
              onChange={v => onSlide(def.input_key, v)} onCommit={v => onCommit(def.input_key, v)} />
          </div>
          <div className="col-span-2 text-right font-mono text-xs text-ink">{cur.toLocaleString(undefined, { maximumFractionDigits: 2 })} <span className="text-ink3">{def.input_unit || ''}</span></div>
          <div className="col-span-1 flex justify-end"><SourceChip source={iv?.value_source} /></div>
        </div>
      );
    }
    function PresetButtons({ tier, onPreset }) {
      const tiers = ['conservative', 'typical', 'aggressive'];
      return (
        <div className="flex border border-border1">
          {tiers.map(t => (
            <button key={t} onClick={() => onPreset(t)}
              className={`px-3 py-1.5 text-[10px] font-mono uppercase tracking-widest transition-colors ${tier === t ? 'bg-red text-white' : 'text-ink2 hover:text-ink hover:bg-surface'}`}>
              {t}
            </button>
          ))}
        </div>
      );
    }
    function InputsTab({ scenarios, defs, values, tier, onSlide, onCommit, onPreset }) {
      const groups = useMemo(() => groupInputsByScenario(scenarios, defs), [scenarios, defs]);
      if (!defs?.length) return <main className="flex-1 overflow-auto p-8 font-mono text-xs text-ink2">No inputs defined for this domain.</main>;
      return (
        <main className="flex-1 overflow-auto">
          <div className="max-w-[960px] mx-auto px-8 py-8">
            <div className="flex items-center justify-between mb-6">
              <div className="text-[10px] font-mono uppercase tracking-widest text-ink2">{defs.length} inputs · {Object.keys(values).length} provided</div>
              <PresetButtons tier={tier} onPreset={onPreset} />
            </div>
            <div className="space-y-8">
              {groups.map(g => (
                <div key={g.name}>
                  <div className="text-[10px] font-mono uppercase tracking-widest text-red mb-3 pb-2 border-b border-border1">{g.name}</div>
                  <div>{g.defs.map(d => <InputRow key={d.input_key} def={d} iv={values[d.input_key]} onSlide={onSlide} onCommit={onCommit} />)}</div>
                </div>
              ))}
            </div>
          </div>
        </main>
      );
    }

    /* ---------- SCENARIOS TAB ---------- */
    function evidenceMeta(strength) {
      if (strength === 'Strong')   return { pct: 100, color: '#86efac', label: 'Strong' };
      if (strength === 'Weak')     return { pct: 30,  color: '#f87171', label: 'Weak' };
      return { pct: 60, color: '#fbbf24', label: 'Moderate' };
    }
    function ThemeChip({ theme }) {
      if (!theme) return null;
      const c = themeColor(theme);
      return <span className="text-[10px] font-mono uppercase tracking-wider px-2 py-0.5" style={{ background: c + '22', color: c }}>{theme}</span>;
    }
    function EvidenceBadge({ strength }) {
      const m = evidenceMeta(strength);
      return <span className="text-[9px] font-mono uppercase tracking-widest px-1.5 py-0.5 border" style={{ borderColor: m.color + '55', color: m.color }}>{m.label}</span>;
    }
    function ToggleSwitch({ on, onChange }) {
      return (
        <button onClick={() => onChange(!on)} aria-pressed={on}
          className={`relative w-11 h-6 transition-colors ${on ? 'bg-red' : 'bg-surface2 border border-border2'}`}>
          <span className={`absolute top-0.5 ${on ? 'left-[22px]' : 'left-0.5'} w-5 h-5 bg-white transition-all`} />
        </button>
      );
    }
    function ScenarioCard({ scenario, perScenario, onToggle }) {
      const [openCfo, setOpenCfo] = useState(false);
      const ev = evidenceMeta(scenario.evidence_strength);
      const arv = perScenario?.arv || 0;
      const shadow = perScenario?.pool_shadow;
      return (
        <div className={`bg-surface border border-border1 p-5 transition-opacity ${scenario.active ? '' : 'opacity-60'}`}>
          <div className="flex items-start justify-between gap-4 mb-2">
            <div className="flex-1 min-w-0">
              <ThemeChip theme={scenario.value_theme} />
              <div className="font-display text-lg text-ink mt-2">{scenario.mechanism_label || scenario.scenario_label || 'Untitled mechanism'}</div>
              <div className="text-xs text-ink2 mt-1 leading-relaxed">{scenario.one_liner || scenario.scenario_description || ''}</div>
            </div>
            <div className="text-right flex-shrink-0">
              <div className={`font-display text-xl ${scenario.active && !shadow ? 'text-red' : 'text-ink3'}`}>{fmtMoney(arv)}</div>
              {shadow && <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mt-0.5">pool-shadowed</div>}
            </div>
          </div>
          <div className="flex items-center gap-3 mt-3">
            <EvidenceBadge strength={scenario.evidence_strength} />
            <div className="flex-1 h-1 bg-surface2 relative">
              <div className="absolute inset-y-0 left-0" style={{ width: ev.pct + '%', background: ev.color }} />
            </div>
            <span className="text-[10px] font-mono text-ink3 uppercase tracking-widest">{ev.pct}%</span>
          </div>
          {scenario.cfo_objection && (
            <div className="mt-4 border-t border-border1 pt-3">
              <button onClick={() => setOpenCfo(o => !o)} className="text-[10px] font-mono uppercase tracking-widest text-ink2 hover:text-ink flex items-center gap-1.5">
                <span className="text-ink3">{openCfo ? '▾' : '▸'}</span>CFO Objection
              </button>
              {openCfo && <div className="text-xs text-ink2 mt-2 leading-relaxed italic">"{scenario.cfo_objection}"</div>}
            </div>
          )}
          <div className="flex items-center justify-between mt-4 pt-3 border-t border-border1">
            <span className="text-[10px] font-mono uppercase tracking-widest text-ink2">{scenario.active ? 'Active' : 'Inactive'}</span>
            <ToggleSwitch on={scenario.active} onChange={() => onToggle(scenario.scenario_id, !scenario.active)} />
          </div>
        </div>
      );
    }
    function ScenariosTab({ scenarios, analysis, onToggle }) {
      if (!scenarios.length) return <main className="flex-1 overflow-auto p-8 font-mono text-xs text-ink2">No scenarios loaded for this domain.</main>;
      return (
        <main className="flex-1 overflow-auto">
          <div className="max-w-[960px] mx-auto px-8 py-8 space-y-4">
            <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-2">{scenarios.filter(s => s.active).length} of {scenarios.length} mechanisms active</div>
            {scenarios.map(s => (
              <ScenarioCard key={s.scenario_id} scenario={s} perScenario={analysis?.perScenario?.find(p => p.scenario_id === s.scenario_id)} onToggle={onToggle} />
            ))}
          </div>
        </main>
      );
    }

    /* ---------- OVERVIEW TAB ---------- */
    function OverviewTab({ bundle, scenarios, analysis, governed }) {
      const conf = useMemo(() => confidenceTier(scenarios), [scenarios]);
      const next = useMemo(() => priorityAction({ governed, scenarios, snapshots: bundle.snapshots, conf }), [governed, scenarios, bundle.snapshots, conf]);
      const evMix = useMemo(() => {
        const t = { Strong: 0, Moderate: 0, Weak: 0 };
        scenarios.filter(s => s.active).forEach(s => { const k = s.evidence_strength || 'Moderate'; if (t[k] != null) t[k]++; });
        return t;
      }, [scenarios]);
      const arv = analysis?.arvY1 || 0;
      return (
        <main className="flex-1 overflow-auto">
          <div className="max-w-[960px] mx-auto px-8 py-10">
            <div className="text-center mb-10">
              <div className={`font-display font-bold leading-none ${arv > 0 ? 'text-red' : 'text-ink3'}`} style={{ fontSize: '64px' }}>{fmtMoney(arv)}</div>
              <div className="text-[11px] font-mono uppercase tracking-widest text-ink2 mt-3">annual value at stake</div>
              <div className="mt-4 inline-flex items-center gap-1.5 text-[10px] font-mono uppercase tracking-widest" style={{ color: conf.color }}>
                <span className="w-1.5 h-1.5 rounded-full" style={{ background: conf.color }} />{conf.tier} confidence
              </div>
            </div>
            <div className="grid grid-cols-3 gap-6 mb-12">
              {[
                { label: 'Cost of Delay', value: fmtMoney(analysis?.monthlyDelay || 0) + '/mo' },
                { label: 'Payback', value: fmtMonths(analysis?.payback) },
                { label: 'BCR', value: fmtMultiple(analysis?.bcr) }
              ].map(s => (
                <div key={s.label} className="text-center">
                  <div className="font-display text-2xl text-ink">{s.value}</div>
                  <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mt-1">{s.label}</div>
                </div>
              ))}
            </div>
            <div className="grid grid-cols-2 gap-6 mb-10">
              <div>
                <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-3">What's working</div>
                <div className="space-y-2">
                  {scenarios.length === 0 && <div className="text-[11px] font-mono text-ink3 italic">No mechanisms loaded.</div>}
                  {scenarios.map(s => {
                    const per = analysis?.perScenario?.find(p => p.scenario_id === s.scenario_id);
                    const glyph = !s.active ? { icon: '○', color: '#444' } : per?.pool_shadow ? { icon: '◐', color: '#888' } : { icon: '✓', color: '#86efac' };
                    return (
                      <div key={s.scenario_id} className="flex items-center justify-between text-sm">
                        <div className="flex items-center gap-2 truncate">
                          <span style={{ color: glyph.color }}>{glyph.icon}</span>
                          <span className={s.active ? 'text-ink' : 'text-ink3'}>{s.mechanism_label || s.scenario_label || s.scenario_id}</span>
                        </div>
                        <span className={`font-mono text-xs ${s.active && !per?.pool_shadow ? 'text-red' : 'text-ink3'}`}>{fmtMoney(per?.arv || 0)}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div>
                <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-3">What to do next</div>
                <div className="border-l-2 border-red bg-surface p-4">
                  <div className="font-display text-base text-ink mb-1">{next.headline}</div>
                  <div className="text-[12px] text-ink2 mb-3 leading-relaxed">{next.body}</div>
                  <button className="bg-red hover:bg-red/90 text-white px-3 py-1.5 text-[11px] font-mono uppercase tracking-wider">{next.cta}</button>
                </div>
              </div>
            </div>
            <div className="grid grid-cols-4 gap-4 pt-6 border-t border-border1 text-center">
              <div><div className="font-display text-lg text-ink">{governed}%</div><div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mt-1">Completeness</div></div>
              <div><div className="font-display text-sm text-ink">{evMix.Strong}<span className="text-ink3">/</span>{evMix.Moderate}<span className="text-ink3">/</span>{evMix.Weak}</div><div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mt-1">Strong / Mod / Weak</div></div>
              <div><div className="font-display text-sm text-ink">{bundle.snapshots?.[0] ? fmtRelative(bundle.snapshots[0].created_at) : 'never'}</div><div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mt-1">Last Snapshot</div></div>
              <div><div className="font-display text-lg text-ink">{scenarios.filter(s => s.active).length}<span className="text-ink3">/{scenarios.length}</span></div><div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mt-1">Scenarios</div></div>
            </div>
          </div>
        </main>
      );
    }

    function CenterSurface({ tab, bundle, scenarios, analysis, governed, tier, values, onToggleScenario, onSlide, onCommit, onPreset }) {
      if (tab === 'overview')  return <OverviewTab bundle={bundle} scenarios={scenarios} analysis={analysis} governed={governed} />;
      if (tab === 'scenarios') return <ScenariosTab scenarios={scenarios} analysis={analysis} onToggle={onToggleScenario} />;
      if (tab === 'inputs')    return <InputsTab scenarios={scenarios} defs={bundle.defs} values={values} tier={tier} onSlide={onSlide} onCommit={onCommit} onPreset={onPreset} />;
      return (
        <main className="flex-1 overflow-auto">
          <div className="p-8 font-mono text-xs text-ink2">[ {tab.toUpperCase()} TAB — chunk W{tab === 'outputs' ? 10 : 12} ]</div>
        </main>
      );
    }

    function RightDrawer({ open, onClose, tab }) {
      if (!open) return null;
      return (
        <aside className="w-[300px] bg-surface border-l border-border1 flex flex-col flex-shrink-0">
          <div className="h-11 px-4 border-b border-border1 flex items-center justify-between flex-shrink-0">
            <div className="font-mono text-[10px] uppercase tracking-widest text-ink2">Meridian · claude-sonnet-4</div>
            <button onClick={onClose} className="text-ink3 hover:text-red text-sm">×</button>
          </div>
          <div className="p-4 text-[11px] font-mono text-ink3 italic">[ chunk W12 ]</div>
        </aside>
      );
    }

    function EngagementShell({ engagementId, onBack }) {
      const [bundle, setBundle] = useState(null);
      const [overrides, setOverrides] = useState({});
      const [activeOverrides, setActiveOverrides] = useState({});
      const [tab, setTab] = useState('overview');
      const [tier, setTier] = useState('typical');
      const [drawerOpen, setDrawerOpen] = useState(false);
      const [err, setErr] = useState('');
      useEffect(() => {
        setBundle(null); setOverrides({}); setActiveOverrides({}); setErr('');
        loadEngagementBundle(engagementId).then(b => {
          if (!b) setErr('Engagement not found');
          else setBundle(b);
        }).catch(e => setErr(e.message || 'Failed to load engagement'));
      }, [engagementId]);
      const values = useMemo(() => ({ ...(bundle?.values || {}), ...overrides }), [bundle, overrides]);
      const scenarios = useMemo(() => {
        const merged = bundle ? mergeScenarios(bundle.scenarios, bundle.selections) : [];
        return merged.map(s => activeOverrides[s.scenario_id] != null ? { ...s, active: activeOverrides[s.scenario_id] } : s);
      }, [bundle, activeOverrides]);
      const analysis = useMemo(() => bundle ? computeAnalysis(scenarios, values, bundle.defs) : null, [bundle, scenarios, values]);
      const governed = useMemo(() => bundle ? governedPct(values, bundle.defs) : 0, [bundle, values]);
      const savedAgo = useMemo(() => bundle ? 'saved ' + fmtRelative(bundle.snapshots?.[0]?.created_at || bundle.engagement?.intake_date) : '', [bundle]);
      const slideInput = (key, val) => setOverrides(p => ({ ...p, [key]: { ...(p[key] || bundle.values?.[key] || {}), engagement_id: engagementId, input_key: key, provided_value: val, value_source: 'buyer' } }));
      const commitInput = async (key, val) => {
        try { await sbUpsert('vef_input_values', { engagement_id: engagementId, input_key: key, provided_value: val, value_source: 'buyer' }, 'engagement_id,input_key'); }
        catch (e) { console.error('input persist failed', e); }
      };
      const cycleTier = () => setTier(t => t === 'conservative' ? 'typical' : t === 'typical' ? 'aggressive' : 'conservative');
      const toggleScenario = async (scenarioId, isActive) => {
        setActiveOverrides(p => ({ ...p, [scenarioId]: isActive }));
        try { await sbUpsert('vef_scenario_selections', { engagement_id: engagementId, scenario_id: scenarioId, is_active: isActive }, 'engagement_id,scenario_id'); }
        catch (e) { console.error('scenario toggle persist failed', e); }
      };
      const applyPreset = async (newTier) => {
        if (!bundle?.defs) return;
        setTier(newTier);
        const tierKey = newTier === 'conservative' ? 'conservative_value' : newTier === 'aggressive' ? 'aggressive_value' : 'typical_value';
        const next = {};
        bundle.defs.forEach(d => {
          const v = d[tierKey] ?? d.typical_value ?? d.default_value;
          if (v != null) next[d.input_key] = { engagement_id: engagementId, input_key: d.input_key, provided_value: Number(v), value_source: 'preset:' + newTier };
        });
        setOverrides(next);
        try {
          await Promise.all(Object.values(next).map(row => sbUpsert('vef_input_values', row, 'engagement_id,input_key')));
        } catch (e) { console.error('preset persist failed', e); }
      };
      if (err) return <div className="p-12 font-mono text-xs text-red">{err} <button onClick={onBack} className="ml-4 text-ink2 hover:text-red">← Back</button></div>;
      if (!bundle) return <div className="min-h-full grid place-items-center text-ink2 font-mono text-xs">Loading engagement…</div>;
      return (
        <div className="h-full flex flex-col bg-bg">
          <Topbar engagement={bundle.engagement} domain={bundle.domain} analysis={analysis} onBack={onBack} onToggleMeridian={() => setDrawerOpen(o => !o)} drawerOpen={drawerOpen} />
          <ContextBar engagement={bundle.engagement} domain={bundle.domain} scenarios={scenarios} tier={tier} onTierCycle={cycleTier} governed={governed} savedAgo={savedAgo} />
          <div className="flex-1 flex min-h-0">
            <LeftRail tab={tab} onTab={setTab} scenarios={scenarios} defs={bundle.defs} values={values} analysis={analysis} onSlide={slideInput} onCommit={commitInput} />
            <CenterSurface tab={tab} bundle={bundle} scenarios={scenarios} analysis={analysis} governed={governed} tier={tier} values={values} onToggleScenario={toggleScenario} onSlide={slideInput} onCommit={commitInput} onPreset={applyPreset} />
            <RightDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)} tab={tab} />
          </div>
        </div>
      );
    }

    /* ---------- APP ROOT ---------- */
    function App() {
      const { user, ready, signIn, signOut } = useAuth();
      const [activeId, setActiveId] = useState(null);
      useEffect(() => {
        const eng = new URLSearchParams(location.search).get('engagement');
        if (eng) setActiveId(eng);
      }, []);
      if (!ready) {
        return <div className="min-h-full grid place-items-center text-ink2 font-mono text-xs">Loading…</div>;
      }
      if (!user) return <LoginScreen onSignIn={signIn} />;
      if (activeId) return <EngagementShell engagementId={activeId} onBack={() => setActiveId(null)} signOut={signOut} />;
      return <HomeScreen onOpen={setActiveId} onNew={() => { location.href = 'vef2.html'; }} signOut={signOut} userEmail={user.email} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
