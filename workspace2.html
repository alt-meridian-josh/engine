    /* ---------- DB HELPERS ---------- */
    async function sbSelect(table, q) {
      let b = sb.from(table).select('*');
      if (q?.eq) Object.entries(q.eq).forEach(([k, v]) => b = b.eq(k, v));
      if (q?.in) Object.entries(q.in).forEach(([k, vs]) => b = b.in(k, vs));
      if (q?.order) b = b.order(q.order[0], { ascending: q.order[1] !== false });
      if (q?.limit) b = b.limit(q.limit);
      const { data, error } = await b;
      if (error) throw error;
      return data || [];
    }
    async function sbInsert(table, row) {
      const { data, error } = await sb.from(table).insert(row).select();
      if (error) throw error;
      return data?.[0] || null;
    }
    async function sbUpsert(table, row, onConflict) {
      const { data, error } = await sb.from(table).upsert(row, onConflict ? { onConflict } : {}).select();
      if (error) throw error;
      return data?.[0] || null;
    }
    async function sbUpdate(table, patch, q) {
      let b = sb.from(table).update(patch);
      if (q?.eq) Object.entries(q.eq).forEach(([k, v]) => b = b.eq(k, v));
      const { data, error } = await b.select();
      if (error) throw error;
      return data || [];
    }

    /* ---------- LOADERS ---------- */
    async function loadDomains() {

    // RFID fallback: synthetic ids like WH-RFD have no scenarios/inputs of their own;
    // retry against canonical 'RFD'. (Mirrors workspace.html v1 line 1340.)
    async function loadScenariosForDomain(domainId, domain) {
      let scens = await sbSelect('vef_value_scenarios', { eq: { domain_id: domainId } }).catch(() => []);
      if (!scens.length && domain?.technology === 'RFID' && domainId !== 'RFD') {

    async function loadInputDefinitions(domainId, domain) {
      let rows = await sbSelect('vef_input_definitions', { eq: { domain_id: domainId } }).catch(() => []);
      if (!rows.length && domain?.technology === 'RFID' && domainId !== 'RFD') {
        rows = await sbSelect('vef_input_definitions', { eq: { domain_id: 'RFD' } }).catch(() => []);

    async function loadEngagementBundle(engagementId) {
      const rows = await sbSelect('vef_engagements', { eq: { engagement_id: engagementId }, limit: 1 });
      const eng = rows[0];
      if (!eng) return null;
      const domains = await loadDomains();
      const domain = domains[eng.domain_id];
      const [selections, scenarios, defs, values, snapshots, evidence, signals] = await Promise.all([
        loadScenarioSelections(eng.engagement_id),
        loadScenariosForDomain(eng.domain_id, domain),
        loadInputDefinitions(eng.domain_id, domain),
        loadInputValues(eng.engagement_id),
        loadSnapshots(eng.engagement_id),
        loadEvidence(eng.domain_id),
        loadValueSignals(eng.domain_id)
      ]);
      return { engagement: eng, domain, domains, selections, scenarios, defs, values, snapshots, evidence, signals };
    }

    /* ---------- FORMULA ENGINE ---------- */
    const RAMPS = [0.5, 1.0, 1.0];   // Y1 50% adoption, Y2/Y3 full
    const DISCOUNT = 0.10;

    function evalFormula(formula, inputs) {
      if (!formula || typeof formula !== 'string') return null;
      const keys = Object.keys(inputs || {});
      const vals = keys.map(k => {
        const v = inputs[k];
        return (v == null || isNaN(Number(v))) ? 0 : Number(v);
      });
      try {
        const fn = new Function(...keys, '"use strict"; return (' + formula + ');');
        const r = fn(...vals);
        return (typeof r === 'number' && isFinite(r)) ? r : null;
      } catch (_) { return null; }
    }

    // Flatten {input_key:{provided_value:N}} → {input_key:N}; falls back to typical/default.
    function resolvedInputs(inputsMap, inputDefs) {
      const out = {};
      (inputDefs || []).forEach(d => {
        const p = inputsMap?.[d.input_key]?.provided_value;
        out[d.input_key] = p != null ? Number(p) : Number(d.typical_value ?? d.default_value ?? 0);
      });
      return out;
    }

    // Pool-share guard: in each value_theme, only the highest-ARV active scenario contributes.
    function computeAnalysis(scenarios, inputsMap, inputDefs) {
      const inputs = resolvedInputs(inputsMap, inputDefs);
      const per = (scenarios || []).map(s => {
        const arv = evalFormula(s.value_scenario_formula, inputs) || 0;
        const delay = evalFormula(s.delay_cost_formula, inputs) || (arv / 12);
        const coi = evalFormula(s.cost_of_inaction_formula, inputs) || (arv * 3);
        return { scenario_id: s.scenario_id, theme: s.value_theme || 'other', active: !!s.active, arv, delay, coi, pool_shadow: false };
      });
      const best = {};
      per.filter(p => p.active).forEach(p => { if (!best[p.theme] || p.arv > best[p.theme].arv) best[p.theme] = p; });
      per.forEach(p => { if (p.active && best[p.theme] && best[p.theme].scenario_id !== p.scenario_id) p.pool_shadow = true; });
      const counted = per.filter(p => p.active && !p.pool_shadow);
      const arvFull = counted.reduce((s, p) => s + p.arv, 0);
      const arvY1 = arvFull * RAMPS[0], arvY2 = arvFull * RAMPS[1], arvY3 = arvFull * RAMPS[2];
      const monthlyDelay = counted.reduce((s, p) => s + p.delay, 0);
      const coi3yr = counted.reduce((s, p) => s + p.coi, 0);
      const impl = Number(inputsMap?.implementation_cost?.provided_value) || 0;
      const npv = impl > 0 ? arvY1 + arvY2 / (1 + DISCOUNT) + arvY3 / (1 + DISCOUNT) ** 2 - impl : null;
      const payback = impl > 0 && arvY1 > 0 ? impl / (arvY1 / 12) : null;
      const bcr = impl > 0 ? (arvY1 + arvY2 + arvY3) / impl : null;
      return { arvY1, arvY2, arvY3, arvFull, monthlyDelay, coi3yr, npv, payback, bcr, perScenario: per, impl };
    }

    /* ---------- FORMAT HELPERS ---------- */
    function fmtMoney(n) {
      if (n == null || !isFinite(n)) return '—';
      const a = Math.abs(n);
      if (a >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
      if (a >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
      if (a >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
      return '$' + Math.round(n).toLocaleString();
    }
    const fmtPercent = (n, d = 0) => (n == null || !isFinite(n)) ? '—' : (n * 100).toFixed(d) + '%';
    const fmtMonths = (n) => (n == null || !isFinite(n)) ? '—' : n.toFixed(1) + ' mo';
    const fmtMultiple = (n) => (n == null || !isFinite(n)) ? '—' : n.toFixed(2) + 'x';
    function fmtDate(s) {
      if (!s) return '—';
      const d = new Date(s);
      return isNaN(d) ? s : d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }
    function fmtRelative(s) {
      if (!s) return '—';
      const ms = Date.now() - new Date(s).getTime();
      if (ms < 60_000) return 'just now';
      if (ms < 3_600_000) return Math.floor(ms / 60_000) + 'm ago';
      if (ms < 86_400_000) return Math.floor(ms / 3_600_000) + 'h ago';
      return Math.floor(ms / 86_400_000) + 'd ago';
    }

    /* ---------- STAGE + PHASE TRANSLATION (Rule 8: no DB language in UI) ---------- */
    // DB stage strings are lowercase; map to friendly verb-tense labels with tone.
    const STAGE_MAP = {
      'discovery':      { label: 'Discovery',  tone: 'blue'  },
      'validation':     { label: 'Validating', tone: 'blue'  },
      'proposal':       { label: 'Proposing',  tone: 'amber' },
      'finance review': { label: 'In Review',  tone: 'amber' },
      'closed won':     { label: 'Won',        tone: 'green' },
      'closed lost':    { label: 'Lost',       tone: 'ink'   }
    };
    const friendlyStage = (raw) => STAGE_MAP[(raw || '').toLowerCase()] || { label: raw || 'Draft', tone: 'ink' };
    // Phase fuzzy-match — DB uses things like "Discovery", "Pilot", "Deployment", "Expansion", "Renewal".
    function friendlyPhase(raw) {
      const lc = (raw || '').toLowerCase();
      if (lc.includes('pilot')) return { label: 'Piloting',  tone: 'amber' };
      if (lc.includes('deploy')) return { label: 'Deploying', tone: 'blue'  };
      if (lc.includes('expand')) return { label: 'Expanding', tone: 'green' };
      if (lc.includes('renew'))  return { label: 'Renewing',  tone: 'green' };
      if (lc.includes('discover') || lc.includes('explor')) return { label: 'Exploring', tone: 'ink' };
      return { label: raw || 'Exploring', tone: 'ink' };
    }
    // Tone → Tailwind class (used by both StageBadge and PhaseBadge in W4+).
    const TONE_BG = {
      blue:  'bg-blue/20 text-blue',
      amber: 'bg-amber/20 text-amber',
      green: 'bg-green/20 text-green',
      teal:  'bg-teal/20 text-teal',
      red:   'bg-red/20 text-red',
      ink:   'bg-surface2 text-ink2'
    };
    const ACTIVE_STAGES   = new Set(['discovery', 'validation', 'proposal', 'finance review']);
    const PILOT_PHASES    = new Set([]);  // matched via friendlyPhase('Piloting'); see isPilot()
    const isActive    = (e) => ACTIVE_STAGES.has((e?.deal_stage || '').toLowerCase()) && !((e?.engagement_status || '').toLowerCase().includes('completed'));
    const isPilot     = (e) => friendlyPhase(e?.phase).label === 'Piloting';
    const isCompleted = (e) => (e?.engagement_status || '').toLowerCase().includes('completed') || (e?.deal_stage || '').toLowerCase().startsWith('closed');

    /* ---------- TAG BEHAVIOR ENGINE (kept in sync with vef2.html) ---------- */
    // Tag → behavior config. Precedence Buyer lens > Motion > Environment.
    // Each tag declares only the slots it influences; resolveTagBehavior merges them.
    const TAG_BEHAVIOR = {
      finance_led:       { group: 'Buyer lens', tone: 'conservative', tierDefault: 'conservative', signalEmphasis: 'NPV',    signalSecondary: 'BCR',          rankBy: 'bcr' },
      ops_led:           { group: 'Buyer lens', tone: 'operational',  tierDefault: 'typical',      signalEmphasis: 'Y1 ARV', signalSecondary: 'Throughput',   rankBy: 'arv' },
      risk_led:          { group: 'Buyer lens', tone: 'conservative', tierDefault: 'conservative', signalEmphasis: 'CoI',    signalSecondary: 'Evidence',     rankBy: 'evidence' },
      rescue:            { group: 'Motion',     tone: 'urgent',       signalEmphasis: 'CoD',       rankBy: 'delay',          overrides: ['tone', 'signalEmphasis'] },
      new_footprint:     { group: 'Motion',     weakLast: true },
      compliance_driven: { group: 'Motion',     tierDefault: 'conservative', themeBias: ['Compliance & Risk'], autoActiveThemes: ['Compliance & Risk'], hideNonBiasedWeak: true },
      expansion:         { group: 'Motion' },
      physical_network:  { group: 'Environment', themeBias: ['Operational Efficiency', 'Inventory Accuracy', 'Throughput'] },
      field_fleet:       { group: 'Environment', themeBias: ['Asset Performance', 'Operational Efficiency'] },
      digital_platform:  { group: 'Environment', themeBias: ['Visibility', 'Intelligence'], deprioritize: ['Throughput', 'Operational Efficiency'] }
    };
    const TAG_PRECEDENCE = ['Buyer lens', 'Motion', 'Environment'];
    const TAG_SCALAR_FIELDS = ['tone', 'tierDefault', 'signalEmphasis', 'signalSecondary', 'rankBy'];
    const TAG_LIST_FIELDS   = ['themeBias', 'autoActiveThemes', 'deprioritize'];
    const TAG_BOOL_FIELDS   = ['weakLast', 'hideNonBiasedWeak'];

    // Merge selected tags into a single behavior object honoring precedence + overrides.
    // - scalar fields: highest-precedence tag's value wins; tags listing the field in
    //   `overrides` always replace regardless of precedence
    // - list fields: union, deduped
    // - boolean fields: OR
    function resolveTagBehavior(tagsSet) {
      const tags = [...(tagsSet || [])]
        .map(k => ({ key: k, ...(TAG_BEHAVIOR[k] || {}) }))
        .filter(t => t.group)
        .sort((a, b) => TAG_PRECEDENCE.indexOf(a.group) - TAG_PRECEDENCE.indexOf(b.group));
      const out = {};
      tags.forEach(t => TAG_SCALAR_FIELDS.forEach(f => { if (t[f] != null && out[f] == null) out[f] = t[f]; }));
      tags.forEach(t => (t.overrides || []).forEach(f => { if (t[f] != null) out[f] = t[f]; }));
      TAG_LIST_FIELDS.forEach(f => {
        const set = new Set();
        tags.forEach(t => (t[f] || []).forEach(v => set.add(v)));
        if (set.size) out[f] = [...set];
      });
      TAG_BOOL_FIELDS.forEach(f => { if (tags.some(t => t[f])) out[f] = true; });
      return out;
    }
    const getTone = (behavior) => behavior?.tone || 'operational';

    /* ---------- TONE_COPY — three tones, three surfaces ---------- */
    const TONE_COPY = {
      conservative: {
        heroSubtitle:    (outcome) => (outcome ? outcome.toLowerCase() + ' value' : 'Annual value') + ' defensible at NPV review',
        confidenceVerb:  'Defensible',
        nextActionVerbs: { send: 'send', schedule: 'schedule', strengthen: 'tighten' }

      operational: {

        confidenceVerb:  'Shippable',
        nextActionVerbs: { send: 'walk through', schedule: 'book', strengthen: 'firm up' }

      urgent: {

    // Parses 'TAGS: a, b, c' line stashed by vef2 createAnalysis (lesson 2026-04-24
    // — speculative fields stash into notes with labeled prefix). Returns a Set of
    // tag keys; gracefully empty when no line found.
    function parseTagsFromNotes(notes) {
      const set = new Set();
      const m = String(notes || '').match(/^TAGS:\s*(.+)$/m);
      if (!m) return set;
      m[1].split(',').map(t => t.trim()).filter(Boolean).forEach(t => {
        if (TAG_BEHAVIOR[t]) set.add(t);  // ignore unknown keys defensively
      });
      return set;
    }

    /* ---------- INTAKE SESSION HELPERS (kept in sync with intake.html) ---------- */
    // Session lives as one labeled JSON line in vef_engagements.notes — same sidecar
    // pattern as TAGS / outcomes / vendor claims (lesson 2026-04-24, no schema change).
    function parseIntakeSession(notes) {
      const m = String(notes || '').match(/^INTAKE_SESSION:(\{[\s\S]*?\})\s*(?:\n|$)/m);
      if (!m) return null;
      try { return JSON.parse(m[1]); } catch { return null; }
    }
    // Replace (or insert) the INTAKE_SESSION line; preserves all other notes content.
    async function writeIntakeSession(engagementId, currentNotes, sessionObj) {
      const stripped = String(currentNotes || '').replace(/^INTAKE_SESSION:\{[\s\S]*?\}\s*\n?/m, '').trim();
      const line = 'INTAKE_SESSION:' + JSON.stringify(sessionObj);
      const next = stripped ? stripped + '\n\n' + line : line;
      await sbUpdate('vef_engagements', { notes: next }, { eq: { engagement_id: engagementId } });
      return next;
    }
    // Generates a fresh session record. Token + session_id are unguessable UUIDs
    // (timestamp fallback for ancient browsers).
    function newIntakeSession({ shared_with_email, shared_with_role, curated_input_keys }) {
      const uuid = () => (crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2, 14));
      return {
        session_id: uuid(),
        share_token: uuid(),
        shared_with_email: shared_with_email || null,
        shared_with_role: shared_with_role || null,
        shared_at: new Date().toISOString(),
        expires_at: null,                      // v1: no expiry; future column-migration to add
        status: 'pending',                     // pending | in_progress | submitted | applied
        curated_input_keys: curated_input_keys || [],
        responses: {}                          // {input_key: {value, source, at}}
      };
    }
    // Curate up to N inputs the prospect can actually answer. Heuristic with seller override.
    // Order: discovery_prompt-equipped inputs ranked by ARV sensitivity; vendor/derived
    // inputs (implementation_cost, *_reduction_pct, rfid_*, vendor_*) blacklisted.
    // Hard cap defaults to 5 — completion rate beats coverage on a 5-minute mobile intake.
    function curateInputs(defs, scenarios, valuesMap, n = 5) {
      if (!defs?.length) return [];
      const blacklist = /^(implementation_cost|.*_reduction_pct|rfid_.*|vendor_.*)$/i;
      const asked = defs.filter(d => d.discovery_prompt && !blacklist.test(d.input_key));
      if (asked.length === 0) return [];
      // When the engagement has scenarios + values loaded, rank by sensitivity within the
      // discovery_prompt set. Otherwise fall back to print_priority asc.
      if (scenarios?.length && valuesMap) {
        const sensitive = topSensitiveInputs(scenarios, asked, valuesMap, n);
        if (sensitive.length >= n) return sensitive;
        const used = new Set(sensitive.map(d => d.input_key));
        const rest = asked.filter(d => !used.has(d.input_key));
        return [...sensitive, ...rest].slice(0, n);
      }
      return asked.slice().sort((a, b) => (Number(a.print_priority) || 99) - (Number(b.print_priority) || 99)).slice(0, n);
    }
    function buildShareLink(token) {
      const base = location.href.replace(/\/[^/]*(\?.*)?$/, '/');
      return base + 'intake.html?s=' + encodeURIComponent(token);
    }

    /* ---------- LOGIN — fake, no validation, no API ---------- */

            </div>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)}
              placeholder="email"
              className="w-full bg-surface2 border border-border px-3 py-2.5 mb-3 text-sm font-mono text-ink placeholder:text-ink3 focus:border-red outline-none" />
            <input type="password" value={password} onChange={e => setPassword(e.target.value)}
              placeholder="password"
              className="w-full bg-surface2 border border-border px-3 py-2.5 mb-6 text-sm font-mono text-ink placeholder:text-ink3 focus:border-red outline-none" />
            <button type="submit"
              className="w-full bg-red hover:bg-red/90 text-white py-2.5 text-sm font-display tracking-wide">
              Enter Workspace →
            </button>
            <div className="text-[11px] font-mono text-ink2 mt-10 italic text-center">
              Value belongs to mechanisms.
            </div>
          </form>
        </div>
      );
    }

    /* ---------- VOCAB + OUTCOMES ---------- */
    const OUTCOMES = [
      { key: 'Visibility',   color: '#93c5fd' },
      { key: 'Throughput',   color: '#fbbf24' },
      { key: 'Compliance',   color: '#c4b5fd' },
      { key: 'Risk',         color: '#f87171' },
      { key: 'Intelligence', color: '#5eead4' },
      { key: 'Performance',  color: '#86efac' },
      { key: 'Revenue',      color: '#6ee7b7' }
    ];
    const OUTCOME_BY = OUTCOMES.reduce((m, o) => (m[o.key] = o, m), {});
    const cleanDomainName = (n) => (n || '').replace(/^[A-Z][A-Z0-9]+\s+—\s+/, '');

    /* ---------- SHARED PRIMITIVES ---------- */
    function OutcomeDot({ outcome, size = 8 }) {
      const o = OUTCOME_BY[outcome];
      return <span className="inline-block rounded-full" style={{ background: o?.color || '#444', width: size, height: size }} />;
    }
    function StageBadge({ stage }) {
      const s = friendlyStage(stage);
      return <span className={`text-[10px] font-mono uppercase tracking-wider px-1.5 py-0.5 ${TONE_BG[s.tone]}`}>{s.label}</span>;
    }
    // Horizontal bar chart used by PipelineBars and elsewhere — Rule 5.
    function BarChart({ rows, max, format = (v) => v, height = 8 }) {
      const m = max || Math.max(...rows.map(r => r.value), 1);
      return (
        <div className="space-y-1.5">
          {rows.map(r => (
            <div key={r.key} className="grid grid-cols-12 gap-3 items-center">
              <div className="col-span-3 text-[10px] font-mono uppercase tracking-wider text-ink2 truncate">{r.label}</div>
              <div className="col-span-7 bg-surface2 relative" style={{ height }}>
                <div className="absolute inset-y-0 left-0" style={{ width: ((r.value / m) * 100) + '%', background: r.color || '#d63b2f' }} />
              </div>
              <div className="col-span-2 text-right font-mono text-[11px] text-ink">{format(r.value)}</div>
            </div>
          ))}
        </div>
      );
    }

    /* ---------- HOME SCREEN ---------- */
    function HomeScreen({ onOpen, onNew, signOut }) {
      const [engagements, setEngagements] = useState([]);
      const [domains, setDomains] = useState({});
      const [arvByEng, setArvByEng] = useState({});
      const [filter, setFilter] = useState('all');
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        (async () => {
          try {
            const [engs, doms, snaps] = await Promise.all([loadEngagements(), loadDomains(), loadAllSnapshots()]);
            setEngagements(engs); setDomains(doms);
            const by = {};
            snaps.forEach(s => { if (!by[s.engagement_id]) by[s.engagement_id] = Number(s.annual_value) || 0; });
            setArvByEng(by);
          } finally { setLoading(false); }
        })();
      }, []);
      const stats = useMemo(() => ({
        totalArv: engagements.reduce((s, e) => s + (arvByEng[e.engagement_id] || 0), 0),
        total: engagements.length,
        active: engagements.filter(isActive).length,
        pilot: engagements.filter(isPilot).length
      }), [engagements, arvByEng]);
      // Pipeline distribution: sum ARV per outcome — feeds PipelineBars (Rule 5).
      const byOutcome = useMemo(() => {
        const acc = {};
        engagements.forEach(e => {
          const oc = domains[e.domain_id]?.primary_outcome;
          if (!oc) return;
          acc[oc] = (acc[oc] || 0) + (arvByEng[e.engagement_id] || 0);
        });
        return Object.entries(acc).map(([k, v]) => ({ key: k, label: k, value: v, color: OUTCOME_BY[k]?.color || '#888' }))
          .sort((a, b) => b.value - a.value);
      }, [engagements, domains, arvByEng]);
      const counts = { all: engagements.length, active: engagements.filter(isActive).length, pilot: engagements.filter(isPilot).length, complete: engagements.filter(isCompleted).length };
      const filterFn = { all: () => true, active: isActive, pilot: isPilot, complete: isCompleted }[filter];
      const rows = useMemo(() => engagements.filter(filterFn).slice().sort((a, b) => (arvByEng[b.engagement_id] || 0) - (arvByEng[a.engagement_id] || 0)), [engagements, filter, arvByEng]);
      return (
        <div className="min-h-full bg-bg">
          <header className="h-12 px-4 sm:px-6 border-b border-border flex items-center justify-between bg-surface">
            <div className="font-display text-lg tracking-wide"><span className="text-red">ALT</span> <span className="text-ink">MERIDIAN</span></div>
            <div className="flex items-center gap-3 sm:gap-4">
              <button onClick={onNew} className="bg-red hover:bg-red/90 text-white px-3 py-1.5 text-xs font-display tracking-wide">+ New Analysis</button>
              <button onClick={signOut} className="text-[11px] font-mono text-ink2 hover:text-red hidden sm:block">Sign out</button>
            </div>
          </header>
          <main className="max-w-[1200px] mx-auto px-4 sm:px-6 py-8">
            <div className="flex flex-wrap items-baseline gap-x-6 gap-y-2 mb-10">
              <div className="font-display font-bold text-red leading-none" style={{ fontSize: '32px' }}>{fmtMoney(stats.totalArv)}</div>
              <div className="text-[11px] font-mono uppercase tracking-widest text-ink2">portfolio ARV</div>
              <div className="text-[11px] font-mono uppercase tracking-widest text-ink3">·</div>
              <div className="text-[11px] font-mono uppercase tracking-widest text-ink2">{stats.total} <span className="text-ink3">analyses</span></div>
              <div className="text-[11px] font-mono uppercase tracking-widest text-ink2">{stats.active} <span className="text-ink3">active</span></div>
              <div className="text-[11px] font-mono uppercase tracking-widest text-ink2">{stats.pilot} <span className="text-ink3">in pilot</span></div>
            </div>
            {byOutcome.length > 0 && (
              <div className="mb-10">
                <div className="text-[10px] font-mono uppercase tracking-widest text-ink3 mb-3">Where value sits</div>
                <BarChart rows={byOutcome} format={fmtMoney} height={10} />
              </div>
            )}
            <div className="flex items-center gap-5 sm:gap-6 border-b border-border mb-3 overflow-x-auto">
              {[['all','All'],['active','Validating'],['pilot','Piloting'],['complete','Complete']].map(([k, label]) => (
                <button key={k} onClick={() => setFilter(k)}
                  className={`pb-2 text-[11px] font-mono uppercase tracking-widest transition-colors border-b-2 -mb-px whitespace-nowrap ${filter === k ? 'text-red border-red' : 'text-ink2 border-transparent hover:text-ink'}`}>
                  {label} <span className="text-ink3 ml-1">{counts[k]}</span>
                </button>
              ))}
            </div>
            {loading ? (
              <div className="py-16 text-center text-ink2 font-mono text-xs">Loading…</div>
            ) : rows.length === 0 ? (
              <div className="py-16 text-center text-ink2 font-mono text-xs">No analyses match this filter.</div>
            ) : (
              <div>
                {rows.map(e => {
                  const d = domains[e.domain_id];
                  const arv = arvByEng[e.engagement_id] || 0;
                  const stage = friendlyStage(e.deal_stage);
                  const phase = friendlyPhase(e.phase);
                  return (
                    <button key={e.engagement_id} onClick={() => onOpen(e.engagement_id)}
                      className="w-full text-left grid grid-cols-12 gap-3 items-center px-3 py-3 border-b border-border border-l-2 border-l-transparent hover:border-l-red hover:bg-red-dim transition-colors">
                      <div className="col-span-1 sm:col-span-1 flex justify-center"><OutcomeDot outcome={d?.primary_outcome} size={10} /></div>
                      <div className="col-span-8 sm:col-span-7 min-w-0">
                        <div className="text-sm text-ink truncate">{e.vendor_name || 'Untitled'} <span className="text-ink3">→</span> {e.prospect_name || '—'}</div>
                        <div className="text-[11px] font-mono text-ink3 mt-0.5 truncate">{cleanDomainName(d?.domain_name) || '—'} · {stage.label} · {phase.label} · {fmtRelative(e.intake_date)}</div>
                      </div>
                      <div className={`col-span-3 sm:col-span-4 text-right font-display font-bold ${arv > 0 ? 'text-red' : 'text-ink3'}`} style={{ fontSize: '18px' }}>{arv > 0 ? fmtMoney(arv) : '—'}</div>
                    </button>
                  );
                })}
              </div>
            )}
          </main>
        </div>
      );
    }

    /* ---------- ANALYSIS HELPERS ---------- */
    function mergeScenarios(scenarios, selections) {
      return (scenarios || []).map(s => {
        const sel = (selections || []).find(x => x.scenario_id === s.scenario_id);
        return { ...s, active: sel ? sel.is_active !== false : !!s.active_by_default };
      });
    }
    function governedPct(values, defs) {
      if (!defs?.length) return 0;
      const provided = defs.filter(d => values?.[d.input_key]?.provided_value != null).length;
      return Math.round((provided / defs.length) * 100);
    }
    function confidenceTier(scenarios) {
      const active = (scenarios || []).filter(s => s.active);
      if (!active.length) return { tier: 'EXPLORATORY', pct: 25, color: '#888' };
      const t = { Strong: 0, Moderate: 0, Weak: 0 };
      active.forEach(s => { const e = s.evidence_strength || 'Moderate'; if (t[e] != null) t[e]++; });
      const score = (t.Strong + t.Moderate * 0.6 + t.Weak * 0.3) / active.length;
      if (score >= 0.75) return { tier: 'STRONG', pct: 90, color: '#86efac' };
      if (score >= 0.45) return { tier: 'MODERATE', pct: 60, color: '#fbbf24' };
      return { tier: 'EXPLORATORY', pct: 30, color: '#888' };
    }
    function topSensitiveInputs(scenarios, defs, valuesMap, n = 3) {
      if (!defs?.length || !scenarios?.length) return [];
      const base = computeAnalysis(scenarios, valuesMap, defs).arvFull;
      return defs.filter(d => d.input_key !== 'implementation_cost').map(d => {
        const cur = Number(valuesMap?.[d.input_key]?.provided_value ?? d.typical_value ?? d.default_value ?? 0);
        const probe = cur === 0 ? 1 : cur * 1.2;
        const probed = { ...valuesMap, [d.input_key]: { ...(valuesMap?.[d.input_key] || {}), provided_value: probe } };
        return { def: d, delta: Math.abs(computeAnalysis(scenarios, probed, defs).arvFull - base) };
      }).filter(x => x.delta > 0).sort((a, b) => b.delta - a.delta).slice(0, n).map(x => x.def);
    }

    /* ---------- SLIDER + SOURCE CHIP ---------- */
    function Slider({ value, min, max, step, onChange, onCommit }) {
      const commit = () => onCommit?.(Number(value));
      return (
        <input type="range" value={value} min={min} max={max} step={step}
          onChange={e => onChange(Number(e.target.value))}
          onMouseUp={commit} onTouchEnd={commit} onKeyUp={commit}
          className="w-full h-1 accent-red bg-border cursor-pointer" />
      );
    }
    function SourceDot({ source }) {
      const isBuyer = source && source !== 'default';
      return <span className="inline-block w-1.5 h-1.5 rounded-full" title={isBuyer ? 'Buyer-confirmed' : 'Default'} style={{ background: isBuyer ? '#86efac' : '#444' }} />;
    }

    /* ---------- LIVE ASSUMPTIONS RAIL ---------- */
    function LiveAssumptions({ scenarios, defs, values, analysis, onSlide, onCommit, tone }) {
      const top = useMemo(() => topSensitiveInputs(scenarios, defs, values, 3), [scenarios, defs, values]);
      const conf = useMemo(() => confidenceTier(scenarios), [scenarios]);
      return (
        <div className="px-4 py-4 border-t border-border">
          <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mb-3">Live Assumptions</div>
          {top.length === 0 ? (
            <div className="text-[11px] font-mono text-ink3 italic">No sensitivity signal yet.</div>
          ) : (
            <div className="space-y-3">
              {top.map(d => {
                const iv = values?.[d.input_key];
                const cur = Number(iv?.provided_value ?? d.typical_value ?? d.default_value ?? 0);
                const min = Number(d.min_value ?? 0);
                const max = Number(d.max_value ?? Math.max(cur * 2, 1000));
                const step = Number(d.step_value ?? Math.max((max - min) / 100, 0.01));
                return (
                  <div key={d.input_key}>
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-[10px] text-ink2 truncate">{d.input_label || d.input_key.replace(/_/g, ' ')}</span>
                      <SourceDot source={iv?.value_source} />
                    </div>
                    <Slider value={cur} min={min} max={max} step={step}
                      onChange={(v) => onSlide(d.input_key, v)} onCommit={(v) => onCommit(d.input_key, v)} />
                    <div className="text-[11px] font-mono text-ink mt-0.5">{cur.toLocaleString(undefined, { maximumFractionDigits: 2 })}</div>
                  </div>
                );
              })}
            </div>
          )}
          <div className="pt-3 mt-4 border-t border-border">
            <div className="font-display font-bold text-red leading-none" style={{ fontSize: '24px' }}>{fmtMoney(analysis?.arvY1 || 0)}</div>
            <div className="mt-1.5 inline-flex items-center gap-1.5 text-[9px] font-mono uppercase tracking-widest" style={{ color: conf.color }}>
              <span className="w-1.5 h-1.5 rounded-full" style={{ background: conf.color }} />{TONE_COPY[tone || 'operational'].confidenceVerb} · {conf.tier}
            </div>
          </div>
        </div>
      );
    }

    /* ---------- OVERVIEW TAB ---------- */
    /* ---------- NEXT ACTION RULES (A6) ---------- */
    // Each rule may produce 0-1 actions; pickNextActions returns top N by priority,
    // deduped by target tab so we never stack two "Open Outputs" cards back to back.
    const NEXT_ACTION_RULES = [
      // Tag-driven (highest)
      { id: 'rescue-quantify-delay', priority: 100,
        when: ({ tags }) => tags.has('rescue'),
        build: ({ analysis }) => ({ headline: 'Quantify cost of delay this quarter', body: `Every month costs ${fmtMoney(analysis?.monthlyDelay || 0)}.`, cta: 'Open Outputs', target: 'outputs' })
      },
      { id: 'finance-validating-npv', priority: 90,
        when: ({ tags, stage }) => tags.has('finance_led') && stage === 'validation',
        build: ({ analysis, engagement }) => ({ headline: 'Send NPV sensitivity', body: engagement.champion_email ? `Walk ${engagement.champion_email} through the ${fmtMoney(analysis?.npv)} NPV.` : `Surface NPV swing under each tier.`, cta: 'Open Outputs', target: 'outputs' })
      },
      { id: 'risk-proposing-objections', priority: 88,
        when: ({ tags, stage }) => tags.has('risk_led') && stage === 'proposal',
        build: () => ({ headline: 'Add objection responses', body: 'CFO hits on the weakest scenarios first.', cta: 'Open Scenarios', target: 'scenarios' })
      },
      { id: 'compliance-confirm-scope', priority: 85,
        when: ({ tags }) => tags.has('compliance_driven'),
        build: () => ({ headline: 'Confirm regulatory scope', body: 'Lock the rule set before pricing the engine.', cta: 'Open Inputs', target: 'inputs' })
      },
      // ARV-banded
      { id: 'arv-exec-sponsor', priority: 78,
        when: ({ analysis }) => (analysis?.arvY1 || 0) > 5_000_000,
        build: () => ({ headline: 'Recommend exec sponsor', body: '>$5M Y1 ARV — exec sign-off shortens the path.', cta: 'Open Outputs', target: 'outputs' })
      },
      { id: 'arv-confirm-scope', priority: 75,
        when: ({ analysis }) => { const v = analysis?.arvY1 || 0; return v > 0 && v < 250_000; },
        build: () => ({ headline: 'Confirm scope', body: 'Y1 ARV under $250K — small ARV may not warrant the full engine.', cta: 'Open Scenarios', target: 'scenarios' })
      },
      // Stage defaults
      { id: 'stage-discovery',  priority: 60, when: ({ stage }) => stage === 'discovery',     build: () => ({ headline: 'Gather buyer inputs',       body: 'Discovery — capture buyer assumptions before they go stale.', cta: 'Open Inputs',    target: 'inputs' }) },
      { id: 'stage-validating', priority: 60, when: ({ stage }) => stage === 'validation',    build: () => ({ headline: 'Strengthen assumptions',    body: 'Validating — pressure-test the inputs that move ARV most.',  cta: 'Open Inputs',    target: 'inputs' }) },
      { id: 'stage-proposing',  priority: 60, when: ({ stage }) => stage === 'proposal',      build: () => ({ headline: 'Prepare the value story',   body: 'Proposing — shortlist the strongest 3 mechanisms.',          cta: 'Open Scenarios', target: 'scenarios' }) },
      { id: 'stage-review',     priority: 60, when: ({ stage }) => stage === 'finance review',build: () => ({ headline: 'Defend the financial case', body: 'In review — line up objection responses + NPV.',             cta: 'Open Outputs',   target: 'outputs' }) },
      { id: 'stage-won',        priority: 60, when: ({ stage }) => stage === 'closed won',    build: () => ({ headline: 'Save baseline snapshot',     body: 'Won — capture the as-sold state for renewals.',              cta: 'Save Snapshot',  target: 'snapshots' }) },
      { id: 'stage-lost',       priority: 60, when: ({ stage }) => stage === 'closed lost',   build: () => ({ headline: 'Capture the loss reason',   body: 'Lost — archive what to do differently next time.',           cta: 'Save Snapshot',  target: 'snapshots' }) },
      // Existing fallbacks
      { id: 'low-completeness', priority: 50, when: ({ governed }) => governed < 40,                          build: ({ governed }) => ({ headline: 'Gather buyer inputs', body: `Only ${governed}% buyer-confirmed.`,                                            cta: 'Open Inputs',    target: 'inputs' }) },
      { id: 'no-active',        priority: 48, when: ({ scenarios }) => !scenarios.some(s => s.active),         build: () => ({ headline: 'Activate a mechanism', body: 'No mechanisms active — ARV is $0.',                                                       cta: 'Open Scenarios', target: 'scenarios' }) },
      { id: 'weak-evidence',    priority: 45, when: ({ scenarios }) => scenarios.some(s => s.active && (s.evidence_strength || '') === 'Weak'),
                                              build: ({ scenarios }) => ({ headline: 'Strengthen weak evidence', body: `${scenarios.filter(s => s.active && s.evidence_strength === 'Weak').length} active on weak proof.`, cta: 'Open Scenarios', target: 'scenarios' }) },
      { id: 'no-snapshots',     priority: 40, when: ({ snapshots }) => !snapshots?.length,                    build: () => ({ headline: 'Save the baseline snapshot', body: 'Capture this state as a reference point.',                                          cta: 'Save Snapshot',  target: 'snapshots' }) }
    ];
    function pickNextActions(ctx, n = 3) {
      const fired = NEXT_ACTION_RULES.filter(r => r.when(ctx));
      const sorted = fired.sort((a, b) => b.priority - a.priority).map(r => ({ id: r.id, ...r.build(ctx) }));
      const seenTarget = new Set();
      return sorted.filter(a => seenTarget.has(a.target) ? false : (seenTarget.add(a.target), true)).slice(0, n);
    }
    function MechanismRow({ scenario, perScenario }) {
      const glyph = !scenario.active ? { icon: '○', color: '#444' } : perScenario?.pool_shadow ? { icon: '◐', color: '#888' } : { icon: '✓', color: '#86efac' };
      return (
        <div className="flex items-center justify-between py-1.5 text-sm">
          <div className="flex items-center gap-2 min-w-0">
            <span className="font-mono flex-shrink-0" style={{ color: glyph.color }}>{glyph.icon}</span>
            <span className={`truncate ${scenario.active ? 'text-ink' : 'text-ink3'}`}>{scenario.mechanism_label || scenario.scenario_label || scenario.scenario_id}</span>
          </div>
          <span className={`font-mono text-xs flex-shrink-0 ml-3 ${scenario.active && !perScenario?.pool_shadow ? 'text-red' : 'text-ink3'}`}>{fmtMoney(perScenario?.arv || 0)}</span>
        </div>
      );
    }
    function HealthBar({ governed, evMix, snapshots, scenarios }) {
      const total = evMix.Strong + evMix.Moderate + evMix.Weak;
      return (
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-6 pt-6 border-t border-border">
          <div>
            <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mb-2">Completeness</div>
            <div className="font-display text-base text-ink mb-1">{governed}%</div>
            <div className="h-1 bg-surface2 relative"><div className="absolute inset-y-0 left-0 bg-red" style={{ width: governed + '%' }} /></div>
          </div>
          <div>
            <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mb-2">Evidence mix</div>
            <div className="font-display text-base text-ink mb-1">{evMix.Strong}<span className="text-ink3">/</span>{evMix.Moderate}<span className="text-ink3">/</span>{evMix.Weak}</div>
            {total > 0 && (
              <div className="flex h-1 w-full">
                <div style={{ width: ((evMix.Strong / total) * 100) + '%', background: '#86efac' }} />
                <div style={{ width: ((evMix.Moderate / total) * 100) + '%', background: '#fbbf24' }} />
                <div style={{ width: ((evMix.Weak / total) * 100) + '%', background: '#f87171' }} />
              </div>
            )}
          </div>
          <div>
            <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mb-2">Last snapshot</div>
            <div className="font-display text-base text-ink">{snapshots?.[0] ? fmtRelative(snapshots[0].created_at) : 'never'}</div>
          </div>
          <div>
            <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mb-2">Mechanisms</div>
            <div className="font-display text-base text-ink">{scenarios.filter(s => s.active).length}<span className="text-ink3">/{scenarios.length}</span></div>
          </div>
        </div>
      );
    }
    // Signal slot definitions; reordered per behavior.signalEmphasis.
    const OVERVIEW_SIGNALS = {
      'CoD':    (a) => ({ label: 'Cost of delay', value: fmtMoney(a?.monthlyDelay || 0), unit: '/mo' }),
      'NPV':    (a) => ({ label: 'NPV (10% discount)', value: a?.npv != null ? fmtMoney(a.npv) : '—', unit: '' }),
      'BCR':    (a) => ({ label: 'BCR', value: fmtMultiple(a?.bcr), unit: '' }),
      'Y1 ARV': (a) => ({ label: 'Y1 realized', value: fmtMoney(a?.arvY1 || 0), unit: '' }),
      'CoI':    (a) => ({ label: 'Cost of doing nothing (3yr)', value: fmtMoney(a?.coi3yr || 0), unit: '' }),
      'Payback':    (a) => ({ label: 'Payback', value: fmtMonths(a?.payback), unit: '' }),
      'Throughput': (a) => ({ label: 'BCR', value: fmtMultiple(a?.bcr), unit: '' }),  // throughput-as-secondary uses BCR proxy until throughput field exists
      'Evidence':   (a) => ({ label: 'BCR', value: fmtMultiple(a?.bcr), unit: '' })
    };
    function orderedSignals(behavior) {
      const seen = new Set();
      const seq = [behavior.signalEmphasis, behavior.signalSecondary, 'Payback', 'BCR', 'CoD']
        .filter(k => k && OVERVIEW_SIGNALS[k] && !seen.has(k) && (seen.add(k), true));
      return seq.slice(0, 3);
    }
    function OverviewTab({ bundle, scenarios, analysis, governed, onTab, tags, behavior, tone }) {
      const conf = useMemo(() => confidenceTier(scenarios), [scenarios]);
      const stage = (bundle.engagement?.deal_stage || '').toLowerCase();
      const actions = useMemo(() => pickNextActions({ governed, scenarios, snapshots: bundle.snapshots, conf, analysis, engagement: bundle.engagement, tags, stage }, 3),
                              [governed, scenarios, bundle.snapshots, bundle.engagement, conf, analysis, tags, stage]);
      const top = actions[0], rest = actions.slice(1);
      const evMix = useMemo(() => {
        const t = { Strong: 0, Moderate: 0, Weak: 0 };
        scenarios.filter(s => s.active).forEach(s => { const k = s.evidence_strength || 'Moderate'; if (t[k] != null) t[k]++; });
        return t;
      }, [scenarios]);
      const arv = analysis?.arvY1 || 0;
      const outcome = bundle.domain?.primary_outcome;
      const heroSub = TONE_COPY[tone].heroSubtitle(outcome);
      const confLine = TONE_COPY[tone].confidenceVerb;
      const signalKeys = orderedSignals(behavior);
      return (
        <div className="max-w-[920px] mx-auto px-6 sm:px-10 py-10">
          <div className="text-center mb-10">
            <div className={`font-display font-bold leading-none ${arv > 0 ? 'text-red' : 'text-ink3'}`} style={{ fontSize: '64px' }}>{fmtMoney(arv)}</div>
            <div className="text-[11px] font-mono uppercase tracking-widest text-ink2 mt-3">{heroSub}</div>
            <div className="mt-4 inline-flex items-center gap-1.5 text-[10px] font-mono uppercase tracking-widest" style={{ color: conf.color }}>
              <span className="w-1.5 h-1.5 rounded-full" style={{ background: conf.color }} />{confLine} — {conf.tier}
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3 sm:gap-6 mb-10">
            {signalKeys.map(k => {
              const s = OVERVIEW_SIGNALS[k](analysis);
              return (
                <div key={k} className="text-center">
                  <div className="font-display text-xl sm:text-2xl text-ink">{s.value}<span className="text-ink3 text-sm font-mono">{s.unit}</span></div>
                  <div className="text-[9px] sm:text-[10px] font-mono uppercase tracking-widest text-ink2 mt-1">{s.label}</div>
                </div>
              );
            })}
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div>
              <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mb-3">Active mechanisms</div>
              {scenarios.length === 0 ? <div className="text-[11px] font-mono text-ink3 italic">No mechanisms loaded.</div> :
                scenarios.map(s => <MechanismRow key={s.scenario_id} scenario={s} perScenario={analysis?.perScenario?.find(p => p.scenario_id === s.scenario_id)} />)}
            </div>
            <div>
              <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mb-3">What to do next</div>
              {top ? (
                <>
                  <div className="border-l-2 border-red bg-surface p-4">
                    <div className="font-display text-base text-ink mb-1.5">{top.headline}</div>
                    <div className="text-[12px] text-ink2 mb-3 leading-relaxed">{top.body}</div>
                    <button onClick={() => onTab(top.target)} className="bg-red hover:bg-red/90 text-white px-3 py-1.5 text-[11px] font-mono uppercase tracking-wider">{top.cta}</button>
                  </div>
                  {rest.length > 0 && (
                    <div className="mt-3 space-y-1">
                      {rest.map(a => (
                        <button key={a.id} onClick={() => onTab(a.target)} className="w-full flex items-center gap-2 text-left px-3 py-2 border border-border bg-surface/50 hover:border-red/40 hover:bg-red-dim transition-colors">
                          <span className="w-1.5 h-1.5 rounded-full bg-red flex-shrink-0" />
                          <span className="text-[12px] text-ink truncate flex-1">{a.headline}</span>
                          <span className="text-ink3 text-xs flex-shrink-0">›</span>
                        </button>
                      ))}
                    </div>
                  )}
                </>
              ) : <div className="text-[11px] font-mono text-ink3 italic">No actions surfaced.</div>}
            </div>
          </div>
          <HealthBar governed={governed} evMix={evMix} snapshots={bundle.snapshots} scenarios={scenarios} />
        </div>
      );
    }
    /* ---------- SCENARIOS TAB ---------- */
    const THEME_COLORS = {
      'Operational Efficiency':'#fbbf24', 'Compliance & Risk':'#c4b5fd', 'Asset Performance':'#86efac',
      'Inventory Accuracy':'#93c5fd', 'Throughput':'#f59e0b', 'Visibility':'#60a5fa',
      'Revenue':'#6ee7b7', 'Labor Productivity':'#5eead4'
    };
    const themeColor = (t) => THEME_COLORS[t] || '#888';
    function evidenceMeta(s) {
      if (s === 'Strong') return { pct: 100, color: '#86efac' };
      if (s === 'Weak')   return { pct: 30,  color: '#f87171' };
      return { pct: 60, color: '#fbbf24' };
    }
    // Inline SVG donut for value-theme distribution (Rule 5).
    function ThemeDonut({ data, size = 96 }) {
      const total = data.reduce((s, d) => s + d.value, 0);
      if (total === 0) return null;
      const r = size / 2 - 8, cx = size / 2, cy = size / 2, C = 2 * Math.PI * r;
      let offset = 0;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1a1a1a" strokeWidth="10" />
          {data.map((d, i) => {
            const len = (d.value / total) * C;
            const seg = <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth="10"
              strokeDasharray={`${len} ${C - len}`} strokeDashoffset={-offset}
              transform={`rotate(-90 ${cx} ${cy})`} vectorEffect="non-scaling-stroke" />;
            offset += len;
            return seg;
          })}
        </svg>
      );
    }
    function ToggleSwitch({ on, onChange }) {
      return (
        <button onClick={() => onChange(!on)} aria-pressed={on}
          className={`relative w-10 h-5 transition-colors ${on ? 'bg-red' : 'bg-surface2 border border-border2'}`}>
          <span className={`absolute top-0.5 ${on ? 'left-[22px]' : 'left-0.5'} w-4 h-4 bg-white transition-all`} />
        </button>
      );
    }
    function ScenarioCard({ scenario, perScenario, onToggle }) {
      const [openCfo, setOpenCfo] = useState(false);
      const ev = evidenceMeta(scenario.evidence_strength);
      const arv = perScenario?.arv || 0;
      const shadow = perScenario?.pool_shadow;
      const themeC = themeColor(scenario.value_theme);
      return (
        <div className={`bg-surface border border-border p-4 sm:p-5 transition-opacity ${scenario.active ? '' : 'opacity-60'}`}>
          <div className="flex items-start justify-between gap-3 mb-2">
            <div className="flex-1 min-w-0">
              {scenario.value_theme && <span className="text-[10px] font-mono uppercase tracking-wider px-2 py-0.5" style={{ background: themeC + '22', color: themeC }}>{scenario.value_theme}</span>}
              <div className="font-display text-base sm:text-lg text-ink mt-2">{scenario.mechanism_label || scenario.scenario_label || 'Untitled'}</div>
              <div className="text-xs text-ink2 mt-1 leading-relaxed">{scenario.one_liner || scenario.scenario_description || ''}</div>
            </div>
            <div className="text-right flex-shrink-0">
              <div className={`font-display text-lg sm:text-xl ${scenario.active && !shadow ? 'text-red' : 'text-ink3'}`}>{fmtMoney(arv)}</div>
              {shadow && <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mt-0.5">shadowed</div>}
            </div>
          </div>
          <div className="flex items-center gap-3 mt-3">
            <span className="text-[9px] font-mono uppercase tracking-widest" style={{ color: ev.color }}>{scenario.evidence_strength || 'Moderate'}</span>
            <div className="flex-1 h-1 bg-surface2 relative">
              <div className="absolute inset-y-0 left-0" style={{ width: ev.pct + '%', background: ev.color }} />
            </div>
            <span className="text-[10px] font-mono text-ink3">{ev.pct}%</span>
          </div>
          {scenario.cfo_objection && (
            <div className="mt-4 border-t border-border pt-3">
              <button onClick={() => setOpenCfo(o => !o)} className="text-[10px] font-mono uppercase tracking-widest text-ink2 hover:text-ink flex items-center gap-1.5">
                <span className="text-ink3">{openCfo ? '▾' : '▸'}</span>CFO objection
              </button>
              {openCfo && <div className="text-xs text-ink2 mt-2 leading-relaxed italic">"{scenario.cfo_objection}"</div>}
            </div>
          )}
          <div className="flex items-center justify-between mt-4 pt-3 border-t border-border">
            <span className="text-[10px] font-mono uppercase tracking-widest text-ink2">{scenario.active ? 'Active' : 'Inactive'}</span>
            <ToggleSwitch on={scenario.active} onChange={() => onToggle(scenario.scenario_id, !scenario.active)} />
          </div>
        </div>
      );
    }
    /* ---------- BIAS + RANK HELPERS (A7) ---------- */
    const RANK_CAPTION = { bcr: 'Ranked by BCR', delay: 'Ranked by Cost of Delay', evidence: 'Ranked by evidence', arv: 'Ranked by Y1 ARV' };
    function applyThemeBias(themeData, biasArr) {
      if (!biasArr?.length || !themeData?.length) return { data: themeData || [], topTheme: null, biasUnmatched: !!biasArr?.length };
      const biased = [], rest = [];
      themeData.forEach(d => biasArr.includes(d.key) ? biased.push(d) : rest.push(d));
      return { data: [...biased, ...rest], topTheme: biased[0]?.label || null, biasUnmatched: biased.length === 0 };
    }
    // Per-scenario rank: BCR proxy = scenario 3yr-arv / total impl (RAMPS sum to 2.5).
    // Confirmed by user: contributing-portion proxy preferred over isolated BCR.
    function scoreScenarioBy(s, analysis, rankBy) {
      const per = analysis?.perScenario?.find(p => p.scenario_id === s.scenario_id);
      if (rankBy === 'bcr')      { const impl = analysis?.impl || 0; return impl > 0 ? ((per?.arv || 0) * 2.5) / impl : (per?.arv || 0); }
      if (rankBy === 'delay')    return per?.delay || 0;
      if (rankBy === 'arv')      return per?.arv || 0;
      if (rankBy === 'evidence') { const o = { Strong: 100, Moderate: 60, Weak: 30 }; return o[s.evidence_strength] ?? 60; }
      return -(Number(s.print_priority) || 99);  // print_priority asc → negate so desc-sort works
    }
    function rankScenarios(scenarios, analysis, rankBy) {
      if (!rankBy || !scenarios?.length) return scenarios;
      return scenarios.slice().sort((a, b) => scoreScenarioBy(b, analysis, rankBy) - scoreScenarioBy(a, analysis, rankBy));
    }

    function ScenariosTab({ scenarios, analysis, onToggle, behavior }) {
      const themeData = useMemo(() => {
        const byTheme = {};
        scenarios.filter(s => s.active).forEach(s => {
          const per = analysis?.perScenario?.find(p => p.scenario_id === s.scenario_id);
          const t = s.value_theme || 'Other';
          byTheme[t] = (byTheme[t] || 0) + (per?.arv || 0);
        });
        return Object.entries(byTheme).filter(([_, v]) => v > 0).map(([k, v]) => ({ key: k, label: k, value: v, color: themeColor(k) })).sort((a, b) => b.value - a.value);
      }, [scenarios, analysis]);
      const { data: themeDataSorted, topTheme, biasUnmatched } = applyThemeBias(themeData, behavior?.themeBias);
      const biasArr = behavior?.themeBias || [];
      const rankedScenarios = useMemo(() => behavior?.rankBy ? rankScenarios(scenarios, analysis, behavior.rankBy) : scenarios, [scenarios, analysis, behavior?.rankBy]);
      const rankCaption = behavior?.rankBy ? RANK_CAPTION[behavior.rankBy] : null;
      if (!scenarios.length) return <div className="p-8 font-mono text-xs text-ink3">No scenarios loaded for this domain.</div>;
      return (
        <div className="max-w-[960px] mx-auto px-4 sm:px-8 py-8">
          {themeDataSorted.length > 0 && (
            <div className="bg-surface border border-border p-4 sm:p-5 mb-6 flex items-center gap-5">
              <ThemeDonut data={themeDataSorted} size={88} />
              <div className="flex-1 min-w-0">
                <div className="flex items-center justify-between mb-2">
                  <div className="text-[10px] font-mono uppercase tracking-widest text-ink3">Value by theme</div>
                  {topTheme && <div className="text-[10px] font-mono text-red">Top theme · {topTheme}</div>}
                </div>
                {biasUnmatched && <div className="text-[10px] font-mono text-ink3 italic mb-2">Tag bias finds no matching theme — using ARV ordering.</div>}
                <div className="space-y-1">
                  {themeDataSorted.slice(0, 4).map(d => (
                    <div key={d.key} className="flex items-center gap-2 text-[11px]">
                      <span className="w-2 h-2 flex-shrink-0" style={{ background: d.color }} />
                      <span className="text-ink truncate flex-1">{d.label}</span>
                      {biasArr.includes(d.key) && <span className="text-[8px] font-mono text-red flex-shrink-0">★</span>}
                      <span className="font-mono text-ink2">{fmtMoney(d.value)}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
          <div className="flex items-center justify-between mb-3">
            <div className="text-[10px] font-mono uppercase tracking-widest text-ink2">{scenarios.filter(s => s.active).length} of {scenarios.length} mechanisms active</div>
            {rankCaption && <div className="text-[9px] font-mono uppercase tracking-widest text-red/80">{rankCaption}</div>}
          </div>
          <div className="space-y-3">
            {rankedScenarios.map(s => <ScenarioCard key={s.scenario_id} scenario={s} perScenario={analysis?.perScenario?.find(p => p.scenario_id === s.scenario_id)} onToggle={onToggle} />)}
          </div>
        </div>
      );
    }

    /* ---------- INPUTS TAB ---------- */
    const FORMULA_KEY_RE = /\b[a-z_][a-z0-9_]*\b/g;
    function extractKeys(formula, knownKeys) {
      if (!formula) return new Set();
      const set = new Set();
      (formula.match(FORMULA_KEY_RE) || []).forEach(m => { if (knownKeys.has(m)) set.add(m); });
      return set;
    }
    function groupInputsByScenario(scenarios, defs) {
      const known = new Set((defs || []).map(d => d.input_key));
      const used = new Set();
      const groups = scenarios.filter(s => s.active).map(s => {
        const keys = new Set([
          ...extractKeys(s.value_scenario_formula, known),
          ...extractKeys(s.delay_cost_formula, known),
          ...extractKeys(s.cost_of_inaction_formula, known)
        ]);
        keys.forEach(k => used.add(k));
        return { name: s.mechanism_label || s.scenario_label || s.scenario_id, defs: defs.filter(d => keys.has(d.input_key)) };
      }).filter(g => g.defs.length);
      const other = defs.filter(d => !used.has(d.input_key) && d.input_key !== 'implementation_cost');
      if (other.length) groups.push({ name: 'Other', defs: other });
      const impl = defs.filter(d => d.input_key === 'implementation_cost');
      if (impl.length) groups.push({ name: 'Implementation', defs: impl });
      return groups;
    }
    function PresetStrip({ tier, onPreset }) {
      const tiers = [
        { key: 'conservative', label: 'Conservative' },
        { key: 'typical',      label: 'Typical' },
        { key: 'aggressive',   label: 'Aggressive' }
      ];
      return (
        <div className="grid grid-cols-3 border border-border">
          {tiers.map(t => (
            <button key={t.key} onClick={() => onPreset(t.key)}
              className={`py-2 text-[10px] font-mono uppercase tracking-widest border-r last:border-r-0 border-border transition-colors ${tier === t.key ? 'bg-red text-white' : 'text-ink2 hover:text-ink hover:bg-surface'}`}>
              {t.label}
            </button>
          ))}
        </div>
      );
    }
    function InputRow({ def, iv, onSlide, onCommit }) {
      const cur = Number(iv?.provided_value ?? def.typical_value ?? def.default_value ?? 0);
      const min = Number(def.min_value ?? 0);
      const max = Number(def.max_value ?? Math.max(cur * 2, 1000));
      const step = Number(def.step_value ?? Math.max((max - min) / 100, 0.01));
      // Rule 1: no labels above. Label sits inline left; slider is the affordance.
      return (
        <div className="grid grid-cols-12 gap-3 items-center py-2.5 border-b border-border">
          <div className="col-span-12 sm:col-span-4 flex items-center gap-2 min-w-0">
            <SourceDot source={iv?.value_source} />
            <span className="text-xs text-ink truncate">{def.input_label || def.input_key.replace(/_/g, ' ')}</span>
            {def.discovery_prompt && <span title={def.discovery_prompt} className="text-[10px] text-ink3 cursor-help">ⓘ</span>}
          </div>
          <div className="col-span-8 sm:col-span-6">
            <Slider value={cur} min={min} max={max} step={step}
              onChange={v => onSlide(def.input_key, v)} onCommit={v => onCommit(def.input_key, v)} />
          </div>
          <div className="col-span-4 sm:col-span-2 text-right font-mono text-xs text-ink">
            {cur.toLocaleString(undefined, { maximumFractionDigits: 2 })}
            {def.input_unit && <span className="text-ink3 ml-1">{def.input_unit}</span>}
          </div>
        </div>
      );
    }
    /* ---------- SHARE INTAKE DIALOG (I2) ---------- */
    const RECIPIENT_ROLES = ['Champion', 'Finance', 'Risk / Compliance', 'Procurement', 'Operations', 'Other'];
    const DEFAULT_INTAKE_INTRO = ({ customer, analysisName }) =>
      `We're modeling the value case for ${customer || 'your initiative'}${analysisName ? ' (' + analysisName + ')' : ''}.\n\n` +
      `This is a 5-question intake — about 5 minutes on phone or laptop. Confirm or adjust the industry benchmarks where you have a real number, skip the rest. Your account team will use it to build the case.`;

    function ShareIntakeDialog({ engagement, defs, scenarios, values, onClose, onWritten }) {
      const [step, setStep] = useState(0);
      const [email, setEmail] = useState(engagement.champion_email || '');
      const [role, setRole] = useState('Champion');
      const curated = useMemo(() => curateInputs(defs, scenarios, values, 5), [defs, scenarios, values]);
      const [selectedKeys, setSelectedKeys] = useState(() => new Set(curated.map(d => d.input_key)));
      const [intro, setIntro] = useState(() => DEFAULT_INTAKE_INTRO({ customer: engagement.prospect_name, analysisName: engagement.analysis_name }));
      const [busy, setBusy] = useState(false);
      const [copied, setCopied] = useState(false);
      const [err, setErr] = useState('');
      const existing = parseIntakeSession(engagement?.notes);
      const toggleKey = (k) => setSelectedKeys(p => { const n = new Set(p); if (n.has(k)) n.delete(k); else if (n.size < 5) n.add(k); return n; });
      const buildAndWrite = async () => {
        const sessionObj = newIntakeSession({ shared_with_email: email || null, shared_with_role: role, curated_input_keys: [...selectedKeys] });
        sessionObj.status = 'in_progress';
        const newNotes = await writeIntakeSession(engagement.engagement_id, engagement.notes, sessionObj);
        onWritten?.(newNotes, sessionObj);
        return buildShareLink(sessionObj.share_token);
      };
      const sendViaMail = async () => {
        setBusy(true); setErr('');
        try {
          const link = await buildAndWrite();
          const subject = encodeURIComponent('Quick value-case intake' + (engagement.analysis_name ? ' — ' + engagement.analysis_name : ''));
          const body = encodeURIComponent(intro + '\n\n' + link + '\n\nThanks');
          window.open(`mailto:${encodeURIComponent(email)}?subject=${subject}&body=${body}`, '_self');
          onClose();
        } catch (e) { setErr(e.message || 'Send failed'); }
        finally { setBusy(false); }
      };
      const copyLink = async () => {
        setBusy(true); setErr('');
        try { const link = await buildAndWrite(); await navigator.clipboard.writeText(link); setCopied(true); setTimeout(() => setCopied(false), 2000); }
        catch (e) { setErr(e.message || 'Copy failed'); }
        finally { setBusy(false); }
      };
      const stepValid = (i) => i === 0 ? /\S+@\S+\.\S+/.test(email) : i === 1 ? selectedKeys.size > 0 : true;
      return (
        <div className="fixed inset-0 z-30 bg-bg/85 grid place-items-center p-4" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="w-full max-w-[560px] bg-surface border border-border max-h-[90vh] overflow-auto">
            <div className="flex items-center justify-between px-5 py-3 border-b border-border">
              <div className="font-display text-base text-ink">Share intake</div>
              <button onClick={onClose} className="text-ink3 hover:text-red text-base leading-none">×</button>
            </div>
            <div className="px-5 pt-3 pb-1 flex items-center gap-2 text-[10px] font-mono uppercase tracking-widest">
              {['Recipient', 'Questions', 'Send'].map((label, i) => (
                <React.Fragment key={label}>
                  <span className={i === step ? 'text-red' : i < step ? 'text-ink' : 'text-ink3'}>{i + 1} · {label}</span>
                  {i < 2 && <span className="text-ink3">›</span>}
                </React.Fragment>
              ))}
            </div>
            {step === 0 && (
              <div className="px-5 py-5">
                {existing && <div className="text-[10px] font-mono text-amber border-l-2 border-amber bg-amber/5 px-3 py-2 mb-4">An intake was sent to {existing.shared_with_email || 'a prospect'} {fmtRelative(existing.shared_at)}. Sending again will replace the existing link.</div>}
                <div className="text-[12px] text-ink2 mb-4 leading-relaxed">Who's filling this out?</div>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="email"
                  className="w-full bg-surface2 border border-border px-3 py-2.5 mb-4 text-sm font-mono text-ink placeholder:text-ink3 focus:border-red outline-none" />
                <div className="text-[10px] font-mono uppercase tracking-widest text-ink3 mb-2">Their role</div>
                <div className="flex flex-wrap gap-1.5">
                  {RECIPIENT_ROLES.map(r => (
                    <button key={r} onClick={() => setRole(r)} className={`text-[11px] font-mono px-2.5 py-1 border ${role === r ? 'border-red bg-red/15 text-ink' : 'border-border bg-surface2 text-ink2 hover:text-ink'}`}>{r}</button>
                  ))}
                </div>
              </div>
            )}
            {step === 1 && (
              <div className="px-5 py-5">
                <div className="text-[12px] text-ink2 leading-relaxed">{selectedKeys.size} of 5 questions selected. Cap is 5 to keep the intake under 5 minutes.</div>
                <div className="space-y-2 mt-3">
                  {curated.map(d => {
                    const on = selectedKeys.has(d.input_key);
                    return (
                      <button key={d.input_key} onClick={() => toggleKey(d.input_key)} className={`w-full text-left p-3 border transition-colors ${on ? 'border-red bg-red/10' : 'border-border bg-surface2 hover:border-border2'}`}>
                        <div className="flex items-start gap-2">
                          <span className={`mt-0.5 w-4 h-4 border flex items-center justify-center flex-shrink-0 ${on ? 'bg-red border-red' : 'border-border2'}`}>{on && <span className="text-white text-[10px]">✓</span>}</span>
                          <div className="flex-1 min-w-0">
                            <div className="text-[12px] text-ink">{d.discovery_prompt || d.input_label || d.input_key}</div>
                            <div className="text-[10px] font-mono text-ink3 mt-0.5">Benchmark · {d.typical_value ?? '—'} {d.input_unit || ''}</div>
                          </div>
                        </div>
                      </button>
                    );
                  })}
                </div>
                <div className="text-[10px] font-mono text-ink3 italic mt-3">Heuristic-curated. Manual override (add other inputs) lands in a follow-up.</div>
              </div>
            )}
            {step === 2 && (
              <div className="px-5 py-5">
                <div className="text-[10px] font-mono uppercase tracking-widest text-ink3 mb-2">Intro your prospect will see</div>
                <textarea value={intro} onChange={e => setIntro(e.target.value)} rows={6}
                  className="w-full bg-surface2 border border-border px-3 py-2 text-sm focus:border-red outline-none mb-2" />
                <div className="text-[10px] font-mono text-ink3 italic mb-4">The link is appended automatically when sent.</div>
                {err && <div className="text-[11px] font-mono text-red mb-3 border-l-2 border-red bg-red/5 px-3 py-2">{err}</div>}
                <div className="space-y-2">
                  <button onClick={sendViaMail} disabled={busy || !email} className="w-full bg-red hover:bg-red/90 disabled:opacity-40 text-white py-2.5 text-[12px] font-display tracking-wide">{busy ? 'Working…' : 'Open in mail client →'}</button>
                  <button onClick={copyLink} disabled={busy} className="w-full border border-border2 hover:border-red/60 text-ink py-2 text-[11px] font-mono uppercase tracking-widest">{copied ? '✓ Copied' : 'Copy share link'}</button>
                  <button disabled className="w-full border border-border text-ink3 py-2 text-[11px] font-mono uppercase tracking-widest opacity-40 cursor-not-allowed">Download brief · chunk I4</button>
                </div>
              </div>
            )}
            <div className="flex items-center justify-between px-5 py-3 border-t border-border">
              <button onClick={() => step === 0 ? onClose() : setStep(s => s - 1)} className="text-[11px] font-mono uppercase tracking-widest text-ink2 hover:text-red">{step === 0 ? 'Cancel' : '← Back'}</button>
              {step < 2 && (
                <button onClick={() => stepValid(step) && setStep(s => s + 1)} disabled={!stepValid(step)} className="bg-red hover:bg-red/90 disabled:opacity-30 text-white px-4 py-1.5 text-[11px] font-mono uppercase tracking-widest">Next →</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    function InputsTab({ scenarios, defs, values, tier, onSlide, onCommit, onPreset, engagement, onSessionWritten }) {
      const groups = useMemo(() => groupInputsByScenario(scenarios, defs), [scenarios, defs]);
      const [shareOpen, setShareOpen] = useState(false);
      const session = parseIntakeSession(engagement?.notes);
      if (!defs?.length) return <div className="p-8 font-mono text-xs text-ink3">No inputs defined for this domain.</div>;
      return (

          <div className="space-y-8">
            {groups.map(g => (

    /* ---------- OUTPUTS TAB (top: tier toggle + 3 micro-visual cards) ---------- */
    function BigTierToggle({ tier, onPreset }) {

    function ValueOfActingCard({ analysis }) {

      const rows = [{ k: 'Y1', v: analysis?.arvY1 || 0 }, { k: 'Y2', v: analysis?.arvY2 || 0 }, { k: 'Y3', v: analysis?.arvY3 || 0 }];
      return (
        <div className="bg-surface border border-border p-5">
          <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-3">Value of acting</div>

          <div className="space-y-2">
            {rows.map(r => (
              <div key={r.k} className="flex items-center gap-3">
                <span className="font-mono text-[10px] uppercase tracking-widest text-ink3 w-6">{r.k}</span>

    function CostOfDelayCard({ analysis }) {
      const monthly = analysis?.monthlyDelay || 0;
      return (
        <div className="bg-surface border border-border p-5">
          <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-3">Cost of delay</div>
          <div className="font-display text-xl sm:text-2xl text-red mb-1">{fmtMoney(monthly)}<span className="text-ink3 text-sm font-mono"> /mo</span></div>
          <div className="text-[11px] font-mono text-ink2 mb-4">12-mo: {fmtMoney(monthly * 12)}</div>
          <div className="grid grid-cols-12 gap-0.5">
            {Array.from({ length: 12 }, (_, i) => (
              <div key={i} className="h-6 bg-red" style={{ opacity: 0.25 + (i / 11) * 0.7 }} title={`Month ${i + 1}: ${fmtMoney(monthly * (i + 1))} cumulative`} />
            ))}

    function CostOfDoingNothingCard({ analysis }) {
      const coi = analysis?.coi3yr || 0;
      const arvCap = (analysis?.arvFull || 0) * 3 || 1;
      const pct = Math.min(100, Math.round((coi / arvCap) * 100));
      return (
        <div className="bg-surface border border-border p-5">
          <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-3">Cost of doing nothing</div>
          <div className="font-display text-xl sm:text-2xl text-red mb-1">{fmtMoney(coi)}</div>
          <div className="text-[11px] font-mono text-ink2 mb-4">3-yr value-at-risk</div>
          <div className="h-3 bg-surface2 relative">
            <div className="absolute inset-y-0 left-0 bg-red" style={{ width: pct + '%' }} />
          </div>
          <div className="flex justify-between text-[9px] font-mono text-ink3 mt-1.5">
            <span>0</span>
            <span>{pct}% of 3yr ARV ceiling</span>

    function ScenarioWaterfall({ scenarios, analysis }) {
      const active = scenarios.filter(s => s.active).map(s => {
        const per = analysis?.perScenario?.find(p => p.scenario_id === s.scenario_id);
        return { name: s.mechanism_label || s.scenario_id, theme: s.value_theme, arv: per?.arv || 0, shadow: per?.pool_shadow };
      }).sort((a, b) => b.arv - a.arv);
      const max = Math.max(...active.map(a => a.arv), analysis?.arvFull || 0, 1);
      return (
        <div className="bg-surface border border-border p-5">
          <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-4">Scenario waterfall</div>
          {active.length === 0 && <div className="text-[11px] font-mono text-ink3 italic">No active scenarios.</div>}
          <div className="space-y-1.5">
            {active.map(a => (
              <div key={a.name} className="grid grid-cols-12 gap-2 sm:gap-3 items-center">
                <span className="col-span-5 sm:col-span-4 text-[11px] text-ink truncate">{a.name}</span>
                <div className="col-span-4 sm:col-span-6 h-5 bg-surface2 relative">
                  <div className="absolute inset-y-0 left-0" style={{ width: ((a.arv / max) * 100) + '%', background: themeColor(a.theme), opacity: a.shadow ? 0.25 : 0.85 }} />
                </div>
                <span className={`col-span-3 sm:col-span-2 font-mono text-[11px] text-right ${a.shadow ? 'text-ink3' : 'text-ink'}`}>{fmtMoney(a.arv)}</span>
              </div>
            ))}
          </div>
          <div className="mt-3 pt-3 border-t border-border grid grid-cols-12 gap-2 sm:gap-3 items-center">
            <span className="col-span-5 sm:col-span-4 text-[10px] font-mono uppercase tracking-widest text-red">Total ARV</span>
            <div className="col-span-4 sm:col-span-6 h-5 bg-red" />
            <span className="col-span-3 sm:col-span-2 font-mono text-[11px] text-red text-right">{fmtMoney(analysis?.arvFull || 0)}</span>
          </div>
        </div>
      );
    }
    function DCFCurve({ analysis }) {
      const monthly = (analysis?.arvFull || 0) / 12;
      const impl = analysis?.impl || 0;
      const points = [{ m: 0, c: -impl }];
      let cum = -impl;
      for (let m = 1; m <= 36; m++) {
        const yearMul = m <= 12 ? RAMPS[0] : m <= 24 ? RAMPS[1] : RAMPS[2];
        cum += monthly * yearMul;
        points.push({ m, c: cum });
      }
      const ymin = Math.min(...points.map(p => p.c));
      const ymax = Math.max(...points.map(p => p.c));
      const range = ymax - ymin || 1;
      const W = 360, H = 80;
      const xOf = m => (m / 36) * W;
      const yOf = c => H - ((c - ymin) / range) * H;
      const path = points.map((p, i) => (i === 0 ? 'M' : 'L') + xOf(p.m).toFixed(1) + ' ' + yOf(p.c).toFixed(1)).join(' ');
      const zeroY = yOf(0);
      let paybackM = null;
      for (let i = 1; i < points.length; i++) { if (points[i - 1].c < 0 && points[i].c >= 0) { paybackM = points[i].m; break; } }
      return (
        <div className="bg-surface border border-border p-5">
          <div className="flex items-center justify-between mb-3 gap-3">
            <div className="text-[10px] font-mono uppercase tracking-widest text-ink2">36-month cumulative cash flow</div>
            <div className="text-[11px] font-mono text-ink2">Payback: <span className="text-red">{paybackM ? paybackM + ' mo' : '—'}</span></div>
          </div>
          <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" width="100%" height={H} className="block">
            <line x1="0" y1={zeroY} x2={W} y2={zeroY} stroke="#444" strokeWidth="1" strokeDasharray="2 3" vectorEffect="non-scaling-stroke" />
            {paybackM && <line x1={xOf(paybackM)} y1="0" x2={xOf(paybackM)} y2={H} stroke="#d63b2f" strokeWidth="1" strokeDasharray="2 3" vectorEffect="non-scaling-stroke" />}
            <path d={path} fill="none" stroke="#d63b2f" strokeWidth="2" vectorEffect="non-scaling-stroke" />
          </svg>
          <div className="flex justify-between text-[9px] font-mono text-ink3 mt-1"><span>Mo 0 ({fmtMoney(-impl)})</span><span>Mo 36 ({fmtMoney(cum)})</span></div>
        </div>
      );
    }
    function FinancialTable({ analysis }) {
      const a = analysis || {};
      const rows = [
        ['Y1 Realized Value', fmtMoney(a.arvY1), 'Y1 ramps to 50% adoption.'],
        ['Y2 Realized Value', fmtMoney(a.arvY2), 'Full adoption.'],
        ['Y3 Realized Value', fmtMoney(a.arvY3), 'Full adoption.'],
        ['3-Year Total', fmtMoney((a.arvY1 || 0) + (a.arvY2 || 0) + (a.arvY3 || 0)), 'Sum, no discounting.'],
        ['NPV (10% discount)', a.npv != null ? fmtMoney(a.npv) : '—', 'Y1 face, Y2/Y3 discounted.'],
        ['Payback', a.payback != null ? fmtMonths(a.payback) : '—', 'impl ÷ (Y1 ARV / 12).'],
        ['BCR', a.bcr != null ? fmtMultiple(a.bcr) : '—', '3yr benefit ÷ implementation.'],
        ['Implementation', a.impl ? fmtMoney(a.impl) : '—', 'From inputs.implementation_cost.']
      ];
      return (
        <div className="bg-surface border border-border">
          <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 px-5 py-3 border-b border-border">Financial summary</div>
          <table className="w-full">
            <tbody>{rows.map((r, i) => (
              <tr key={i} className={i === 3 || i === 6 ? 'border-t border-border' : ''}>
                <td className="px-5 py-2 text-xs text-ink">{r[0]}</td>
                <td className="px-3 py-2 text-xs font-mono text-right text-ink">{r[1]}</td>
                <td className="px-5 py-2 text-[10px] font-mono text-ink3 hidden sm:table-cell">{r[2]}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
