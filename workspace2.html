<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alt Meridian · Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: {
        bg:'#0e0e0e', surface:'#141414', surface2:'#1a1a1a',
        border:'#222222', border2:'#2d2d2d',
        ink:'#e8e8e8', ink2:'#888888', ink3:'#444444',
        red:'#d63b2f', 'red-dim':'rgba(214,59,47,0.10)',
        green:'#2d7d4f', amber:'#b45309', blue:'#1d4ed8', teal:'#0f766e'
      },
      fontFamily: {
        display:['Syne','sans-serif'],
        mono:['"DM Mono"','monospace'],
        sans:['Syne','system-ui','sans-serif']
      }
    } } };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html, body, #root { height: 100%; }
    body { background:#0e0e0e; color:#e8e8e8; font-family:'Syne', system-ui, sans-serif; }
    input, textarea, button, select { font-family: inherit; }

</head>
<body class="bg-bg text-ink">
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    /* ---------- SUPABASE ---------- */
    const SUPABASE_URL = 'https://kpecdezcolcycgpuqbgs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZWNkZXpjb2xjeWNncHVxYmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODIyMDYsImV4cCI6MjA5MTI1ODIwNn0.rKHzdjjkYToEZWdS0ngg3Kgigh_gDWt5cRbLBCE44rg';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ---------- DB HELPERS ---------- */
    async function sbSelect(table, q) {
      let b = sb.from(table).select('*');
      if (q?.eq) Object.entries(q.eq).forEach(([k, v]) => b = b.eq(k, v));
      if (q?.in) Object.entries(q.in).forEach(([k, vs]) => b = b.in(k, vs));
      if (q?.order) b = b.order(q.order[0], { ascending: q.order[1] !== false });
      if (q?.limit) b = b.limit(q.limit);
      const { data, error } = await b;
      if (error) throw error;
      return data || [];
    }
    async function sbInsert(table, row) {
      const { data, error } = await sb.from(table).insert(row).select();
      if (error) throw error;
      return data?.[0] || null;
    }
    async function sbUpsert(table, row, onConflict) {
      const { data, error } = await sb.from(table).upsert(row, onConflict ? { onConflict } : {}).select();
      if (error) throw error;
      return data?.[0] || null;
    }
    async function sbUpdate(table, patch, q) {
      let b = sb.from(table).update(patch);
      if (q?.eq) Object.entries(q.eq).forEach(([k, v]) => b = b.eq(k, v));
      const { data, error } = await b.select();
      if (error) throw error;
      return data || [];
    }

    /* ---------- LOADERS ---------- */
    async function loadDomains() {
      const arr = await sbSelect('vef_domains');
      const m = {}; arr.forEach(d => m[d.domain_id] = d); return m;
    }
    const loadEngagements = () => sbSelect('vef_engagements', { order: ['intake_date', false] });
    const loadValueSignals = (domainId) =>
      sbSelect('vef_value_signals', { eq: { domain_id: domainId } }).catch(() => []);
    const loadEvidence = (domainId) =>
      sbSelect('vef_evidence_registry', { eq: { domain_id: domainId } }).catch(() => []);
    const loadSnapshots = (engId) =>
      sbSelect('vef_output_snapshots', { eq: { engagement_id: engId }, order: ['created_at', false] });
    const loadAllSnapshots = () =>
      sbSelect('vef_output_snapshots', { order: ['created_at', false] }).catch(() => []);
    const loadScenarioSelections = (engId) =>
      sbSelect('vef_scenario_selections', { eq: { engagement_id: engId } });
    async function loadInputValues(engId) {
      const arr = await sbSelect('vef_input_values', { eq: { engagement_id: engId } });
      const m = {}; arr.forEach(iv => m[iv.input_key] = iv); return m;
    }
    // RFID fallback: synthetic ids like WH-RFD have no scenarios/inputs of their own;
    // retry against canonical 'RFD'. (Mirrors workspace.html v1 line 1340.)
    async function loadScenariosForDomain(domainId, domain) {
      let scens = await sbSelect('vef_value_scenarios', { eq: { domain_id: domainId } }).catch(() => []);
      if (!scens.length && domain?.technology === 'RFID' && domainId !== 'RFD') {
        scens = await sbSelect('vef_value_scenarios', { eq: { domain_id: 'RFD' } }).catch(() => []);
      }
      return scens;
    }
    async function loadInputDefinitions(domainId, domain) {
      let rows = await sbSelect('vef_input_definitions', { eq: { domain_id: domainId } }).catch(() => []);
      if (!rows.length && domain?.technology === 'RFID' && domainId !== 'RFD') {
        rows = await sbSelect('vef_input_definitions', { eq: { domain_id: 'RFD' } }).catch(() => []);
      }
      // vef_input_definitions has duplicate input_key rows per domain; dedupe.
      const seen = new Set();
      return rows.filter(r => seen.has(r.input_key) ? false : (seen.add(r.input_key), true));
    }
    async function loadEngagementBundle(engagementId) {
      const rows = await sbSelect('vef_engagements', { eq: { engagement_id: engagementId }, limit: 1 });
      const eng = rows[0];
      if (!eng) return null;
      const domains = await loadDomains();
      const domain = domains[eng.domain_id];
      const [selections, scenarios, defs, values, snapshots, evidence, signals] = await Promise.all([
        loadScenarioSelections(eng.engagement_id),
        loadScenariosForDomain(eng.domain_id, domain),
        loadInputDefinitions(eng.domain_id, domain),
        loadInputValues(eng.engagement_id),
        loadSnapshots(eng.engagement_id),
        loadEvidence(eng.domain_id),
        loadValueSignals(eng.domain_id)
      ]);
      return { engagement: eng, domain, domains, selections, scenarios, defs, values, snapshots, evidence, signals };
    }

    /* ---------- FORMULA ENGINE ---------- */
    const RAMPS = [0.5, 1.0, 1.0];   // Y1 50% adoption, Y2/Y3 full
    const DISCOUNT = 0.10;

    function evalFormula(formula, inputs) {
      if (!formula || typeof formula !== 'string') return null;
      const keys = Object.keys(inputs || {});
      const vals = keys.map(k => {
        const v = inputs[k];
        return (v == null || isNaN(Number(v))) ? 0 : Number(v);
      });
      try {
        const fn = new Function(...keys, '"use strict"; return (' + formula + ');');
        const r = fn(...vals);
        return (typeof r === 'number' && isFinite(r)) ? r : null;
      } catch (_) { return null; }
    }

    // Flatten {input_key:{provided_value:N}} → {input_key:N}; falls back to typical/default.
    function resolvedInputs(inputsMap, inputDefs) {
      const out = {};
      (inputDefs || []).forEach(d => {
        const p = inputsMap?.[d.input_key]?.provided_value;
        out[d.input_key] = p != null ? Number(p) : Number(d.typical_value ?? d.default_value ?? 0);
      });
      return out;
    }

    // Pool-share guard: in each value_theme, only the highest-ARV active scenario contributes.
    function computeAnalysis(scenarios, inputsMap, inputDefs) {
      const inputs = resolvedInputs(inputsMap, inputDefs);
      const per = (scenarios || []).map(s => {
        const arv = evalFormula(s.value_scenario_formula, inputs) || 0;
        const delay = evalFormula(s.delay_cost_formula, inputs) || (arv / 12);
        const coi = evalFormula(s.cost_of_inaction_formula, inputs) || (arv * 3);
        return { scenario_id: s.scenario_id, theme: s.value_theme || 'other', active: !!s.active, arv, delay, coi, pool_shadow: false };
      });
      const best = {};
      per.filter(p => p.active).forEach(p => { if (!best[p.theme] || p.arv > best[p.theme].arv) best[p.theme] = p; });
      per.forEach(p => { if (p.active && best[p.theme] && best[p.theme].scenario_id !== p.scenario_id) p.pool_shadow = true; });
      const counted = per.filter(p => p.active && !p.pool_shadow);
      const arvFull = counted.reduce((s, p) => s + p.arv, 0);
      const arvY1 = arvFull * RAMPS[0], arvY2 = arvFull * RAMPS[1], arvY3 = arvFull * RAMPS[2];
      const monthlyDelay = counted.reduce((s, p) => s + p.delay, 0);
      const coi3yr = counted.reduce((s, p) => s + p.coi, 0);
      const impl = Number(inputsMap?.implementation_cost?.provided_value) || 0;
      const npv = impl > 0 ? arvY1 + arvY2 / (1 + DISCOUNT) + arvY3 / (1 + DISCOUNT) ** 2 - impl : null;
      const payback = impl > 0 && arvY1 > 0 ? impl / (arvY1 / 12) : null;
      const bcr = impl > 0 ? (arvY1 + arvY2 + arvY3) / impl : null;
      return { arvY1, arvY2, arvY3, arvFull, monthlyDelay, coi3yr, npv, payback, bcr, perScenario: per, impl };
    }

    /* ---------- FORMAT HELPERS ---------- */
    function fmtMoney(n) {
      if (n == null || !isFinite(n)) return '—';
      const a = Math.abs(n);
      if (a >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
      if (a >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
      if (a >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
      return '$' + Math.round(n).toLocaleString();
    }
    const fmtPercent = (n, d = 0) => (n == null || !isFinite(n)) ? '—' : (n * 100).toFixed(d) + '%';
    const fmtMonths = (n) => (n == null || !isFinite(n)) ? '—' : n.toFixed(1) + ' mo';
    const fmtMultiple = (n) => (n == null || !isFinite(n)) ? '—' : n.toFixed(2) + 'x';
    function fmtDate(s) {
      if (!s) return '—';
      const d = new Date(s);
      return isNaN(d) ? s : d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }
    function fmtRelative(s) {
      if (!s) return '—';
      const ms = Date.now() - new Date(s).getTime();
      if (ms < 60_000) return 'just now';
      if (ms < 3_600_000) return Math.floor(ms / 60_000) + 'm ago';
      if (ms < 86_400_000) return Math.floor(ms / 3_600_000) + 'h ago';
      return Math.floor(ms / 86_400_000) + 'd ago';
    }

    /* ---------- STAGE + PHASE TRANSLATION (Rule 8: no DB language in UI) ---------- */
    // DB stage strings are lowercase; map to friendly verb-tense labels with tone.
    const STAGE_MAP = {
      'discovery':      { label: 'Discovery',  tone: 'blue'  },
      'validation':     { label: 'Validating', tone: 'blue'  },
      'proposal':       { label: 'Proposing',  tone: 'amber' },
      'finance review': { label: 'In Review',  tone: 'amber' },
      'closed won':     { label: 'Won',        tone: 'green' },
      'closed lost':    { label: 'Lost',       tone: 'ink'   }
    };
    const friendlyStage = (raw) => STAGE_MAP[(raw || '').toLowerCase()] || { label: raw || 'Draft', tone: 'ink' };
    // Phase fuzzy-match — DB uses things like "Discovery", "Pilot", "Deployment", "Expansion", "Renewal".
    function friendlyPhase(raw) {
      const lc = (raw || '').toLowerCase();
      if (lc.includes('pilot')) return { label: 'Piloting',  tone: 'amber' };
      if (lc.includes('deploy')) return { label: 'Deploying', tone: 'blue'  };
      if (lc.includes('expand')) return { label: 'Expanding', tone: 'green' };
      if (lc.includes('renew'))  return { label: 'Renewing',  tone: 'green' };
      if (lc.includes('discover') || lc.includes('explor')) return { label: 'Exploring', tone: 'ink' };
      return { label: raw || 'Exploring', tone: 'ink' };
    }
    // Tone → Tailwind class (used by both StageBadge and PhaseBadge in W4+).
    const TONE_BG = {
      blue:  'bg-blue/20 text-blue',
      amber: 'bg-amber/20 text-amber',
      green: 'bg-green/20 text-green',
      teal:  'bg-teal/20 text-teal',
      red:   'bg-red/20 text-red',
      ink:   'bg-surface2 text-ink2'
    };
    const ACTIVE_STAGES   = new Set(['discovery', 'validation', 'proposal', 'finance review']);
    const PILOT_PHASES    = new Set([]);  // matched via friendlyPhase('Piloting'); see isPilot()
    const isActive    = (e) => ACTIVE_STAGES.has((e?.deal_stage || '').toLowerCase()) && !((e?.engagement_status || '').toLowerCase().includes('completed'));
    const isPilot     = (e) => friendlyPhase(e?.phase).label === 'Piloting';
    const isCompleted = (e) => (e?.engagement_status || '').toLowerCase().includes('completed') || (e?.deal_stage || '').toLowerCase().startsWith('closed');

    /* ---------- LOGIN — fake, no validation, no API ---------- */
    function LoginScreen({ onEnter }) {
      const [email, setEmail] = useState('seller@altmeridian.com');
      const [password, setPassword] = useState('altmeridian2026');
      const submit = (e) => { e.preventDefault(); onEnter(); };
      return (
        <div className="min-h-full grid place-items-center bg-bg px-6">
          <form onSubmit={submit} className="w-full max-w-[360px] bg-surface border border-border p-8">
            <div className="font-display text-2xl tracking-wide mb-10">
              <span className="text-red">ALT</span> <span className="text-ink">MERIDIAN</span>
            </div>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)}
              placeholder="email"
              className="w-full bg-surface2 border border-border px-3 py-2.5 mb-3 text-sm font-mono text-ink placeholder:text-ink3 focus:border-red outline-none" />
            <input type="password" value={password} onChange={e => setPassword(e.target.value)}
              placeholder="password"
              className="w-full bg-surface2 border border-border px-3 py-2.5 mb-6 text-sm font-mono text-ink placeholder:text-ink3 focus:border-red outline-none" />
            <button type="submit"
              className="w-full bg-red hover:bg-red/90 text-white py-2.5 text-sm font-display tracking-wide">
              Enter Workspace →
            </button>
            <div className="text-[11px] font-mono text-ink2 mt-10 italic text-center">
              Value belongs to mechanisms.
            </div>
          </form>
        </div>
      );
    }

    /* ---------- ROUTE STUBS (filled in later chunks) ---------- */
    function HomeScreen({ onOpen, onNew, signOut }) {
      return (
        <div className="p-12 font-mono text-xs text-ink2">
          <div className="font-display text-2xl mb-4"><span className="text-red">ALT</span> <span className="text-ink">MERIDIAN</span></div>
          [ HOME — chunk W4 ]
          <div className="mt-6 flex gap-4">
            <button onClick={onNew} className="hover:text-red">+ New Analysis</button>
            <button onClick={signOut} className="hover:text-red">Sign out</button>
          </div>
        </div>
      );
    }
    function AnalysisShell({ engagementId, onBack }) {
      return (
        <div className="p-12 font-mono text-xs text-ink2">
          <div className="mb-4">[ ANALYSIS — chunk W5+ ]</div>
          <button onClick={onBack} className="hover:text-red">← Back</button>
        </div>
      );
    }

    /* ---------- APP ROOT ---------- */
    function App() {
      const [signedIn, setSignedIn] = useState(false);
      const [activeId, setActiveId] = useState(null);
      useEffect(() => {
        const eng = new URLSearchParams(location.search).get('engagement');
        if (eng) { setSignedIn(true); setActiveId(eng); }
      }, []);
      if (!signedIn) return <LoginScreen onEnter={() => setSignedIn(true)} />;
      if (activeId) return <AnalysisShell engagementId={activeId} onBack={() => setActiveId(null)} />;
      return <HomeScreen onOpen={setActiveId} onNew={() => { location.href = 'vef2.html'; }} signOut={() => setSignedIn(false)} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
