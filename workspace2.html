    function OutputsTab({ scenarios, analysis, tier, onPreset }) {
      return (
        <div className="max-w-[1080px] mx-auto px-4 sm:px-8 py-8">
          <div className="mb-6">
            <div className="text-[10px] font-mono uppercase tracking-widest text-ink2 mb-2">Assumption tier</div>
            <BigTierToggle tier={tier} onPreset={onPreset} />
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <ValueOfActingCard analysis={analysis} />
            <CostOfDelayCard analysis={analysis} />
            <CostOfDoingNothingCard analysis={analysis} />
          </div>
          <div className="space-y-4">
            <ScenarioWaterfall scenarios={scenarios} analysis={analysis} />
            <DCFCurve analysis={analysis} />
            <FinancialTable analysis={analysis} />
          </div>
        </div>
      );
    }

    /* ---------- SNAPSHOTS TAB ---------- */
    function buildSnapshotRow({ engagementId, label, intent, analysis, defs, values, scenarios, engagement }) {
      const inputSnap = {};
      (defs || []).forEach(d => { inputSnap[d.input_key] = values?.[d.input_key]?.provided_value ?? d.typical_value ?? d.default_value ?? null; });
      // Lesson 2026-04-24: stash speculative fields in JSON sidecar; never INSERT
      // unknown columns. stage/phase at snapshot live here in case the columns
      // don't exist on every tenant schema.
      inputSnap._meta = {
        stage_at_snapshot: engagement?.deal_stage || null,
        phase_at_snapshot: engagement?.phase || null,
        active_scenario_count: scenarios.filter(s => s.active).length,
        arv_full: analysis?.arvFull || 0,
        npv: analysis?.npv ?? null
      };
      return {
        engagement_id: engagementId,
        snapshot_label: label,
        intent: (intent || 'track').toLowerCase(),  // BUG-004 — DB CHECK constraint requires lowercase
        annual_value: analysis?.arvY1 || 0,
        input_snapshot: inputSnap,
        notes: ''
      };
    }
    function SnapshotCard({ snapshot }) {
      const meta = snapshot.input_snapshot?._meta || {};
      const stage = friendlyStage(meta.stage_at_snapshot);
      return (
        <div className="bg-surface border border-border p-4">
          <div className="flex items-center justify-between mb-2 gap-3">
            <div className="font-display text-sm text-ink truncate">{snapshot.snapshot_label || '(unlabeled)'}</div>
            <span className="text-[9px] font-mono uppercase tracking-widest px-1.5 py-0.5 bg-surface2 text-ink2 flex-shrink-0">{snapshot.intent || 'track'}</span>
          </div>
          <div className="text-[11px] font-mono text-ink2 mb-3">{fmtDate(snapshot.created_at)} · {fmtRelative(snapshot.created_at)}</div>
          <div className="grid grid-cols-3 gap-3 pt-3 border-t border-border">
            <div><div className="text-[9px] font-mono uppercase tracking-widest text-ink3">Y1 ARV</div><div className="text-sm font-display text-red mt-0.5">{fmtMoney(snapshot.annual_value)}</div></div>
            <div><div className="text-[9px] font-mono uppercase tracking-widest text-ink3">Full ARV</div><div className="text-sm font-mono text-ink mt-0.5">{fmtMoney(meta.arv_full)}</div></div>
            <div><div className="text-[9px] font-mono uppercase tracking-widest text-ink3">Stage</div><div className="text-sm font-mono text-ink mt-0.5">{stage.label}</div></div>

    function SnapshotsTab({ snapshots, onSave }) {
      const [busy, setBusy] = useState(false);
      const save = async () => { setBusy(true); try { await onSave(); } finally { setBusy(false); } };
      return (
        <div className="max-w-[720px] mx-auto px-4 sm:px-8 py-8">
          <div className="flex items-center justify-between mb-6 gap-3">
            <div>
              <div className="font-display text-xl text-ink">Snapshots</div>
              <div className="text-[11px] font-mono text-ink2 mt-1">{snapshots.length} captured</div>
            </div>
            <button onClick={save} disabled={busy} className="bg-red hover:bg-red/90 disabled:opacity-50 text-white px-4 py-2 text-xs font-display tracking-wide">{busy ? 'Saving…' : '+ Save Snapshot'}</button>
          </div>
          {snapshots.length === 0 ? (
            <div className="py-16 text-center text-ink3 font-mono text-xs">No snapshots yet. Save the first one to capture this baseline.</div>
          ) : (
            <div className="relative pl-6 space-y-4">
              <div className="absolute left-2 top-1 bottom-1 w-px bg-border" />
              {snapshots.map(s => (
                <div key={s.snapshot_id || s.created_at} className="relative">
                  <span className="absolute -left-[20px] top-3 w-2 h-2 rounded-full bg-red" />

      );

    /* ---------- MERIDIAN DRAWER (Anthropic chat) ---------- */
    const MERIDIAN_MODEL = 'claude-sonnet-4-5';
    const QUICK_PROMPTS = {
      overview:  ['Weakest assumption?', 'Draft a CFO narrative.'],
      scenarios: ['Which scenario gets challenged?', 'What evidence hardens the weak ones?'],
      inputs:    ['What am I missing?', 'Which inputs would the buyer push back on?'],
      outputs:   ['Is this defensible to finance?', 'How would procurement attack the BCR?'],
      snapshots: ['Compare the last two snapshots.', 'What changed since the last snapshot?']
    };
    function meridianSystemPrompt({ engagement, domain, scenarios, analysis, tab, tags, behavior, tone }) {
      const active = scenarios.filter(s => s.active);
      const stage = friendlyStage(engagement.deal_stage);
      const phase = friendlyPhase(engagement.phase);
      const tagList = [...(tags || [])].map(humanizeTagLabel).filter(Boolean);
      const toneNote = tone === 'conservative' ? 'Be conservative. Lead with NPV / payback. Hedge less than usual; numbers do the work.'
                     : tone === 'urgent'       ? 'Be urgent. Lead with cost of delay. Short sentences. Bias toward action this quarter.'
                                               : 'Be operational. Lead with realized Y1 value and what the team can ship.';
      const persona = `You are Meridian, a value-engineering analyst copilot inside the Alt Meridian workspace.\n${toneNote}\nNo filler. No hedging.`;
      return [
        persona,
        '',
        '# Current analysis',
        `Customer: ${engagement.prospect_name || '—'}`,
        `Vendor: ${engagement.vendor_name || '—'}`,
        `Domain: ${cleanDomainName(domain?.domain_name) || engagement.domain_id} (${domain?.primary_outcome || 'unmapped'})`,
        `Stage: ${stage.label} · Phase: ${phase.label}`,
        tagList.length ? `Tags: ${tagList.join(', ')}` : null,
        behavior?.signalEmphasis ? `Lead with: ${behavior.signalEmphasis}` : null,
        '',
        '# Computed numbers',
        `Y1 ARV: ${fmtMoney(analysis?.arvY1)} · Full ARV: ${fmtMoney(analysis?.arvFull)} · NPV: ${analysis?.npv != null ? fmtMoney(analysis.npv) : 'N/A'} · Payback: ${analysis?.payback != null ? fmtMonths(analysis.payback) : 'N/A'} · BCR: ${analysis?.bcr != null ? fmtMultiple(analysis.bcr) : 'N/A'}`,
        '',
        '# Active mechanisms',
        ...active.map(s => `- ${s.mechanism_label || s.scenario_id} (${s.value_theme || 'untyped'}, evidence: ${s.evidence_strength || 'Moderate'})`),
        '',
        `User is on the ${tab.toUpperCase()} tab.`
      ].filter(Boolean).join('\n');
    }
    // Friendly label for a tag key (matches the chip text shown in vef2 step 1).
    function humanizeTagLabel(key) {
      const map = {
        finance_led: 'Finance-led', ops_led: 'Ops-led', risk_led: 'Risk / compliance-led',
        rescue: 'Rescue / turnaround', new_footprint: 'New footprint', expansion: 'Expansion', compliance_driven: 'Compliance-driven',
        physical_network: 'Physical network', field_fleet: 'Field & fleet', digital_platform: 'Digital / data platform'
      };
      return map[key] || key;
    }
    function getMeridianKey() {
      let k = localStorage.getItem('anthropic_api_key');
      if (!k) {
        k = prompt('Enter your Anthropic API key (stored in localStorage):');
        if (k) localStorage.setItem('anthropic_api_key', k.trim());
      }
      return k;
    }
    async function callMeridian(messages, system) {
      const key = getMeridianKey();
      if (!key) throw new Error('No API key.');
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'  // Lesson 2026-04-24 — required for browser CORS
        },
        body: JSON.stringify({ model: MERIDIAN_MODEL, max_tokens: 1024, system, messages })
      });
      if (!resp.ok) throw new Error('Meridian ' + resp.status + ': ' + await resp.text());
      const data = await resp.json();
      return data.content?.map(c => c.text).join('') || '';
    }
    function ChatBubble({ role, text }) {
      const cls = role === 'user' ? 'bg-red/15 border-red/40 text-ink' : role === 'error' ? 'bg-red/10 border-red text-red' : 'bg-surface2 border-border text-ink';
      return (
        <div className="mb-3">
          <div className="text-[8px] font-mono uppercase tracking-widest text-ink3 mb-1">{role === 'user' ? 'You' : role === 'error' ? 'Error' : 'Assistant'}</div>
          <div className={`border px-3 py-2 text-[12px] leading-relaxed whitespace-pre-wrap ${cls}`}>{text}</div>
        </div>
      );
    }
    function MeridianDrawer({ onClose, tab, context }) {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [busy, setBusy] = useState(false);
      const bodyRef = useRef(null);
      useEffect(() => { if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight; }, [messages]);
      const send = async (text) => {
        const t = (text || input).trim();
        if (!t || busy) return;
        setInput('');
        const next = [...messages, { role: 'user', content: t }];
        setMessages(next); setBusy(true);
        try {
          const reply = await callMeridian(next, meridianSystemPrompt({ ...context, tab }));
          setMessages([...next, { role: 'assistant', content: reply }]);
        } catch (e) {
          setMessages([...next, { role: 'error', content: e.message || 'Request failed' }]);
        } finally { setBusy(false); }
      };
      const prompts = QUICK_PROMPTS[tab] || QUICK_PROMPTS.overview;
      return (
        <aside className="fixed inset-0 z-20 md:relative md:inset-auto md:z-auto md:w-[320px] bg-surface md:border-l md:border-border flex flex-col flex-shrink-0">
          <div className="h-12 px-4 border-b border-border flex items-center justify-between flex-shrink-0">
            <div className="font-mono text-[10px] uppercase tracking-widest text-ink2">Meridian · {MERIDIAN_MODEL}</div>
            <button onClick={onClose} className="text-ink3 hover:text-red text-base leading-none">×</button>
          </div>
          {messages.length === 0 && (
            <div className="px-4 pt-4 flex-shrink-0">
              <div className="text-[9px] font-mono uppercase tracking-widest text-ink3 mb-2">Quick prompts · {tab}</div>
              <div className="space-y-1.5">
                {prompts.map(p => (
                  <button key={p} onClick={() => send(p)} className="block w-full text-left text-[11px] text-ink2 hover:text-red border border-border hover:border-red/50 px-2.5 py-1.5">{p}</button>
                ))}
              </div>
            </div>
          )}
          <div ref={bodyRef} className="flex-1 overflow-auto px-4 pt-4">
            {messages.map((m, i) => <ChatBubble key={i} role={m.role === 'error' ? 'error' : m.role} text={m.content} />)}
            {busy && <div className="text-[10px] font-mono text-ink3 italic">thinking…</div>}
          </div>
          <div className="border-t border-border p-3 flex-shrink-0">
            <textarea value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
              rows={2} placeholder="Ask Meridian…" className="w-full bg-surface2 border border-border px-2 py-1.5 text-[12px] resize-none focus:border-red outline-none" />
            <button onClick={() => send()} disabled={busy} className="w-full mt-2 bg-red hover:bg-red/90 disabled:opacity-50 text-white py-1.5 text-[11px] font-mono uppercase tracking-wider">Send</button>
          </div>
        </aside>
      );
    }

    /* ---------- ANALYSIS SHELL ---------- */
    const NAV = [
      { key: 'overview',  label: 'Overview' },
      { key: 'scenarios', label: 'Scenarios' },
      { key: 'inputs',    label: 'Inputs' },
      { key: 'outputs',   label: 'Outputs' },
      { key: 'snapshots', label: 'Snapshots' }
    ];

    function AnalysisShell({ engagementId, onBack }) {
      const [bundle, setBundle] = useState(null);
      const [err, setErr] = useState('');
      const [tab, setTab] = useState('overview');
      const [overrides, setOverrides] = useState({});
      const [activeOverrides, setActiveOverrides] = useState({});
      const [navOpen, setNavOpen] = useState(false);
      const [drawerOpen, setDrawerOpen] = useState(false);
      const [tier, setTier] = useState('typical');
      useEffect(() => {
        setBundle(null); setOverrides({}); setActiveOverrides({}); setErr('');
        loadEngagementBundle(engagementId).then(b => b ? setBundle(b) : setErr('Engagement not found')).catch(e => setErr(e.message || 'Failed to load'));
      }, [engagementId]);
      const values = useMemo(() => ({ ...(bundle?.values || {}), ...overrides }), [bundle, overrides]);
      const scenarios = useMemo(() => {
        const merged = bundle ? mergeScenarios(bundle.scenarios, bundle.selections) : [];
        return merged.map(s => activeOverrides[s.scenario_id] != null ? { ...s, active: activeOverrides[s.scenario_id] } : s);
      }, [bundle, activeOverrides]);
      const analysis = useMemo(() => bundle ? computeAnalysis(scenarios, values, bundle.defs) : null, [bundle, scenarios, values]);
      // Tag behavior derived once per bundle load — drives Overview/Scenarios/Inputs/Meridian copy + ranking.
      const tags = useMemo(() => bundle ? parseTagsFromNotes(bundle.engagement?.notes) : new Set(), [bundle]);
      const behavior = useMemo(() => resolveTagBehavior(tags), [tags]);
      const tone = getTone(behavior);
      // Auto-activate scenarios in tag-driven themes that haven't been explicitly toggled yet.
      // Only fires once per bundle load — respects subsequent user toggles via the activeOverrides
      // null-check inside setActiveOverrides.
      useEffect(() => {
        if (!bundle || !behavior.autoActiveThemes?.length) return;
        const noSelection = (s) => !bundle.selections.find(x => x.scenario_id === s.scenario_id);
        const targets = bundle.scenarios.filter(s => behavior.autoActiveThemes.includes(s.value_theme) && noSelection(s) && !s.active_by_default);
        if (!targets.length) return;
        setActiveOverrides(prev => {
          const next = { ...prev };
          targets.forEach(s => { if (next[s.scenario_id] == null) next[s.scenario_id] = true; });
          return next;
        });
        Promise.all(targets.map(s => sbUpsert('vef_scenario_selections', { engagement_id: engagementId, scenario_id: s.scenario_id, is_active: true }, 'engagement_id,scenario_id'))).catch(() => {});
      }, [bundle, behavior]);
      // Buyer-lens tier default: surface visually on every load; auto-apply values only
      // on a fresh engagement (no input_values rows yet) to avoid clobbering buyer input.
      const tierDefaultedRef = useRef(null);
      useEffect(() => {
        if (!bundle || !behavior.tierDefault) return;
        if (tierDefaultedRef.current === bundle.engagement.engagement_id) return;
        tierDefaultedRef.current = bundle.engagement.engagement_id;
        setTier(behavior.tierDefault);
        if (Object.keys(bundle.values || {}).length === 0) {
          applyPreset(behavior.tierDefault);
        }
      }, [bundle, behavior]);
      const slideInput = (key, val) => setOverrides(p => ({ ...p, [key]: { ...(p[key] || bundle.values?.[key] || {}), engagement_id: engagementId, input_key: key, provided_value: val, value_source: 'buyer' } }));
      const commitInput = (key, val) => sbUpsert('vef_input_values', { engagement_id: engagementId, input_key: key, provided_value: val, value_source: 'buyer' }, 'engagement_id,input_key').catch(() => {});
      const toggleScenario = (scenarioId, isActive) => {
        setActiveOverrides(p => ({ ...p, [scenarioId]: isActive }));
        sbUpsert('vef_scenario_selections', { engagement_id: engagementId, scenario_id: scenarioId, is_active: isActive }, 'engagement_id,scenario_id').catch(() => {});
      };
      const refreshSnapshots = async () => {
        const snaps = await loadSnapshots(engagementId).catch(() => []);
        setBundle(b => b ? { ...b, snapshots: snaps } : b);
      };
      const saveSnapshot = async () => {
        const today = new Date().toISOString().slice(0, 10);
        const row = buildSnapshotRow({
          engagementId, label: `Snapshot ${today}`, intent: 'track',
          analysis, defs: bundle.defs, values, scenarios, engagement: bundle.engagement
        });
        await sbInsert('vef_output_snapshots', row);
        await refreshSnapshots();
      };
      const applyPreset = (newTier) => {
        if (!bundle?.defs) return;
        setTier(newTier);
        const tk = newTier === 'conservative' ? 'conservative_value' : newTier === 'aggressive' ? 'aggressive_value' : 'typical_value';
        const next = {};
        bundle.defs.forEach(d => {
          const v = d[tk] ?? d.typical_value ?? d.default_value;
          if (v != null) next[d.input_key] = { engagement_id: engagementId, input_key: d.input_key, provided_value: Number(v), value_source: 'preset:' + newTier };
        });
        setOverrides(next);
        Promise.all(Object.values(next).map(row => sbUpsert('vef_input_values', row, 'engagement_id,input_key'))).catch(() => {});
      };
      const governed = useMemo(() => bundle ? governedPct(values, bundle.defs) : 0, [bundle, values]);
      if (err) return <div className="p-12 font-mono text-xs text-red">{err} <button onClick={onBack} className="ml-4 text-ink2 hover:text-red">← Back</button></div>;
      if (!bundle) return <div className="min-h-full grid place-items-center text-ink2 font-mono text-xs">Loading…</div>;
      const stage = friendlyStage(bundle.engagement.deal_stage);
      return (
        <div className="h-full flex flex-col bg-bg">
          <header className="h-12 px-3 sm:px-4 border-b border-border bg-surface flex items-center justify-between flex-shrink-0 gap-3">
            <div className="flex items-center gap-2 sm:gap-3 min-w-0">
              <button onClick={onBack} className="text-ink2 hover:text-red text-sm font-mono flex-shrink-0">←</button>
              <button onClick={() => setNavOpen(o => !o)} className="md:hidden text-ink2 hover:text-red text-sm font-mono flex-shrink-0">☰</button>
              <div className="font-display text-sm tracking-wide"><span className="text-red">ALT</span> <span className="text-ink">MERIDIAN</span></div>
            </div>
            <div className="flex items-center gap-2 sm:gap-3 flex-shrink-0">
              <StageBadge stage={bundle.engagement.deal_stage} />
              <button onClick={() => setDrawerOpen(o => !o)} className={`px-2.5 py-1 text-[10px] font-mono uppercase tracking-wider border ${drawerOpen ? 'border-red text-red' : 'border-border2 text-ink2 hover:text-ink'}`}>Meridian ◆</button>
              <button className="hidden sm:block bg-red hover:bg-red/90 text-white px-2.5 py-1 text-[10px] font-mono uppercase tracking-wider">Report</button>
            </div>
          </header>
          <div className="flex-1 flex min-h-0">
            <aside className={`${navOpen ? 'absolute inset-0 z-10 flex' : 'hidden'} md:relative md:flex md:w-[220px] bg-surface border-r border-border flex-col flex-shrink-0`}>
              <div className="px-4 pt-4 pb-3 border-b border-border">
                <button onClick={() => { onBack(); setNavOpen(false); }}
                  className="flex items-center gap-1.5 text-[10px] font-mono uppercase tracking-widest text-ink2 hover:text-red mb-3">
                  <span>←</span><span>Back to workspace</span>
                </button>
                <div className="font-display text-sm text-ink truncate">{bundle.engagement.analysis_name || bundle.engagement.vendor_name || 'Untitled'}</div>
                <div className="font-mono text-[10px] text-ink3 truncate mt-0.5">{bundle.engagement.prospect_name || '—'}</div>
              </div>
              <nav className="py-2 flex-shrink-0">
                {NAV.map(t => (
                  <button key={t.key} onClick={() => { setTab(t.key); setNavOpen(false); }}
                    className={`w-full text-left px-4 py-2 text-[11px] font-mono uppercase tracking-widest border-l-2 transition-colors ${tab === t.key ? 'border-red text-red bg-red-dim' : 'border-transparent text-ink2 hover:text-ink'}`}>
                    {t.label}
                  </button>
                ))}
              </nav>
              <LiveAssumptions scenarios={scenarios} defs={bundle.defs} values={values} analysis={analysis} onSlide={slideInput} onCommit={commitInput} tone={tone} />
            </aside>
            <main className="flex-1 overflow-auto">
              {tab === 'overview' ? <OverviewTab bundle={bundle} scenarios={scenarios} analysis={analysis} governed={governed} onTab={setTab} tags={tags} behavior={behavior} tone={tone} />
                : tab === 'scenarios' ? <ScenariosTab scenarios={scenarios} analysis={analysis} onToggle={toggleScenario} behavior={behavior} />
                : tab === 'inputs' ? <InputsTab scenarios={scenarios} defs={bundle.defs} values={values} tier={tier} onSlide={slideInput} onCommit={commitInput} onPreset={applyPreset} engagement={bundle.engagement} onSessionWritten={(notes) => setBundle(b => b ? { ...b, engagement: { ...b.engagement, notes } } : b)} />
                : tab === 'outputs' ? <OutputsTab scenarios={scenarios} analysis={analysis} tier={tier} onPreset={applyPreset} />
                : <SnapshotsTab snapshots={bundle.snapshots || []} onSave={saveSnapshot} />}
            </main>
            {drawerOpen && <MeridianDrawer onClose={() => setDrawerOpen(false)} tab={tab} context={{ engagement: bundle.engagement, domain: bundle.domain, scenarios, analysis, tags, behavior, tone }} />}
          </div>
        </div>
      );
    }

    /* ---------- APP ROOT ---------- */
    function App() {
      const [signedIn, setSignedIn] = useState(false);
      const [activeId, setActiveId] = useState(null);
      useEffect(() => {
        const eng = new URLSearchParams(location.search).get('engagement');
        if (eng) { setSignedIn(true); setActiveId(eng); }
      }, []);
      if (!signedIn) return <LoginScreen onEnter={() => setSignedIn(true)} />;
      if (activeId) return <AnalysisShell engagementId={activeId} onBack={() => setActiveId(null)} />;
      return <HomeScreen onOpen={setActiveId} onNew={() => { location.href = 'vef2.html'; }} signOut={() => setSignedIn(false)} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
